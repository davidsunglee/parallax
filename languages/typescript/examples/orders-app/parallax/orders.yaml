# Sample-app descriptor — a minimal `Order` entity plus its line `items`.
#
# A descriptor is an instance of core/schemas/metamodel.schema.json (spec §3.1):
# pure serialized metamodel, no fixture rows. `parallax generate` reads it and
# emits the typed `#parallax` barrel (entity symbols + the `parallax(...)`
# factory). This is the same canonical format the compatibility corpus uses.
entities:
  - name: Order
    table: orders
    persistence: read-write
    attributes:
      - { name: id, type: int64, primaryKey: true, pkGeneration: application-assigned }
      - { name: name, type: string, maxLength: 255 }
      - { name: sku, type: string, maxLength: 32, nullable: true }
      - { name: qty, type: int32 }
      - { name: price, type: "decimal(18,2)" }
      - { name: active, type: boolean }
    relationships:
      - name: items
        cardinality: one-to-many
        join:
          source: id
          target: { entity: OrderItem, attribute: orderId }
  - name: OrderItem
    table: order_item
    persistence: read-write
    attributes:
      - { name: id, type: int64, primaryKey: true, pkGeneration: application-assigned }
      - { name: orderId, type: int64, column: order_id }
      - { name: sku, type: string, maxLength: 32 }
      - { name: quantity, type: int32 }
    relationships:
      - name: order
        reverseOf: Order.items
