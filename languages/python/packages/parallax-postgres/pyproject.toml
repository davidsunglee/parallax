[project]
name = "parallax-postgres"
version = "0.1.0"
description = "Parallax Postgres database adapter: the concrete database port over psycopg (the sole psycopg declarer)."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Parallax" }]
dependencies = [
    "parallax-core",
    # The binary extra bundles libpq so the adapter installs self-contained (no
    # system libpq required); parallax-postgres remains the sole psycopg declarer.
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parallax"]

[tool.hatch.build.targets.sdist]
include = ["src/parallax", "README.md"]
