[project]
name = "parallax-snapshot"
version = "0.1.0"
description = "Parallax snapshot lifecycle extension: Snapshot[T] materialization and the developer handle over the parallax-core spine."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Parallax" }]
dependencies = [
    "parallax-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parallax"]

[tool.hatch.build.targets.sdist]
include = ["src/parallax", "README.md"]
