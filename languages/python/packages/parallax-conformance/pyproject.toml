[project]
name = "parallax-conformance"
version = "0.1.0"
description = "Parallax conformance tooling (development-only): corpus/case loading, the recording/refusing compile port, provisioning, and the describe/compile/run CLI."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Parallax" }]
dependencies = [
    "parallax-core",
    "parallax-snapshot",
    "parallax-postgres",
    "testcontainers>=4.0",
    "jsonschema>=4.21",
]

[project.scripts]
parallax-conformance = "parallax.conformance.cli:main"
gen-usage-guide = "parallax.conformance.usage_guide:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parallax"]

[tool.hatch.build.targets.sdist]
include = ["src/parallax", "README.md"]
