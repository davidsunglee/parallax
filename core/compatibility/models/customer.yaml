# Customer: a valueObject model — an embedded composite mapped to a single
# structured-document column (Phase 9).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. The
# `address` element is a `valueObject`: an embedded composite (street / city /
# geo) stored in ONE m-core `json` column (`address`), NOT column-flattened (a
# deliberate deviation from Reladomo). Its inner fields are read / filtered with
# the m-op-algebra nested-attribute access form (nestedEq / nestedNotEq over a dotted path
# `Customer.address.field`). Postgres golden SQL lowers that to a
# `jsonb_extract_path_text` extraction whose path segments are carried as `?`
# binds.
#
# Row data lives in the sibling fixtures/customer.yaml; each `address` fixture
# value is a nested mapping loaded into the structured-document column.
entity:
  name: Customer
  namespace: parallax.compatibility
  table: customer
  mutability: transactional
  temporal: non-temporal
  attributes:
    - name: id
      type: int64
      column: id
      primaryKey: true
      pkGenerator: none
    - name: name
      type: string
      column: name
      maxLength: 64
  valueObjects:
    - name: address
      type: Address
      column: address
      mapping: json
      nullable: true
  indices:
    - name: customer_pk
      attributes: [id]
      unique: true
