# Customer: a valueObject model ‚Äî a recursive, typed embedded composite mapped to
# a single structured-document column (m-value-object).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. The
# `address` element is a top-level `valueObject`: an embedded composite stored in
# ONE m-core `json` column (`address`), NOT column-flattened (a deliberate
# deviation from Reladomo). It declares typed inner `attributes` (street / city),
# nested `valueObjects` to arbitrary depth (`geo` one -> `point` one), and a
# to-many nested member (`phones` many). Every nested value object and inner
# attribute lives inside that SAME `address` column ‚Äî never an extra column, row,
# or join ‚Äî so only `address` carries `column`/`mapping`.
#
# Its inner fields are read / filtered with the m-op-algebra nested-attribute
# access form (a dotted path `Customer.address.field` / `Customer.address.geo.‚Ä¶`).
# Postgres golden SQL lowers that to a `jsonb_extract_path_text` extraction whose
# path segments are carried as `?` binds.
#
# Row data lives in the sibling fixtures/customer.yaml; each `address` fixture
# value is a nested mapping loaded into the structured-document column. Nested
# members not yet present in every fixture row are `nullable: true` so the current
# fixtures stay valid; fixtures/cases are enriched in later phases.
#
# COR-3 Phase 5b (read-projection amendment) adds a SECOND, VO-bearing child
# entity `Location` and the to-many `Customer.locations` relationship, so the
# corpus can witness the deep-fetch √ó value-object composition (design note 14 ¬ß3,
# round 4): a `deepFetch(all(Customer), paths=[[Customer.locations]])` read whose
# root level projects Customer's instance-form list (`id, name, address`) and whose
# child level projects Location's own instance-form list (`id, customer_id, label,
# address`: the FK via slot 1, the document last via slot 4). `Location` reuses
# Customer's `address` composite verbatim ‚Äî same declared members, same
# absence-state vocabulary ‚Äî so a null-document child materializes null exactly as
# a null-address Customer does, pinning the absence collapse AT DEPTH. Adding a
# sibling entity + relationship leaves Customer's own attributes/valueObjects and
# their derived `columnOrder` untouched, so the existing customer reads (the 21
# filter reads and the -023/-024 materialization graphs) do not ripple.
#
# A re-review round adds a THIRD entity `Depot` and the to-many `Customer.depots`,
# to make the per-step read-entity resolution regression-sensitive. Where `Location`
# reuses Customer's `address` composite VERBATIM (so a wrong-descriptor decode is
# indistinguishable), `Depot.address` is a DIFFERENT declared STRUCTURE ‚Äî a FLAT
# `{ line, postcode }` in the same `address` column. Decoding a Depot row with the
# root Customer descriptor therefore yields observably wrong keys, so the deferred
# `action: load` and operation-list first-`access` witnesses over `depots`
# (m-deep-fetch-020, m-op-list-004) go RED if a runner materializes them with the
# scenario root instead of the navigated child entity. `Depot` and its relationship
# again leave Customer's / Location's attributes, valueObjects, and `columnOrder`
# untouched, so no existing customer/location case ripples.
entities:
  - name: Customer
    namespace: parallax.compatibility
    table: customer
    persistence: read-write
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: application-assigned
      - name: name
        type: string
        column: name
        maxLength: 64
    valueObjects:
      - name: address
        column: address
        multiplicity: one
        nullable: true
        attributes:
          - name: street
            type: string
          - name: city
            type: string
        valueObjects:
          - name: geo
            multiplicity: one
            nullable: true
            attributes:
              - name: country
                type: string
              - name: elevation
                type: float64
                nullable: true
            valueObjects:
              - name: point
                multiplicity: one
                nullable: true
                attributes:
                  - name: lat
                    type: float64
                    nullable: true
                  - name: lon
                    type: float64
                    nullable: true
          - name: phones
            multiplicity: many
            attributes:
              - name: type
                type: string
                nullable: true
              - name: number
                type: string
                nullable: true
    relationships:
      - name: locations
        cardinality: one-to-many
        join:
          source: id
          target: { entity: Location, attribute: customerId }
        dependent: true
        orderBy:
          - { attribute: id, direction: asc }
      # depots: a SECOND VO-bearing child, reached via a distinct one-to-many. Its
      # `Depot.address` value object reuses the SAME column name `address` but a
      # DIFFERENT declared STRUCTURE (a FLAT { line, postcode }) than Customer's /
      # Location's recursive composite ‚Äî a deliberate descriptor DIVERGENCE. Decoding
      # a Depot row with Customer's `address` descriptor yields observably wrong keys,
      # so the deferred-load / first-access witnesses over `depots` are regression-
      # sensitive to the per-step read-entity resolution (m-sql "Read projection",
      # slot 4; m-case-format "Read result form"), unlike Location whose composite is
      # Customer's verbatim.
      - name: depots
        cardinality: one-to-many
        join:
          source: id
          target: { entity: Depot, attribute: customerId }
        dependent: true
        orderBy:
          - { attribute: id, direction: asc }
    indices:
      - name: customer_pk
        attributes: [id]
        unique: true
  # Location: a VO-bearing CHILD of Customer (the many side of the to-many
  # `Customer.locations`). It carries its own scalars ‚Äî `id`, the `customer_id`
  # foreign key, and `label` ‚Äî plus its OWN `address` value object, the same
  # recursive composite Customer declares (reused verbatim, m-value-object). It is
  # the first relationship-target entity in the corpus to declare a value object,
  # so a deep-fetch child level materializes a document at DEPTH: the child's
  # instance-form projection is `id, customer_id, label, address` (scalars in
  # columnOrder, then the single structured-document column last).
  - name: Location
    namespace: parallax.compatibility
    table: location
    persistence: read-write
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: application-assigned
      - name: customerId
        type: int64
        column: customer_id
      - name: label
        type: string
        column: label
        maxLength: 64
    valueObjects:
      - name: address
        column: address
        multiplicity: one
        nullable: true
        attributes:
          - name: street
            type: string
          - name: city
            type: string
        valueObjects:
          - name: geo
            multiplicity: one
            nullable: true
            attributes:
              - name: country
                type: string
              - name: elevation
                type: float64
                nullable: true
            valueObjects:
              - name: point
                multiplicity: one
                nullable: true
                attributes:
                  - name: lat
                    type: float64
                    nullable: true
                  - name: lon
                    type: float64
                    nullable: true
          - name: phones
            multiplicity: many
            attributes:
              - name: type
                type: string
                nullable: true
              - name: number
                type: string
                nullable: true
    relationships:
      - name: customer
        reverseOf: Customer.locations
    indices:
      - name: location_pk
        attributes: [id]
        unique: true
      - name: location_customer_id
        attributes: [customerId]
        unique: false
  # Depot: a SECOND VO-bearing CHILD of Customer (the many side of the to-many
  # `Customer.depots`). Unlike Location ‚Äî whose `address` is Customer's recursive
  # composite VERBATIM ‚Äî Depot declares a DIFFERENT `address` structure: a FLAT
  # composite `{ line, postcode }` in the SAME `address` column. This descriptor
  # DIVERGENCE is deliberate: it makes the deferred-load and first-access witnesses
  # over `depots` regression-sensitive. Decoding a Depot row with Customer's
  # recursive `address` descriptor drops `line`/`postcode` and injects
  # `street`/`city`/`geo`/`phones`, so materializing a Depot list with the WRONG
  # (root Customer) descriptor is OBSERVABLE ‚Äî the failure Location cannot surface.
  # Its own instance-form projection is `id, customer_id, label, address` (scalars in
  # columnOrder, then the single structured-document column last).
  - name: Depot
    namespace: parallax.compatibility
    table: depot
    persistence: read-write
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: application-assigned
      - name: customerId
        type: int64
        column: customer_id
      - name: label
        type: string
        column: label
        maxLength: 64
    valueObjects:
      - name: address
        column: address
        multiplicity: one
        nullable: true
        attributes:
          - name: line
            type: string
            nullable: true
          - name: postcode
            type: string
            nullable: true
    relationships:
      - name: customer
        reverseOf: Customer.depots
    indices:
      - name: depot_pk
        attributes: [id]
        unique: true
      - name: depot_customer_id
        attributes: [customerId]
        unique: false
