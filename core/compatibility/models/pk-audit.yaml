# PK generation composed with a TEMPORAL (audit-only) entity (m-pk-gen +
# m-txtime-write) — net-new: no existing model puts a pkGeneration on a temporal
# entity.
#
# `AuditSeq` is the simulated-sequence registry (Reladomo SimulatedSequence): one
# row per named sequence (`name` PK) holding the next value (`next_val`) to hand
# out. `AuditEntry` is an audit-only (Transaction-Time-Only) entity whose primary
# key is allocated by that sequence (`pkGeneration: { strategy: sequence, ... }`):
# an insert first reserves a block from the registry (`next_val += 1`), then opens
# a milestone `[in_z = txInstant, out_z = infinity)` carrying the reserved id.
#
# The two disciplines compose without conflict: the reserved id is a plain domain
# value on the milestone (the sequence oracle re-derives it from the config), and
# the in_z/out_z bookkeeping is the ordinary txtime-write milestone open. The
# interval columns are `timestamp` (instants are UTC); the open upper bound is the
# database-native infinity (m-core/m-dialect). Row data (the registry seed) lives
# in fixtures/pk-audit.yaml; the AuditEntry milestone is built by the case's DML.
entities:
  - name: AuditSeq
    namespace: parallax.compatibility
    table: audit_seq
    persistence: read-write
    attributes:
      - { name: name, type: string, column: name, primaryKey: true, maxLength: 64, pkGeneration: application-assigned }
      - { name: nextVal, type: int64, column: next_val }
    indices:
      - { name: audit_seq_pk, attributes: [name], unique: true }
  - name: AuditEntry
    namespace: parallax.compatibility
    table: audit_entry
    persistence: read-write
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: { strategy: sequence, name: entry_seq, initialValue: 1, incrementSize: 1, batchSize: 1 }
      - name: note
        type: string
        column: note
        maxLength: 64
      - name: tx_start
        type: timestamp
        column: in_z
      - name: tx_end
        type: timestamp
        column: out_z
    asOfAxes:
      - dimension: transactionTime
        startAttribute: tx_start
        endAttribute: tx_end
    indices:
      - name: audit_entry_pk
        attributes: [id, tx_start]
        unique: true
