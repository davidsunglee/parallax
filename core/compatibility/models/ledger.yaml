# Ledger: an audit-only (processing-temporal) model with an INCLUSIVE upper
# bound — the toIsInclusive=true counterpart to Balance (models/balance.yaml).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It is a
# copy of the Balance shape EXCEPT its processing as-of attribute declares
# `toIsInclusive: true`, so the as-of interval is the CLOSED form [from, to]
# rather than Balance's half-open [from, to). The injected as-of predicate
# therefore reads `out_z >= ?` instead of `out_z > ?`, and a pin exactly on a
# milestone boundary includes BOTH the row ending at the boundary and the row
# beginning there. This is the opposite normative branch from 0507 (which proves
# the exclusive boundary on Balance).
#
# Row data lives in the sibling fixtures/ledger.yaml (same milestone history as
# Balance, so the boundary read discriminates cleanly).
entity:
  name: Ledger
  namespace: parallax.compatibility
  table: ledger
  mutability: transactional
  temporal: unitemporal-processing
  attributes:
    - name: id
      type: int64
      column: led_id
      primaryKey: true
      pkGenerator: none
    - name: acctNum
      type: string
      column: acct_num
      maxLength: 32
    - name: value
      type: decimal(18,2)
      column: val
    - name: processingFrom
      type: timestamp
      column: in_z
    - name: processingTo
      type: timestamp
      column: out_z
  asOfAttributes:
    - name: processingDate
      fromColumn: in_z
      toColumn: out_z
      axis: processing
      toIsInclusive: true
      infinity: infinity
      default: now
  indices:
    - name: ledger_pk
      attributes: [id, processingFrom]
      unique: true
    - name: ledger_acct
      attributes: [acctNum]
      unique: false
