# Ledger: a Transaction-Time-Only model used for milestone-boundary reads.
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It is a
# second witness of the normalized half-open `[start, end)` axis contract. A pin
# exactly on a milestone boundary excludes the row ending there and includes the
# row beginning there; there is no per-axis inclusivity switch.
#
# Row data lives in the sibling fixtures/ledger.yaml (same milestone history as
# Balance, so the boundary read discriminates cleanly).
entity:
  name: Ledger
  namespace: parallax.compatibility
  table: ledger
  persistence: read-write
  attributes:
    - name: id
      type: int64
      column: led_id
      primaryKey: true
      pkGeneration: application-assigned
    - name: acctNum
      type: string
      column: acct_num
      maxLength: 32
    - name: value
      type: decimal(18,2)
      column: val
    - name: tx_start
      type: timestamp
      column: in_z
    - name: tx_end
      type: timestamp
      column: out_z
  asOfAxes:
    - dimension: transactionTime
      startAttribute: tx_start
      endAttribute: tx_end
  indices:
    - name: ledger_pk
      attributes: [id, tx_start]
      unique: true
    - name: ledger_acct
      attributes: [acctNum]
      unique: false
