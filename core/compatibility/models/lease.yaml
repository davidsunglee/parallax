# Tenant / Lease / LeaseNote: the MIXED-temporality chain. A single path crosses
# both mixed directions: Tenant.leases is non-temporal -> temporal (the child
# Lease defaults every axis to LATEST), and Lease.notes is temporal ->
# non-temporal (the child LeaseNote carries NO as-of term). Proves the two mixed
# rules of m-navigate's as-of-propagation section. Row data lives in fixtures/lease.yaml.
entities:
  - name: Tenant
    namespace: parallax.compatibility
    table: tenant
    attributes:
      - { name: id, type: int64, primaryKey: true }
      - { name: name, type: string, maxLength: 64 }
    relationships:
      - name: leases
        cardinality: one-to-many
        join:
          source: id
          target: { entity: Lease, attribute: tenantId }
    indices:
      - { name: tenant_pk, attributes: [id], unique: true }
  - name: Lease
    namespace: parallax.compatibility
    table: lease
    attributes:
      - { name: id, type: int64, primaryKey: true }
      - { name: tenantId, type: int64, column: tenant_id }
      - { name: term, type: string, maxLength: 16 }
      - { name: tx_start, type: timestamp, column: in_z }
      - { name: tx_end, type: timestamp, column: out_z }
    asOfAxes:
      - { dimension: transactionTime, startAttribute: tx_start, endAttribute: tx_end }
    relationships:
      - name: notes
        cardinality: one-to-many
        join:
          source: id
          target: { entity: LeaseNote, attribute: leaseId }
        dependent: true
    indices:
      - { name: lease_pk, attributes: [id, tx_start], unique: true }
      - { name: lease_tenant, attributes: [tenantId] }
  - name: LeaseNote
    namespace: parallax.compatibility
    table: lease_note
    attributes:
      - { name: id, type: int64, primaryKey: true }
      - { name: leaseId, type: int64, column: lease_id }
      - { name: text, type: string, column: note_text, maxLength: 64 }
    indices:
      - { name: lease_note_pk, attributes: [id], unique: true }
      - { name: lease_note_lease, attributes: [leaseId] }
