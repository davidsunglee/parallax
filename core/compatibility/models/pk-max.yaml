# Attendee: a plain non-temporal entity whose primary key is allocated by the
# `max` pkGeneration strategy (max(col)+1). The strategy is realized entirely in
# the golden SQL of the writeSequence cases (the harness applies the DML and
# asserts the resulting table state); the metamodel declaration documents intent.
# Cases self-seed any baseline via an initial literal `insert` step, so this model
# carries NO fixtures (each case starts from an empty schema).
entity:
  name: Attendee
  namespace: parallax.compatibility
  table: attendee
  attributes:
    - name: id
      type: int64
      primaryKey: true
      pkGeneration: max
    - name: name
      type: string
      maxLength: 64
  indices:
    - name: attendee_pk
      attributes: [id]
      unique: true
