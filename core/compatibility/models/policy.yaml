# Policy / Coverage / Claim: three BITEMPORAL entities that also RELATE — the
# temporal x relationships crossing (as-of propagation). Mirrors position.yaml's
# bitemporal shape (two axes, half-open [from, to), open bound = infinity) but
# adds relationships so an as-of read can navigate/deep-fetch across temporal
# hops. Per m-navigate's as-of-propagation rule, the root pin propagates per-hop, matched
# by axis, to every temporal entity reached; the harness derives and enforces the
# propagated child predicate (the propagation oracle).
#
# Coverage 10 carries the correction history (the audit teeth): as-of-past
# returns the superseded value, as-of-latest the corrected one. Row data lives in
# fixtures/policy.yaml.
entities:
  - name: Policy
    namespace: parallax.compatibility
    table: policy
    persistence: read-write
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGeneration: application-assigned }
      - { name: name, type: string, column: name, maxLength: 64 }
      - { name: valid_start, type: timestamp, column: from_z }
      - { name: valid_end, type: timestamp, column: thru_z }
      - { name: tx_start, type: timestamp, column: in_z }
      - { name: tx_end, type: timestamp, column: out_z }
    asOfAxes:
      - { dimension: validTime, startAttribute: valid_start, endAttribute: valid_end }
      - { dimension: transactionTime, startAttribute: tx_start, endAttribute: tx_end }
    relationships:
      - name: coverages
        cardinality: one-to-many
        join:
          source: id
          target: { entity: Coverage, attribute: policyId }
        dependent: true
    indices:
      - { name: policy_pk, attributes: [id, valid_start, tx_start], unique: true }
  - name: Coverage
    namespace: parallax.compatibility
    table: coverage
    persistence: read-write
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGeneration: application-assigned }
      - { name: policyId, type: int64, column: policy_id }
      - { name: amount, type: "decimal(18,2)", column: amount }
      - { name: valid_start, type: timestamp, column: from_z }
      - { name: valid_end, type: timestamp, column: thru_z }
      - { name: tx_start, type: timestamp, column: in_z }
      - { name: tx_end, type: timestamp, column: out_z }
    asOfAxes:
      - { dimension: validTime, startAttribute: valid_start, endAttribute: valid_end }
      - { dimension: transactionTime, startAttribute: tx_start, endAttribute: tx_end }
    relationships:
      - name: claims
        cardinality: one-to-many
        join:
          source: id
          target: { entity: Claim, attribute: coverageId }
        dependent: true
      - name: policy
        reverseOf: Policy.coverages
    indices:
      - { name: coverage_pk, attributes: [id, valid_start, tx_start], unique: true }
      - { name: coverage_policy, attributes: [policyId], unique: false }
  - name: Claim
    namespace: parallax.compatibility
    table: claim
    persistence: read-write
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGeneration: application-assigned }
      - { name: coverageId, type: int64, column: coverage_id }
      - { name: reserve, type: "decimal(18,2)", column: reserve }
      - { name: valid_start, type: timestamp, column: from_z }
      - { name: valid_end, type: timestamp, column: thru_z }
      - { name: tx_start, type: timestamp, column: in_z }
      - { name: tx_end, type: timestamp, column: out_z }
    asOfAxes:
      - { dimension: validTime, startAttribute: valid_start, endAttribute: valid_end }
      - { dimension: transactionTime, startAttribute: tx_start, endAttribute: tx_end }
    indices:
      - { name: claim_pk, attributes: [id, valid_start, tx_start], unique: true }
      - { name: claim_coverage, attributes: [coverageId], unique: false }
