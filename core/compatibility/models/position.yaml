# Position: a FULL bitemporal model — the Phase 8 signature shape.
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It models
# the full bitemporal profile (DQ7 fast-follow / definitely-do): TWO as-of
# dimensions, one per axis.
#
#   business   (from_z / thru_z) — WHEN A FACT IS TRUE IN THE WORLD.
#   processing (in_z   / out_z ) — WHEN THE SYSTEM KNEW that fact (audit-only axis).
#
# A row is the milestone at the intersection of a business interval and a
# processing interval — a "rectangle" in (business x processing) space. Each
# interval is half-open `[from, to)`; the open upper bound is the database-native
# infinity (m-core/m-dialect). A row is CURRENT on an axis when its `to` on that axis equals
# infinity; the fully-Latest row is current on BOTH (thru_z = out_z = infinity).
#
# Milestone-chaining writes never mutate a value in place. The signature
# bitemporal write is the RECTANGLE SPLIT (research §6): an `updateUntil` over a
# bounded Valid-Time window inactivates the original (closes its Transaction-Time dimension at
# the transaction instant) and chains up to THREE new rows at fresh processing
# time — head [from_z, valid_start), middle [valid_start, valid_end) carrying
# the new value, tail [valid_end, infinity) — so the value changes ONLY inside
# the window while the audit trail is preserved on the Transaction-Time dimension.
#
# The non-temporal attributes (id, acctNum, value) are the business payload. The
# four interval columns (from_z/thru_z, in_z/out_z) are typed `timestamp` (m-core:
# instants are UTC `timestamptz`).
#
# Row data lives in the sibling fixtures/position.yaml (the as-of READ cases).
# The write-sequence cases construct their own bitemporal history from their
# ordered DML, so they start from an empty table and ignore the fixtures.
entity:
  name: Position
  namespace: parallax.compatibility
  table: position
  persistence: read-write
  attributes:
    - name: id
      type: int64
      column: pos_id
      primaryKey: true
      pkGeneration: application-assigned
    - name: acctNum
      type: string
      column: acct_num
      maxLength: 32
    - name: value
      type: decimal(18,2)
      column: val
    - name: valid_start
      type: timestamp
      column: from_z
    - name: valid_end
      type: timestamp
      column: thru_z
    - name: tx_start
      type: timestamp
      column: in_z
    - name: tx_end
      type: timestamp
      column: out_z
  asOfAxes:
    - dimension: validTime
      startAttribute: valid_start
      endAttribute: valid_end
    - dimension: transactionTime
      startAttribute: tx_start
      endAttribute: tx_end
  indices:
    - name: position_pk
      attributes: [id, valid_start, tx_start]
      unique: true
    - name: position_acct
      attributes: [acctNum]
      unique: false
