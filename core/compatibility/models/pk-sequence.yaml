# Simulated-sequence (Reladomo SimulatedSequence) primary-key allocation model.
#
# `PkSequence` is the sequence registry entity: table `pk_sequence`, one row per named
# sequence (`name` PK) holding the next value (`next_val`) to hand out. Four target
# entities draw ids from it via `pkGeneration: { strategy: sequence, ... }`, each with a
# distinct config to cover the allocation arithmetic (initialValue / incrementSize /
# batchSize):
#   - Badge   (badge_seq):   1    / 1  / 1
#   - Ticket  (ticket_seq):  1000 / 5  / 1
#   - Pass    (pass_seq):    1    / 1  / 3
#   - Voucher (voucher_seq): 100  / 10 / 2
# All entities are non-temporal transactional over a plain table + UPDATE, so the
# emitted SQL is portable across Postgres and MariaDB.
entities:
  - name: PkSequence
    namespace: parallax.compatibility
    table: pk_sequence
    attributes:
      - { name: name, type: string, primaryKey: true, maxLength: 64 }
      - { name: nextVal, type: int64, column: next_val }
    indices:
      - { name: pk_sequence_pk, attributes: [name], unique: true }
  - name: Badge
    namespace: parallax.compatibility
    table: badge
    attributes:
      - name: id
        type: int64
        primaryKey: true
        pkGeneration: { strategy: sequence, name: badge_seq }
      - { name: holder, type: string, maxLength: 64 }
    indices:
      - { name: badge_pk, attributes: [id], unique: true }
  - name: Ticket
    namespace: parallax.compatibility
    table: ticket
    attributes:
      - name: id
        type: int64
        primaryKey: true
        pkGeneration: { strategy: sequence, name: ticket_seq, initialValue: 1000, incrementSize: 5 }
      - { name: tier, type: string, maxLength: 64 }
    indices:
      - { name: ticket_pk, attributes: [id], unique: true }
  - name: Pass
    namespace: parallax.compatibility
    table: pass
    attributes:
      - name: id
        type: int64
        primaryKey: true
        pkGeneration: { strategy: sequence, name: pass_seq, batchSize: 3 }
      - { name: zone, type: string, maxLength: 64 }
    indices:
      - { name: pass_pk, attributes: [id], unique: true }
  - name: Voucher
    namespace: parallax.compatibility
    table: voucher
    attributes:
      - name: id
        type: int64
        primaryKey: true
        pkGeneration: { strategy: sequence, name: voucher_seq, initialValue: 100, incrementSize: 10, batchSize: 2 }
      - { name: label, type: string, maxLength: 64 }
    indices:
      - { name: voucher_pk, attributes: [id], unique: true }
