# Supplier: an audit-only (Transaction-Time-Only) OWNER of a value object — the
# unitemporal half of the m-value-object "inherited temporality" proof (Phase 7).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It is the
# temporal analogue of models/customer.yaml: the SAME recursive `address` value
# object (street/city, a nested `geo` one, a to-many `phones`) rides a
# `Transaction-Time-Only` (audit-only) owner instead of a non-temporal one. A
# value object declares NO asOfAxes of its own (the schema forbids them) — it
# inherits the owner's single `transactionTime` dimension and its backing `address`
# column rides the milestoned row exactly like the scalar `name` column.
#
# A row's [in_z, out_z) interval records WHEN THE SYSTEM KNEW this supplier's
# contact address; out_z = infinity marks the current row. Milestone-chaining
# writes (insert / update / terminate) never mutate in place — they close the
# current row (out_z = the transaction instant) and, for an update, chain a new
# current row carrying the NEW address document. The document is copied/updated
# across the chain exactly like any scalar column; there is no value-object-specific
# temporal machinery (m-value-object "Inherited temporality", m-txtime-write).
#
# `address` is the ONE m-core `json` column the whole embedded composite is stored
# in (never column-flattened); geo/phones and every inner attribute live inside it,
# so only `address` carries `column`/`mapping`. columnOrder is the scalar attributes
# (id, name, in_z, out_z) then the single document column (address).
#
# Read row data lives in the sibling fixtures/supplier.yaml (the as-of READ cases);
# the write-sequence cases construct their own milestone history from their ordered
# DML, so they start from an empty table and ignore the fixtures.
entity:
  name: Supplier
  namespace: parallax.compatibility
  table: supplier
  attributes:
    - name: id
      type: int64
      column: sup_id
      primaryKey: true
    - name: name
      type: string
      maxLength: 64
    - name: tx_start
      type: timestamp
      column: in_z
    - name: tx_end
      type: timestamp
      column: out_z
  asOfAxes:
    - dimension: transactionTime
      startAttribute: tx_start
      endAttribute: tx_end
  valueObjects:
    - name: address
      nullable: true
      attributes:
        - name: street
          type: string
          nullable: true
        - name: city
          type: string
          nullable: true
      valueObjects:
        - name: geo
          nullable: true
          attributes:
            - name: country
              type: string
              nullable: true
        - name: phones
          multiplicity: many
          attributes:
            - name: type
              type: string
              nullable: true
            - name: number
              type: string
              nullable: true
  indices:
    - name: supplier_pk
      attributes: [id, tx_start]
      unique: true
    - name: supplier_name
      attributes: [name]
