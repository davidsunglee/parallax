# ScalarThing exercises the m-core neutral scalar mappings that are not covered by
# the relationship, aggregate, temporal, or lifecycle fixtures.
entity:
  name: ScalarThing
  namespace: parallax.compatibility
  table: scalar_thing
  persistence: read-only
  attributes:
    - name: id
      type: int64
      primaryKey: true
    - name: f32
      type: float32
    - name: f64
      type: float64
    - name: payload
      type: bytes
    - name: localTime
      type: time
      column: local_time
    - name: externalId
      type: uuid
      column: external_id
  indices:
    - name: scalar_thing_pk
      attributes: [id]
      unique: true
