# Document: a TABLE-PER-CONCRETE-SUBTYPE inheritance model with an INTERMEDIATE
# abstract subtype and a concrete SIBLING branch (m-inheritance).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It is the
# TPCS counterpart of the table-per-hierarchy `animal` family: a closed tree whose
# concrete subtypes each map to their OWN table (no shared table, no tag), so an
# abstract-target read lowers to `union all` over exactly the effective concrete
# tables (m-sql). The tree is:
#
#   Document          (root, ABSTRACT)          — declares the strategy; tableless,
#                                                  rowless; owns id + title
#     FinancialDocument (abstract-subtype)       — tableless, rowless; adds currency
#       Invoice       (concrete-subtype)         — its own `invoice` table; adds amount_due
#       Receipt       (concrete-subtype)         — its own `receipt` table; adds paid_amount
#     Memo            (concrete-subtype)         — its own `memo` table; adds body;
#                                                  SIBLING branch directly under Document
#                                                  — proves an abstract-subtype read of
#                                                  FinancialDocument covers ONLY {Invoice,
#                                                  Receipt}, never Memo, and that narrowing
#                                                  Document to FinancialDocument cannot
#                                                  broaden back to Memo.
#
# Abstract nodes (Document, FinancialDocument) are tableless and rowless; only the
# concrete subtypes own rows. Concrete subtypes do NOT repeat inherited attributes —
# each concrete table physically carries the full inherited chain derived from its
# ancestry (Invoice/Receipt: id, title, currency, + own; Memo: id, title, + own).
#
# table-per-leaf is strictly replaced by table-per-concrete-subtype; table-per-leaf
# and table-per-class are rejected by the metamodel schema (m-inheritance).
#
# Phase 6 adds a POLYMORPHIC OWNER: `Folder` owns documents through the inherited
# `folder_id` foreign key (declared on the abstract ROOT `Document`, so it threads into
# EVERY concrete table — invoice, receipt, memo — via the ancestry chain). The
# relationship `Folder.documents -> Document` targets the abstract root, so navigating
# it under table-per-concrete-subtype lowers to a grouped `OR` of one correlated
# `EXISTS` per concrete table, in alphabetical order (m-navigate / m-sql):
#   Folder.documents -> Document (abstract ROOT)   — reaches any {Invoice, Memo, Receipt}
# A narrow in the filter's `op` restricts that to a subset (e.g. FinancialDocument ->
# {Invoice, Receipt}), dropping the Memo `EXISTS` branch.
#
# Row data lives in the sibling fixtures/document.yaml, keyed per concrete subtype.
entities:
  - name: Document
    namespace: parallax.compatibility
    mutability: transactional
    temporal: non-temporal
    inheritance:
      role: root
      strategy: table-per-concrete-subtype
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGenerator: none
      - name: title
        type: string
        column: title
        maxLength: 64
      # The polymorphic owner FK, inherited by every concrete subtype (Phase 6): a
      # nullable back-pointer to Folder. Because it is declared on the abstract ROOT,
      # the ancestry chain threads `folder_id` into invoice, receipt, AND memo, so an
      # abstract-target read projects it in the concrete superset (right after the
      # inherited title, before the FinancialDocument branch's currency).
      - name: folderId
        type: int64
        column: folder_id
        nullable: true
  - name: FinancialDocument
    namespace: parallax.compatibility
    inheritance:
      role: abstract-subtype
      parent: Document
    attributes:
      # REQUIRED (non-null): a financial document without a currency is meaningless, so
      # currency is a real, settled model constraint on the FinancialDocument branch.
      # PHASE-7 DECISION: the earlier `nullable: true` was a pre-write-protocol expedient
      # (Phase 5 review Finding 6) so a concrete-subtype insert could omit currency
      # before the write payload was specified. Phase 7 specifies the payload, so
      # currency is now required and every Invoice / Receipt insert SUPPLIES it
      # (m-inheritance-010 / -081). The abstract subtype threads currency into both
      # Invoice's and Receipt's concrete tables (the TPCS ancestry chain), never into
      # the sibling Memo's — so an abstract-target `union all` read still NULL-casts
      # currency for the Memo branch (m-inheritance-050..053), which is about the shared
      # superset, not this column's nullability on the FinancialDocument branch.
      - name: currency
        type: string
        column: currency
        maxLength: 3
  - name: Invoice
    namespace: parallax.compatibility
    table: invoice
    mutability: transactional
    temporal: non-temporal
    inheritance:
      role: concrete-subtype
      parent: FinancialDocument
    attributes:
      - name: amountDue
        type: decimal(18,2)
        column: amount_due
  - name: Receipt
    namespace: parallax.compatibility
    table: receipt
    mutability: transactional
    temporal: non-temporal
    inheritance:
      role: concrete-subtype
      parent: FinancialDocument
    attributes:
      - name: paidAmount
        type: decimal(18,2)
        column: paid_amount
  - name: Memo
    namespace: parallax.compatibility
    table: memo
    mutability: transactional
    temporal: non-temporal
    inheritance:
      role: concrete-subtype
      parent: Document
    attributes:
      - name: body
        type: string
        column: body
        maxLength: 64
  # The polymorphic OWNER (Phase 6): a plain non-inheritance entity whose relationship
  # targets the abstract root Document, so navigation crosses a table-per-concrete-
  # subtype polymorphic boundary and lowers to a grouped `OR` of per-branch `EXISTS`.
  - name: Folder
    namespace: parallax.compatibility
    table: folder
    mutability: transactional
    temporal: non-temporal
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGenerator: none
      - name: name
        type: string
        column: name
        maxLength: 32
    relationships:
      # Targets the abstract ROOT Document: reaches any concrete {Invoice, Memo,
      # Receipt}. A narrow in a navigation filter's `op` may restrict it to a subset.
      - name: documents
        relatedEntity: Document
        cardinality: one-to-many
        join: this.id = Document.folderId
        reverseName: folder
        foreignKey: folder_id
    indices:
      - name: folder_pk
        attributes: [id]
        unique: true
