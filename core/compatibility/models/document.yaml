# Document: a TABLE-PER-LEAF inheritance model (m-inheritance, Phase 9).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. Each
# concrete leaf maps to its OWN table (no shared table, no discriminator column):
#
#   Document (root)    — abstract; names the hierarchy, owns no instance rows
#   Invoice  (subtype) — its own `invoice` table
#   Receipt  (subtype) — its own `receipt` table
#
# A leaf query is an ORDINARY single-table read of that leaf's table — the
# subtype is selected by WHICH table is queried, so no discriminator predicate is
# injected (contrast table-per-hierarchy). The abstract root's own table stays
# empty (it has no fixtures); it exists only so the descriptor is a valid entity.
#
# Row data lives in the sibling fixtures/document.yaml, keyed per leaf class.
entities:
  - name: Document
    namespace: parallax.compatibility
    table: document
    mutability: transactional
    temporal: non-temporal
    inheritance:
      strategy: table-per-leaf
      role: root
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGenerator: none
      - name: title
        type: string
        column: title
        maxLength: 64
    indices:
      - name: document_pk
        attributes: [id]
        unique: true
  - name: Invoice
    namespace: parallax.compatibility
    table: invoice
    mutability: transactional
    temporal: non-temporal
    inheritance:
      strategy: table-per-leaf
      role: subtype
      parent: Document
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGenerator: none
      - name: title
        type: string
        column: title
        maxLength: 64
      - name: amountDue
        type: decimal(18,2)
        column: amount_due
    indices:
      - name: invoice_pk
        attributes: [id]
        unique: true
  - name: Receipt
    namespace: parallax.compatibility
    table: receipt
    mutability: transactional
    temporal: non-temporal
    inheritance:
      strategy: table-per-leaf
      role: subtype
      parent: Document
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGenerator: none
      - name: title
        type: string
        column: title
        maxLength: 64
      - name: paidAmount
        type: decimal(18,2)
        column: paid_amount
    indices:
      - name: receipt_pk
        attributes: [id]
        unique: true
