# Document: a TABLE-PER-CONCRETE-SUBTYPE inheritance model (m-inheritance).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. The closed
# tree is:
#
#   Document (root, ABSTRACT)     — declares the strategy; tableless, rowless;
#                                    owns the inherited id + title
#   Invoice  (concrete-subtype)   — its own `invoice` table; adds amount_due
#   Receipt  (concrete-subtype)   — its own `receipt` table; adds paid_amount
#
# Each concrete subtype maps to its OWN table (no shared table, no tag). A concrete
# read is an ordinary single-table read of that subtype's table; the subtype is
# selected by WHICH table is queried. Concrete subtypes do NOT repeat the inherited
# id/title — the concrete table physically carries the full inherited attribute
# chain (id, title) plus its own columns, derived from the ancestry. The abstract
# `Document` root owns no table and no rows.
#
# table-per-leaf is strictly replaced by table-per-concrete-subtype; table-per-leaf
# and table-per-class are rejected by the metamodel schema (m-inheritance).
#
# Row data lives in the sibling fixtures/document.yaml, keyed per concrete subtype.
entities:
  - name: Document
    namespace: parallax.compatibility
    mutability: transactional
    temporal: non-temporal
    inheritance:
      role: root
      strategy: table-per-concrete-subtype
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGenerator: none
      - name: title
        type: string
        column: title
        maxLength: 64
  - name: Invoice
    namespace: parallax.compatibility
    table: invoice
    mutability: transactional
    temporal: non-temporal
    inheritance:
      role: concrete-subtype
      parent: Document
    attributes:
      - name: amountDue
        type: decimal(18,2)
        column: amount_due
  - name: Receipt
    namespace: parallax.compatibility
    table: receipt
    mutability: transactional
    temporal: non-temporal
    inheritance:
      role: concrete-subtype
      parent: Document
    attributes:
      - name: paidAmount
        type: decimal(18,2)
        column: paid_amount
