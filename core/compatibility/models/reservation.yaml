# Reservation: a BUSINESS-temporal-only model (unitemporal-business).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It models
# the business-temporal-only profile (the counterpart to the audit-only Balance):
# a SINGLE `business` as-of dimension. A row's [from_z, thru_z) interval records
# WHEN A FACT IS TRUE IN THE WORLD; thru_z = infinity marks the row that is true
# from from_z onward (the "current" business milestone).
#
# Unlike the audit-only (processing) axis, the business axis has no notion of
# "what the system knew" — there is one milestone chain over wall-clock business
# time. Milestone-chaining writes close the open business row (set thru_z = the
# business instant of the change) and chain a new row [businessInstant, infinity)
# with the new value, so a business correction supersedes the prior value at the
# business date it takes effect. This is the SAME close-and-chain shape as the
# audit-only profile (M7), but driven by business date rather than transaction
# instant — it has NO processing-axis residual and so no rectangle split.
#
# The non-temporal attributes (id, room, guest) are the payload. The interval
# columns (from_z/thru_z) are typed `timestamp` (M0: instants are UTC
# `timestamptz`); the open upper bound is the database-native infinity (M0/M11).
#
# Row data lives in the sibling fixtures/reservation.yaml (the as-of READ cases).
# The write-sequence cases construct their own business history from their ordered
# DML, so they start from an empty table and ignore the fixtures.
entity:
  name: Reservation
  namespace: parallax.compatibility
  table: reservation
  mutability: transactional
  temporal: unitemporal-business
  attributes:
    - name: id
      type: int64
      column: res_id
      primaryKey: true
      pkGenerator: none
    - name: room
      type: string
      column: room
      maxLength: 16
    - name: guest
      type: string
      column: guest
      maxLength: 64
    - name: businessFrom
      type: timestamp
      column: from_z
    - name: businessTo
      type: timestamp
      column: thru_z
  asOfAttributes:
    - name: businessDate
      fromColumn: from_z
      toColumn: thru_z
      axis: business
      toIsInclusive: false
      infinity: infinity
      default: now
  indices:
    - name: reservation_pk
      attributes: [id, businessFrom]
      unique: true
    - name: reservation_room
      attributes: [room]
      unique: false
