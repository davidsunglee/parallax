# Grade: a model with a RESERVED-WORD column, for the identifier-quoting case.
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. The
# `ordinal` attribute maps to a column literally named `order` — a SQL reserved
# word in both Postgres and MariaDB — so every reference to it MUST be quoted:
# `"order"` on Postgres, `` `order` `` on MariaDB (the divergent quote characters
# of the m-dialect seam). The harness quotes the column in generated DDL / INSERT /
# table-state reads (a reserved word, so quoting is required), and the golden SQL
# quotes it by hand; the m-sql normalizer preserves quoted identifiers. Simple
# lowercase columns (id, label) are not reserved and stay unquoted.
#
# Row data lives in the sibling fixtures/grade.yaml.
entity:
  name: Grade
  namespace: parallax.compatibility
  table: grade
  attributes:
    - name: id
      type: int64
      primaryKey: true
    - name: ordinal
      type: int32
      column: order
    - name: label
      type: string
      maxLength: 32
  indices:
    - name: grade_pk
      attributes: [id]
      unique: true
