# Error-cases model (m-db-error error-code classification). Three plain non-temporal
# entities, each set up so a related case can provoke one error class:
#   - Widget: id PK with `pkGenerator: none` — the duplicate-PK INSERT path.
#   - Tag:    id PK plus a `tag_name_uq` UNIQUE index on `name` — a non-PK unique
#             collision (exercises DDL UNIQUE-constraint emission).
#   - Gauge:  id PK and an int `v` — two rows for two connections to contend over
#             (deadlock / lock-wait contention).
# This file defines only the entities; the error-class and native-code assertions
# live in the related case files, not here.
entities:
  - name: Widget
    namespace: parallax.compatibility
    table: widget
    mutability: transactional
    temporal: non-temporal
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGenerator: none }
      - { name: label, type: string, column: label, maxLength: 64 }
    indices:
      - { name: widget_pk, attributes: [id], unique: true }
  - name: Tag
    namespace: parallax.compatibility
    table: tag
    mutability: transactional
    temporal: non-temporal
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGenerator: none }
      - { name: name, type: string, column: name, maxLength: 64 }
    indices:
      - { name: tag_pk, attributes: [id], unique: true }
      - { name: tag_name_uq, attributes: [name], unique: true }
  - name: Gauge
    namespace: parallax.compatibility
    table: gauge
    mutability: transactional
    temporal: non-temporal
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGenerator: none }
      - { name: v, type: int32, column: v }
    indices:
      - { name: gauge_pk, attributes: [id], unique: true }
