# Error-cases model (m-db-error error-code classification). Three plain non-temporal
# entities, each the subject of one error class:
#   - Widget: a duplicate primary-key INSERT -> uniqueViolation (PK path).
#   - Tag:    a duplicate value on a non-PK UNIQUE index -> uniqueViolation
#             (unique-index path; exercises the DDL UNIQUE-constraint emission).
#   - Gauge:  two rows two connections contend over -> deadlock / lockWaitTimeout.
# The error classes are dialect-neutral (`then.errorClass`); the per-dialect native
# code each database raises is witnessed by `then.nativeCode` on every case.
entities:
  - name: Widget
    namespace: parallax.compatibility
    table: widget
    mutability: transactional
    temporal: non-temporal
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGenerator: none }
      - { name: label, type: string, column: label, maxLength: 64 }
    indices:
      - { name: widget_pk, attributes: [id], unique: true }
  - name: Tag
    namespace: parallax.compatibility
    table: tag
    mutability: transactional
    temporal: non-temporal
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGenerator: none }
      - { name: name, type: string, column: name, maxLength: 64 }
    indices:
      - { name: tag_pk, attributes: [id], unique: true }
      - { name: tag_name_uq, attributes: [name], unique: true }
  - name: Gauge
    namespace: parallax.compatibility
    table: gauge
    mutability: transactional
    temporal: non-temporal
    attributes:
      - { name: id, type: int64, column: id, primaryKey: true, pkGenerator: none }
      - { name: v, type: int32, column: v }
    indices:
      - { name: gauge_pk, attributes: [id], unique: true }
