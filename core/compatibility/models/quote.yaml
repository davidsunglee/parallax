# Quote: a TABLE-PER-CONCRETE-SUBTYPE inheritance family whose Transaction-Time-Only
# axis is declared on the abstract root and inherited by the concrete subtype
# (m-inheritance x m-txtime-write — Phase 8 temporal composition).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It is the TPCS
# counterpart of the table-per-hierarchy `reading` family: a NEW, small
# Transaction-Time-Only family whose concrete subtype maps to its OWN table (no shared
# table, no tag). The single Transaction-Time dimension lives on the ROOT and threads into the
# concrete table via the ancestry chain, so the concrete table carries [in_z, out_z)
# and admits the milestone chain.
#
#   Quote (root, ABSTRACT)     — strategy + the Transaction-Time dimension; owns id + price + the
#                                interval columns; tableless, rowless
#     SpotQuote (concrete)     — its own `spot_quote` table; adds symbol
#
# The audit-only concrete-subtype TERMINATE (m-inheritance-091) closes the
# current-on-processing milestone in the concrete subtype's OWN table with NO tag guard
# (contrast the table-per-hierarchy `reading` close m-inheritance-090). The
# write-sequence case builds its own milestone history, so this family needs no
# fixtures.
entities:
  - name: Quote
    namespace: parallax.compatibility
    persistence: read-write
    inheritance:
      role: root
      strategy: table-per-concrete-subtype
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: application-assigned
      - name: price
        type: decimal(18,2)
        column: price
      - name: tx_start
        type: timestamp
        column: in_z
      - name: tx_end
        type: timestamp
        column: out_z
    asOfAxes:
      - dimension: transactionTime
        startAttribute: tx_start
        endAttribute: tx_end
    indices:
      - name: quote_pk
        attributes: [id, tx_start]
        unique: true
  - name: SpotQuote
    namespace: parallax.compatibility
    table: spot_quote
    inheritance:
      role: concrete-subtype
      parent: Quote
    attributes:
      - name: symbol
        type: string
        column: symbol
        maxLength: 8
        nullable: true
