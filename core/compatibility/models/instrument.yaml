# Instrument: a TABLE-PER-HIERARCHY inheritance family whose BITEMPORAL axes are
# declared on the abstract root and inherited by every concrete subtype
# (m-inheritance x m-bitemp-write x m-temporal-read — Phase 8 temporal composition).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It is a NEW,
# small temporal family (the existing payment/animal/document/vehicle families stay
# non-temporal): the whole family maps to ONE shared `instrument` table discriminated
# by the root's `tag` column (`kind`), and every row is a bitemporal MILESTONE — the
# intersection of a business interval [from_z, thru_z) and a processing interval
# [in_z, out_z). The axes live on the ROOT, so the concrete subtypes inherit the full
# temporal profile (the harness derives it from the ancestry; a concrete subtype
# declares NO asOfAttributes / temporal of its own, so a per-entity metamodel reader
# classifies it non-temporal while the inheritance-aware harness flattens the axes in).
#
#   Instrument (root, ABSTRACT)   — strategy + tag column + the two as-of axes; owns
#                                   id + price + the four interval columns
#     Bond  (concrete-subtype)    — tagValue 'bond';  adds coupon
#     Stock (concrete-subtype)    — tagValue 'stock'; adds ticker
#
# Effective concrete alpha order: Bond, Stock. A temporal abstract-target read
# (m-inheritance-092) injects the as-of predicate over the shared table and projects
# the raw tag column so familyVariant materializes; the bitemporal terminate /
# terminateUntil writes (m-inheritance-094 / -096) inactivate the current-on-processing
# rectangle with the tag GUARD among the identity predicates and chain head / tail
# milestones setting the tag from tagValue — the standalone m-bitemp-write shapes,
# routed to the shared table.
#
# Row data lives in the sibling fixtures/instrument.yaml (the temporal abstract read).
# The write-sequence cases construct their own milestone history from ordered DML.
entities:
  - name: Instrument
    namespace: parallax.compatibility
    mutability: transactional
    temporal: bitemporal
    inheritance:
      role: root
      strategy: table-per-hierarchy
      tag:
        column: kind
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGenerator: none
      - name: price
        type: decimal(18,2)
        column: price
      - name: businessFrom
        type: timestamp
        column: from_z
      - name: businessTo
        type: timestamp
        column: thru_z
      - name: processingFrom
        type: timestamp
        column: in_z
      - name: processingTo
        type: timestamp
        column: out_z
    asOfAttributes:
      - name: businessDate
        fromColumn: from_z
        toColumn: thru_z
        axis: business
        toIsInclusive: false
        infinity: infinity
        default: now
      - name: processingDate
        fromColumn: in_z
        toColumn: out_z
        axis: processing
        toIsInclusive: false
        infinity: infinity
        default: now
    indices:
      - name: instrument_pk
        attributes: [id, businessFrom, processingFrom]
        unique: true
  - name: Bond
    namespace: parallax.compatibility
    table: instrument
    mutability: transactional
    inheritance:
      role: concrete-subtype
      parent: Instrument
      tagValue: bond
    attributes:
      - name: coupon
        type: decimal(18,2)
        column: coupon
        nullable: true
  - name: Stock
    namespace: parallax.compatibility
    table: instrument
    mutability: transactional
    inheritance:
      role: concrete-subtype
      parent: Instrument
      tagValue: stock
    attributes:
      - name: ticker
        type: string
        column: ticker
        maxLength: 8
        nullable: true
