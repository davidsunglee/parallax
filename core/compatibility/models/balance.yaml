# Balance: an audit-only (processing-temporal) model — the temporal MVP.
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It models
# the most-used temporal profile (DQ7): a SINGLE `processing` as-of dimension
# (audit-only / unitemporal-processing). A row's [in_z, out_z) interval records
# WHEN THE SYSTEM KNEW the balance value; out_z = infinity marks the current row.
#
# Milestone-chaining writes (insert / update / terminate) never mutate a value in
# place — they close the current row (set out_z = the transaction instant) and,
# for an update, chain a new current row [in_z = txInstant, out_z = infinity).
# The processing axis has no business-date residual split (that is the bitemporal
# rectangle-split, deferred to Phase 8), so audit-only chaining is the simplest
# observable form of the contract.
#
# The interval columns are `timestamp` (m-core: instants are UTC `timestamptz`); the
# open upper bound is the database-native infinity (m-core/m-dialect). The non-temporal
# attributes (id, acctNum, value) are the business payload.
#
# Row data lives in the sibling fixtures/balance.yaml (used by the as-of READ
# cases). The write-sequence cases construct their own milestone history from
# their ordered DML, so they start from an empty table and ignore the fixtures.
entity:
  name: Balance
  namespace: parallax.compatibility
  table: balance
  mutability: transactional
  temporal: unitemporal-processing
  attributes:
    - name: id
      type: int64
      column: bal_id
      primaryKey: true
      pkGenerator: none
    - name: acctNum
      type: string
      column: acct_num
      maxLength: 32
    - name: value
      type: decimal(18,2)
      column: val
    - name: processingFrom
      type: timestamp
      column: in_z
    - name: processingTo
      type: timestamp
      column: out_z
  asOfAttributes:
    - name: processingDate
      fromColumn: in_z
      toColumn: out_z
      axis: processing
      toIsInclusive: false
      infinity: infinity
      default: now
  indices:
    - name: balance_pk
      attributes: [id, processingFrom]
      unique: true
    - name: balance_acct
      attributes: [acctNum]
      unique: false
