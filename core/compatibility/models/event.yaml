# Event: a minimal non-temporal model with a plain `timestamp` attribute, for the
# m-core timezone/precision write cases.
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. Unlike the
# temporal models (Balance/Position), `occurredAt` is an ordinary instant column,
# not an as-of milestone bound — so a write case can assert how a `timestamp`
# value is stored and read back: normalized to UTC at the boundary (m-core timezone
# rule) and preserved to microsecond precision. m-dialect maps `timestamp` to Postgres
# `timestamptz` and MariaDB `datetime(6)`; both provider seams normalize an
# offset-bearing instant to UTC, so one write case holds on both dialects.
#
# No fixtures: the write cases build their own state from ordered DML.
entity:
  name: Event
  namespace: parallax.compatibility
  table: event
  persistence: read-write
  attributes:
    - name: id
      type: int64
      column: id
      primaryKey: true
      pkGeneration: application-assigned
    - name: occurredAt
      type: timestamp
      column: occurred_at
  indices:
    - name: event_pk
      attributes: [id]
      unique: true
