# Branch: a FULL bitemporal OWNER of a value object — the bitemporal half of the
# m-value-object "inherited temporality" proof (Phase 7).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It is the
# bitemporal analogue of models/supplier.yaml (and of models/position.yaml): the
# SAME recursive `address` value object rides a `bitemporal` owner with TWO as-of
# dimensions.
#
#   business   (from_z / thru_z) — WHEN A FACT IS TRUE IN THE WORLD.
#   processing (in_z   / out_z ) — WHEN THE SYSTEM KNEW that fact (audit-only axis).
#
# A row is the milestone at the intersection of a business interval and a processing
# interval — a "rectangle" in (business x processing) space. A row is CURRENT on an
# axis when its `to` on that axis equals infinity; the fully-current row is current
# on BOTH (thru_z = out_z = infinity). The `address` value object declares NO
# asOfAttributes of its own (the schema forbids them) — it inherits BOTH of the
# owner's dimensions and its backing column rides the milestoned rectangle exactly
# like the scalar `name` column.
#
# The signature bitemporal write is the RECTANGLE SPLIT (m-bitemp-write): an
# `updateUntil` over a bounded business window inactivates the original (closes its
# processing axis at the transaction instant) and chains up to THREE new rows at
# fresh processing time — head (old address before the window), middle (NEW address
# for the window), tail (old address after the window). The address DOCUMENT is
# carried across every chained rectangle exactly like a scalar column; there is no
# value-object-specific temporal machinery (m-value-object "Inherited temporality").
#
# `address` is the ONE m-core `json` column the whole embedded composite is stored
# in. columnOrder is the scalar attributes (id, name, from_z, thru_z, in_z, out_z)
# then the single document column (address).
#
# Read row data lives in the sibling fixtures/branch.yaml (the both-axis as-of READ
# cases); the write-sequence cases construct their own bitemporal history from their
# ordered DML, so they start from an empty table and ignore the fixtures.
entity:
  name: Branch
  namespace: parallax.compatibility
  table: branch
  mutability: transactional
  temporal: bitemporal
  attributes:
    - name: id
      type: int64
      column: br_id
      primaryKey: true
      pkGenerator: none
    - name: name
      type: string
      column: name
      maxLength: 64
    - name: businessFrom
      type: timestamp
      column: from_z
    - name: businessTo
      type: timestamp
      column: thru_z
    - name: processingFrom
      type: timestamp
      column: in_z
    - name: processingTo
      type: timestamp
      column: out_z
  asOfAttributes:
    - name: businessDate
      fromColumn: from_z
      toColumn: thru_z
      axis: business
      toIsInclusive: false
      infinity: infinity
      default: now
    - name: processingDate
      fromColumn: in_z
      toColumn: out_z
      axis: processing
      toIsInclusive: false
      infinity: infinity
      default: now
  valueObjects:
    - name: address
      column: address
      mapping: json
      cardinality: one
      nullable: true
      attributes:
        - name: street
          type: string
          nullable: true
        - name: city
          type: string
          nullable: true
      valueObjects:
        - name: geo
          cardinality: one
          nullable: true
          attributes:
            - name: country
              type: string
              nullable: true
        - name: phones
          cardinality: many
          nullable: true
          attributes:
            - name: type
              type: string
              nullable: true
            - name: number
              type: string
              nullable: true
  indices:
    - name: branch_pk
      attributes: [id, businessFrom, processingFrom]
      unique: true
    - name: branch_name
      attributes: [name]
      unique: false
