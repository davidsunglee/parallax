# Branch: a FULL bitemporal OWNER of a value object — the bitemporal half of the
# m-value-object "inherited temporality" proof (Phase 7).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. It is the
# bitemporal analogue of models/supplier.yaml (and of models/position.yaml): the
# SAME recursive `address` value object rides a `bitemporal` owner with TWO as-of
# dimensions.
#
#   validTime       (from_z / thru_z) — WHEN A FACT IS TRUE IN THE WORLD.
#   transactionTime (in_z   / out_z ) — WHEN THE SYSTEM KNEW that fact (audit axis).
#
# A row is the milestone at the intersection of a Valid-Time interval and a
# Transaction-Time interval — a "rectangle" in (valid x transaction) space. A row is CURRENT on an
# axis when its `to` on that axis equals infinity; the fully-Latest row is current
# on BOTH (thru_z = out_z = infinity). The `address` value object declares NO
# asOfAxes of its own (the schema forbids them) — it inherits BOTH of the
# owner's dimensions and its backing column rides the milestoned rectangle exactly
# like the scalar `name` column.
#
# The signature bitemporal write is the RECTANGLE SPLIT (m-bitemp-write): an
# `updateUntil` over a bounded Valid-Time window inactivates the original (closes its
# Transaction-Time dimension at the transaction instant) and chains up to THREE new rows at
# fresh Transaction Time — head (old address before the window), middle (NEW address
# for the window), tail (old address after the window). The address DOCUMENT is
# carried across every chained rectangle exactly like a scalar column; there is no
# value-object-specific temporal machinery (m-value-object "Inherited temporality").
#
# `address` is the ONE m-core `json` column the whole embedded composite is stored
# in. columnOrder is the scalar attributes (id, name, from_z, thru_z, in_z, out_z)
# then the single document column (address).
#
# Read row data lives in the sibling fixtures/branch.yaml (the both-axis as-of READ
# cases); the write-sequence cases construct their own bitemporal history from their
# ordered DML, so they start from an empty table and ignore the fixtures.
entity:
  name: Branch
  namespace: parallax.compatibility
  table: branch
  persistence: read-write
  attributes:
    - name: id
      type: int64
      column: br_id
      primaryKey: true
      pkGeneration: application-assigned
    - name: name
      type: string
      column: name
      maxLength: 64
    - name: valid_start
      type: timestamp
      column: from_z
    - name: valid_end
      type: timestamp
      column: thru_z
    - name: tx_start
      type: timestamp
      column: in_z
    - name: tx_end
      type: timestamp
      column: out_z
  asOfAxes:
    - dimension: validTime
      startAttribute: valid_start
      endAttribute: valid_end
    - dimension: transactionTime
      startAttribute: tx_start
      endAttribute: tx_end
  valueObjects:
    - name: address
      column: address
      multiplicity: one
      nullable: true
      attributes:
        - name: street
          type: string
          nullable: true
        - name: city
          type: string
          nullable: true
      valueObjects:
        - name: geo
          multiplicity: one
          nullable: true
          attributes:
            - name: country
              type: string
              nullable: true
        - name: phones
          multiplicity: many
          attributes:
            - name: type
              type: string
              nullable: true
            - name: number
              type: string
              nullable: true
  indices:
    - name: branch_pk
      attributes: [id, valid_start, tx_start]
      unique: true
    - name: branch_name
      attributes: [name]
      unique: false
