# Orders model: three related non-temporal entities.
#
# This file is a model descriptor — an instance of
# core/schemas/metamodel.schema.json. It is intentionally pure metadata: no
# fixture rows live here (the descriptor IS the serialized m-descriptor metamodel, and the
# metamodel schema forbids extra top-level keys). Row data for a model lives in
# the sibling core/compatibility/fixtures/<model-stem>.yaml file.
#
# Phase 2 grew the Order entity with string / decimal / nullable / boolean
# columns so the operation algebra's range, null, string, and membership
# predicates have attributes to exercise.
#
# Phase 3 expands the descriptor to MULTIPLE entities so relationships, navigate
# / exists predicates, and deep fetch have something to traverse:
#   - Order        — the root entity (unchanged columns, so every Phase 1/2 case
#                    keeps passing).
#   - OrderItem    — line items; many belong to one Order (one-to-many `items`).
#   - OrderStatus  — status events; each belongs to an Order, and OPTIONALLY to a
#                    specific OrderItem. This lets one entity serve both the
#                    to-one `Order.status`-style lookup and the multi-hop
#                    `Order.items -> OrderItem.statuses` deep-fetch path.
#
# The multi-hop `[Order.items, OrderItem.statuses]` path is the 1 -> N -> N case
# that MUST resolve in exactly three statements (root + items + statuses), never
# 1 + N + N, which is how the suite proves N+1 elimination automatically.
entities:
  - name: Order
    namespace: parallax.compatibility
    table: orders
    persistence: read-write
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: application-assigned
      - name: name
        type: string
        column: name
        maxLength: 255
      - name: sku
        type: string
        column: sku
        maxLength: 32
        nullable: true
      - name: qty
        type: int32
        column: qty
      - name: price
        type: decimal(18,2)
        column: price
      - name: active
        type: boolean
        column: active
      # Phase 4 adds a date column so aggregate min/max has a `date`-typed
      # attribute to range over (alongside numeric `price` and string `name`).
      # It is appended after the existing columns and every fixture row supplies
      # a value, so the Phase 1-3 cases (which project only id/name) are
      # unaffected.
      - name: orderedOn
        type: date
        column: ordered_on
    relationships:
      - name: items
        cardinality: one-to-many
        join:
          source: id
          target: { entity: OrderItem, attribute: orderId }
        dependent: true
        orderBy:
          - { attribute: id, direction: desc }
      - name: statuses
        cardinality: one-to-many
        join:
          source: id
          target: { entity: OrderStatus, attribute: orderId }
        dependent: true
      - name: tags
        cardinality: one-to-many
        join:
          source: id
          target: { entity: OrderTag, attribute: orderId }
        orderBy:
          - { attribute: priority, direction: desc }
          - { attribute: label, direction: asc }
      - name: itemsByShipDate
        cardinality: one-to-many
        join:
          source: id
          target: { entity: OrderItem, attribute: orderId }
        orderBy:
          - { attribute: shippedOn, direction: asc }
    indices:
      - name: orders_pk
        attributes: [id]
        unique: true
      - name: orders_sku
        attributes: [sku]
        unique: false
  - name: OrderItem
    namespace: parallax.compatibility
    table: order_item
    persistence: read-write
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: application-assigned
      - name: orderId
        type: int64
        column: order_id
      - name: sku
        type: string
        column: sku
        maxLength: 32
      - name: quantity
        type: int32
        column: quantity
      - name: shippedOn
        type: date
        column: shipped_on
        nullable: true
    relationships:
      - name: order
        reverseOf: Order.items
      - name: statuses
        cardinality: one-to-many
        join:
          source: id
          target: { entity: OrderStatus, attribute: orderItemId }
        dependent: true
        orderBy:
          - { attribute: code, direction: asc }
    indices:
      - name: order_item_pk
        attributes: [id]
        unique: true
      - name: order_item_order_id
        attributes: [orderId]
        unique: false
  - name: OrderStatus
    namespace: parallax.compatibility
    table: order_status
    persistence: read-write
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: application-assigned
      - name: orderId
        type: int64
        column: order_id
      - name: orderItemId
        type: int64
        column: order_item_id
        nullable: true
      - name: code
        type: string
        column: code
        maxLength: 16
    relationships:
      - name: order
        reverseOf: Order.statuses
      - name: orderItem
        reverseOf: OrderItem.statuses
    indices:
      - name: order_status_pk
        attributes: [id]
        unique: true
      - name: order_status_order_id
        attributes: [orderId]
        unique: false
  - name: OrderTag
    namespace: parallax.compatibility
    table: order_tag
    persistence: read-write
    attributes:
      - name: id
        type: int64
        column: id
        primaryKey: true
        pkGeneration: application-assigned
      - name: orderId
        type: int64
        column: order_id
      - name: label
        type: string
        column: label
        maxLength: 32
      - name: priority
        type: int32
        column: priority
    relationships:
      - name: order
        reverseOf: Order.tags
    indices:
      - name: order_tag_pk
        attributes: [id]
        unique: true
      - name: order_tag_order_id
        attributes: [orderId]
        unique: false
