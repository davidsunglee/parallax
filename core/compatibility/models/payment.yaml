# Payment: a TABLE-PER-HIERARCHY inheritance model (m-inheritance).
#
# This descriptor is an instance of core/schemas/metamodel.schema.json. The whole
# Payment family maps to ONE shared table (`payment`); rows are discriminated by
# the root's `tag` column (`kind`). The closed tree is:
#
#   Payment      (root, ABSTRACT)     — declares the strategy, shared table, and
#                                        tag column; rowless; owns id + amount
#   CardPayment  (concrete-subtype)   — tagValue 'card'; adds card_network
#   CashPayment  (concrete-subtype)   — tagValue 'cash'; adds tendered
#
# The abstract root owns the shared table but no rows; only concrete subtypes are
# instantiable. Concrete subtypes do NOT repeat the inherited id/amount — the full
# inherited attribute chain is derived from the ancestry. Because every concrete
# subtype shares the table, its subtype-declared columns are nullable (a card row
# leaves `tendered` null and vice-versa). The `kind` tag column is framework-owned
# metadata, NOT a declared attribute: a concrete-subtype read injects `t0.kind = ?`
# (its tagValue) and an abstract-target read projects the tag column raw so
# familyVariant can be materialized (m-sql / m-case-format, resolved Q6).
#
# table-per-leaf and table-per-class are NOT legal strategies (m-inheritance): the
# strategy enum rejects both, proven by the harness metamodel-extension tests.
#
# Row data lives in the sibling fixtures/payment.yaml, keyed per concrete subtype.
entities:
  - name: Payment
    namespace: parallax.compatibility
    table: payment
    inheritance:
      role: root
      strategy: table-per-hierarchy
      tag:
        column: kind
    attributes:
      - name: id
        type: int64
        primaryKey: true
      - name: amount
        type: decimal(18,2)
  - name: CardPayment
    namespace: parallax.compatibility
    inheritance:
      role: concrete-subtype
      parent: Payment
      tagValue: card
    attributes:
      - name: cardNetwork
        type: string
        column: card_network
        maxLength: 16
        nullable: true
  - name: CashPayment
    namespace: parallax.compatibility
    inheritance:
      role: concrete-subtype
      parent: Payment
      tagValue: cash
    attributes:
      - name: tendered
        type: decimal(18,2)
        nullable: true
