# Invoice / InvoiceLine: the CLEAN audit-only (Transaction-Time-Only) crossing —
# one as-of dimension, with no Valid-Time dimension. A deliberately minimal
# example of as-of propagation across a relationship for readers who only care
# about the common transaction-time-only case. Mirrors balance.yaml's single-axis
# shape; InvoiceLine 1000 carries a correction so as-of-past vs as-of-latest
# discriminate. Row data lives in fixtures/invoice.yaml.
entities:
  - name: Invoice
    namespace: parallax.compatibility
    table: invoice
    attributes:
      - { name: id, type: int64, primaryKey: true }
      - { name: name, type: string, maxLength: 64 }
      - { name: tx_start, type: timestamp, column: in_z }
      - { name: tx_end, type: timestamp, column: out_z }
    asOfAxes:
      - { dimension: transactionTime, startAttribute: tx_start, endAttribute: tx_end }
    relationships:
      - name: lines
        cardinality: one-to-many
        join:
          source: id
          target: { entity: InvoiceLine, attribute: invoiceId }
        dependent: true
    indices:
      - { name: invoice_pk, attributes: [id, tx_start], unique: true }
  - name: InvoiceLine
    namespace: parallax.compatibility
    table: invoice_line
    attributes:
      - { name: id, type: int64, primaryKey: true }
      - { name: invoiceId, type: int64, column: invoice_id }
      - { name: amount, type: "decimal(18,2)" }
      - { name: tx_start, type: timestamp, column: in_z }
      - { name: tx_end, type: timestamp, column: out_z }
    asOfAxes:
      - { dimension: transactionTime, startAttribute: tx_start, endAttribute: tx_end }
    indices:
      - { name: invoice_line_pk, attributes: [id, tx_start], unique: true }
      - { name: invoice_line_invoice, attributes: [invoiceId] }
