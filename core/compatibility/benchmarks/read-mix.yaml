# Benchmark fixture (m-perf-bench): the read operation-mix workload.
#
# Loads a GENERATED dataset — 1,000 `Account` rows from the `accounts-sequential`
# recipe — then runs four read workloads, each declaring its per-dialect SQL, binds,
# and `iterations`. An OPTIONAL `expectRoundTrips` makes the benchmark double as a
# round-trip regression check:
#   - point-read (200):         a single PK lookup            — expectRoundTrips 1
#   - range-read (100):         a bounded balance range scan  — expectRoundTrips 1
#   - aggregate-group-by (100): a count/sum over the dataset  — (no round-trip bound)
#   - point-read-cached (200):  the same point-read, cache HIT — expectRoundTrips 0
tags: [m-perf-bench, operation-mix]
model: models/account.yaml
dataset:
  generate:
    entity: Account
    rows: 1000
    recipe: accounts-sequential
workloads:
  - name: point-read
    note: a single primary-key lookup — the query-cache miss/first-fetch cost
    iterations: 200
    expectRoundTrips: 1
    statements:
      - sql:
          postgres: select t0.id, t0.owner, t0.balance from account t0 where t0.id = ?
          mariadb: select t0.id, t0.owner, t0.balance from account t0 where t0.id = ?
        binds: [500]
  - name: range-read
    note: a bounded range scan over the balance column (m-op-algebra range predicates)
    iterations: 100
    expectRoundTrips: 1
    statements:
      - sql:
          postgres: select t0.id, t0.owner, t0.balance from account t0 where t0.balance between ? and ?
          mariadb: select t0.id, t0.owner, t0.balance from account t0 where t0.balance between ? and ?
        binds: [10000.00, 20000.00]
  - name: aggregate-group-by
    note: a group-by / aggregate workload (the m-agg aggregate path) over the dataset
    iterations: 100
    expectRoundTrips: 1
    statements:
      - sql:
          postgres: select count(*) n, sum(t0.balance) total from account t0
          mariadb: select count(*) n, sum(t0.balance) total from account t0
  - name: point-read-cached
    kind: cache-hit
    note: the SAME point-read issued again — a query-cache HIT costs ZERO round trips (served from the cache). Pairs with `point-read` (the miss) so the hit/miss distinction is a measured round-trip regression guard. A cache-hit workload lists no golden SQL; the reference harness has no cache, so it runs nothing and records 0 trips, proving the methodology end-to-end.
    iterations: 200
    expectRoundTrips: 0
