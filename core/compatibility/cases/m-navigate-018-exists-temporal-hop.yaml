# Semi-join across a temporal hop: Policies (as of business+processing LATEST)
# that HAVE a coverage (as of the same LATEST) with amount >= 600. The as-of
# propagates into the EXISTS subquery: BOTH the outer Policy and the inner
# Coverage carry the current-row predicate. As of latest, only coverage 10 (700)
# clears 600, so only policy 1 qualifies: policy 2's current coverage is 300.
# Policy 2 also has historical coverage 21 (900), so dropping the inner Coverage
# as-of predicates would incorrectly return policies 1 and 2. Proven by the
# independent referenceSql oracle (an `id in (select policy_id ...)`
# reformulation, as-of included) returning the same rows.
model: models/policy.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, exists, semi-join, propagation, bitemporal, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Policy
  operation:
    asOf:
      operand:
        asOf:
          operand:
            exists:
              rel: Policy.coverages
              op:
                greaterThanEquals: { attr: Coverage.amount, value: 600.00 }
          dimension: transactionTime
          coordinate: latest
      dimension: validTime
      coordinate: latest
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from policy t0 where exists (select 1 from coverage t1 where t1.policy_id = t0.id and t1.amount >= ? and t1.thru_z = ? and t1.out_z = ?) and t0.thru_z = ? and t0.out_z = ?
      binds: [600.00, infinity, infinity, infinity, infinity]
  referenceSql: select id, name, from_z, thru_z, in_z, out_z from policy where id in (select policy_id from coverage where amount >= 600.00 and thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz) and thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz
  rows:
    - { id: 1, name: Auto, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
