# notExists(Order.items): orders with no line items — the negated semi-join. The
# golden SQL normalizes the negation as a leading `not exists (...)`. Orders 3,
# 4, 5 have no items.
model: models/orders.yaml
tags: [m-navigate, notExists, relationship, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  operation:
    notExists:
      rel: Order.items
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where not exists (select 1 from order_item t1 where t1.order_id = t0.id)
  referenceSql: select id, name from orders where id not in (select order_id from order_item)
  rows:
    - { id: 3, name: ada }
    - { id: 4, name: Margaret }
    - { id: 5, name: Alan }
  roundTrips: 1
