# Deep fetch, two independent paths off one root: the classic Reladomo worked
# example (research §5) — orders.deepFetch(items); orders.deepFetch(statuses).
#
# Two SEPARATE to-many relationships are fetched from the same root, so the round
# trips are 1 (root) + 1 (items) + 1 (statuses) = 3, never 1 + N + N. Both child
# levels are keyed by the same distinct order ids {1, 2, 3, 4, 5, 42} but issue
# INDEPENDENT statements — one per relationship level.
#
# `Order.statuses` joins on order_id, so it gathers BOTH order-level statuses
# (order_item_id NULL) and item-level statuses for an order; that is the correct
# semantics for the order's status events. Orders 3, 4, 5 have neither items nor
# statuses ⇒ both lists empty.
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, to-many, relationship, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    deepFetch:
      operand:
        all: {}
      paths:
        - [{ rel: Order.items }]
        - [{ rel: Order.statuses }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?, ?, ?, ?, ?, ?) order by t0.id desc
      binds: [1, 2, 3, 4, 5, 42]
    - sql:
        postgres: select t0.id, t0.order_id, t0.order_item_id, t0.code from order_status t0 where t0.order_id in (?, ?, ?, ?, ?, ?)
      binds: [1, 2, 3, 4, 5, 42]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders
  graph:
    Order:
      - id: 1
        name: Ada
        sku: A-100
        qty: 5
        price: 10.50
        active: true
        ordered_on: 2024-01-05
        items:
          - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
          - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
        statuses:
          - { id: 101, order_id: 1, order_item_id: null, code: NEW }
          - { id: 201, order_id: 1, order_item_id: 11, code: PICKED }
          - { id: 202, order_id: 1, order_item_id: 11, code: PACKED }
          - { id: 203, order_id: 1, order_item_id: 12, code: PICKED }
      - id: 2
        name: Linus
        sku: B-200
        qty: 10
        price: 20.00
        active: true
        ordered_on: 2024-02-10
        items:
          - { id: 21, order_id: 2, sku: A-300, quantity: 4, shipped_on: 2024-02-20 }
        statuses:
          - { id: 102, order_id: 2, order_item_id: null, code: SHIPPED }
      - id: 3
        name: ada
        sku: A-300
        qty: 15
        price: 30.25
        active: false
        ordered_on: 2024-03-15
        items: []
        statuses: []
      - id: 4
        name: Margaret
        sku: null
        qty: 20
        price: 40.00
        active: true
        ordered_on: 2024-04-20
        items: []
        statuses: []
      - id: 5
        name: Alan
        sku: "C_50%"
        qty: 25
        price: 50.75
        active: false
        ordered_on: 2024-05-25
        items: []
        statuses: []
      - id: 42
        name: Grace
        sku: A-999
        qty: 30
        price: 99.99
        active: true
        ordered_on: 2024-06-30
        items:
          - { id: 422, order_id: 42, sku: B-200, quantity: 5, shipped_on: 2024-02-05 }
          - { id: 421, order_id: 42, sku: A-999, quantity: 3, shipped_on: 2024-03-10 }
