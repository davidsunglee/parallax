# Deep fetch with an empty root result. Because the root query returns no parent
# keys, the child levels are elided: no Order.items or OrderItem.statuses SQL is
# authored or executed, and roundTrips is 1.
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, empty-root, relationship, slice-mvp-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    deepFetch:
      operand:
        eq: { attr: Order.id, value: 999 }
      paths:
        - [{ rel: Order.items }, { rel: OrderItem.statuses }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id = ?
      binds: [999]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id = 999
  graph:
    Order: []
  roundTrips: 1
