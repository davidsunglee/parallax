# Deep fetch with an empty root result. Because the root query returns no parent
# keys, the child levels are elided: no Order.items or OrderItem.statuses SQL is
# authored or executed, and roundTrips is 1.
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, empty-root, relationship, slice-mvp-1]
shape: read
when:
  operation:
    deepFetch:
      operand:
        eq: { attr: Order.id, value: 999 }
      paths:
        - [Order.items, OrderItem.statuses]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where t0.id = ?
      binds: [999]
  referenceSql: select id, name from orders where id = 999
  graph:
    Order: []
  roundTrips: 1
