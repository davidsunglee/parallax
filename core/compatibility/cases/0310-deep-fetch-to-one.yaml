# Deep fetch, to-one: every OrderItem with its single owning Order eager-fetched
# via the many-to-one `OrderItem.order` relationship.
#
# Two statements, so roundTrips = 2 (NOT one query per item):
#   level 0 (root)  : all order items
#   level 1 (order) : the orders whose id is in the DISTINCT order_id values of
#                     those items — {1, 2, 42}.
# The harness gathers the distinct parent keys from level 0, asserts they equal
# the authored level-1 binds, executes once, and fans each order back onto its
# items as a single `order` object (to-one).
#
# Non-trivial (deep fetch) ⇒ referenceSql REQUIRED: it is the naive single-
# statement oracle for the ROOT row set (all order items).
model: models/orders.yaml
tags: [m4, m5, deepFetch, to-one, relationship, first-implementation-mvp]
operation:
  deepFetch:
    operand:
      all: {}
    paths:
      - [OrderItem.order]
goldenSql:
  postgres:
    - select t0.id, t0.order_id, t0.sku, t0.quantity from order_item t0
    - select t0.id, t0.name from orders t0 where t0.id in (?, ?, ?)
binds:
  - []
  - [1, 2, 42]
referenceSql: select id, order_id, sku, quantity from order_item
roundTrips: 2
expectedGraph:
  OrderItem:
    - id: 11
      order_id: 1
      sku: A-100
      quantity: 2
      order: { id: 1, name: Ada }
    - id: 12
      order_id: 1
      sku: B-200
      quantity: 1
      order: { id: 1, name: Ada }
    - id: 21
      order_id: 2
      sku: A-300
      quantity: 4
      order: { id: 2, name: Linus }
    - id: 421
      order_id: 42
      sku: A-999
      quantity: 3
      order: { id: 42, name: Grace }
    - id: 422
      order_id: 42
      sku: B-200
      quantity: 5
      order: { id: 42, name: Grace }
