# History materializes one edge-pinned view per milestone (m-identity-map): a
# `history` read returns the full milestone set, and each result is a DISTINCT
# coordinate-keyed view interned at its milestone's own EDGE pin (its from-instant,
# the one instant guaranteed to select exactly that milestone).
#
# Position id 1 is a full bitemporal history of three rectangles
# (models/position.yaml): R1 value 90 (the superseded belief, processing
# [2024-01-01, 2024-04-01)), R2 value 100 (the head, business [2024-01-01,
# 2024-06-01)), and R3 value 200 (the corrected value, business [2024-06-01,
# infinity)). Step 0's `history` returns all three, each row carrying its own
# from/thru/in/out edge columns — the milestone edge pins. Steps 1 and 2 re-read
# id 1 pinned at two of those EDGE coordinates: R1's edge (business 2024-01-01,
# processing 2024-01-01, exercising the processing axis) and R3's edge (business
# 2024-06-01, processing 2024-04-01, exercising the business axis). Each resolves
# exactly its milestone (90, then 200), and the two are DISTINCT pinned views
# (`differentObjectFrom`) — proven at the wire by the differing coordinates and
# rows, graded as reference inequality by the API Conformance Suite.
model: models/position.yaml
tags: [m-identity-map, m-temporal-read, identity, as-of, bitemporal, temporal, history, scenario, slice-managed-1]
shape: scenario
when:
  uow:
    concurrency: optimistic
  scenario:
    - targetEntity: Position
      find:
        history:
          operand:
            history:
              operand:
                eq:
                  attr: Position.id
                  value: 1
              asOfAttr: Position.processingDate
          asOfAttr: Position.businessDate
      roundTrips: 1
      note: history returns all three milestones, each carrying its own edge pins (from/thru/in/out)
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.pos_id = ?
          binds: [1]
      expectRows:
        - { pos_id: 1, acct_num: A, val: 90.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-04-01T00:00:00+00:00" }
        - { pos_id: 1, acct_num: A, val: 100.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: "2024-06-01T00:00:00+00:00", in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
        - { pos_id: 1, acct_num: A, val: 200.00, from_z: "2024-06-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
    - targetEntity: Position
      find:
        asOf:
          operand:
            asOf:
              operand:
                eq:
                  attr: Position.id
                  value: 1
              asOfAttr: Position.processingDate
              date: "2024-01-01T00:00:00+00:00"
          asOfAttr: Position.businessDate
          date: "2024-01-01T00:00:00+00:00"
      roundTrips: 1
      note: re-read at R1's edge pin (business + processing from-instant 2024-01-01) -> exactly R1 (90)
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.pos_id = ? and t0.from_z <= ? and t0.thru_z > ? and t0.in_z <= ? and t0.out_z > ?
          binds: [1, "2024-01-01T00:00:00+00:00", "2024-01-01T00:00:00+00:00", "2024-01-01T00:00:00+00:00", "2024-01-01T00:00:00+00:00"]
      expectRows:
        - { pos_id: 1, acct_num: A, val: 90.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-04-01T00:00:00+00:00" }
    - targetEntity: Position
      find:
        asOf:
          operand:
            asOf:
              operand:
                eq:
                  attr: Position.id
                  value: 1
              asOfAttr: Position.processingDate
              date: "2024-04-01T00:00:00+00:00"
          asOfAttr: Position.businessDate
          date: "2024-06-01T00:00:00+00:00"
      roundTrips: 1
      differentObjectFrom: 1
      identityAttr: pos_id
      note: re-read at R3's edge pin (business 2024-06-01, processing 2024-04-01) -> exactly R3 (200), a DISTINCT view from R1
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.pos_id = ? and t0.from_z <= ? and t0.thru_z > ? and t0.in_z <= ? and t0.out_z > ?
          binds: [1, "2024-06-01T00:00:00+00:00", "2024-06-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
      expectRows:
        - { pos_id: 1, acct_num: A, val: 200.00, from_z: "2024-06-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
then:
  roundTrips: 3
