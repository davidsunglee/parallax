# Processing as-of exactly on a milestone boundary proves half-open interval
# semantics: in_z <= asOf < out_z. The row ending at 2024-06-01 is excluded and
# the row beginning at 2024-06-01 is included.
model: models/balance.yaml
tags: [m-temporal-read, m-sql, as-of, audit-only, boundary, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Balance
  operation:
    asOf:
      operand:
        all: {}
      asOfAttr: Balance.processingDate
      date: "2024-06-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.in_z <= ? and t0.out_z > ?
      binds: ["2024-06-01T00:00:00+00:00", "2024-06-01T00:00:00+00:00"]
  referenceSql: select bal_id, acct_num, val, in_z, out_z from balance where in_z <= '2024-06-01T00:00:00+00:00'::timestamptz and out_z > '2024-06-01T00:00:00+00:00'::timestamptz
  rows:
    - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
    - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: infinity }
    - { bal_id: 3, acct_num: C, val: 50.00, in_z: "2024-03-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
  roundTrips: 1
