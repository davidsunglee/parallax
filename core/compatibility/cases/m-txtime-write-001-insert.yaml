# Audit-only INSERT opens a single current milestone [txInstant, infinity) with no
# prior row to close — the simplest write contract (m-txtime-write).
#
# An insert in audit-only mode writes one milestone row opened at the transaction
# instant with the open upper bound infinity (in_z = txInstant, out_z = infinity);
# the harness applies the golden DML and asserts the resulting current row. The
# insert is identical SQL on both dialects and its open bound rides as a bind, so
# there is no `then.referenceSql` and the case runs cleanly on both. Postgres writes
# native `'infinity'::timestamptz` while the MariaDB seam writes the max-sentinel
# `9999-12-31 23:59:59.999999` and reads it back as infinity, so the single authored
# `then.tableState` (out_z: infinity) holds on each.
model: models/balance.yaml
tags: [m-txtime-write, m-sql, write-sequence, insert, audit-only, slice-snapshot-1, slice-managed-1]
shape: writeSequence
when:
  writeSequence:
    - mutation: insert
      entity: Balance
      statements: 1
      note: open a current milestone [txInstant, infinity)
      rows:
        - { id: 1, acctNum: A, value: 100.00 }
      at: "2024-01-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: insert into balance(bal_id, acct_num, val, in_z, out_z) values (?, ?, ?, ?, ?)
        mariadb: insert into balance(bal_id, acct_num, val, in_z, out_z) values (?, ?, ?, ?, ?)
      binds: [1, A, 100.00, "2024-01-01T00:00:00+00:00", infinity]
  tableState:
    balance:
      - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
