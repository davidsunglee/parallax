# orderBy (ascending, default direction) + limit — the lowest 3 ids. Ascending
# is the default direction, so the canonical SQL emits the bare `asc` keyword for
# clarity and limits to 3, selecting ids 1, 2, 3 via the ordering.
model: models/orders.yaml
tags: [m-op-algebra, orderBy, limit, directive, slice-mvp-1]
shape: read
when:
  operation:
    limit:
      count: 3
      operand:
        orderBy:
          keys:
            - { attr: Order.id, direction: asc }
          operand:
            all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 order by t0.id asc limit ?
      binds: [3]
  referenceSql: select id, name from orders order by id asc limit 3
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
    - { id: 3, name: ada }
  roundTrips: 1
