# orderBy (ascending, default direction) + limit — the lowest 3 ids. Ascending
# is the default direction, so the canonical SQL emits the bare `asc` keyword for
# clarity and limits to 3, selecting ids 1, 2, 3 via the ordering.
model: models/orders.yaml
tags: [m-op-algebra, orderBy, limit, directive, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    limit:
      count: 3
      operand:
        orderBy:
          keys:
            - { attr: Order.id, direction: asc }
          operand:
            all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 order by t0.id asc limit ?
      binds: [3]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders order by id asc limit 3
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
  roundTrips: 1
