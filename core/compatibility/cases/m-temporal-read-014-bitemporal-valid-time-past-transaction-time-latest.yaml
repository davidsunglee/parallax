# Bitemporal as-of: business date in the PAST, processing date NOW.
#
# Pin validTime = 2024-03-01 (a past instant, so the [from, to) containment
# predicate `from_z <= ? and thru_z > ?` is injected) and transactionTime = Latest
# (the current-row equality `out_z = ?`). This asks: of what the system knows NOW,
# what was true in the world on 2024-03-01?
#
# Over the id-1 history that is R2 (value 100): R2's business interval
# [2024-01-01, 2024-06-01) contains 2024-03-01 AND it is current on processing
# (out_z = infinity). R3's business starts 2024-06-01 (> 2024-03-01), excluded.
# R1 is superseded on processing (out_z finite), excluded. The business and
# processing binds read business-axis-first (the outer pin), then processing.
model: models/position.yaml
tags: [m-temporal-read, m-sql, bitemporal, temporal, as-of, both-axes, past, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Position
  operation:
    asOf:
      operand:
        asOf:
          operand:
            all: {}
          dimension: transactionTime
          coordinate: latest
      dimension: validTime
      coordinate: "2024-03-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
      binds: ["2024-03-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", infinity]
  referenceSql: select pos_id, acct_num, val, from_z, thru_z, in_z, out_z from position where from_z <= '2024-03-01T00:00:00+00:00'::timestamptz and thru_z > '2024-03-01T00:00:00+00:00'::timestamptz and out_z = 'infinity'::timestamptz
  rows:
    - { pos_id: 1, acct_num: A, val: 100.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: "2024-06-01T00:00:00+00:00", in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
