# count(*) versus count(nullable_attr): grouped by active flag, Order.sku proves
# count(attr) skips NULL while count(*) counts every row.
model: models/orders.yaml
tags: [m2, m3, aggregate, count, nullable, groupBy]
operation:
  groupBy:
    operand:
      all: {}
    keys: [Order.active]
    aggregates:
      - count: { as: row_count }
      - count: { attr: Order.sku, as: sku_count }
goldenSql:
  postgres: select t0.active, count(*) row_count, count(t0.sku) sku_count from orders t0 group by t0.active
binds: []
referenceSql: select active, count(*) as row_count, count(sku) as sku_count from orders group by active
expectedRows:
  - { active: true, row_count: 4, sku_count: 3 }
  - { active: false, row_count: 2, sku_count: 2 }
roundTrips: 1
