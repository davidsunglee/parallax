# Deferred load x DIVERGENT value object: the wrong-entity regression witness.
#
# m-deep-fetch-019 loads `Customer.locations`, but Location's `address` is Customer's
# recursive composite VERBATIM, so decoding a Location row with the WRONG (root
# Customer) descriptor is indistinguishable. This case loads `Customer.depots`
# instead, whose child Depot declares a DIFFERENT `address` STRUCTURE — a FLAT
# `{ line, postcode }` in the same `address` column (models/customer.yaml). Decoding a
# Depot row with Customer's recursive descriptor drops `line`/`postcode` and injects
# `street`/`city`/`geo`/`phones`, so the per-step read-entity resolution is now
# OBSERVABLE. The classification the witness proves:
#
#   * m-case-format "Read result form" — a relationship `action: load` step is
#     INSTANCE-FORM (object lane): the SQL-producing read that first materializes the
#     loaded related objects projects the read entity's OWN instance-form list, its
#     scalars PLUS any value-object document column it declares.
#   * m-sql "Read projection" (slot 4) — an instance-form read projects every declared
#     value-object document column LAST; a `load` to a VO-bearing child therefore rides
#     the child's whole `address` document on the child-level statement, decoded with
#     the CHILD Depot's descriptor (the harness walks the relationship path's terminal
#     entity), never the scenario root's.
#
# Steps:
#   0  find (Customer id 1, Ada)      : INSTANCE-FORM managed find — the developer find
#      materializes the owner, so the projection carries Customer's scalars in
#      columnOrder (id, name) then the `address` document LAST (slot 4). expectRows
#      carries Ada's materialized recursive address.
#   1  load (depots, on 0)            : the deferred child fetch — INSTANCE-FORM. It
#      projects Depot's OWN instance-form list `id, customer_id, label, address` (the
#      FK `customer_id` is a declared scalar in slot 1; the `address` document is slot
#      4, LAST), honoring the relationship `orderBy: id asc`. expectRows carries each
#      Depot row WITH its own materialized FLAT `address` — decoded with DEPOT's
#      descriptor, not Customer's. Customer 1 owns depot 200 (present divergent
#      { line, postcode }) and 201 (SQL-NULL document -> the whole value object
#      materializes null, the absence collapse pinned AT DEPTH).
#
# Golden SQL is identical on Postgres and MariaDB (bare column projections, no JSON
# extraction); both decode to the same flat composite. Total roundTrips 2 = managed
# find (1) + deferred load (1) — one IN-keyed child statement, not one per parent.
#
# compileEligibility is run-only / query-result-dependent: the deferred load's
# `customer_id IN (…)` binds are the distinct parent keys gathered from step 0's find
# RESULT, exactly as m-deep-fetch-019 names for the analogous fan-out bind.
model: models/customer.yaml
tags: [m-deep-fetch, m-value-object, relationship, to-many, deferred-load, materialization, json, slice-managed-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "deferred load - the Customer.depots child IN-list binds are the distinct parent keys gathered from step 0's find result, so the child emission depends on a query result"
when:
  scenario:
    - targetEntity: Customer
      find:
        eq: { attr: Customer.id, value: 1 }
      roundTrips: 1
      note: managed find materializes the owner WITH its address document — INSTANCE-FORM, slot 4 present (id, name, then address last)
      statements:
        - sql:
            postgres: select t0.id, t0.name, t0.address from customer t0 where t0.id = ?
            mariadb: select t0.id, t0.name, t0.address from customer t0 where t0.id = ?
          binds: [1]
      expectRows:
        - id: 1
          name: Ada
          address:
            street: 1 Park Ave
            city: Oslo
            geo:
              country: NO
              elevation: 10.5
              point: { lat: 59.9, lon: 10.7 }
            phones:
              - { type: home, number: '555-1234' }
              - { type: work, number: '555-9999' }
    - action: load
      "on": 0
      path: depots
      roundTrips: 1
      note: deferred load of the DIVERGENT VO-bearing child Depot — INSTANCE-FORM, projects Depot's own list (id, customer_id, label, address); each row's flat address decodes with DEPOT's descriptor, not Customer's
      statements:
        - sql:
            postgres: select t0.id, t0.customer_id, t0.label, t0.address from depot t0 where t0.customer_id in (?) order by t0.id asc
            mariadb: select t0.id, t0.customer_id, t0.label, t0.address from depot t0 where t0.customer_id in (?) order by t0.id asc
          binds: [1]
      expectRows:
        - id: 200
          customer_id: 1
          label: Dock
          address:
            line: "1 Dock St"
            postcode: "0193"
        # Depot 201: SQL-NULL document child -> address materializes null (the
        # absence collapse pinned AT DEPTH for the divergent flat composite).
        - id: 201
          customer_id: 1
          label: Yard
          address: null
then:
  roundTrips: 2
