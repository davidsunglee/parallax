# Deferred load x DIVERGENT value object: the wrong-entity regression witness.
#
# m-deep-fetch-019 loads `Customer.locations`, but Location's `address` is Customer's
# recursive composite VERBATIM, so decoding a Location row with the WRONG (root
# Customer) descriptor is indistinguishable. This case loads `Customer.depots`: child
# Depot declares a FLAT `{ line, postcode }` in the same `address` column
# (models/customer.yaml), so the wrong descriptor drops `line`/`postcode` and injects
# `street`/`city`/`geo`/`phones` — the per-step read-entity resolution is OBSERVABLE.
#
# The classification pinned: a relationship `action: load` step is INSTANCE-FORM
# (m-case-format "Read result form", object lane), and its SQL-producing child read
# projects the read entity's OWN instance-form list — scalars plus the `address`
# document LAST (m-sql "Read projection", slot 4) — decoded with the relationship
# path's TERMINAL entity descriptor (Depot), never the scenario root's. The deferred
# load emits ONE IN-keyed child statement (not one per parent) honoring
# `orderBy: id asc`; depot 201's SQL-NULL document materializes a null address — the
# absence collapse pinned AT DEPTH for the divergent flat composite. Golden SQL is
# dialect-identical (bare projections, no JSON extraction); compileEligibility is
# run-only because the `customer_id IN (…)` binds are the distinct parent keys
# gathered from step 0's find RESULT, exactly as m-deep-fetch-019 names.
model: models/customer.yaml
tags: [m-deep-fetch, m-value-object, relationship, to-many, deferred-load, materialization, json, slice-managed-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "deferred load - the Customer.depots child IN-list binds are the distinct parent keys gathered from step 0's find result, so the child emission depends on a query result"
when:
  scenario:
    - targetEntity: Customer
      find:
        eq: { attr: Customer.id, value: 1 }
      roundTrips: 1
      note: managed find materializes the owner WITH its address document — INSTANCE-FORM, slot 4 present (id, name, then address last)
      statements:
        - sql:
            postgres: select t0.id, t0.name, t0.address from customer t0 where t0.id = ?
            mariadb: select t0.id, t0.name, t0.address from customer t0 where t0.id = ?
          binds: [1]
      expectRows:
        - id: 1
          name: Ada
          address:
            street: 1 Park Ave
            city: Oslo
            geo:
              country: NO
              elevation: 10.5
              point: { lat: 59.9, lon: 10.7 }
            phones:
              - { type: home, number: '555-1234' }
              - { type: work, number: '555-9999' }
    - action: load
      "on": 0
      path: depots
      roundTrips: 1
      note: deferred load of the DIVERGENT VO-bearing child Depot — INSTANCE-FORM, projects Depot's own list (id, customer_id, label, address); each row's flat address decodes with DEPOT's descriptor, not Customer's
      statements:
        - sql:
            postgres: select t0.id, t0.customer_id, t0.label, t0.address from depot t0 where t0.customer_id in (?) order by t0.id asc
            mariadb: select t0.id, t0.customer_id, t0.label, t0.address from depot t0 where t0.customer_id in (?) order by t0.id asc
          binds: [1]
      expectRows:
        - id: 200
          customer_id: 1
          label: Dock
          address:
            line: "1 Dock St"
            postcode: "0193"
        - id: 201
          customer_id: 1
          label: Yard
          address: null
then:
  roundTrips: 2
