# Walking-skeleton case: eq on the primary key — one equality predicate, one bind.
#
# The literal 42 becomes a `?` placeholder whose value rides in the statement's
# binds. Trivial single-table predicate, so `then.referenceSql` is optional; a
# naive oracle is included anyway to exercise the triple-equivalence path.
#
# A plain single-table `eq` lowers to identical SQL on Postgres and MariaDB (no
# dialect divergence), so both dialects share one `then.statements` entry and the
# harness runs it against both — the simplest matrix row.
model: models/orders.yaml
tags: [m-op-algebra, m-conformance-adapter, eq, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    eq:
      attr: Order.id
      value: 42
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id = ?
        mariadb: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id = ?
      binds: [42]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id = 42
  rows:
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
