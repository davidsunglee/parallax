# Walking-skeleton case: eq on the primary key — one equality predicate, one bind.
#
# The literal 42 becomes a `?` placeholder whose value rides in the statement's
# binds. Trivial single-table predicate, so `then.referenceSql` is optional; a
# naive oracle is included anyway to exercise the triple-equivalence path.
#
# A plain single-table `eq` lowers to identical SQL on Postgres and MariaDB (no
# dialect divergence), so both dialects share one `then.statements` entry and the
# harness runs it against both — the simplest matrix row.
model: models/orders.yaml
tags: [m-op-algebra, m-conformance-adapter, eq, slice-mvp-1]
shape: read
when:
  operation:
    eq:
      attr: Order.id
      value: 42
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where t0.id = ?
        mariadb: select t0.id, t0.name from orders t0 where t0.id = ?
      binds: [42]
  referenceSql: select id, name from orders where id = 42
  rows:
    - { id: 42, name: Grace }
  roundTrips: 1
