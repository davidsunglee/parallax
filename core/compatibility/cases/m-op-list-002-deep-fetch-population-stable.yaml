# Deep fetch populates operation-backed relationship lists, stably (m-op-list,
# m-deep-fetch): once a deep fetch has populated a relationship list, accessing it
# again does not re-query.
#
# Step 0 finds all orders. Step 1 deep-fetches (loads) `items`, populating each
# order's line-item list in one batched child query. Step 2 accesses `items` again
# and emits NO SQL — the list is already populated and returns the SAME objects
# (sameObjectAs). Two round trips total.
model: models/orders.yaml
tags: [m-op-list, m-deep-fetch, relationship, slice-managed-1]
shape: scenario
when:
  scenario:
    - targetEntity: Order
      find:
        all: {}
      roundTrips: 1
      note: the root orders
      statements:
        - sql:
            postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0
      expectRows:
        - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
        - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
        - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
        - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
        - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
        - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
    - action: load
      "on": 0
      path: items
      roundTrips: 1
      note: deep fetch populates the items lists in one batched query
      statements:
        - sql:
            postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?, ?, ?, ?, ?, ?) order by t0.id desc
          binds: [1, 2, 3, 4, 5, 42]
      expectRows:
        - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
        - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
        - { id: 21, order_id: 2, sku: A-300, quantity: 4, shipped_on: 2024-02-20 }
        - { id: 421, order_id: 42, sku: A-999, quantity: 3, shipped_on: 2024-03-10 }
        - { id: 422, order_id: 42, sku: B-200, quantity: 5, shipped_on: 2024-02-05 }
    - action: access
      "on": 0
      path: items
      roundTrips: 0
      sameObjectAs: 1
      note: accessing the populated list again -> zero SQL, the same objects
then:
  roundTrips: 2
