# Boundary case (M8): a PERSISTENT retriable failure surfaces after the bound is
# exhausted — `api-conformance` lane.
#
# The retry loop is BOUNDED: a failure that keeps recurring is not retried forever.
# This case injects a `serialization-failure` on EVERY attempt under a small bound
# (`retries: 2` — three attempts total), and asserts the transient SURFACES to the
# caller once the bound is exhausted (diagnosably — the surfaced error carries the
# attempt count). This pins the upper boundary of the bound, the counterpart to
# `m-auto-retry-004`'s disabled loop.
#
# `lane: api-conformance`: injected persistent transient + bound exhaustion; suite-
# driven via a fault-injecting decorator around the shipped adapter.
model: models/account.yaml
tags: [m-auto-retry, m-opt-lock, m-api-conformance, transient, slice-mvp-1]
lane: api-conformance
uow:
  concurrency: locking
  retries: 2
inject: serialization-failure
boundary:
  - action: read
    note: observe the versioned row
  - action: update
    note: the write raises a serialization failure on every attempt — surfaces after the bound
expect: serialization-failure
