# Read-your-own-writes for UPDATE (m-unit-work): a dependent find observes a
# committed in-transaction UPDATE.
#
# m-unit-work-001 proves read-your-own-writes for INSERT; this pins the UPDATE
# variant. account.version is an optimistic-lock column, so a keyed UPDATE requires
# a PRIOR observation (`m-opt-lock` "Version values are framework-owned") — the unit
# of work first OBSERVES account 1 (Ada, balance 100.00, version 1), then commits an
# UPDATE that advances from that observation (locking mode: no gate, version
# advances 1 -> 2), then issues a find that depends on the update — it MUST observe
# the updated row, not the stale fixture value. All three steps share ONE `uow`
# group (`observed-update`): the observing find, the versioned write, and the
# dependent find run inside the SAME unit of work, which is what lets the write's
# version bind be the observing find's OWN transaction-scoped observation
# (`m-opt-lock` "the version the unit of work observed") rather than an oracle
# value the compile lane could not otherwise derive — the case is therefore
# `compileEligibility: run-only` (query-result-dependent). The scenario:
#   step 0 find  : observe account 1 (Ada, 100.00, version 1), 1 round trip.
#   step 1 write : an UPDATE of account 1 (Ada) balance 100.00 -> 175.00, advancing
#                  the OBSERVED version 1 -> 2.
#   step 2 find  : query account 1 — it MUST observe balance 175.00, version 2. The
#                  group COMMITS after this, its last step.
# Every find is a cache MISS (the write step's forced flush precedes step 2) and, in
# the DEFAULT `locking` mode, carries the m-read-lock shared-row-lock suffix
# (`for share of t0`). roundTrips = 3 (the observing find + the committed update +
# the dependent find).
model: models/account.yaml
tags: [m-unit-work, read-your-own-writes, flush, scenario, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "the versioned write's version bind is the framework-owned advance of the version the unit of work's own observing find returned — a query result (m-opt-lock)"
when:
  scenario:
    - uow: observed-update
      targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 1
      roundTrips: 1
      note: observe account 1 (balance 100.00, version 1) before the update, inside the SAME unit of work as the write below
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
          binds: [1]
      expectRows:
        - { id: 1, owner: Ada, balance: 100.00, version: 1 }
    - uow: observed-update
      write:
        - mutation: update
          entity: Account
          rows:
            - { id: 1, balance: 175.00 }
      roundTrips: 1
      note: buffer a keyed update of account 1 (balance 175.00), advancing the OBSERVED version 1 -> 2; the unit of work commits at the group's last step below
      statements:
        - sql:
            postgres: update account set balance = ?, version = ? where id = ?
          binds: [175.00, 2, 1]
    - uow: observed-update
      targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 1
      roundTrips: 1
      note: a dependent find MUST observe the flushed update (read-your-own-writes); the group COMMITS after this, its last step
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
          binds: [1]
      expectRows:
        - { id: 1, owner: Ada, balance: 175.00, version: 2 }
then:
  roundTrips: 3
