# Explicit as-of a PAST instant: pin processingDate to 2024-04-01. Because the
# pin is < infinity, the [from, to) containment predicate is injected
# (toIsInclusive = false ⇒ `in_z <= ? and out_z > ?`), NOT the current-row form.
# The pin instant appears as TWO binds (one per interval bound).
#
# As-of 2024-04-01 each account's then-known milestone is returned:
#   id 1: 100.00 ([2024-01-01, 2024-06-01) contains 2024-04-01)
#   id 2: 200.00 ([2024-02-01, infinity)   contains 2024-04-01)
#   id 3:  50.00 ([2024-03-01, 2024-08-01) contains 2024-04-01)
# The later id-1 (150.00) milestone is excluded — it was not yet known.
model: models/balance.yaml
tags: [m7, m3, temporal mvp, as-of, audit-only, past]
operation:
  asOf:
    operand:
      all: {}
    asOfAttr: Balance.processingDate
    date: "2024-04-01T00:00:00+00:00"
goldenSql:
  postgres: select t0.bal_id, t0.val from balance t0 where t0.in_z <= ? and t0.out_z > ?
binds: ["2024-04-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
referenceSql: select bal_id, val from balance where in_z <= '2024-04-01T00:00:00+00:00'::timestamptz and out_z > '2024-04-01T00:00:00+00:00'::timestamptz
expectedRows:
  - { bal_id: 1, val: 100.00 }
  - { bal_id: 2, val: 200.00 }
  - { bal_id: 3, val: 50.00 }
roundTrips: 1
