# variancePop — POPULATION variance (n), with the TWO-COLUMN read.
#
# Over the 5 order_item quantities {2,1,4,3,5} (mean 3, Σ(x−μ)² = 10):
#   var_pop(quantity) = 10/5 = 2   (exactly; the harness compares numerics in
#                                   Decimal space, so 2 and 2.0 are equivalent)
#   count(quantity)   = 5
# var_pop is the square of stddev_pop (0408: sqrt(2)² = 2), so the pair
# cross-checks. Like every stdDev*/variance* aggregate it emits BOTH the statistic
# and a companion sample count (the two-column read). The independent referenceSql
# proves golden == reference == expected against real Postgres, pinning the
# var_pop SQL mapping, which no fixture exercised before.
model: models/orders.yaml
tags: [m2, m3, aggregate, variance, variancePop, twoColumn]
operation:
  groupBy:
    operand:
      all: {}
    aggregates:
      - variancePop: { attr: OrderItem.quantity, as: quantity_variance }
      - count: { attr: OrderItem.quantity, as: sample_count }
goldenSql:
  postgres: select var_pop(t0.quantity) quantity_variance, count(t0.quantity) sample_count from order_item t0
binds: []
referenceSql: select var_pop(quantity) as quantity_variance, count(quantity) as sample_count from order_item
expectedRows:
  - { quantity_variance: 2, sample_count: 5 }
roundTrips: 1
