# stdDevPop — POPULATION standard deviation, with the TWO-COLUMN read.
#
# The population sibling of 0406 (which proves stddev_samp). Over the 5 order_item
# quantities {2,1,4,3,5} (mean 3, Σ(x−μ)² = 10):
#   stddev_pop(quantity) = sqrt(10/5) = sqrt(2) = 1.4142135623730950... (irrational)
#   count(quantity)      = 5
# Like every stdDev*/variance* aggregate it emits BOTH the statistic and a
# companion sample count (the two-column read; see m2/m3). The independent
# referenceSql computes the same two columns naively, so golden == reference ==
# expected is proven against real Postgres — pinning the stddev_pop SQL mapping,
# which no fixture exercised before.
#
# sqrt(2) is irrational (and its scale differs across databases), so the statistic
# is compared with `tolerance` (abs(actual - expected) <= 1e-9); count and the
# var_*/exact aggregates elsewhere compare exactly.
model: models/orders.yaml
tags: [m2, m3, aggregate, stdDev, stdDevPop, twoColumn]
operation:
  groupBy:
    operand:
      all: {}
    aggregates:
      - stdDevPop: { attr: OrderItem.quantity, as: quantity_stddev_pop }
      - count: { attr: OrderItem.quantity, as: sample_count }
goldenSql:
  postgres: select stddev_pop(t0.quantity) quantity_stddev_pop, count(t0.quantity) sample_count from order_item t0
binds: []
referenceSql: select stddev_pop(quantity) as quantity_stddev_pop, count(quantity) as sample_count from order_item
expectedRows:
  - { quantity_stddev_pop: 1.4142135624, sample_count: 5 }
tolerance: 1.0e-9
roundTrips: 1
