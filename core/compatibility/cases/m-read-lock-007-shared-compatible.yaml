# Read-lock is SHARED, not exclusive (m-read-lock / m-dialect). Round 1: transaction A takes the
# in-transaction shared read lock (`for share of t0` / `lock in share mode`) on
# account 2 and HOLDS (no commit). Round 2: transaction B takes the SAME shared read
# lock on account 2 -- and, because a shared lock is compatible with another shared
# lock, B is ADMITTED and succeeds without blocking. Both reads observe Linus /
# 250.00 / version 1 on their own held session.
#
# This is the negative control for m-read-lock-006: m-read-lock-006 alone cannot tell a SHARED lock from an
# EXCLUSIVE one (`for update` would also block a writer and pass it). m-read-lock-007 pins the
# lock as shared -- an adapter that emitted `for update` instead of `for share` fails
# here, because B would then block on A and time out. No error is raised; the
# concurrency-success shape asserts NO node blocked/raised and each read's expectRows.
model: models/account.yaml
tags: [m-read-lock, m-dialect, concurrency, shared-lock-compatible, slice-mvp-1]
shape: concurrencySuccess
given:
  fixtures: true
when:
  concurrency:
    rounds:
      - A:
          kind: read
          statements:
            - sql:
                postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
                mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? lock in share mode
              binds: [2]
          expectRows:
            - { id: 2, owner: Linus, balance: 250.00, version: 1 }
      - B:
          kind: read
          statements:
            - sql:
                postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
                mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? lock in share mode
              binds: [2]
          expectRows:
            - { id: 2, owner: Linus, balance: 250.00, version: 1 }
