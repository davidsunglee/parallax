# in(values) — set membership against a literal list.
#
# `in (?, ?, ?)` is identical SQL on Postgres and MariaDB, so both dialects share
# one `then.statements` entry — a membership matrix row alongside the `eq` one. The
# value list {1, 2, 42} returns the three matching orders.
model: models/orders.yaml
tags: [m-op-algebra, in, membership, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    in:
      attr: Order.id
      values: [1, 2, 42]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id in (?, ?, ?)
        mariadb: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id in (?, ?, ?)
      binds: [1, 2, 42]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id in (1, 2, 42)
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
