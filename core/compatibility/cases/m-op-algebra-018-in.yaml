# in(values) — set membership against a literal list.
#
# `in (?, ?, ?)` is identical SQL on Postgres and MariaDB, so both dialects share
# one `then.statements` entry — a membership matrix row alongside the `eq` one. The
# value list {1, 2, 42} returns the three matching orders.
model: models/orders.yaml
tags: [m-op-algebra, in, membership, slice-mvp-1]
shape: read
when:
  operation:
    in:
      attr: Order.id
      values: [1, 2, 42]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where t0.id in (?, ?, ?)
        mariadb: select t0.id, t0.name from orders t0 where t0.id in (?, ?, ?)
      binds: [1, 2, 42]
  referenceSql: select id, name from orders where id in (1, 2, 42)
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
    - { id: 42, name: Grace }
  roundTrips: 1
