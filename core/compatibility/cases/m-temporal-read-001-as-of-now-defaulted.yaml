# Defaulted as-of read (the m-temporal-read default-injection rule, made observable).
#
# The operation is a plain `all` over Balance — the caller OMITS the processingDate
# dimension. The temporal MVP rule is "an omitted as-of dimension defaults to as-of
# now", so the implementation must auto-inject the current-row predicate
# `out_z = infinity`; the golden SQL carries that injected `t0.out_z = ?` even though
# the operation has no asOf node. As-of now over the fixture history returns only the
# CURRENT milestone of each live account — (1, 150.00) and (2, 200.00) — excluding
# the superseded id-1 row and the terminated id-3 account, whose out_z is finite.
# The cross-dialect infinity-fallback proof lives in the dedicated
# m-temporal-read-021 (a MariaDB `then.statements` twin whose `then.referenceSql` is
# dialect-neutral); this case stays Postgres-only because its `then.referenceSql`
# uses the Postgres-specific `'infinity'::timestamptz` cast.
model: models/balance.yaml
tags: [m-temporal-read, m-sql, m-core, as-of, audit-only, defaulted, infinity, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Balance
  operation:
    all: {}
then:
  statements:
    - sql:
        postgres: select t0.bal_id, t0.val from balance t0 where t0.out_z = ?
      binds: [infinity]
  referenceSql: select bal_id, val from balance where out_z = 'infinity'::timestamptz
  rows:
    - { bal_id: 1, val: 150.00 }
    - { bal_id: 2, val: 200.00 }
  roundTrips: 1
