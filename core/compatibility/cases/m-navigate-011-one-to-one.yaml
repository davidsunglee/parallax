# navigate over a ONE-TO-ONE relationship (m-descriptor cardinality, m-navigate semi-join).
#
# Filter Persons by a predicate on their single Passport peer. A one-to-one
# navigation lowers to the same correlated EXISTS semi-join as any to-one hop, so
# it never multiplies the person rows. Only person 1 holds passport number
# 'P-AAA'.
model: models/person.yaml
tags: [m-navigate, navigate, relationship, one-to-one, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Person
  operation:
    navigate:
      rel: Person.passport
      op:
        eq: { attr: Passport.number, value: P-AAA }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from person t0 where exists (select 1 from passport t1 where t1.person_id = t0.id and t1.number = ?)
      binds: [P-AAA]
  referenceSql: select id, name from person where id in (select person_id from passport where number = 'P-AAA')
  rows:
    - { id: 1, name: Alan }
  roundTrips: 1
