# Held views reflect the post-write timeline at their own pin (m-identity-map):
# after an in-transaction milestone-chaining write (m-audit-write), a held
# latest-pinned view ADVANCES to the newly chained milestone while a held past-pinned
# view keeps showing the milestone its own pin selects.
#
# Balance id 2 starts as one open milestone: value 200.00 known [2024-02-01,
# infinity). Step 0 holds the LATEST view (200.00) and step 1 holds a PAST view
# pinned at 2024-04-01 (also 200.00 right now — the same milestone contains it).
# Step 2 is an audit-only update at transaction instant 2024-07-01: it closes the
# current row (out_z = 2024-07-01, keyed by the current-row predicate) and chains a
# new current milestone value 250.00. Re-reading the LATEST pin (step 3) now
# observes the advanced value 250.00 — the SAME held latest view (`sameObjectAs` 0).
# Re-reading the PAST pin (step 4) still observes 200.00 — its pin selects the
# now-closed [2024-02-01, 2024-07-01) milestone, the SAME held past view
# (`sameObjectAs` 1). The differing values are the wire observable; the
# same-object-across-the-write reference identity is asserted by the API Conformance
# Suite.
model: models/balance.yaml
tags: [m-identity-map, m-audit-write, m-temporal-read, identity, as-of, temporal, audit-only, scenario, slice-managed-1]
shape: scenario
when:
  uow:
    concurrency: optimistic
  scenario:
    - targetEntity: Balance
      find:
        eq:
          attr: Balance.id
          value: 2
      roundTrips: 1
      note: hold the LATEST view of id 2 (the current milestone, 200.00)
      statements:
        - sql:
            postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.bal_id = ? and t0.out_z = ?
          binds: [2, infinity]
      expectRows:
        - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: infinity }
    - targetEntity: Balance
      find:
        asOf:
          operand:
            eq:
              attr: Balance.id
              value: 2
          dimension: transactionTime
          coordinate: "2024-04-01T00:00:00+00:00"
      roundTrips: 1
      note: hold a PAST view pinned at 2024-04-01 (the same milestone right now, 200.00)
      statements:
        - sql:
            postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.bal_id = ? and t0.in_z <= ? and t0.out_z > ?
          binds: [2, "2024-04-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
      expectRows:
        - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: infinity }
    - write: update
      roundTrips: 2
      note: audit-only update at 2024-07-01 — close the current row, then chain a new current milestone (250.00)
      statements:
        - sql:
            postgres: update balance set out_z = ? where bal_id = ? and out_z = ?
          binds: ["2024-07-01T00:00:00+00:00", 2, infinity]
        - sql:
            postgres: insert into balance(bal_id, acct_num, val, in_z, out_z) values (?, ?, ?, ?, ?)
          binds: [2, B, 250.00, "2024-07-01T00:00:00+00:00", infinity]
    - targetEntity: Balance
      find:
        eq:
          attr: Balance.id
          value: 2
      roundTrips: 1
      sameObjectAs: 0
      identityAttr: bal_id
      note: the held LATEST view ADVANCED to the newly chained milestone (250.00) — the SAME object as step 0
      statements:
        - sql:
            postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.bal_id = ? and t0.out_z = ?
          binds: [2, infinity]
      expectRows:
        - { bal_id: 2, acct_num: B, val: 250.00, in_z: "2024-07-01T00:00:00+00:00", out_z: infinity }
    - targetEntity: Balance
      find:
        asOf:
          operand:
            eq:
              attr: Balance.id
              value: 2
          dimension: transactionTime
          coordinate: "2024-04-01T00:00:00+00:00"
      roundTrips: 1
      sameObjectAs: 1
      identityAttr: bal_id
      note: the held PAST view still reflects its own pin (200.00, now the closed [2024-02-01, 2024-07-01) milestone) — the SAME object as step 1
      statements:
        - sql:
            postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.bal_id = ? and t0.in_z <= ? and t0.out_z > ?
          binds: [2, "2024-04-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
      expectRows:
        - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: "2024-07-01T00:00:00+00:00" }
then:
  roundTrips: 6
