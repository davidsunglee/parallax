# valueObject structured-column read: project an inner field (M1 valueObject,
# M3).
#
# Read a nested field of the `address` valueObject into the result set. The
# Postgres extraction `jsonb_extract_path_text(t0.address, ?)` is aliased `city`
# in the projection; the JSON key is the only bind ['city']. Every customer is
# returned with its extracted city. This proves the structured-column READ form
# (projection), the complement of the structured-column FILTER cases.
#
# A whole-row read of an extracted field is obvious by eye, but referenceSql is
# supplied as the independent oracle (native `->>` projection).
model: models/customer.yaml
tags: [m1, m3, nested, value-object, json, projection]
operation:
  all: {}
goldenSql:
  postgres: select t0.id, jsonb_extract_path_text(t0.address, ?) city from customer t0
binds: [city]
referenceSql: select id, address ->> 'city' as city from customer
expectedRows:
  - { id: 1, city: Oslo }
  - { id: 2, city: Oslo }
  - { id: 3, city: Boston }
  # id 4 has a null address valueObject, so the extracted city projects as null —
  # the structured-column read of an absent value object.
  - { id: 4, city: null }
roundTrips: 1
