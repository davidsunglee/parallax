# PK generation `sequence` (m-pk-gen) — stride across two blocks.
#
# voucher_seq batch 2, inc 10: insert 4 -> two allocations (next_val 100->120->140).
# Block 1 (base 100): 100,110. Block 2 (base 120): 120,130.
model: models/pk-sequence.yaml
tags: [m-pk-gen, m-unit-work, sequence, write-sequence, slice-snapshot-1, slice-managed-1]
shape: writeSequence
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "sequence-strategy PK allocation - the following INSERT binds registry-read-derived id values, so emissions depend on a query result"
given:
  fixtures: true
when:
  writeSequence:
    - mutation: update
      entity: PkSequence
      statements: 1
      note: reserve block 1 (base 100)
      rows:
        - { name: voucher_seq, nextVal: { increment: 20 } }
    - mutation: insert
      entity: Voucher
      statements: 2
      note: "100,110"
      rows:
        - { id: 100, label: spring }
        - { id: 110, label: summer }
    - mutation: update
      entity: PkSequence
      statements: 1
      note: reserve block 2 (base 120)
      rows:
        - { name: voucher_seq, nextVal: { increment: 20 } }
    - mutation: insert
      entity: Voucher
      statements: 2
      note: "120,130"
      rows:
        - { id: 120, label: autumn }
        - { id: 130, label: winter }
then:
  statements:
    - sql:
        postgres: update pk_sequence set next_val = next_val + ? where name = ?
        mariadb: update pk_sequence set next_val = next_val + ? where name = ?
      binds: [20, voucher_seq]
    - sql:
        postgres: insert into voucher(id, label) values (?, ?)
        mariadb: insert into voucher(id, label) values (?, ?)
      binds: [100, spring]
    - sql:
        postgres: insert into voucher(id, label) values (?, ?)
        mariadb: insert into voucher(id, label) values (?, ?)
      binds: [110, summer]
    - sql:
        postgres: update pk_sequence set next_val = next_val + ? where name = ?
        mariadb: update pk_sequence set next_val = next_val + ? where name = ?
      binds: [20, voucher_seq]
    - sql:
        postgres: insert into voucher(id, label) values (?, ?)
        mariadb: insert into voucher(id, label) values (?, ?)
      binds: [120, autumn]
    - sql:
        postgres: insert into voucher(id, label) values (?, ?)
        mariadb: insert into voucher(id, label) values (?, ?)
      binds: [130, winter]
  tableState:
    voucher:
      - { id: 100, label: spring }
      - { id: 110, label: summer }
      - { id: 120, label: autumn }
      - { id: 130, label: winter }
  roundTrips: 6
