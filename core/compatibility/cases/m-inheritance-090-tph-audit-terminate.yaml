# Table-per-hierarchy Transaction-Time-Only concrete-subtype TERMINATE: the milestone close is
# tag-GUARDED (m-inheritance x m-audit-write x m-sql — Phase 8 temporal composition).
#
# A terminate on an audit-only (Transaction-Time-Only) entity closes the current
# milestone (out_z = the transaction instant) and inserts nothing — the terminated
# state is the ABSENCE of any current row (m-audit-write). Under table-per-hierarchy the
# whole family shares the `reading` table, so the close carries the concrete-subtype tag
# GUARD `and kind = ?` among the identity predicates, immediately AFTER the pk and
# BEFORE the current-row predicate: `where id = ? and kind = ? and out_z = ?`, binds
# [2024-08-01, 1, meter, infinity] (the tag value is framework-derived from MeterReading's
# tagValue). The close is the standalone m-audit-write shape, routed to the shared table.
#
# The sequence (self-contained, from an empty table):
#   step 1 insert    : open [2024-01-01, infinity) celsius 20.00, kind=meter   (1 statement)
#   step 2 terminate : close the current milestone (out_z = 2024-08-01), tag-guarded (1 statement)
#
# Resulting state: one CLOSED milestone (out_z finite) with no out_z = infinity row —
# the observable signature of termination — scoped to the meter subtype's rows.
model: models/reading.yaml
tags: [m-inheritance, m-audit-write, m-sql, table-per-hierarchy, tag, temporal, audit-only, write-sequence, terminate, slice-snapshot-1, slice-managed-1]
shape: writeSequence
when:
  writeSequence:
    - mutation: insert
      entity: MeterReading
      statements: 1
      note: open a current milestone [2024-01-01, infinity); kind=meter derived from tagValue
      rows:
        - { id: 1, celsius: 20.00 }
      at: "2024-01-01T00:00:00+00:00"
    - mutation: terminate
      entity: MeterReading
      statements: 1
      note: close the current row, tag-guarded on kind='meter'; insert nothing
      rows:
        - { id: 1 }
      at: "2024-08-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: insert into reading(id, kind, celsius, in_z, out_z) values (?, ?, ?, ?, ?)
      binds: [1, meter, 20.00, "2024-01-01T00:00:00+00:00", infinity]
    - sql:
        postgres: update reading set out_z = ? where id = ? and kind = ? and out_z = ?
      binds: ["2024-08-01T00:00:00+00:00", 1, meter, infinity]
  tableState:
    reading:
      - { id: 1, kind: meter, celsius: 20.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
  roundTrips: 2
