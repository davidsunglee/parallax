# Read-lock divergence — an in-transaction read that intends to write appends the
# dialect's shared-row-lock suffix, the one place the two dialects diverge on
# read-locking syntax (m-read-lock / m-dialect seam).
#
# Postgres emits `for share of t0` (qualified by the root alias); MariaDB has no
# `for share` (MDEV-17514) and emits the unaliased `lock in share mode`. Each is the
# canonical fixed point of the m-sql normalizer for its dialect, so both
# `then.statements` entries pass the layer-3 idempotence check. The lock is a
# concurrency property, so a single-connection harness proves the observable half:
# each locking read is well-formed and result-correct against its real database,
# cross-checked by a dialect-neutral oracle (the same select WITHOUT a lock, which
# must return the same rows). This is the first matrix row where the two dialects
# emit DIFFERENT optimized SQL for the same operation.
model: models/account.yaml
tags: [m-read-lock, m-dialect]
shape: read
when:
  operation:
    eq:
      attr: Account.id
      value: 2
then:
  statements:
    - sql:
        postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
        mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? lock in share mode
      binds: [2]
  referenceSql: select id, owner, balance, version from account where id = 2
  rows:
    - { id: 2, owner: Linus, balance: 250.00, version: 1 }
  roundTrips: 1
