# The CLEAN audit-only example: deep fetch Invoice.lines as of processing LATEST.
# Single-axis propagation: the child carries `out_z = ?` (bind infinity). Line
# 1000 -> 75 (current), line 1001 -> 25.
model: models/invoice.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, propagation, audit-only, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Invoice
  operation:
    deepFetch:
      operand:
        asOf:
          operand: { all: {} }
          asOfAttr: Invoice.processingDate
          date: now
      paths:
        - [{ rel: Invoice.lines }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.in_z, t0.out_z from invoice t0 where t0.out_z = ?
      binds: [infinity]
    - sql:
        postgres: select t0.id, t0.invoice_id, t0.amount, t0.in_z, t0.out_z from invoice_line t0 where t0.invoice_id in (?) and t0.out_z = ?
      binds: [100, infinity]
  graph:
    Invoice:
      - id: 100
        name: INV-100
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        lines:
          - { id: 1000, invoice_id: 100, amount: 75.00, in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
          - { id: 1001, invoice_id: 100, amount: 25.00, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 2
