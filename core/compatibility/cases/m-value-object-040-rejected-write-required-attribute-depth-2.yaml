# Negative (m-value-object write validation, resolved Q7): a write missing a required
# DEPTH-2 attribute is refused PRE-SQL.
#
# Required-ness applies at ANY depth. Contact's `address.geo.country` is a required
# (`nullable: false`) attribute at depth 2; this write supplies address (street/city)
# and a present `geo` — but that `geo` omits `country` (its required `point` with
# lat/lon is complete), so model-aware write validation MUST reject it before any DML
# (m-value-object writes).
model: models/contact.yaml
tags: [m-value-object, rejected, negative, write, nested, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  write:
    id: 2
    name: Beacon
    address:
      street: 1 Main St
      city: Oslo
      geo:
        point: { lat: 59.9, lon: 10.7 }
then:
  rejectedRule: write-required-attribute-missing
