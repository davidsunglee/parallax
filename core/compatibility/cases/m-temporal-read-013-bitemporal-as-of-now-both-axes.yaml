# Bitemporal as-of NOW on BOTH axes: the fully-current milestone.
#
# Pinning businessDate = now AND processingDate = now restricts Position to the
# row that is true in the world NOW and known to the system NOW — the rectangle
# current on both axes (thru_z = infinity AND out_z = infinity). Each axis injects
# its current-row equality (m-temporal-read), so the golden SQL carries TWO infinity binds.
#
# Over the id-1 history that is R3 (value 200): R1 is superseded on the processing
# axis (out_z finite); R2 is the head, current on processing but its business
# thru_z is finite (2024-06-01), so business=now excludes it. Only R3 is current
# on both axes.
model: models/position.yaml
tags: [m-temporal-read, m-sql, bitemporal, temporal, as-of, both-axes, defaulted, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Position
  operation:
    asOf:
      operand:
        asOf:
          operand:
            all: {}
          asOfAttr: Position.processingDate
          date: now
      asOfAttr: Position.businessDate
      date: now
then:
  statements:
    - sql:
        postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.thru_z = ? and t0.out_z = ?
      binds: [infinity, infinity]
  referenceSql: select pos_id, acct_num, val, from_z, thru_z, in_z, out_z from position where thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz
  rows:
    - { pos_id: 1, acct_num: A, val: 200.00, from_z: "2024-06-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
