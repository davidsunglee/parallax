# Read-lock matrix (m-read-lock / m-dialect): a deep fetch inside a LOCKING unit of work emits the
# shared row lock on EVERY level — root + each child — `api-conformance` lane.
#
# Every deep-fetch level is an ordinary in-transaction object find flowing through
# the SAME unified read path a flat find uses (delta 09 D1); so in `px.transaction(
# body, { concurrency: "locking" })` the root read AND each fanned-out child level
# carry the dialect's shared-row-lock suffix (`for share of t0`). This pins the
# `4690825` child-locking fix as a portable core observable: child locking is not
# re-plumbed per level — it falls out of the shared executor.
#
# `lane: api-conformance`: the lock is a concurrency property no single-connection
# harness can observe, so the language's API Conformance Suite proves the runtime
# deep-fetch read path locks every level (the developer `find(..., { includes })`
# surface); the m-case-format harness schema-validates the case. The golden documents the
# expected emitted SQL — the ordinary `m-deep-fetch-001` deep fetch with the lock appended to
# each level.
model: models/orders.yaml
tags: [m-read-lock, m-dialect, m-deep-fetch, m-op-list, m-api-conformance, locking-mode, slice-managed-1]
lane: api-conformance
shape: read
when:
  targetEntity: OrderItem
  uow:
    concurrency: locking
  operation:
    deepFetch:
      operand:
        all: {}
      paths:
        - [{ rel: OrderItem.order }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 for share of t0
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id in (?, ?, ?) for share of t0
      binds: [1, 2, 42]
  referenceSql: select id, order_id, sku, quantity, shipped_on from order_item
  graph:
    OrderItem:
      - id: 11
        order_id: 1
        sku: A-100
        quantity: 2
        shipped_on: null
        order: { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
      - id: 12
        order_id: 1
        sku: B-200
        quantity: 1
        shipped_on: 2024-02-15
        order: { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
      - id: 21
        order_id: 2
        sku: A-300
        quantity: 4
        shipped_on: 2024-02-20
        order: { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
      - id: 421
        order_id: 42
        sku: A-999
        quantity: 3
        shipped_on: 2024-03-10
        order: { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
      - id: 422
        order_id: 42
        sku: B-200
        quantity: 5
        shipped_on: 2024-02-05
        order: { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 2
