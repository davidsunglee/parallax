# valueObject to-many: nestedNotExists + `where` INCLUDES every non-array `many`
# state (m-value-object to-many, m-op-algebra same-element negation + absence
# collapse, m-dialect array-traversal form), on Postgres AND MariaDB.
#
# nestedNotExists(Customer.address.phones, where: number = '555-0000') matches every
# row where NO element has number = 555-0000. Only Nils (id 7, {work, 555-0000}) is
# excluded; everyone else matches — including the empty array (3), the NULL column
# (4), the missing-`phones` rows (5, 6) and the three NON-ARRAY states (8, 9, 10).
# Omar (id 9) is the trap on the negated side: his scalar `phones` "555-0000" equals
# the query value, but a non-array `phones` vacuously has no satisfying element, so
# he is correctly INCLUDED — the complement of m-value-object-021.
#
# Postgres negates the same-element `exists` behind the `case`/`jsonb_typeof` array
# guard; MariaDB negates the array-type-guarded `json_contains`, wrapped in
# `coalesce(..., 0)` so a NULL/empty/missing/non-array `phones` still counts as "no
# element".
model: models/customer.yaml
tags: [m-value-object, m-op-algebra, m-sql, m-dialect, nested, json, to-many, exists, scoped, absence-collapse, array-traversal, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Customer
  operation:
    nestedNotExists:
      path: Customer.address.phones
      where:
        nestedEq: { path: number, value: '555-0000' }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where not exists (select 1 from jsonb_array_elements(case when jsonb_typeof(jsonb_extract_path(t0.address, ?)) = ? then jsonb_extract_path(t0.address, ?) else cast(? as jsonb) end) t1 where jsonb_extract_path_text(t1.value, ?) = ?)
        mariadb: select t0.id, t0.name from customer t0 where not coalesce(json_type(json_extract(t0.address, ?)) = ? and json_contains(t0.address, ?, ?), ?)
      binds:
        postgres: [phones, 'array', phones, '[]', number, '555-0000']
        mariadb: ['$.phones', 'ARRAY', '{"number":"555-0000"}', '$.phones', 0]
  referenceSql:
    postgres: select id, name from customer where coalesce(address -> 'phones' @> '[{"number":"555-0000"}]', false) = false
    mariadb: select id, name from customer where json_type(json_extract(address, '$.phones')) is null or json_type(json_extract(address, '$.phones')) <> 'ARRAY' or not exists (select 1 from json_table(address, '$.phones[*]' columns (type varchar(64) path '$.type', number varchar(64) path '$.number')) jt where jt.number = '555-0000')
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
    - { id: 3, name: Grace }
    - { id: 4, name: Mary }
    - { id: 5, name: Kavi }
    - { id: 6, name: Rin }
    - { id: 8, name: Iris }
    - { id: 9, name: Omar }
    - { id: 10, name: Priya }
  roundTrips: 1
