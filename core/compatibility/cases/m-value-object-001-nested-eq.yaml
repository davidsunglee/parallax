# valueObject structured-column filter: nested field equality (m-value-object valueObject,
# m-core json, m-sql), on Postgres AND MariaDB.
#
# Filter Customers by an inner attribute of the `address` valueObject (stored as
# one structured-document column). nestedEq(Customer.address.city, 'Oslo') lowers
# per the m-dialect nested-extraction seam: Postgres
# `jsonb_extract_path_text(t0.address, ?) = ?` carries the JSON key then the value
# as per-segment binds ['city', 'Oslo']; MariaDB
# `json_unquote(json_extract(t0.address, ?)) = ?` carries one '$.city' path bind
# then the value. Customers 1 and 2 live in Oslo; Grace (Boston) is excluded.
#
# The bind hole structure diverges, so `binds` is a dialect-keyed map; the
# independent `referenceSql` oracle is likewise per dialect (native `->>` spelling
# — a bare key on Postgres, a '$.path' on MariaDB).
model: models/customer.yaml
tags: [m-value-object, m-sql, nested, json]
shape: read
when:
  operation:
    nestedEq: { path: Customer.address.city, value: Oslo }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where jsonb_extract_path_text(t0.address, ?) = ?
        mariadb: select t0.id, t0.name from customer t0 where json_unquote(json_extract(t0.address, ?)) = ?
      binds:
        postgres: [city, Oslo]
        mariadb: ['$.city', Oslo]
  referenceSql:
    postgres: select id, name from customer where address ->> 'city' = 'Oslo'
    mariadb: select id, name from customer where json_value(address, '$.city') = 'Oslo'
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
  roundTrips: 1
