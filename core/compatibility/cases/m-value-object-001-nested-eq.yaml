# valueObject structured-column filter: nested field equality (m-value-object valueObject,
# m-core json, m-sql).
#
# Filter Customers by an inner field of the `address` valueObject (stored as one
# structured-document column). In Postgres golden SQL,
# nestedEq(Customer.address.city, 'Oslo') lowers to a
# `jsonb_extract_path_text(t0.address, ?) = ?` extraction; the JSON key is the
# first bind, the compared value the second ['city', 'Oslo']. Customers 1 and
# 2 live in Oslo; Grace (Boston) is excluded.
#
# Non-trivial structured extraction case => referenceSql is the independent
# oracle, spelling the same Postgres extraction with the native `->>` operator
# and inline key.
model: models/customer.yaml
tags: [m-value-object, m-sql, nested, json]
shape: read
when:
  operation:
    nestedEq: { path: Customer.address.city, value: Oslo }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where jsonb_extract_path_text(t0.address, ?) = ?
      binds: [city, Oslo]
  referenceSql: select id, name from customer where address ->> 'city' = 'Oslo'
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
  roundTrips: 1
