# Classic two-connection deadlock (M11). Round 1: A locks gauge row 1, B locks
# row 2 (barrier: both first locks held). Round 2: A waits for row 2, B waits for
# row 1 -> cycle -> the DB victimizes one transaction, whose statement raises.
# The victim choice is non-deterministic; the runner classifies whichever error
# is raised. Neutral category deadlock; native PG 40P01 / MariaDB 1213.
model: models/error-cases.yaml
tags: [m-db-error, deadlock]
loadFixtures: true
errorClass: deadlock
expectedNativeCode:
  postgres: "40P01"
  mariadb: 1213
concurrency:
  rounds:
    - A: { goldenSql: { postgres: "update gauge set v = ? where id = ?", mariadb: "update gauge set v = ? where id = ?" }, binds: [10, 1] }
      B: { goldenSql: { postgres: "update gauge set v = ? where id = ?", mariadb: "update gauge set v = ? where id = ?" }, binds: [20, 2] }
    - A: { goldenSql: { postgres: "update gauge set v = ? where id = ?", mariadb: "update gauge set v = ? where id = ?" }, binds: [11, 2] }
      B: { goldenSql: { postgres: "update gauge set v = ? where id = ?", mariadb: "update gauge set v = ? where id = ?" }, binds: [21, 1] }
