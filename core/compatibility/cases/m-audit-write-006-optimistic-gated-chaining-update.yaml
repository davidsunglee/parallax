# Optimistic gate on an audit-only chaining update's close (m-audit-write + m-opt-lock).
#
# An audit-only entity carries no version column, so the observed processing-from
# (in_z) is the optimistic-lock version analogue. Under optimistic concurrency the
# milestone-closing UPDATE that BEGINS a chaining update GATES on that observed in_z
# (`and in_z = ?`): a concurrent writer that already superseded the milestone leaves
# a fresh in_z, so the stale gate matches ZERO rows — the updatedRows != 1 conflict
# signal (m-opt-lock).
#
# This case witnesses the GATED CLOSE of the chaining update reusing the temporal
# inactivation gate shape (m-bitemp-write-004): a conflict case runs only that single
# gated close, not the replacement INSERT the chaining update would go on to emit —
# the chain proper is proven ungated by m-audit-write-002/-004/-005. Here the gate
# MATCHES (a fresh observed in_z), so the close affects exactly 1 row.
#
# Fixtures are loaded. Id 1 (acct A) has a superseded milestone [2024-01-01,
# 2024-06-01) value 100.00 and a CURRENT milestone [2024-06-01, infinity) value
# 150.00. The close observed the current row's in_z (2024-06-01) and closes it at
# 2024-09-01, gated on `and in_z = 2024-06-01`; it inactivates 1 row. Ids 2 and 3
# are untouched — conflict granularity is the observed milestone, not the key.
model: models/balance.yaml
tags: [m-audit-write, m-opt-lock, m-sql, temporal, conflict, slice-snapshot-1, slice-managed-1]
shape: conflict
compileEligibility:
  mode: run-only
  reason: single-connection
  note: "single-connection concurrency/locking intent (shape:conflict)"
when:
  uow:
    concurrency: optimistic
  write: { id: 1 }
  at: "2024-09-01T00:00:00+00:00"
  observedTxStart: "2024-06-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update balance set out_z = ? where bal_id = ? and out_z = ? and in_z = ?
      binds: ["2024-09-01T00:00:00+00:00", 1, infinity, "2024-06-01T00:00:00+00:00"]
  affectedRows: 1
  tableState:
    balance:
      - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-06-01T00:00:00+00:00" }
      - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: "2024-09-01T00:00:00+00:00" }
      - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: infinity }
      - { bal_id: 3, acct_num: C, val: 50.00, in_z: "2024-03-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
