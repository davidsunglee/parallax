# group (precedence) — GROUPED form: `(qty >= 25 OR qty <= 5) AND active = true`.
#
# The explicit `group` node wraps the `or`, forcing the disjunction to bind
# before the `and`. This is the half of the group-precedence pair that pins
# parenthesization: the golden SQL parenthesizes the OR, and the result {1, 42}
# differs from the UNGROUPED sibling case (m-op-algebra-025), where `and` binds tighter and
# the result is {1, 5, 42}. The `group` node is what makes that difference
# unambiguous through the canonical serde.
# Two surface re-expressions of the SAME grouped intent that an implementation's
# serde might emit — a "prefix" and a "fluent" spelling. They differ only in
# object-key authoring order (operand order is identity-significant and kept the
# same); canonicalization sorts keys, so both MUST collapse to `operation` above.
# The harness asserts this dialect-agnostically (layer 4c), so the prefix-vs-
# fluent precedence-fidelity contract lives in this fixture instead of bespoke
# test code.
# "prefix" surface: group(...) wrapping the disjunction, eq written value-first.
# "fluent" surface: identical tree, comparators written value-before-attr.
model: models/orders.yaml
tags: [m-op-algebra, group, boolean, precedence, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    and:
      operands:
        - group:
            operand:
              or:
                operands:
                  - greaterThanEquals: { attr: Order.qty, value: 25 }
                  - lessThanEquals: { attr: Order.qty, value: 5 }
        - eq: { attr: Order.active, value: true }
  equivalentEncodings:
    - and:
        operands:
          - group:
              operand:
                or:
                  operands:
                    - greaterThanEquals: { attr: Order.qty, value: 25 }
                    - lessThanEquals: { attr: Order.qty, value: 5 }
          - eq: { value: true, attr: Order.active }
    - and:
        operands:
          - group:
              operand:
                or:
                  operands:
                    - greaterThanEquals: { value: 25, attr: Order.qty }
                    - lessThanEquals: { value: 5, attr: Order.qty }
          - eq: { attr: Order.active, value: true }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where (t0.qty >= ? or t0.qty <= ?) and t0.active = ?
      binds: [25, 5, true]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where (qty >= 25 or qty <= 5) and active = true
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
