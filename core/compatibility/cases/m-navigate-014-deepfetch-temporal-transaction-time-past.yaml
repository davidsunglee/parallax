# Deep fetch Policy.coverages, Valid Time LATEST / Transaction Time PAST 2024-02-01 — the
# combo the m-temporal-read read-matrix table previously OMITTED. Valid Time propagates as the
# equality form, Transaction Time as a range, IN THE SAME child predicate:
# `thru_z = ? and in_z <= ? and out_z > ?` (binds infinity, P, P). As the system
# believed on 2024-02-01, the Valid-Time-latest value of coverage 10 was the
# ORIGINAL belief -> 500 (C-R1); coverage 20 -> 300.
model: models/policy.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, propagation, bitemporal, slice-snapshot-1, slice-managed-1]
shape: read
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "deep-fetch child level - the Policy.coverages IN-list binds are the distinct policy ids gathered from the root query result, so the child emissions depend on a query result"
when:
  targetEntity: Policy
  operation:
    deepFetch:
      operand:
        asOf:
          operand:
            asOf:
              operand: { all: {} }
              dimension: transactionTime
              coordinate: "2024-02-01T00:00:00+00:00"
          dimension: validTime
          coordinate: latest
      paths:
        - [{ rel: Policy.coverages }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from policy t0 where t0.thru_z = ? and t0.in_z <= ? and t0.out_z > ?
      binds: [infinity, "2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
    - sql:
        postgres: select t0.id, t0.policy_id, t0.amount, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from coverage t0 where t0.policy_id in (?, ?) and t0.thru_z = ? and t0.in_z <= ? and t0.out_z > ?
      binds: [1, 2, infinity, "2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
  graph:
    Policy:
      - id: 1
        name: Auto
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        coverages:
          - { id: 10, policy_id: 1, amount: 500.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-04-01T00:00:00+00:00" }
      - id: 2
        name: Home
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        coverages:
          - { id: 20, policy_id: 2, amount: 300.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 2
