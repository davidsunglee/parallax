# Deep fetch Coverage.policy — a to-ONE temporal hop (many-to-one back-reference),
# business LATEST / processing LATEST. The single-object attach path: each
# coverage's `policy` is the propagated-as-of Policy milestone. Root Coverage
# resolves to the fully-current coverages (10 -> 700, 20 -> 300); the propagated
# pin fetches policies 1 and 2 (`id in (?, ?) and thru_z = ? and out_z = ?`),
# attached as single objects.
model: models/policy.yaml
tags: [m4, m7, temporal, relationship, deepFetch, propagation, bitemporal, to-one, first-implementation-mvp]
operation:
  deepFetch:
    operand:
      asOf:
        operand:
          asOf:
            operand: { all: {} }
            asOfAttr: Coverage.processingDate
            date: now
        asOfAttr: Coverage.businessDate
        date: now
    paths:
      - [Coverage.policy]
goldenSql:
  postgres:
    - select t0.id, t0.policy_id, t0.amount from coverage t0 where t0.thru_z = ? and t0.out_z = ?
    - select t0.id, t0.name from policy t0 where t0.id in (?, ?) and t0.thru_z = ? and t0.out_z = ?
binds:
  - [infinity, infinity]
  - [1, 2, infinity, infinity]
roundTrips: 2
expectedGraph:
  Coverage:
    - id: 10
      policy_id: 1
      amount: 700.00
      policy: { id: 1, name: Auto }
    - id: 20
      policy_id: 2
      amount: 300.00
      policy: { id: 2, name: Home }
