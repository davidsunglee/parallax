# Negative (m-inheritance, resolved Q3/Q4): a table-per-concrete-subtype root declares
# a `tag`.
#
# `Document` declares `table-per-concrete-subtype` yet also carries a `tag` column.
# There is no shared table under table-per-concrete-subtype, so no tag exists anywhere
# in the family; a model-aware validator MUST reject the tag. (The metamodel schema's
# inheritance-block conditional — tag only on a table-per-hierarchy root — also rejects
# this; the semantic validator enforces the family-wide rule portably.)
model: models/payment.yaml
tags: [m-inheritance, m-descriptor, rejected, negative, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  model:
    entities:
      - name: Document
        inheritance:
          strategy: table-per-concrete-subtype
          role: root
          tag: { column: kind }
        attributes:
          - { name: id, type: int64, column: id, primaryKey: true }
      - name: Invoice
        table: invoice
        inheritance:
          role: concrete-subtype
          parent: Document
        attributes:
          - { name: amountDue, type: "decimal(18,2)", column: amount_due }
then:
  rejectedRule: inheritance-tag-on-concrete-subtype-strategy
