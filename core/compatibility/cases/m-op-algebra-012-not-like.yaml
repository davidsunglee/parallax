# notLike — negated raw pattern. The m-sql canonical form keeps the `not like`
# keyword pair. A NULL sku yields NULL (not true), so id 4 is excluded — exactly
# the SQL three-valued-logic the naive referenceSql also produces.
model: models/orders.yaml
tags: [m-op-algebra, notLike, string, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    notLike:
      attr: Order.sku
      value: A-%
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.sku not like ?
      binds: ["A-%"]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where sku not like 'A-%'
  rows:
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
  roundTrips: 1
