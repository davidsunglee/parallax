# Bitemporal as-of: BOTH axes in the past — the audit read.
#
# Pin businessDate = 2024-03-01 AND processingDate = 2024-02-01. Both pins are
# past instants, so each axis injects its [from, to) containment predicate. This
# asks: as the system BELIEVED on 2024-02-01, what was true in the world on
# 2024-03-01? — reconstructing a historical belief, the signature bitemporal read.
#
# Over the id-1 history that is R1 (value 90): R1's processing interval
# [2024-01-01, 2024-04-01) contains 2024-02-01 AND its business interval
# [2024-01-01, infinity) contains 2024-03-01. R2/R3 were not yet known on
# 2024-02-01 (their processing starts 2024-04-01), so the audit read returns the
# ORIGINAL belief 90 — distinct from the 100 the system knows about that same
# business date NOW (case 0802). The four binds read business-axis-first (outer
# pin), then processing.
model: models/position.yaml
tags: [m7, m3, bitemporal, temporal, as-of, both-axes, past, audit]
operation:
  asOf:
    operand:
      asOf:
        operand:
          all: {}
        asOfAttr: Position.processingDate
        date: "2024-02-01T00:00:00+00:00"
    asOfAttr: Position.businessDate
    date: "2024-03-01T00:00:00+00:00"
goldenSql:
  postgres: select t0.pos_id, t0.val from position t0 where t0.from_z <= ? and t0.thru_z > ? and t0.in_z <= ? and t0.out_z > ?
binds: ["2024-03-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
referenceSql: select pos_id, val from position where from_z <= '2024-03-01T00:00:00+00:00'::timestamptz and thru_z > '2024-03-01T00:00:00+00:00'::timestamptz and in_z <= '2024-02-01T00:00:00+00:00'::timestamptz and out_z > '2024-02-01T00:00:00+00:00'::timestamptz
expectedRows:
  - { pos_id: 1, val: 90.00 }
roundTrips: 1
