# Explicit as-of-Latest read: the same current-row result as the defaulted case,
# but the caller WRITES the asOf pin with date `now`. Proves the explicit asOf
# node lowers to the identical injected current-row predicate (`out_z = infinity`)
# the default-injection rule produces — pinning the equivalence in a fixture.
model: models/balance.yaml
tags: [m-temporal-read, m-sql, as-of, audit-only, explicit, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Balance
  operation:
    asOf:
      operand:
        all: {}
      dimension: transactionTime
      coordinate: latest
then:
  statements:
    - sql:
        postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.out_z = ?
      binds: [infinity]
  referenceSql: select bal_id, acct_num, val, in_z, out_z from balance where out_z = 'infinity'::timestamptz
  rows:
    - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
    - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
