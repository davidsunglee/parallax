# Table-per-hierarchy INSERT: writing a concrete subtype persists the TAG
# (m-inheritance, m-sql).
#
# The whole Payment family shares one `payment` table discriminated by the root's
# `tag` column (`kind`). Inserting a CardPayment writes its subtype-declared columns
# AND the tag `kind` — set to the subtype's declared `tagValue` ('card'), NOT authored
# in the neutral write input (①). The framework derives the tag column the same way it
# derives a version bump or a milestone bound: the ① row carries only the domain
# attributes (id, amount, cardNetwork), and `kind` is slotted at its columnOrder
# position with the tagValue as its bind. `tendered` (the cash subtype's column) is
# left null.
#
# Starts from an EMPTY table (self-contained), then asserts the single inserted row
# carries kind='card'. This is the write mirror of the read cases m-inheritance-001/
# 003, where the tag is INJECTED into the SELECT, never written by the user.
model: models/payment.yaml
tags: [m-inheritance, m-sql, table-per-hierarchy, tag, write-sequence, slice-snapshot-1, slice-managed-1]
shape: writeSequence
when:
  writeSequence:
    - mutation: insert
      entity: CardPayment
      statements: 1
      note: insert a CardPayment; kind='card' is derived from tagValue, not authored
      rows:
        - { id: 10, amount: 200.00, cardNetwork: Mastercard }
then:
  statements:
    - sql:
        postgres: insert into payment(id, kind, amount, card_network) values (?, ?, ?, ?)
      binds: [10, card, 200.00, Mastercard]
  tableState:
    payment:
      - { id: 10, kind: card, amount: 200.00, card_network: Mastercard, tendered: null }
  roundTrips: 1
