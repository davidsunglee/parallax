# Same deadlock, opposite lock order: A locks row 2 then waits for row 1; B locks
# row 1 then waits for row 2. Proves classification does not depend on which
# transaction the DB picks as victim.
model: models/error-cases.yaml
tags: [m-db-error, deadlock]
shape: error
given:
  fixtures: true
when:
  concurrency:
    rounds:
      - A:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [10, 2]
        B:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [20, 1]
      - A:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [11, 1]
        B:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [21, 2]
then:
  errorClass: deadlock
  nativeCode:
    postgres: "40P01"
    mariadb: 1213
