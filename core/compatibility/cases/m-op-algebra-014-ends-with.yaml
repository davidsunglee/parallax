# endsWith — affix match. `value` is a LITERAL suffix; the implementation
# prepends a leading `%` wildcard. `00` has no wildcard chars, so the pattern is
# `%00`.
model: models/orders.yaml
tags: [m-op-algebra, endsWith, string, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    endsWith:
      attr: Order.sku
      value: "00"
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.sku like ?
      binds: ["%00"]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where sku like '%00'
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
  roundTrips: 1
