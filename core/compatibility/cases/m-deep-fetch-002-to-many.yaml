# Deep fetch, to-many: every Order with its line items eager-fetched via the
# one-to-many `Order.items` relationship.
#
# Two statements, roundTrips = 2 (NOT 1 + N):
#   level 0 (root)  : all orders
#   level 1 (items) : order_item rows whose order_id is in the DISTINCT order ids
#                     {1, 2, 3, 4, 5, 42}.
# Orders with no items (3, 4, 5) still appear in the graph with an empty `items`
# list — proving the fan-out attaches by key, not by inner join (which would drop
# childless parents). The harness asserts the gathered parent keys equal the
# authored level-1 binds and that statement count == roundTrips.
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, to-many, relationship, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    deepFetch:
      operand:
        all: {}
      paths:
        - [{ rel: Order.items }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?, ?, ?, ?, ?, ?) order by t0.id desc
      binds: [1, 2, 3, 4, 5, 42]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders
  graph:
    Order:
      - id: 1
        name: Ada
        sku: A-100
        qty: 5
        price: 10.50
        active: true
        ordered_on: 2024-01-05
        items:
          - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
          - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
      - id: 2
        name: Linus
        sku: B-200
        qty: 10
        price: 20.00
        active: true
        ordered_on: 2024-02-10
        items:
          - { id: 21, order_id: 2, sku: A-300, quantity: 4, shipped_on: 2024-02-20 }
      - id: 3
        name: ada
        sku: A-300
        qty: 15
        price: 30.25
        active: false
        ordered_on: 2024-03-15
        items: []
      - id: 4
        name: Margaret
        sku: null
        qty: 20
        price: 40.00
        active: true
        ordered_on: 2024-04-20
        items: []
      - id: 5
        name: Alan
        sku: "C_50%"
        qty: 25
        price: 50.75
        active: false
        ordered_on: 2024-05-25
        items: []
      - id: 42
        name: Grace
        sku: A-999
        qty: 30
        price: 99.99
        active: true
        ordered_on: 2024-06-30
        items:
          - { id: 422, order_id: 42, sku: B-200, quantity: 5, shipped_on: 2024-02-05 }
          - { id: 421, order_id: 42, sku: A-999, quantity: 3, shipped_on: 2024-03-10 }
  roundTrips: 2
