# Deep fetch with a DIRECTIVE-WRAPPED temporal root: the top-1 Policy (ordered by
# id, `limit 1`) as of business PAST 2024-03-01 / processing LATEST, eager-loading
# its coverages as of the SAME instant. The root operand is
# `limit(orderBy(asOf(asOf(all))))` — the result directives wrap the temporal
# wrappers. A conforming compiler peels `distinct`/`orderBy`/`limit` BEFORE the
# temporal wrappers on the root (so the root query injects the business-past
# predicate) AND collects the same as-of pins to PROPAGATE into the child level.
#
# This catches a propagation-pin collector that only walks the OUTERMOST `asOf`
# nodes: with the directives wrapping them it would see no pins and the child
# Coverage level would wrongly default to `now`, returning coverage 10's CURRENT
# value 700 (C-R3) instead of the business-2024-03-01 HEAD 600 (C-R2). The propagated
# child suffix is the ordered `[business, business, processing]` binds `[B, B,
# infinity]`, appended after the IN list. Mirrors 0325 (business-past deep fetch) but
# proves propagation survives the directive peel; `limit 1` keeps only Policy 1.
model: models/policy.yaml
tags: [m4, m7, temporal, relationship, deepFetch, propagation, bitemporal, orderBy, limit, first-implementation-mvp]
operation:
  deepFetch:
    operand:
      limit:
        operand:
          orderBy:
            operand:
              asOf:
                operand:
                  asOf:
                    operand: { all: {} }
                    asOfAttr: Policy.processingDate
                    date: now
                asOfAttr: Policy.businessDate
                date: "2024-03-01T00:00:00+00:00"
            keys:
              - { attr: Policy.id, direction: asc }
        count: 1
    paths:
      - [Policy.coverages]
goldenSql:
  postgres:
    - select t0.id, t0.name from policy t0 where t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ? order by t0.id asc limit ?
    - select t0.id, t0.policy_id, t0.amount from coverage t0 where t0.policy_id in (?) and t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
  mariadb:
    - select t0.id, t0.name from policy t0 where t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ? order by t0.id asc limit ?
    - select t0.id, t0.policy_id, t0.amount from coverage t0 where t0.policy_id in (?) and t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
binds:
  - ["2024-03-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", infinity, 1]
  - [1, "2024-03-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", infinity]
roundTrips: 2
expectedGraph:
  Policy:
    - id: 1
      name: Auto
      coverages:
        - { id: 10, policy_id: 1, amount: 600.00 }
