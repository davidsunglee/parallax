# Business-temporal-only as-of a PAST instant: pin businessDate to 2024-02-01.
#
# Because the pin is < infinity, the [from, to) containment predicate is injected
# (toIsInclusive = false ⇒ `from_z <= ? and thru_z > ?`), NOT the current-row
# form. The pin instant appears as TWO binds (one per interval bound). This is the
# business-axis "what was true in the world then" read.
#
# As-of business 2024-02-01, room 101's reservation was held by Ada
# (business [2024-01-01, 2024-03-01) contains 2024-02-01). The later Bob
# milestone (from 2024-03-01) is excluded — it was not yet in effect.
model: models/reservation.yaml
tags: [m-temporal-read, m-sql, business_temporal, temporal, as-of, business-only, past]
shape: read
when:
  targetEntity: Reservation
  operation:
    asOf:
      operand:
        all: {}
      asOfAttr: Reservation.businessDate
      date: "2024-02-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: select t0.res_id, t0.room, t0.guest, t0.from_z, t0.thru_z from reservation t0 where t0.from_z <= ? and t0.thru_z > ?
      binds: ["2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
  referenceSql: select res_id, room, guest, from_z, thru_z from reservation where from_z <= '2024-02-01T00:00:00+00:00'::timestamptz and thru_z > '2024-02-01T00:00:00+00:00'::timestamptz
  rows:
    - { res_id: 1, room: "101", guest: Ada, from_z: "2024-01-01T00:00:00+00:00", thru_z: "2024-03-01T00:00:00+00:00" }
  roundTrips: 1
