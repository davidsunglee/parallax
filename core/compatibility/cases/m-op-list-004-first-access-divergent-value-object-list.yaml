# Operation-backed list x DIVERGENT value object: the first-access materialization
# witness (m-op-list + m-value-object) — the operation-list analogue of
# m-deep-fetch-020, resolving the VO-bearing child via a FIRST `action: access`
# instead of a relationship load (the other instance-form step read m-sql "Read
# result form" classifies: the first access of an operation-list is INSTANCE-FORM,
# object lane).
#
# Step 0 constructs `findMany(all Depot)` lazily — no SQL (m-op-list). Step 1's first
# access resolves the list in ONE query (the scenario's only round trip), projecting
# Depot's OWN instance-form list — scalars in columnOrder, the `address` document LAST
# (slot 4) — materialized with DEPOT's descriptor; step 2 re-accesses with NO SQL,
# returning the SAME resolved objects. Depot's `address` is a FLAT { line, postcode },
# DIVERGENT from the recursive Customer / Location composite (models/customer.yaml):
# a runner materializing with the scenario ROOT's descriptor drops `line`/`postcode`
# and injects `street`/`city`/`geo`/`phones`, failing expectRows observably — the
# wrong-entity failure a verbatim-composite child cannot surface. The all-Depot read
# returns exactly the two fixture depots; 201's SQL-NULL document materializes a null
# address (the absence collapse). Golden SQL is dialect-identical (bare projection); a
# bare `all(Depot)` read carries no `order by`, and expectRows compares
# order-insensitively.
model: models/customer.yaml
tags: [m-op-list, m-value-object, lazy, materialization, json, slice-managed-1]
shape: scenario
when:
  scenario:
    - targetEntity: Depot
      find:
        all: {}
      roundTrips: 0
      note: construction -> an operation-backed list, no DB work
    - action: access
      "on": 0
      roundTrips: 1
      note: first access resolves the list once — INSTANCE-FORM, projects Depot's own list (id, customer_id, label, address); each row's flat address decodes with DEPOT's descriptor
      statements:
        - sql:
            postgres: select t0.id, t0.customer_id, t0.label, t0.address from depot t0
            mariadb: select t0.id, t0.customer_id, t0.label, t0.address from depot t0
      expectRows:
        - id: 200
          customer_id: 1
          label: Dock
          address:
            line: "1 Dock St"
            postcode: "0193"
        - id: 201
          customer_id: 1
          label: Yard
          address: null
    - action: access
      "on": 0
      roundTrips: 0
      sameObjectAs: 1
      note: re-access (iterate / index / size again) -> zero SQL, the same resolved objects
then:
  roundTrips: 1
