# notIn over a column containing NULLs — three-valued-logic exclusion (m-op-algebra §Null).
#
# `notIn` against a NULL column yields NULL, so the NULL row is EXCLUDED. Order 4
# has a NULL sku, so `not sku in ('A-100', 'B-200')` drops orders 1 and 2 (the
# matches) AND order 4 (the NULL) — leaving only the non-matching, non-null skus.
# This is the `NOT IN` NULL footgun the spec explicitly pins; the negative 3VL
# companion to m-op-algebra-019 (notIn over non-null data).
model: models/orders.yaml
tags: [m-op-algebra, notIn, membership, "null", three-valued-logic, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    notIn:
      attr: Order.sku
      values: [A-100, B-200]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where not t0.sku in (?, ?)
      binds: [A-100, B-200]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where sku not in ('A-100', 'B-200')
  rows:
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
