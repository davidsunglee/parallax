# Operation-backed list laziness (m-op-list): constructing the list does no DB
# work, the first access resolves it in exactly one query, and every later access
# re-uses that resolved result with zero further SQL.
#
# Step 0 constructs `findMany(all Orders)` — an operation-backed view, roundTrips 0,
# no SQL. Step 1 is the first access (iterate / size / index): it resolves the list
# once, six orders in a single query. Step 2 accesses again and emits NO SQL,
# returning the SAME resolved objects (sameObjectAs). The whole scenario costs one
# round trip — the single first-access resolution.
model: models/orders.yaml
tags: [m-op-list, lazy, slice-managed-1]
shape: scenario
when:
  scenario:
    - targetEntity: Order
      find:
        all: {}
      roundTrips: 0
      note: construction -> an operation-backed list, no DB work
    - action: access
      "on": 0
      roundTrips: 1
      note: first access resolves the list once
      statements:
        - sql:
            postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0
      expectRows:
        - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
        - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
        - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
        - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
        - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
        - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
    - action: access
      "on": 0
      roundTrips: 0
      sameObjectAs: 1
      note: re-access (iterate / index / size again) -> zero SQL, the same resolved objects
then:
  roundTrips: 1
