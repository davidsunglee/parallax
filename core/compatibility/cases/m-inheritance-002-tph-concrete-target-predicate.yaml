# Table-per-hierarchy concrete-target read with a user predicate (m-inheritance, m-sql).
#
# Find CardPayments with amount > 60. The injected tag predicate (`t0.kind = ?`)
# composes with the user predicate via `and` and is appended AFTER it, so binds read
# user-first then tag: [60.00, 'card']. Only the Visa card row (id 1, amount 100.00)
# qualifies; the Amex card row (50.00) is filtered by the amount predicate. `amount`
# is an INHERITED attribute (declared on the abstract root Payment), referenced here
# through CardPayment's ancestry — valid at a concrete target with no narrowing.
#
# The projection is CardPayment's full flattened ancestry-plus-own columnOrder
# (id, amount from the root Payment; card_network its own) — the base read
# projection never depends on the predicate (m-sql).
model: models/payment.yaml
tags: [m-inheritance, m-sql, table-per-hierarchy, tag, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: CardPayment
  operation:
    greaterThan: { attr: CardPayment.amount, value: 60.00 }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.amount, t0.card_network from payment t0 where t0.amount > ? and t0.kind = ?
      binds: [60.00, card]
  referenceSql: select id, amount, card_network from payment where amount > 60.00 and kind = 'card'
  rows:
    - { id: 1, amount: 100.00, card_network: Visa }
  roundTrips: 1
