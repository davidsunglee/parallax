# greaterThan — strict `>` range predicate.
model: models/orders.yaml
tags: [m-op-algebra, greaterThan, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    greaterThan:
      attr: Order.qty
      value: 20
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.qty > ?
      binds: [20]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where qty > 20
  rows:
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
