# greaterThan — strict `>` range predicate.
model: models/orders.yaml
tags: [m-op-algebra, greaterThan, slice-mvp-1]
shape: read
when:
  operation:
    greaterThan:
      attr: Order.qty
      value: 20
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where t0.qty > ?
      binds: [20]
  referenceSql: select id, name from orders where qty > 20
  rows:
    - { id: 5, name: Alan }
    - { id: 42, name: Grace }
  roundTrips: 1
