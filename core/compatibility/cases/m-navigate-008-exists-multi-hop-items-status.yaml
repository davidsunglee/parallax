# exists(Order.items -> exists(OrderItem.statuses -> code = 'PACKED')): a nested
# existence predicate over two relationship hops. Only order 1 has an item-level
# PACKED status (row 202 on item 11).
model: models/orders.yaml
tags: [m-navigate, exists, relationship, multi-hop, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    exists:
      rel: Order.items
      op:
        exists:
          rel: OrderItem.statuses
          op:
            eq: { attr: OrderStatus.code, value: PACKED }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where exists (select 1 from order_item t1 where t1.order_id = t0.id and exists (select 1 from order_status t2 where t2.order_item_id = t1.id and t2.code = ?))
      binds: [PACKED]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id in (select order_id from order_item where id in (select order_item_id from order_status where code = 'PACKED'))
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
  roundTrips: 1
