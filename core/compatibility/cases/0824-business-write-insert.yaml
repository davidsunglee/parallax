# Write sequence: business-temporal-only INSERT (milestone chaining, M7).
#
# A business-only insert opens a single milestone [businessInstant, infinity)
# with no prior row to close — the business-axis counterpart of the audit-only
# insert (0510). Until now business-only insert appeared ONLY as step 1 of the
# update-chaining sequence (0822); this pins it as a standalone, asserted write.
# The lone current business row carries thru_z = infinity.
model: models/reservation.yaml
tags: [m7, m3, business_temporal, temporal, write-sequence, insert, business-only]
writeSequence:
  - mutation: insert
    entity: Reservation
    statements: 1
    note: open a current business milestone [2024-01-01, infinity)
goldenSql:
  postgres:
    - insert into reservation(res_id, room, guest, from_z, thru_z) values (?, ?, ?, ?, ?)
binds:
  - [1, "101", Ada, "2024-01-01T00:00:00+00:00", infinity]
roundTrips: 1
expectedTableState:
  reservation:
    - res_id: 1
      room: "101"
      guest: Ada
      from_z: "2024-01-01T00:00:00+00:00"
      thru_z: infinity
