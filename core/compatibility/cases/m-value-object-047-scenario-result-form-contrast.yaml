# Scenario-step RESULT-FORM contrast over a value-object-bearing entity
# (m-value-object + m-txtime-write + m-sql "Read result form"): a managed find
# materializes the owner's `address` document (INSTANCE-FORM, slot 4) while the
# internal materialized-predicate-write resolving read observes only pk + gate
# columns (ROW-FORM, slot 4 omitted). Postgres AND MariaDB.
#
# This is the value-object-bearing WITNESS the result-form classification needs: for
# a value-object-FREE entity (balance, position, account, order_item) the two lanes
# project identical columns, so no existing scenario step can distinguish them. The
# Supplier owns the recursive `address` value object on a Transaction-Time-Only
# (audit-only) axis, so the two forms first diverge here.
#
# Steps (one resolving read PLUS one independent managed find, then the write):
#   0  find (managed, Baltic Traders) : INSTANCE-FORM — the developer find materializes
#      the owner, so the projection carries the whole `address` document last
#      (sup_id, name, in_z, out_z, address). Slot 4 present.
#   1  find (Nordic Foods)            : the materialized-predicate-write RESOLVING read —
#      ROW-FORM. It observes each matched row's pk + current gate columns to plan the
#      per-row close (ADR 0014), constructing no instance, so it OMITS `address`
#      (sup_id, name, in_z, out_z). Slot 4 absent, even though Supplier owns a value
#      object — the point of the witness.
#   2  terminate (predicate = name Nordic Foods) : closes the resolved current row
#      (out_z = at), GATED on the observed in_z step 1's resolving read returned
#      (2024-06-01) — an OPTIMISTIC audit-only close binds `and in_z = ?` last, the
#      same gate-last shape a keyed temporal terminate already carries
#      (m-txtime-write-006, m-opt-lock "the gate binds last"). A Transaction-Time-only close
#      copies no payload, so no document rides a read here; a reassigned document
#      would ride the write instruction, not the read.
#   3  find (Nordic Foods, asOf transactionTime = 2024-08-01) : verify — INSTANCE-FORM
#      managed find, the SAME form as step 0 (slot 4 present, projects `address`).
#      asOf-pins the Transaction-Time dimension strictly INSIDE the now-closed window
#      [2024-06-01, 2024-10-01), so the containment predicate (`in_z <= ? and
#      out_z > ?`) resolves the superseded milestone rather than defaulting to the
#      current-row form. The RETURNED row's own out_z column (expectRows, graded by
#      exact scalar equality regardless of the selecting predicate) is what proves
#      the terminate landed at exactly 2024-10-01 — a NON-EMPTY read that ALSO
#      exercises the instance-form slot-4 `address` projection with real data, so
#      dropping `address` from this golden / referenceSql now FAILS (a
#      regression-sensitive read, not a vacuous empty one). A plain (non-asOf) find
#      defaults to the current-row predicate and can never render this golden —
#      NOTHING lowers `out_z = <finite instant>`, only `out_z = infinity` for
#      latest — so the asOf form is the only vocabulary that reaches a closed
#      milestone by its own finite instant.
#
# The instance-form goldens (the managed finds, steps 0 and 3) project `address`; the
# row-form goldens (the predicate-write resolving read, step 1) do not. The harness
# decodes the projected document into its declared composite (the same materialization
# the graph-read path performs) so the managed find's expectRows compares identically on
# both dialects; the row-form reads carry no document to decode. Total roundTrips 4 =
# managed find (1) + resolve read (1) + close (1) + verify read (1).
model: models/supplier.yaml
tags: [m-value-object, m-txtime-write, m-opt-lock, m-sql, m-unit-work, temporal, audit-only, json, nested, materialize, predicate-write, scenario, slice-snapshot-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "predicate write materializes per-row from a resolving read - per-row binds (matched keys / observed in_z) depend on the query result"
when:
  uow:
    concurrency: optimistic
  scenario:
    - targetEntity: Supplier
      find:
        eq: { attr: Supplier.name, value: Baltic Traders }
      roundTrips: 1
      note: managed find materializes the owner WITH its address document — INSTANCE-FORM, slot 4 present
      statements:
        - sql:
            postgres: select t0.sup_id, t0.name, t0.in_z, t0.out_z, t0.address from supplier t0 where t0.name = ? and t0.out_z = ?
            mariadb: select t0.sup_id, t0.name, t0.in_z, t0.out_z, t0.address from supplier t0 where t0.name = ? and t0.out_z = ?
          binds: [Baltic Traders, infinity]
      expectRows:
        - sup_id: 2
          name: Baltic Traders
          in_z: "2024-02-01T00:00:00+00:00"
          out_z: infinity
          address:
            street: 5 Port Road
            city: Riga
            geo:
              country: LV
            phones: []
    - targetEntity: Supplier
      find:
        eq: { attr: Supplier.name, value: Nordic Foods }
      roundTrips: 1
      note: the predicate-write resolving read observes pk + gate columns only — ROW-FORM, NO address document (slot 4 omitted)
      statements:
        - sql:
            postgres: select t0.sup_id, t0.name, t0.in_z, t0.out_z from supplier t0 where t0.name = ? and t0.out_z = ?
            mariadb: select t0.sup_id, t0.name, t0.in_z, t0.out_z from supplier t0 where t0.name = ? and t0.out_z = ?
          binds: [Nordic Foods, infinity]
      referenceSql: select sup_id, name, in_z, out_z from supplier where name = 'Nordic Foods' and out_z > '9000-01-01'
      expectRows:
        - { sup_id: 1, name: Nordic Foods, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
    - write:
        mutation: terminate
        target:
          entity: Supplier
          predicate:
            eq: { attr: Supplier.name, value: Nordic Foods }
        at: "2024-10-01T00:00:00+00:00"
      roundTrips: 1
      note: close the resolved current row (out_z = at), gated on step 1's observed in_z; a Transaction-Time-only close copies no payload, so no document rides this write's read
      statements:
        - sql:
            postgres: update supplier set out_z = ? where sup_id = ? and out_z = ? and in_z = ?
            mariadb: update supplier set out_z = ? where sup_id = ? and out_z = ? and in_z = ?
          binds: ["2024-10-01T00:00:00+00:00", 1, infinity, "2024-06-01T00:00:00+00:00"]
    - targetEntity: Supplier
      find:
        asOf:
          operand:
            eq: { attr: Supplier.name, value: Nordic Foods }
          dimension: transactionTime
          coordinate: "2024-08-01T00:00:00+00:00"
      roundTrips: 1
      note: >-
        verify (INSTANCE-FORM managed find, same form as step 0, slot 4 present) —
        asOf-pins the Transaction-Time dimension strictly INSIDE the now-closed window
        [2024-06-01, 2024-10-01), so the containment predicate resolves the
        superseded milestone rather than defaulting to the current row; the
        RETURNED row's own out_z column (expectRows, graded by exact scalar
        equality regardless of the selecting predicate) is what proves the
        terminate landed at exactly 2024-10-01. A NON-EMPTY read that also
        exercises the instance-form slot-4 address projection with real data.
      statements:
        - sql:
            postgres: select t0.sup_id, t0.name, t0.in_z, t0.out_z, t0.address from supplier t0 where t0.name = ? and t0.in_z <= ? and t0.out_z > ?
            mariadb: select t0.sup_id, t0.name, t0.in_z, t0.out_z, t0.address from supplier t0 where t0.name = ? and t0.in_z <= ? and t0.out_z > ?
          binds: [Nordic Foods, "2024-08-01T00:00:00+00:00", "2024-08-01T00:00:00+00:00"]
      referenceSql: select sup_id, name, in_z, out_z, address from supplier where name = 'Nordic Foods' and in_z <= '2024-08-01T00:00:00+00:00' and out_z > '2024-08-01T00:00:00+00:00'
      expectRows:
        - sup_id: 1
          name: Nordic Foods
          in_z: "2024-06-01T00:00:00+00:00"
          out_z: "2024-10-01T00:00:00+00:00"
          address:
            street: 2 New Avenue
            city: Bergen
            geo:
              country: "NO"
            phones:
              - { type: work, number: '555-0200' }
then:
  roundTrips: 4
