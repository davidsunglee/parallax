# Walking-skeleton case: all() — no WHERE clause.
#
# `all` is the identity of the operation algebra; it lowers to a SELECT over the
# single aliased table with no predicate. This trivial single-table read omits
# `then.referenceSql` (its `then.rows` are verifiable by eye) yet exercises the full
# m-case-format contract end-to-end — schema conformance, golden-SQL equivalence,
# normalization, and the operation/metamodel serde round-trip — hence the
# `m-case-format` tag.
model: models/orders.yaml
tags: [m-op-algebra, m-conformance-adapter, m-case-format, all, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
    - { id: 3, name: ada }
    - { id: 4, name: Margaret }
    - { id: 5, name: Alan }
    - { id: 42, name: Grace }
  roundTrips: 1
