# Walking-skeleton case: all() — no WHERE clause.
#
# `all` is the identity of the operation algebra; it lowers to a SELECT over the
# single aliased table with no predicate. This trivial single-table read omits
# `then.referenceSql` (its `then.rows` are verifiable by eye) yet exercises the full
# m-case-format contract end-to-end — schema conformance, golden-SQL equivalence,
# normalization, and the operation/metamodel serde round-trip — hence the
# `m-case-format` tag.
model: models/orders.yaml
tags: [m-op-algebra, m-conformance-adapter, m-case-format, all, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
