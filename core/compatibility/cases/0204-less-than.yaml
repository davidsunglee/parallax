# lessThan — strict `<` range predicate.
model: models/orders.yaml
tags: [m2, lessThan]
operation:
  lessThan:
    attr: Order.qty
    value: 15
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where t0.qty < ?
binds: [15]
referenceSql: select id, name from orders where qty < 15
expectedRows:
  - { id: 1, name: Ada }
  - { id: 2, name: Linus }
roundTrips: 1
