# Closed-world snapshot access (m-snapshot-read): accessing a relationship the
# snapshot did NOT include issues ZERO SQL — there is no lazy load.
#
# Step 0 materializes a snapshot of order 1 (a plain-value read, no includes). Step 1
# accesses `statuses`, which the snapshot never included: a snapshot is closed-world,
# so the relationship is found ABSENT and NO query is issued (roundTrips 0) — the
# defining difference from a managed operation-backed list, which would resolve a
# deferred load here. The per-language absence representation (null / empty / a raised
# access error) is deliberately unconstrained, so this is graded by each language's
# API Conformance Suite (api-conformance lane); the wire assertion is only that no SQL
# fires.
model: models/orders.yaml
tags: [m-snapshot-read, m-deep-fetch, closed-world, relationship, scenario, slice-snapshot-1]
shape: scenario
lane: api-conformance
when:
  scenario:
    - targetEntity: Order
      find:
        eq:
          attr: Order.id
          value: 1
      roundTrips: 1
      note: materialize a snapshot of order 1 (no relationships included)
      statements:
        - sql:
            postgres: select t0.id, t0.name from orders t0 where t0.id = ?
          binds: [1]
      expectRows:
        - { id: 1, name: Ada }
    - action: access
      "on": 0
      path: statuses
      roundTrips: 0
      note: access an UNINCLUDED relationship on a snapshot -> closed-world absent, ZERO SQL (no lazy load); absence representation is per-language
then:
  roundTrips: 1
