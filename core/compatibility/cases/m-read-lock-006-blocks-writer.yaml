# Behavioral counterpart to m-read-lock-001/m-read-lock-002 (m-read-lock/m-dialect). Round 1: transaction A issues the
# m-read-lock in-transaction shared read lock (`for share of t0` / `lock in share mode`) on
# account 2 and HOLDS (no commit). Round 2: transaction B attempts to UPDATE account
# 2 and, with the session's lowered lock-wait budget (lock_timeout /
# innodb_lock_wait_timeout), blocks on A's shared lock and raises lockWaitTimeout.
#
# This proves the emitted read-lock SQL has real locking EFFECT: a concurrent writer
# cannot mutate the row while a read-then-write holds the shared lock. The single-
# connection cases m-read-lock-001/m-read-lock-009 prove the locking read is well-formed and result-correct;
# this proves it behaves as a lock. Neutral category lockWaitTimeout; native PG 55P03 /
# MariaDB 1205. Mirrors m-db-error-006 with A's blocking statement swapped from an UPDATE to the
# read-lock SELECT -- the runner runs A's round-1 statement verbatim, so a round-1 read
# holds a lock exactly like a round-1 write.
model: models/account.yaml
tags: [m-read-lock, m-dialect, m-db-error, concurrency, lockWaitTimeout, slice-mvp-1]
shape: error
given:
  fixtures: true
when:
  concurrency:
    rounds:
      - A:
          statements:
            - sql:
                postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
                mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? lock in share mode
              binds: [2]
      - B:
          statements:
            - sql:
                postgres: update account set balance = ? where id = ?
                mariadb: update account set balance = ? where id = ?
              binds: [999.00, 2]
then:
  errorClass: lockWaitTimeout
  nativeCode:
    postgres: "55P03"
    mariadb: 1205
