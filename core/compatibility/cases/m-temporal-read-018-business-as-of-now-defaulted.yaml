# Business-temporal-only as-of NOW (defaulted): the current business milestone.
#
# Reservation has a single `business` as-of dimension. Omitting businessDate
# defaults it to "as of now" (the m-temporal-read default-injection rule), so the
# implementation MUST inject the current-row predicate `thru_z = infinity` even
# though the operation is a plain `all`. This is the business-axis counterpart of
# the audit-only defaulted read (case m-temporal-read-001) — same injection rule, business axis.
#
# As-of now over room 101's history returns only the CURRENT guest: Bob
# (business [2024-03-01, infinity)). The superseded Ada row (thru_z finite) is
# excluded.
model: models/reservation.yaml
tags: [m-temporal-read, m-sql, business_temporal, temporal, as-of, business-only, defaulted]
shape: read
when:
  targetEntity: Reservation
  operation:
    all: {}
then:
  statements:
    - sql:
        postgres: select t0.res_id, t0.guest from reservation t0 where t0.thru_z = ?
      binds: [infinity]
  referenceSql: select res_id, guest from reservation where thru_z = 'infinity'::timestamptz
  rows:
    - { res_id: 1, guest: Bob }
  roundTrips: 1
