# Deep fetch, ORDERED to-many — a relationship's declared `orderBy` is honored
# (m-deep-fetch). `Order.items` declares `id desc`, but the fixture items are inserted in
# ASCENDING id order, so the child query MUST emit `order by t0.id desc` and the
# assembled `items` list comes back REVERSED (12 before 11). The harness ordering
# oracle derives the expected order from the declared key and asserts the DB
# returned rows obey it, so a dropped or wrong `ORDER BY` fails this case. This is
# the dedicated, single-purpose witness for the ordering contract.
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, orderBy, ordering, relationship, slice-mvp-1]
operation:
  deepFetch:
    operand:
      eq:
        attr: Order.id
        value: 1
    paths:
      - [Order.items]
goldenSql:
  postgres:
    - select t0.id, t0.name from orders t0 where t0.id = ?
    - select t0.id, t0.order_id, t0.sku, t0.quantity from order_item t0 where t0.order_id in (?) order by t0.id desc
binds:
  - [1]
  - [1]
referenceSql: select id, name from orders where id = 1
roundTrips: 2
expectedGraph:
  Order:
    - id: 1
      name: Ada
      items:
        - { id: 12, order_id: 1, sku: B-200, quantity: 1 }
        - { id: 11, order_id: 1, sku: A-100, quantity: 2 }
