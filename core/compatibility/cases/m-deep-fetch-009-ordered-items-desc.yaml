# Deep fetch, ORDERED to-many — a relationship's declared `orderBy` is honored
# (m-deep-fetch). `Order.items` declares `id desc`, but the fixture items are inserted in
# ASCENDING id order, so the child query MUST emit `order by t0.id desc` and the
# assembled `items` list comes back REVERSED (12 before 11). The harness ordering
# oracle derives the expected order from the declared key and asserts the DB
# returned rows obey it, so a dropped or wrong `ORDER BY` fails this case. This is
# the dedicated, single-purpose witness for the ordering contract.
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, orderBy, ordering, relationship, slice-mvp-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    deepFetch:
      operand:
        eq:
          attr: Order.id
          value: 1
      paths:
        - [{ rel: Order.items }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id = ?
      binds: [1]
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?) order by t0.id desc
      binds: [1]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id = 1
  graph:
    Order:
      - id: 1
        name: Ada
        sku: A-100
        qty: 5
        price: 10.50
        active: true
        ordered_on: 2024-01-05
        items:
          - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
          - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
  roundTrips: 2
