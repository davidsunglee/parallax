# isNotNull — the negated nullability predicate. The m-sql canonical form renders
# the negation as `not t0.sku is null` (the normalizer's fixed point); the naive
# referenceSql uses the more familiar `is not null` to cross-check.
model: models/orders.yaml
tags: [m-op-algebra, isNotNull, slice-mvp-1]
operation:
  isNotNull:
    attr: Order.sku
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where not t0.sku is null
binds: []
referenceSql: select id, name from orders where sku is not null
expectedRows:
  - { id: 1, name: Ada }
  - { id: 2, name: Linus }
  - { id: 3, name: ada }
  - { id: 5, name: Alan }
  - { id: 42, name: Grace }
roundTrips: 1
