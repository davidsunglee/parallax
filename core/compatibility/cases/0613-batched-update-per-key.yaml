# Batched UPDATE, per-distinct-key form (M8): non-uniform new values.
#
# M8 says batched updates collapse "executed once per distinct key, OR as a single
# statement with an IN predicate when the new values are uniform." 0604 proves the
# uniform `id in (?, ?)` form (one statement, one shared value). This pins the
# complementary per-key form: when each key gets a DIFFERENT new value, the batch
# flushes one keyed UPDATE per distinct key. Fixtures are loaded first; wallets 1
# and 2 receive different balances, wallet 3 is untouched.
#
# The subject is the NON-VERSIONED Wallet (models/wallet.yaml): a readless batched
# UPDATE per key is honest only for a non-versioned entity — a versioned entity's
# set-based update MUST materialize into per-object version-advancing updates
# (M10 / ADR 0031).
model: models/wallet.yaml
tags: [m8, m3, batched-write, write-sequence, per-key, transactions cache, slice-mvp-1]
loadFixtures: true
writeSequence:
  - mutation: update
    entity: Wallet
    statements: 2
    note: two distinct keys take DIFFERENT new balances ⇒ one keyed UPDATE each
    rows:
      # Non-uniform new values across keys ⇒ one keyed `where id = ?` UPDATE each.
      - { id: 1, balance: 111.00 }
      - { id: 2, balance: 222.00 }
goldenSql:
  postgres:
    - update wallet set balance = ? where id = ?
    - update wallet set balance = ? where id = ?
binds:
  - [111.00, 1]
  - [222.00, 2]
roundTrips: 2
expectedTableState:
  wallet:
    - id: 1
      owner: Ada
      balance: 111.00
    - id: 2
      owner: Linus
      balance: 222.00
    - id: 3
      owner: Grace
      balance: 10.00
