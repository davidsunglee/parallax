# Same-transaction coalescing on the AUDIT axis (m-txtime-write + m-unit-work): a row
# inserted and then updated in the SAME unit of work coalesces IN PLACE to a single
# current-milestone INSERT carrying the FINAL value — NO closed milestone is fabricated
# for a state that was never durably observable (Reladomo GenericBiTemporalDirector
# same-transaction handling; the coalescing rule is m-unit-work). Contrast
# m-txtime-write-002, whose insert-then-update spans TWO transactions and therefore
# close-and-chains a superseded milestone.
#
# Against the loaded Balance fixtures, step 0 buffers INSERT of NEW account 9 (value
# 100) then an UPDATE to 150, flushing as ONE INSERT [in_z = 2024-06-01,
# out_z = infinity] at 150 — no close UPDATE, no superseded 100 row: the single INSERT
# IS the observable proof. Step 1's Latest find (optimistic mode, so no read lock — a
# plain temporal read) observes ONE current row at 150. In the neutral write input `at`
# is the Clock-supplied Transaction-Time instant (in_z), never an instruction field.
model: models/balance.yaml
tags: [m-txtime-write, m-unit-work, m-temporal-read, same-transaction-coalescing, scenario, slice-snapshot-1]
shape: scenario
when:
  uow:
    concurrency: optimistic
  scenario:
    - write:
        - mutation: insert
          entity: Balance
          rows:
            - { id: 9, acctNum: D, value: 100.00 }
          at: "2024-06-01T00:00:00+00:00"
        - mutation: update
          entity: Balance
          rows:
            - { id: 9, value: 150.00 }
          at: "2024-06-01T00:00:00+00:00"
      roundTrips: 1
      note: the buffered INSERT (value 100) then the buffered UPDATE (value 150) of the SAME new account 9 coalesce IN PLACE to ONE current-milestone INSERT carrying the final value 150 — no close, no superseded milestone
      statements:
        - sql:
            postgres: insert into balance(bal_id, acct_num, val, in_z, out_z) values (?, ?, ?, ?, ?)
          binds: [9, D, 150.00, "2024-06-01T00:00:00+00:00", infinity]
    - targetEntity: Balance
      find:
        eq:
          attr: Balance.id
          value: 9
      roundTrips: 1
      note: Latest over account 9 observes ONE current milestone at the coalesced value 150 (a single row, not a superseded 100 + current 150)
      statements:
        - sql:
            postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.bal_id = ? and t0.out_z = ?
          binds: [9, infinity]
      referenceSql: select bal_id, acct_num, val, in_z, out_z from balance where bal_id = 9 and out_z = 'infinity'::timestamptz
      expectRows:
        - { bal_id: 9, acct_num: D, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
then:
  roundTrips: 2
