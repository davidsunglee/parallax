# notExists(Order.items) AND active = true: a navigation filter composed with a
# scalar predicate via `and`. Orders with no items are 3, 4, 5; of those only
# order 4 is active, so the result is {4}. This pins that a navigation node
# composes inside the boolean algebra exactly like an atomic predicate, and that
# the EXISTS semi-join's correlation binds come before the trailing scalar bind.
model: models/orders.yaml
tags: [m-navigate, notExists, boolean, relationship, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    and:
      operands:
        - notExists:
            rel: Order.items
        - eq: { attr: Order.active, value: true }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where not exists (select 1 from order_item t1 where t1.order_id = t0.id) and t0.active = ?
      binds: [true]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id not in (select order_id from order_item) and active = true
  rows:
    - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
  roundTrips: 1
