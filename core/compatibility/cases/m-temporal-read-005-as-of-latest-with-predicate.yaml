# As-of-now read COMPOSED with a non-temporal predicate. The user predicate
# (acctNum = 'A') and the auto-injected current-row predicate (out_z = infinity)
# combine with `and`; the injected temporal term is appended after the user term.
# As-of now, account A's current balance is the 150.00 milestone (id 1).
model: models/balance.yaml
tags: [m-temporal-read, m-sql, as-of, audit-only, composed, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Balance
  operation:
    asOf:
      operand:
        eq:
          attr: Balance.acctNum
          value: A
      dimension: transactionTime
      coordinate: latest
then:
  statements:
    - sql:
        postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.acct_num = ? and t0.out_z = ?
      binds: [A, infinity]
  referenceSql: select bal_id, acct_num, val, in_z, out_z from balance where acct_num = 'A' and out_z = 'infinity'::timestamptz
  rows:
    - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
