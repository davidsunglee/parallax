# valueObject nested predicate over a NULL value object — 3VL exclusion (M2).
#
# M2 mandates that when the value-object column is NULL (the path is absent, or
# the selected value is null) the row is EXCLUDED. Customer 4 has a null address,
# so its `jsonb_extract_path_text(t0.address, 'city')` yields NULL. A
# `nestedNotEq(city, 'Boston')` therefore must NOT return customer 4 even though
# it is intuitively "not Boston" — `not (NULL = 'Boston')` is NULL, not true.
# Only the present, non-Boston cities (Oslo: 1, 2) survive; Boston (3) fails the
# inequality and the null VO (4) is excluded by 3VL. This is the structured-
# column parity of the scalar NULL exclusion (0227/0228).
model: models/customer.yaml
tags: [m-value-object, m-sql, nested, json, "null", three-valued-logic]
operation:
  nestedNotEq: { path: Customer.address.city, value: Boston }
goldenSql:
  postgres: select t0.id, t0.name from customer t0 where not jsonb_extract_path_text(t0.address, ?) = ?
binds: [city, Boston]
referenceSql: select id, name from customer where address ->> 'city' <> 'Boston'
expectedRows:
  - { id: 1, name: Ada }
  - { id: 2, name: Linus }
roundTrips: 1
