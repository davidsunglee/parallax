# Deep fetch Policy.coverages, business LATEST / processing PAST 2024-02-01 — the
# combo the M7 read-matrix table previously OMITTED. Business propagates as the
# equality form, processing as a range, IN THE SAME child predicate:
# `thru_z = ? and in_z <= ? and out_z > ?` (binds infinity, P, P). As the system
# believed on 2024-02-01, the latest-business value of coverage 10 was the
# ORIGINAL belief -> 500 (C-R1); coverage 20 -> 300.
model: models/policy.yaml
tags: [m4, m7, temporal, relationship, deepFetch, propagation, bitemporal]
operation:
  deepFetch:
    operand:
      asOf:
        operand:
          asOf:
            operand: { all: {} }
            asOfAttr: Policy.processingDate
            date: "2024-02-01T00:00:00+00:00"
        asOfAttr: Policy.businessDate
        date: now
    paths:
      - [Policy.coverages]
goldenSql:
  postgres:
    - select t0.id, t0.name from policy t0 where t0.thru_z = ? and t0.in_z <= ? and t0.out_z > ?
    - select t0.id, t0.policy_id, t0.amount from coverage t0 where t0.policy_id in (?, ?) and t0.thru_z = ? and t0.in_z <= ? and t0.out_z > ?
binds:
  - [infinity, "2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
  - [1, 2, infinity, "2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
roundTrips: 2
expectedGraph:
  Policy:
    - id: 1
      name: Auto
      coverages:
        - { id: 10, policy_id: 1, amount: 500.00 }
    - id: 2
      name: Home
      coverages:
        - { id: 20, policy_id: 2, amount: 300.00 }
