# endsWith + wildcard escape — affix escaping (m-op-algebra §Wildcard/escape rule).
#
# The endsWith affix prepends a leading `%` to the escaped literal. `endsWith
# '50%'` escapes the trailing literal `%` so it does NOT act as a wildcard:
# `like '%50\%' escape '\'`. Only `C_50%` ends with a literal `50%`. The
# independent `right(sku, 3)` oracle would catch an unescaped `%` (which would
# match any suffix). Companion to m-op-algebra-033 (startsWith) and m-op-algebra-015 (contains).
model: models/orders.yaml
tags: [m-op-algebra, endsWith, string, escape, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    endsWith:
      attr: Order.sku
      value: 50%
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.sku like ? escape ?
      binds: ["%50\\%", "\\"]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where right(sku, 3) = '50%'
  rows:
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
  roundTrips: 1
