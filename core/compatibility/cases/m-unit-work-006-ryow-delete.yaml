# Read-your-own-writes for DELETE (m-unit-work): a dependent find observes a
# committed in-transaction DELETE (the row is GONE).
#
# m-unit-work-001 proves read-your-own-writes for INSERT and m-unit-work-005 for
# UPDATE; this pins the DELETE variant. A keyed DELETE of a versioned row requires a
# PRIOR observation exactly like a keyed UPDATE (`m-opt-lock`) — the unit of work
# first OBSERVES account 3 (Grace, balance 10.00, version 1), then commits a DELETE
# of that SAME observed row, then issues a find that depends on it — the find MUST
# observe the ABSENCE of the row (zero rows), not the stale fixture. Unlike a keyed
# UPDATE (whose version gate is optimistic-only), a keyed DELETE of an OBSERVED
# versioned row gates on that observed version in EITHER concurrency mode
# (`m-batch-write-004`'s own default-mode witness; `python.md` §5's asymmetric
# phrasing), so the golden DELETE carries `and version = ?` even in the DEFAULT
# `locking` mode here. All three steps share ONE `uow` group (`observed-delete`):
# the observing find, the versioned delete, and the dependent find run inside the
# SAME unit of work, which is what lets the delete's version bind be the observing
# find's OWN transaction-scoped observation (`m-opt-lock`) rather than an oracle
# value the compile lane could not otherwise derive — the case is therefore
# `compileEligibility: run-only` (query-result-dependent). The scenario:
#   step 0 find  : observe account 3 (Grace, 10.00, version 1), 1 round trip.
#   step 1 write : a DELETE of the observed account 3, gated on its observed
#                  version 1.
#   step 2 find  : query account 3 — it MUST observe NO rows (the delete is
#                  visible). The group COMMITS after this, its last step.
# Every find is a cache MISS (the write step's forced flush precedes step 2) and, in
# the DEFAULT `locking` mode, carries the m-read-lock shared-row-lock suffix
# (`for share of t0` — locking zero rows is valid SQL); asserting an empty result
# proves read-your-own-writes for a deletion against real committed data.
# roundTrips = 3 (the observing find + the committed delete + the dependent find).
model: models/account.yaml
tags: [m-unit-work, read-your-own-writes, flush, scenario, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "the versioned delete's version bind is the OBSERVED version the unit of work's own observing find returned — a DELETE gates on that observation, it never advances it — a query result (m-opt-lock)"
when:
  scenario:
    - uow: observed-delete
      targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 3
      roundTrips: 1
      note: observe account 3 (Grace, balance 10.00, version 1) before the delete, inside the SAME unit of work as the write below
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
          binds: [3]
      expectRows:
        - { id: 3, owner: Grace, balance: 10.00, version: 1 }
    - uow: observed-delete
      write:
        - mutation: delete
          entity: Account
          rows:
            - { id: 3 }
      roundTrips: 1
      note: buffer a delete of the observed account 3, gated on its observed version 1; the unit of work commits at the group's last step below
      statements:
        - sql:
            postgres: delete from account where id = ? and version = ?
          binds: [3, 1]
    - uow: observed-delete
      targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 3
      roundTrips: 1
      note: a dependent find MUST observe the deletion (read-your-own-writes) — zero rows; the group COMMITS after this, its last step
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
          binds: [3]
      expectRows: []
then:
  roundTrips: 3
