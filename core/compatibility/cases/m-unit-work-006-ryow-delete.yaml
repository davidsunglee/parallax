# Read-your-own-writes for DELETE (m-unit-work): a dependent find observes a
# committed in-transaction DELETE (the row is GONE).
#
# m-unit-work-001 proves read-your-own-writes for INSERT and m-unit-work-005 for
# UPDATE; this pins the DELETE variant. The unit of work commits a DELETE of an
# existing account, then issues a find that depends on it — the find MUST observe
# the ABSENCE of the row (zero rows), not the stale fixture. The scenario:
#   step 0 write : COMMIT a DELETE of account 3 (Grace)
#   step 1 find  : query account 3 — it MUST observe NO rows (the delete is visible).
# The find is a cache MISS that costs one round trip (the forced flush precedes it)
# and, in the DEFAULT `locking` mode, carries the m-read-lock shared-row-lock suffix
# (`for share of t0` — locking zero rows is valid SQL); asserting an empty result
# proves read-your-own-writes for a deletion against real committed data.
# roundTrips = 2 (the committed delete + the dependent find).
model: models/account.yaml
tags: [m-unit-work, read-your-own-writes, flush, scenario, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: scenario
when:
  scenario:
    - write:
        - mutation: delete
          entity: Account
          rows:
            - { id: 3 }
      roundTrips: 1
      note: buffer + COMMIT a delete of account 3
      statements:
        - sql:
            postgres: delete from account where id = ?
          binds: [3]
    - targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 3
      roundTrips: 1
      note: a dependent find MUST observe the deletion (read-your-own-writes) — zero rows
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
          binds: [3]
      expectRows: []
then:
  roundTrips: 2
