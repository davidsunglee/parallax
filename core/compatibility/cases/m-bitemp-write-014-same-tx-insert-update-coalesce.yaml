# Same-transaction coalescing on a BITEMPORAL entity (m-bitemp-write + m-unit-work): a
# plain insert then an update of the SAME new object in ONE unit of work coalesces IN
# PLACE to a single fully-Latest-rectangle INSERT carrying the final value — NO
# inactivation and NO head/tail rectangle split is fabricated for a state that was
# never durably observable (Reladomo GenericBiTemporalDirector same-transaction
# handling; the coalescing rule is m-unit-work). Contrast m-bitemp-write-006, whose
# plain update spans a prior COMMITTED rectangle and therefore inactivates + chains
# head/tail.
#
# Against the loaded Position fixtures, step 0 buffers a plain INSERT of NEW position 9
# (value 100, valid [2024-01-01, infinity)) then an UPDATE to 150, flushing as ONE
# fully-Latest rectangle INSERT (thru_z = out_z = infinity) at the FINAL value 150 —
# no inactivation UPDATE, no head/tail split. Step 1's bitemporal Latest find on BOTH
# dimensions (optimistic mode, so no read lock) observes that one rectangle. In the
# neutral write input `validFrom` is the canonical Valid-Time lower bound (from_z), a
# plain insert omits `until` (the window runs to infinity), and `at` is the
# Clock-supplied Transaction-Time instant (in_z), never an instruction field.
model: models/position.yaml
tags: [m-bitemp-write, m-unit-work, m-temporal-read, bitemporal, same-transaction-coalescing, scenario, slice-snapshot-1]
shape: scenario
when:
  uow:
    concurrency: optimistic
  scenario:
    - write:
        - mutation: insert
          entity: Position
          rows:
            - { id: 9, acctNum: D, value: 100.00 }
          validFrom: "2024-01-01T00:00:00+00:00"
          at: "2024-01-01T00:00:00+00:00"
        - mutation: update
          entity: Position
          rows:
            - { id: 9, value: 150.00 }
          at: "2024-01-01T00:00:00+00:00"
      roundTrips: 1
      note: the buffered plain INSERT (value 100) then the buffered UPDATE (value 150) of the SAME new position 9 coalesce IN PLACE to ONE fully-Latest rectangle INSERT carrying the final value 150 — no inactivation, no head/tail split
      statements:
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [9, D, 150.00, "2024-01-01T00:00:00+00:00", infinity, "2024-01-01T00:00:00+00:00", infinity]
    - targetEntity: Position
      find:
        asOf:
          operand:
            asOf:
              operand:
                eq:
                  attr: Position.id
                  value: 9
              dimension: transactionTime
              coordinate: latest
          dimension: validTime
          coordinate: latest
      roundTrips: 1
      note: bitemporal Latest on both dimensions over position 9 observes ONE fully-Latest rectangle at the coalesced value 150
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.pos_id = ? and t0.thru_z = ? and t0.out_z = ?
          binds: [9, infinity, infinity]
      referenceSql: select pos_id, acct_num, val, from_z, thru_z, in_z, out_z from position where pos_id = 9 and thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz
      expectRows:
        - { pos_id: 9, acct_num: D, val: 150.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
then:
  roundTrips: 2
