# Classic two-connection deadlock (m-db-error). Round 1: A locks gauge row 1, B locks
# row 2 (barrier: both first locks held). Round 2: A waits for row 2, B waits for
# row 1 -> cycle -> the DB victimizes one transaction, whose statement raises.
# The victim choice is non-deterministic; the runner classifies whichever error
# is raised. Neutral category deadlock; native PG 40P01 / MariaDB 1213.
model: models/error-cases.yaml
tags: [m-db-error, deadlock, slice-snapshot-1, slice-managed-1]
shape: error
given:
  fixtures: true
when:
  concurrency:
    rounds:
      - A:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [10, 1]
        B:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [20, 2]
      - A:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [11, 2]
        B:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [21, 1]
then:
  errorClass: deadlock
  nativeCode:
    postgres: "40P01"
    mariadb: 1213
