# Deep fetch Invoice.lines as of processing INSTANT 2024-02-01. Single-axis range
# propagation: the child carries `in_z <= ? and out_z > ?` (binds T, T). At that
# instant line 1000 is the SUPERSEDED 50 (L-R1), line 1001 -> 25 — distinct from
# m-navigate-019, proving the propagated instant selects the milestone whose interval
# contains it.
model: models/invoice.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, propagation, audit-only, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Invoice
  operation:
    deepFetch:
      operand:
        asOf:
          operand: { all: {} }
          asOfAttr: Invoice.processingDate
          date: "2024-02-01T00:00:00+00:00"
      paths:
        - [{ rel: Invoice.lines }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.in_z, t0.out_z from invoice t0 where t0.in_z <= ? and t0.out_z > ?
        mariadb: select t0.id, t0.name, t0.in_z, t0.out_z from invoice t0 where t0.in_z <= ? and t0.out_z > ?
      binds: ["2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
    - sql:
        postgres: select t0.id, t0.invoice_id, t0.amount, t0.in_z, t0.out_z from invoice_line t0 where t0.invoice_id in (?) and t0.in_z <= ? and t0.out_z > ?
        mariadb: select t0.id, t0.invoice_id, t0.amount, t0.in_z, t0.out_z from invoice_line t0 where t0.invoice_id in (?) and t0.in_z <= ? and t0.out_z > ?
      binds: [100, "2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
  graph:
    Invoice:
      - id: 100
        name: INV-100
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        lines:
          - { id: 1000, invoice_id: 100, amount: 50.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-04-01T00:00:00+00:00" }
          - { id: 1001, invoice_id: 100, amount: 25.00, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 2
