# Cross-process cache coherence — INSERT under full-cache re-fetch (Phase 11).
#
# 1102 proves insert visibility under the partial-cache MARK-DIRTY strategy; this
# pins the genuinely harder combination: an insert observed under the full-cache
# RE-FETCH strategy (1101's strategy, but for a brand-new row). Re-fetch resolves
# by re-querying known primary keys, which conceptually cannot DISCOVER a new PK
# on its own — so a conforming implementation's notification must carry the new
# key (or re-resolve the predicate) for node B to converge. The harness has no
# cache; it asserts the OBSERVABLE outcome that any such mechanism must produce:
# node B's predicate re-fetch returns node A's committed insert.
#
# Steps:
#   0  read  on B : query owner='Trent' — empty (no such account yet).
#   1  write on A : A commits an INSERT of account 8 (Trent, 64.00) on its connection.
#   2  read  on B : node B re-fetches and MUST observe the newly-inserted row.
model: models/account.yaml
tags: [m-coherence, full-cache-refetch, insert]
coherence:
  - node: B
    kind: read
    find:
      eq:
        attr: Account.owner
        value: Trent
    goldenSql:
      postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.owner = ?
      mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.owner = ?
    binds: [Trent]
    note: seed read on node B — Trent does not exist yet, so the result is empty
    observeRows: []
  - node: A
    kind: write
    goldenSql:
      postgres: insert into account(id, owner, balance, version) values (?, ?, ?, ?)
      mariadb: insert into account(id, owner, balance, version) values (?, ?, ?, ?)
    binds: [8, Trent, 64.00, 1]
    note: node A commits an INSERT of the new account on a separate connection
  - node: B
    kind: read
    find:
      eq:
        attr: Account.owner
        value: Trent
    goldenSql:
      postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.owner = ?
      mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.owner = ?
    binds: [Trent]
    note: node B re-fetches after re-fetch invalidation and MUST observe A's committed insert
    observeRows:
      - { id: 8, owner: Trent, balance: 64.00, version: 1 }
