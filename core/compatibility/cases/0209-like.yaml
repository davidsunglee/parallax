# like — raw pattern match; `%` and `_` are wildcards in the pattern. The bind
# carries the pattern verbatim. NULL skus never match.
model: models/orders.yaml
tags: [m2, like, string, first-implementation-mvp]
operation:
  like:
    attr: Order.sku
    value: A-%
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where t0.sku like ?
binds: ["A-%"]
referenceSql: select id, name from orders where sku like 'A-%'
expectedRows:
  - { id: 1, name: Ada }
  - { id: 3, name: ada }
  - { id: 42, name: Grace }
roundTrips: 1
