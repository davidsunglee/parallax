# Diamond identity resolution (m-snapshot-read): two include paths reach the SAME
# rows, and the snapshot graph materializes them in 1 + L statements — one node
# per row, referenced from both positions.
#
# Order 1 is fetched with [Order.items] and [Order.itemsByShipDate]: two
# relationships over the same order_id join, so both levels return the same
# OrderItem rows {11, 12} — the diamond. One row is ONE node referenced from both
# lists; only the list order differs (id desc vs shipped_on asc, NULLs last).
# Both levels fetch the IDENTICAL projection, so the graph expectation never
# depends on which path materializes a node first; the reference-equality half of
# identity resolution is asserted per-language by the API Conformance Suite,
# exactly like `sameObjectAs` scenarios. Round trips are 1 (root) + 1 (items) +
# 1 (itemsByShipDate) = 3 — one statement per level, never a fourth statement
# for the shared rows.
model: models/orders.yaml
tags: [m-snapshot-read, m-deep-fetch, to-many, relationship, graph, materialization, slice-snapshot-1]
shape: read
when:
  operation:
    deepFetch:
      operand:
        eq:
          attr: Order.id
          value: 1
      paths:
        - [Order.items]
        - [Order.itemsByShipDate]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where t0.id = ?
      binds: [1]
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?) order by t0.id desc
      binds: [1]
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?) order by t0.shipped_on asc
      binds: [1]
  referenceSql: select id, name from orders where id = 1
  graph:
    Order:
      - id: 1
        name: Ada
        items:
          - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
          - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
        itemsByShipDate:
          - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
          - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
  roundTrips: 3
