# Deferred load batches the whole source set (m-deep-fetch): an explicit `load`
# over several already-managed objects emits ONE child statement, never one per
# object.
#
# Step 0 finds orders {1, 2, 42} (one round trip). Step 1 is an explicit `load` of
# the `items` relationship over that whole set: a single `order_id in (?, ?, ?)`
# query keyed by the three distinct parent ids — not three per-object queries — so
# the deferred load costs exactly one round trip and returns every line item of the
# three orders. This is the portable, mandatory explicit-load trigger.
model: models/orders.yaml
tags: [m-deep-fetch, relationship, deferred-load, slice-managed-1]
shape: scenario
when:
  scenario:
    - targetEntity: Order
      find:
        in:
          attr: Order.id
          values: [1, 2, 42]
      roundTrips: 1
      note: find the three source orders (one query)
      statements:
        - sql:
            postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id in (?, ?, ?)
          binds: [1, 2, 42]
      expectRows:
        - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
        - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
        - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
    - action: load
      "on": 0
      path: items
      roundTrips: 1
      note: explicit load of items over all three orders -> ONE batched child statement
      statements:
        - sql:
            postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?, ?, ?) order by t0.id desc
          binds: [1, 2, 42]
      expectRows:
        - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
        - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
        - { id: 21, order_id: 2, sku: A-300, quantity: 4, shipped_on: 2024-02-20 }
        - { id: 421, order_id: 42, sku: A-999, quantity: 3, shipped_on: 2024-03-10 }
        - { id: 422, order_id: 42, sku: B-200, quantity: 5, shipped_on: 2024-02-05 }
then:
  roundTrips: 2
