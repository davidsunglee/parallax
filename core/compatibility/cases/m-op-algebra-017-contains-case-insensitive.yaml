# contains (case-insensitive) — the affix form composes with case folding too:
# `contains 'A'` ignoring case lowers both sides and wraps the lowered literal in
# `%...%`. Every name containing an `a`/`A` matches except `Linus`.
model: models/orders.yaml
tags: [m-op-algebra, contains, string, caseInsensitive, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    contains:
      attr: Order.name
      value: A
      caseInsensitive: true
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where lower(t0.name) like lower(?)
      binds: ["%a%"]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where lower(name) like '%a%'
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
