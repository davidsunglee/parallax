# Negative (m-value-object write validation, resolved Q7): a write missing a required
# DEPTH-1 attribute is refused PRE-SQL.
#
# A value object is written atomically as one whole document, so the document must be
# structurally complete against its DECLARED structure. Contact's `address.street` is
# a required (`nullable: false`) attribute at depth 1; this write omits it (the rest of
# the document — city, the required `geo` with country + point — is complete), so
# model-aware write validation MUST reject it before any DML (m-value-object writes).
model: models/contact.yaml
tags: [m-value-object, rejected, negative, write, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  write:
    id: 1
    name: Acme
    address:
      city: Oslo
      geo:
        country: "NO"
        point: { lat: 59.9, lon: 10.7 }
then:
  rejectedRule: write-required-attribute-missing
