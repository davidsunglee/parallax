# Table-per-hierarchy OR across two concrete-subtype branches (m-inheritance, m-op-algebra, m-sql).
#
# targetEntity Animal, OR of two narrowed branches: Dogs with barkVolume > 5, OR Cats
# that are indoor. Each branch predicate over a concrete-subtype attribute is guarded
# by that branch's tag (appended after the predicate) and the whole branch is grouped,
# so the branches join with `or`:
#   (t0.bark_volume > ? and t0.kind = ?) or (t0.indoor = ? and t0.kind = ?)
# binds [5, dog, true, cat]. Rex (bark 7) and Whiskers (indoor) match; Fido (bark 3)
# and Tusker (a boar) do not. The top node is `or`, so the position stays the whole
# Animal family and the projection is the full superset; familyVariant per row.
#
# Non-trivial (grouped branches) case => referenceSql is the independent oracle.
model: models/animal.yaml
tags: [m-inheritance, m-op-algebra, m-sql, table-per-hierarchy, narrow, familyVariant, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Animal
  operation:
    or:
      operands:
        - narrow:
            entity: Animal
            to: [Dog]
            operand:
              greaterThan: { attr: Dog.barkVolume, value: 5 }
        - narrow:
            entity: Animal
            to: [Cat]
            operand:
              eq: { attr: Cat.indoor, value: true }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.license_id, t0.bark_volume, t0.indoor, t0.tusk_length, t0.kind from animal t0 where (t0.bark_volume > ? and t0.kind = ?) or (t0.indoor = ? and t0.kind = ?)
      binds: [5, dog, true, cat]
  referenceSql: select id, name, license_id, bark_volume, indoor, tusk_length, kind from animal where (bark_volume > 5 and kind = 'dog') or (indoor = true and kind = 'cat')
  rows:
    - { id: 1, name: Rex, license_id: L-100, bark_volume: 7, indoor: null, tusk_length: null, familyVariant: Dog }
    - { id: 3, name: Whiskers, license_id: L-200, bark_volume: null, indoor: true, tusk_length: null, familyVariant: Cat }
  roundTrips: 1
