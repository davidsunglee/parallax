# valueObject materialization under a FILTER: the matched owners' nested composite
# still arrives in ONE round trip (m-value-object "Materialization and navigation
# contract"), on Postgres AND MariaDB.
#
# A nested-field filter selects the owners (nestedEq(Customer.address.city, Oslo)
# -> Ada and Linus, the same extraction as m-value-object-001), and the same
# single statement projects the `address` document column so their whole nested
# composite — the to-one `geo` -> `point` (three levels) and the to-many `phones`
# array — materializes with them. There is NO deep-fetch statement: roundTrips is
# 1, and `then.graph` carries the decoded composite for exactly the matched rows.
# This pins that materialization rides the owner's own read even when that read is
# filtered, and that the getter surface reaches arbitrary depth.
#
# The extraction bind holes diverge per dialect (Postgres per-segment key, MariaDB
# one '$.city' path bind), so `binds` is a dialect-keyed map; the independent
# `referenceSql` oracle re-selects the matched row SET a different way (a naive
# native extraction), verifying the filter without routing the JSON document
# through row comparison.
model: models/customer.yaml
tags: [m-value-object, m-sql, nested, json, materialization, graph, to-one, to-many]
shape: read
when:
  operation:
    nestedEq: { path: Customer.address.city, value: Oslo }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.address from customer t0 where jsonb_extract_path_text(t0.address, ?) = ?
        mariadb: select t0.id, t0.name, t0.address from customer t0 where json_value(t0.address, ?) = ?
      binds:
        postgres: [city, Oslo]
        mariadb: ['$.city', Oslo]
  referenceSql:
    postgres: select id, name from customer where address ->> 'city' = 'Oslo'
    mariadb: select id, name from customer where nullif(json_unquote(json_extract(address, '$.city')), 'null') = 'Oslo'
  graph:
    Customer:
      - id: 1
        name: Ada
        address:
          street: 1 Park Ave
          city: Oslo
          geo:
            country: NO
            elevation: 10.5
            point: { lat: 59.9, lon: 10.7 }
          phones:
            - { type: home, number: '555-1234' }
            - { type: work, number: '555-9999' }
      - id: 2
        name: Linus
        address:
          street: 2 Main St
          city: Oslo
          geo:
            country: NO
            elevation: 20.0
            point: { lat: 59.9, lon: 10.8 }
          phones:
            - { type: home, number: '555-9999' }
  roundTrips: 1
