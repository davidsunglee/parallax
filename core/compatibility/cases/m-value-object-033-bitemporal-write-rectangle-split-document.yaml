            country: FI
          phones:
            - { type: main, number: '555-1000' }
    - sql:
        postgres: insert into branch(br_id, name, from_z, thru_z, in_z, out_z, address) values (?, ?, ?, ?, ?, ?, ?)
        mariadb: insert into branch(br_id, name, from_z, thru_z, in_z, out_z, address) values (?, ?, ?, ?, ?, ?, ?)
      binds:
        - 1
        - Central Branch
        - "2024-03-01T00:00:00+00:00"
        - "2024-09-01T00:00:00+00:00"
        - "2024-02-15T00:00:00+00:00"
        - infinity
