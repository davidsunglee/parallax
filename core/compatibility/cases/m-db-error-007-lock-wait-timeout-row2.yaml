# Lock-wait timeout on the other row: A holds row 2, B blocks on row 2.
model: models/error-cases.yaml
tags: [m-db-error, lockWaitTimeout, slice-snapshot-1, slice-managed-1]
shape: error
compileEligibility:
  mode: run-only
  reason: single-connection
  note: "single-connection concurrency/locking intent (when.concurrency)"
given:
  fixtures: true
when:
  concurrency:
    rounds:
      - A:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [10, 2]
      - B:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [20, 2]
then:
  errorClass: lockWaitTimeout
  nativeCode:
    postgres: "55P03"
    mariadb: 1205
