# Boundary case (m-unit-work abort contract / ADR 0006): the transaction callback's return
# value is WITHHELD on abort — `api-conformance` lane.
#
# Promoted into m-unit-work normative text in phase 1 and closed here as the portable
# boundary observable: when the closure throws, the unit of work ABORTS — its
# writes (buffered, force-flushed for a dependent read, or cached) are discarded —
# and `px.transaction` REJECTS with the thrown error, returning NO value. This is
# the callback-withheld-on-abort row of phase 1's matrix, expressed as a boundary
# case so the whole retry/abort surface is single-sourced.
#
# No fault is injected: the closure itself throws after a write a dependent find has
# already observed (forcing the read-your-own-writes flush first), so the case also
# witnesses that the forced flush never escapes the atomic scope the abort discards.
#
# `lane: api-conformance`: it proves a boundary control-flow observable (the promise
# rejects; no value is produced); the suite runs `px.transaction` with a throwing
# body and asserts the rejection propagates and the pre-transaction state stands.
model: models/account.yaml
tags: [m-unit-work, m-api-conformance, abort, slice-mvp-1, slice-snapshot-1, slice-managed-1]
lane: api-conformance
shape: boundary
compileEligibility:
  mode: run-only
  reason: single-connection
  note: "single-connection concurrency/locking intent (shape:boundary)"
when:
  boundary:
    - action: read
      note: observe the row
    - action: update
      note: buffer/flush a write (forces the read-your-own-writes flush for a dependent read)
    - action: read
      note: a dependent find observes the flushed write (still inside the atomic scope)
then:
  outcome: aborted
