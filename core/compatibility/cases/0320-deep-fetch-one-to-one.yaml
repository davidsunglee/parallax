# Deep fetch over a ONE-TO-ONE relationship (M1 cardinality, M4 deep fetch).
#
# Every existing deep-fetch case traverses one-to-many or many-to-one; this pins
# the one-to-one cardinality. Fetch every Person with its single Passport peer:
#   level 0 (root)     : all persons
#   level 1 (passport) : passports keyed by the distinct person ids {1, 2, 3}
# A one-to-one peer is attached as a SINGLE object (to-one), not a list — and
# person 3, who has no passport, gets a null peer. Two statements, roundTrips = 2
# (never one query per person), proving N+1 elimination holds for 1:1 too.
model: models/person.yaml
tags: [m-deep-fetch, m-op-list, one-to-one, relationship, nullable, slice-mvp-1]
operation:
  deepFetch:
    operand:
      all: {}
    paths:
      - [Person.passport]
goldenSql:
  postgres:
    - select t0.id, t0.name from person t0
    - select t0.id, t0.person_id, t0.number from passport t0 where t0.person_id in (?, ?, ?)
binds:
  - []
  - [1, 2, 3]
referenceSql: select id, name from person
roundTrips: 2
expectedGraph:
  Person:
    - id: 1
      name: Alan
      passport: { id: 101, person_id: 1, number: P-AAA }
    - id: 2
      name: Grace
      passport: { id: 102, person_id: 2, number: P-BBB }
    - id: 3
      name: Ada
      passport: null
