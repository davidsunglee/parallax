# Write sequence: insertUntil — the third of the *Until trio (DQ11). Insert a
# bitemporal value scoped to a BOUNDED Valid-Time window, with no prior row to close.
#
# An insertUntil opens a single new milestone whose BUSINESS interval is the
# bounded window [validFrom, until) (rather than [validFrom, infinity)),
# at fresh processing time [txInstant, infinity). There is no existing current row
# to inactivate, so it is a single INSERT — the bitemporal analogue of the
# audit-only insert, but business-bounded.
#
# The sequence (self-contained, from an empty table):
#   step 1 insertUntil : open value 100 for Valid-Time window [2024-03-01, 2024-09-01)
#                        at txInstant 2024-01-01, processing [2024-01-01, infinity)  (1 statement)
#
# Resulting state (1 row): a single rectangle current on processing whose business
# interval is bounded — outside [2024-03-01, 2024-09-01) no value exists.
model: models/position.yaml
tags: [m-bitemp-write, m-sql, bitemporal, temporal, write-sequence, insert-until, slice-snapshot-1, slice-managed-1]
shape: writeSequence
when:
  writeSequence:
    - mutation: insertUntil
      entity: Position
      statements: 1
      note: open a single business-bounded rectangle [2024-03-01, 2024-09-01)
      rows:
        - { id: 1, acctNum: A, value: 100.00 }
      validFrom: "2024-03-01T00:00:00+00:00"
      at: "2024-01-01T00:00:00+00:00"
      until: "2024-09-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
        mariadb: insert into `position` (pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
      binds: [1, A, 100.00, "2024-03-01T00:00:00+00:00", "2024-09-01T00:00:00+00:00", "2024-01-01T00:00:00+00:00", infinity]
  tableState:
    position:
      - pos_id: 1
        acct_num: A
        val: 100.00
        from_z: "2024-03-01T00:00:00+00:00"
        thru_z: "2024-09-01T00:00:00+00:00"
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
  roundTrips: 1
