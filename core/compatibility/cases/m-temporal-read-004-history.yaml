# history(transactionTime): the FULL milestone set, no as-of predicate injected.
#
# Scoped to account id 1 with an inner `eq`, history returns BOTH milestones —
# the superseded [2024-01-01, 2024-06-01) 100.00 row AND the current
# [2024-06-01, infinity) 150.00 row — because the as-of axis is read as edge
# points, not pinned to a single instant. The projection includes the interval
# columns so the result carries the current row's open bound (`out_z = infinity`)
# alongside a finite, superseded `out_z` — exercising the native-infinity read.
model: models/balance.yaml
tags: [m-temporal-read, m-sql, history, audit-only, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Balance
  operation:
    history:
      operand:
        eq:
          attr: Balance.id
          value: 1
      dimension: transactionTime
then:
  statements:
    - sql:
        postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.bal_id = ?
      binds: [1]
  referenceSql: select bal_id, acct_num, val, in_z, out_z from balance where bal_id = 1
  rows:
    - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-06-01T00:00:00+00:00" }
    - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
