# An UPDATE that drives a row's unique-index value onto an existing one ->
# uniqueViolation via the UPDATE path (not INSERT). Two tags are inserted with
# distinct names; the final UPDATE sets tag 2's name to tag 1's name, colliding
# on tag_name_uq.
model: models/error-cases.yaml
tags: [m11, error-classification, uniqueViolation]
errorClass: uniqueViolation
expectedNativeCode:
  postgres: "23505"
  mariadb: 1062
goldenSql:
  postgres:
    - insert into tag(id, name) values (?, ?)
    - insert into tag(id, name) values (?, ?)
    - update tag set name = ? where id = ?
  mariadb:
    - insert into tag(id, name) values (?, ?)
    - insert into tag(id, name) values (?, ?)
    - update tag set name = ? where id = ?
binds:
  - [1, "one"]
  - [2, "two"]
  - ["one", 2]   # collides with tag 1's name
