# A zero-row temporal close in LOCKING mode: the ungated close finds no current
# milestone and affects 0 rows (m-temporal-read + m-opt-lock).
#
# In locking mode the close is UNGATED: the m-read-lock shared read lock makes the
# write correct, so no `and in_z = ?` gate is emitted — the locking-mode counterpart
# of m-temporal-read-009's gated close. But `given.apply` TERMINATES id 2 (closes its
# current row at 2024-09-01, chaining nothing), so no current row remains and the
# ungated `update ... where out_z = 'infinity'` matches nothing: `then.affectedRows`
# is 0 and `then.tableState` is the fixtures with id 2 already terminated (unchanged
# by the close).
model: models/balance.yaml
tags: [m-temporal-read, m-opt-lock, m-sql, temporal, conflict, locking, slice-mvp-1]
shape: conflict
given:
  apply:
    - sql: update balance set out_z = '2024-09-01T00:00:00+00:00' where bal_id = 2 and out_z = 'infinity'
when:
  uow:
    concurrency: locking
  write: { id: 2 }
  at: "2024-10-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update balance set out_z = ? where bal_id = ? and out_z = ?
      binds: ["2024-10-01T00:00:00+00:00", 2, infinity]
  affectedRows: 0
  tableState:
    balance:
      - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-06-01T00:00:00+00:00" }
      - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
      - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: "2024-09-01T00:00:00+00:00" }
      - { bal_id: 3, acct_num: C, val: 50.00, in_z: "2024-03-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
