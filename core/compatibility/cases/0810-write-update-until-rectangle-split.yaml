# Write sequence: updateUntil — the BITEMPORAL RECTANGLE SPLIT (the signature
# full-bitemporal write). A value is corrected for a BOUNDED business window only,
# while preserving the audit trail on the processing axis (research §6).
#
# An updateUntil over a business window [businessFrom, businessTo) never mutates a
# value in place. It (1) INACTIVATES the original current row by closing its
# PROCESSING axis at the transaction instant (out_z = txInstant), then chains
# THREE new rows at fresh processing time [txInstant, infinity):
#   head   : business [from_z, businessFrom)  — the OLD value before the window
#   middle : business [businessFrom, businessTo) — the NEW value, for the window
#   tail   : business [businessTo, infinity)  — the OLD value after the window
# so the value changes ONLY inside the window. The original survives as a row
# closed on the processing axis — the bitemporal audit trail.
#
# The sequence (self-contained, from an empty table):
#   step 1 insert      : open the current rectangle, value 100,
#                        business [2024-01-01, infinity), processing [2024-01-01, infinity)  (1 statement)
#   step 2 updateUntil : set value 200 for business window [2024-03-01, 2024-09-01)
#                        at txInstant 2024-02-15 — inactivate the original
#                        (out_z = 2024-02-15) and chain head / middle / tail
#                        at processing [2024-02-15, infinity)                   (4 statements)
#
# Resulting state (4 rows): the inactivated original (out_z finite) + head (100) +
# middle (200) + tail (100), the three new rows current on processing. The close
# UPDATE is keyed by the current-on-processing predicate (pos_id AND
# out_z = infinity), never a blind in-place set.
model: models/position.yaml
tags: [m7, m3, bitemporal, temporal, write-sequence, update-until, rectangle-split]
writeSequence:
  - mutation: insert
    entity: Position
    statements: 1
    note: open the original current rectangle [business inf, processing inf)
  - mutation: updateUntil
    entity: Position
    statements: 4
    note: inactivate the original on the processing axis, then chain head / middle / tail
goldenSql:
  postgres:
    - insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
    - update position set out_z = ? where pos_id = ? and out_z = ?
    - insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
    - insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
    - insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
binds:
  - [1, A, 100.00, "2024-01-01T00:00:00+00:00", infinity, "2024-01-01T00:00:00+00:00", infinity]
  - ["2024-02-15T00:00:00+00:00", 1, infinity]
  - [1, A, 100.00, "2024-01-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", "2024-02-15T00:00:00+00:00", infinity]
  - [1, A, 200.00, "2024-03-01T00:00:00+00:00", "2024-09-01T00:00:00+00:00", "2024-02-15T00:00:00+00:00", infinity]
  - [1, A, 100.00, "2024-09-01T00:00:00+00:00", infinity, "2024-02-15T00:00:00+00:00", infinity]
roundTrips: 5
expectedTableState:
  position:
    # the inactivated original — closed on the processing axis (out_z finite)
    - pos_id: 1
      acct_num: A
      val: 100.00
      from_z: "2024-01-01T00:00:00+00:00"
      thru_z: infinity
      in_z: "2024-01-01T00:00:00+00:00"
      out_z: "2024-02-15T00:00:00+00:00"
    # head: old value 100 before the business window, current on processing
    - pos_id: 1
      acct_num: A
      val: 100.00
      from_z: "2024-01-01T00:00:00+00:00"
      thru_z: "2024-03-01T00:00:00+00:00"
      in_z: "2024-02-15T00:00:00+00:00"
      out_z: infinity
    # middle: NEW value 200 for the business window, current on processing
    - pos_id: 1
      acct_num: A
      val: 200.00
      from_z: "2024-03-01T00:00:00+00:00"
      thru_z: "2024-09-01T00:00:00+00:00"
      in_z: "2024-02-15T00:00:00+00:00"
      out_z: infinity
    # tail: old value 100 after the business window, current on processing
    - pos_id: 1
      acct_num: A
      val: 100.00
      from_z: "2024-09-01T00:00:00+00:00"
      thru_z: infinity
      in_z: "2024-02-15T00:00:00+00:00"
      out_z: infinity
