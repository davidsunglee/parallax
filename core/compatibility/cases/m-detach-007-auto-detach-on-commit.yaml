# Automatic detach at owning-scope end on COMMIT (m-detach): when the unit of work
# that owns a managed object commits, the object transitions to `detached` IN PLACE
# — a later mutation lands only in the object (no SQL, no error), never reaching the
# committed database.
#
# This is an api-conformance-lane case: its defining observable is an in-memory
# lifecycle STATE (`detached`), which the single-connection wire harness cannot
# grade, so the harness schema-validates it and each language's API Conformance
# Suite returns and verifies the `stateChecks` observation (m-conformance-adapter).
# Step 0 finds account 1 (Ada, 100.00) inside a unit of work — a `persisted`
# managed object. Step 1 commits the unit of work; the object user code still holds
# transitions to `detached` in place (m-detach.md: auto-detach at owning-scope end).
# Step 2 mutates the now-detached object (balance -> 500.00): the write lands ONLY
# in the object (roundTrips 0, no DML) and the object stays `detached` — the escaped
# object is usable across the transaction boundary without a live transaction.
model: models/account.yaml
lane: api-conformance
tags: [m-detach, m-unit-work, detached, lifecycle, scenario, slice-managed-1]
shape: scenario
when:
  scenario:
    - targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 1
      roundTrips: 1
      expectState: persisted
      note: find account 1 in a unit of work — a persisted, interned managed object
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
          binds: [1]
      expectRows:
        - { id: 1, owner: Ada, balance: 100.00, version: 1 }
    - action: commit
      "on": 0
      roundTrips: 0
      expectState: detached
      note: committing the owning unit of work auto-detaches the managed object IN PLACE
    - action: mutate
      "on": 0
      set:
        balance: 500.00
      roundTrips: 0
      expectState: detached
      note: mutating the detached object lands ONLY in the object — no DML, still detached
      expectRows:
        - { id: 1, owner: Ada, balance: 500.00, version: 1 }
then:
  roundTrips: 1
