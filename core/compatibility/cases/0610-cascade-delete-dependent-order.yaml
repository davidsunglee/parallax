# Minimal dependent cascade-delete witness. Broader Reladomo bulk/cascade APIs
# remain deferred; this case pins only the observable delete ordering for an
# owned Order aggregate.
#
# Fixtures are loaded first. Deleting Order 1 removes dependent statuses, then
# dependent items, then the root order. Rows for other orders remain untouched.
model: models/orders.yaml
tags: [m5, m8, m3, cascade, cascade-delete, write-sequence]
loadFixtures: true
writeSequence:
  - mutation: cascadeDelete
    entity: Order
    statements: 3
    note: delete dependent statuses, dependent items, then the root order
    rows:
      # pk only: the root Order `id` the cascade keys on (dependent deletes bind
      # the same value as `order_id`).
      - { id: 1 }
goldenSql:
  postgres:
    - delete from order_status where order_id = ?
    - delete from order_item where order_id = ?
    - delete from orders where id = ?
binds:
  - [1]
  - [1]
  - [1]
roundTrips: 3
expectedTableState:
