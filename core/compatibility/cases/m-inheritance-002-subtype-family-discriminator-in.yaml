# Table-per-hierarchy multi-subtype read: Payments that are card OR cash (m-inheritance, m-sql).
#
# A read across a family of concrete subtypes injects a tag `in (…)` predicate
# (`t0.kind in (?, ?)`, binds ['card','cash']). It matches the two card rows and the
# cash row (1, 2, 3). targetEntity is the abstract root `Payment` (provisional here:
# the true `narrow` spelling that constrains an abstract-root read to a subtype set
# lands in Phase 4). The projection is the root superset available to a Phase-3
# minimal-green abstract read (id, amount); the raw tag column and familyVariant
# materialization arrive with the full abstract-read rewrite in Phase 4.
#
# Non-trivial (tag) case => referenceSql is the independent oracle.
model: models/payment.yaml
tags: [m-inheritance, m-sql, table-per-hierarchy, tag, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Payment
  operation:
    all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.amount from payment t0 where t0.kind in (?, ?)
      binds: [card, cash]
  referenceSql: select id, amount from payment where kind in ('card', 'cash')
  rows:
    - { id: 1, amount: 100.00 }
    - { id: 2, amount: 50.00 }
    - { id: 3, amount: 20.00 }
  roundTrips: 1
