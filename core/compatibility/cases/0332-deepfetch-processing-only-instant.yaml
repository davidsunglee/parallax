# Deep fetch Invoice.lines as of processing INSTANT 2024-02-01. Single-axis range
# propagation: the child carries `in_z <= ? and out_z > ?` (binds T, T). At that
# instant line 1000 is the SUPERSEDED 50 (L-R1), line 1001 -> 25 — distinct from
# 0331, proving the propagated instant selects the milestone whose interval
# contains it.
model: models/invoice.yaml
tags: [m4, m7, temporal, relationship, deepFetch, propagation, audit-only]
operation:
  deepFetch:
    operand:
      asOf:
        operand: { all: {} }
        asOfAttr: Invoice.processingDate
        date: "2024-02-01T00:00:00+00:00"
    paths:
      - [Invoice.lines]
goldenSql:
  postgres:
    - select t0.id, t0.name from invoice t0 where t0.in_z <= ? and t0.out_z > ?
    - select t0.id, t0.invoice_id, t0.amount from invoice_line t0 where t0.invoice_id in (?) and t0.in_z <= ? and t0.out_z > ?
  mariadb:
    - select t0.id, t0.name from invoice t0 where t0.in_z <= ? and t0.out_z > ?
    - select t0.id, t0.invoice_id, t0.amount from invoice_line t0 where t0.invoice_id in (?) and t0.in_z <= ? and t0.out_z > ?
binds:
  - ["2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
  - [100, "2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
roundTrips: 2
expectedGraph:
  Invoice:
    - id: 100
      name: INV-100
      lines:
        - { id: 1000, invoice_id: 100, amount: 50.00 }
        - { id: 1001, invoice_id: 100, amount: 25.00 }
