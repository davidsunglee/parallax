# valueObject to-many: two ANDed flat predicates match across DIFFERENT elements
# (m-value-object to-many, m-op-algebra any-element), on Postgres AND MariaDB.
#
# The unscoped `and(nestedEq(phones.type, 'home'), nestedEq(phones.number,
# '555-9999'))` evaluates each flat predicate INDEPENDENTLY as any-element, so a
# row matches when some element has type = home and some — possibly DIFFERENT —
# element has number = 555-9999. Ada matches on different elements (home in element
# 0, 555-9999 in element 1); Linus matches on one element that has both. This is
# the paired contrast to m-value-object-019 (scoped, same-element), which excludes
# Ada. It lowers to two INDEPENDENT existence checks — Postgres two `exists`
# subqueries (aliases t1, t2), MariaDB two `json_contains` conjuncts.
model: models/customer.yaml
tags: [m-value-object, m-op-algebra, m-sql, m-dialect, nested, json, to-many, any-element, array-traversal]
shape: read
when:
  operation:
    and:
      operands:
        - nestedEq: { path: Customer.address.phones.type, value: home }
        - nestedEq: { path: Customer.address.phones.number, value: '555-9999' }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where exists (select 1 from jsonb_array_elements(jsonb_extract_path(t0.address, ?)) t1 where jsonb_extract_path_text(t1.value, ?) = ?) and exists (select 1 from jsonb_array_elements(jsonb_extract_path(t0.address, ?)) t2 where jsonb_extract_path_text(t2.value, ?) = ?)
        mariadb: select t0.id, t0.name from customer t0 where json_contains(t0.address, ?, ?) and json_contains(t0.address, ?, ?)
      binds:
        postgres: [phones, type, home, phones, number, '555-9999']
        mariadb: ['{"type":"home"}', '$.phones', '{"number":"555-9999"}', '$.phones']
  referenceSql:
    postgres: select id, name from customer where address -> 'phones' @> '[{"type":"home"}]' and address -> 'phones' @> '[{"number":"555-9999"}]'
    mariadb: select id, name from customer where exists (select 1 from json_table(address, '$.phones[*]' columns (type varchar(64) path '$.type')) jt where jt.type = 'home') and exists (select 1 from json_table(address, '$.phones[*]' columns (number varchar(64) path '$.number')) jt2 where jt2.number = '555-9999')
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
  roundTrips: 1
