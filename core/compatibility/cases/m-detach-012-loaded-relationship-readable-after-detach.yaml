# An already-LOADED relationship stays readable after detach (m-detach): a
# relationship loaded while the object was managed remains readable once the object
# detaches at its owning scope's end — with NO SQL, because only already-loaded
# state is readable on a detached object.
#
# This is an api-conformance-lane case: its defining observable is that the
# post-detach access is a cache hit (roundTrips 0) returning the SAME already-loaded
# objects and that the object is `detached` — an in-memory lifecycle observable the
# single-connection wire harness cannot grade. It is the readable counterpart of
# m-detach-013 (a NOT-yet-loaded relationship load on a detached object errors).
#
# Step 0 finds order 1 (persisted). Step 1 loads its `items` WHILE managed (order 1
# has line items 12 and 11). Step 2 commits the owning unit of work — the object
# auto-detaches in place (`expectState: detached`). Step 3 accesses the items again
# AFTER detach: it emits NO SQL (roundTrips 0) and returns the SAME already-loaded
# line items (`sameObjectAs: 1`) — the loaded state survives the detach.
model: models/orders.yaml
lane: api-conformance
tags: [m-detach, m-deep-fetch, detached, relationship, scenario, slice-managed-1]
shape: scenario
when:
  scenario:
    - targetEntity: Order
      find:
        eq:
          attr: Order.id
          value: 1
      roundTrips: 1
      expectState: persisted
      note: find order 1 — a persisted managed object
      statements:
        - sql:
            postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id = ?
          binds: [1]
      expectRows:
        - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - action: load
      "on": 0
      path: items
      roundTrips: 1
      note: load order 1's line items WHILE the object is managed (id desc)
      statements:
        - sql:
            postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?) order by t0.id desc
          binds: [1]
      expectRows:
        - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
        - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
    - action: commit
      "on": 0
      roundTrips: 0
      expectState: detached
      note: committing the owning unit of work auto-detaches order 1 in place
    - action: access
      "on": 0
      path: items
      roundTrips: 0
      sameObjectAs: 1
      note: the already-loaded items are still readable after detach — NO SQL, the SAME objects as step 1
      expectRows:
        - { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
        - { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
then:
  roundTrips: 2
