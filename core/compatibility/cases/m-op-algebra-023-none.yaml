# none — the absorbing element of the algebra: matches nothing. It lowers to a
# query whose WHERE is unsatisfiable (`1 = 0`), returning zero rows. Defined as
# the dual of `all`; here it gets its dedicated fixture alongside the boolean
# combinators.
model: models/orders.yaml
tags: [m-op-algebra, none, boolean, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  operation:
    none: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where 1 = 0
  referenceSql: select id, name from orders where false
  rows: []
  roundTrips: 1
