# none — the absorbing element of the algebra: matches nothing. It lowers to a
# query whose WHERE is unsatisfiable (`1 = 0`), returning zero rows. Defined as
# the dual of `all`; here it gets its dedicated fixture alongside the boolean
# combinators.
model: models/orders.yaml
tags: [m-op-algebra, none, boolean, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    none: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where 1 = 0
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where false
  rows: []
  roundTrips: 1
