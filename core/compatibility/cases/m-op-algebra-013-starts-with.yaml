# startsWith — affix match. `value` is a LITERAL prefix; the implementation
# appends a trailing `%` wildcard and escapes any wildcard chars in the literal.
# `A-` has no wildcard chars, so the pattern is simply `A-%`.
model: models/orders.yaml
tags: [m-op-algebra, startsWith, string, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    startsWith:
      attr: Order.sku
      value: A-
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.sku like ?
      binds: ["A-%"]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where sku like 'A-%'
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
