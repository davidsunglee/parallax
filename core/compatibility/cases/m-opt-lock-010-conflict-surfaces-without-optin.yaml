# Boundary case (m-opt-lock): an optimistic-lock conflict SURFACES to the caller when the
# unit of work does NOT opt into conflict retry — `api-conformance` lane.
#
# The default retry posture (ADR 0031 / TS ADR 0065): transient database failures
# auto-retry, but an optimistic-lock conflict is NOT automatically retried unless
# the unit of work sets `retryOptimisticConflicts`. With the flag UNSET, an
# injected conflict surfaces after ONE attempt as the `optimistic-lock-conflict`
# error kind (TypeScript: `ParallaxOptimisticLockError`) — the caller inspects the
# winning change and decides, exactly as `m-opt-lock-007`'s caller-driven narrative does.
#
# `lane: api-conformance`: it needs an injected conflict a single-connection
# harness cannot provoke; the language's API Conformance Suite drives it through
# a fault-injecting decorator wrapped around the shipped adapter.
model: models/account.yaml
tags: [m-opt-lock, m-auto-retry, m-api-conformance, conflict, slice-mvp-1]
lane: api-conformance
uow:
  concurrency: optimistic
  retryOptimisticConflicts: false
inject: optimistic-lock-conflict
boundary:
  - action: read
    note: observe the versioned row (records the observed version)
  - action: update
    note: the gated UPDATE conflicts once — with the opt-in unset it is NOT retried
expect: optimistic-lock-conflict
