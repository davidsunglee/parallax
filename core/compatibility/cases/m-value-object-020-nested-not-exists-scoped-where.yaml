# valueObject to-many: nestedNotExists + `where` means NO element satisfies the
# compound (m-value-object to-many, m-op-algebra same-element negation, m-dialect
# array-traversal form), on Postgres AND MariaDB.
#
# nestedNotExists(Customer.address.phones, where: type = 'home' AND number =
# '555-9999') is the exact complement of the scoped exists (m-value-object-019):
# every row where NO single element carries both fields. Linus (his one element has
# both) is the only exclusion; everyone else matches — Ada (fields in different
# elements), Nils (neither field), the empty array (3), the NULL column (4) and the
# missing-`phones` rows (5, 6) all vacuously have no satisfying element. Postgres
# negates the same-element `exists`; MariaDB negates the `json_contains`, wrapped in
# `coalesce(..., 0)` so a NULL/empty/missing array still counts as "no element".
model: models/customer.yaml
tags: [m-value-object, m-op-algebra, m-sql, m-dialect, nested, json, to-many, exists, scoped, same-element, array-traversal]
shape: read
when:
  operation:
    nestedNotExists:
      path: Customer.address.phones
      where:
        and:
          operands:
            - nestedEq: { path: type, value: home }
            - nestedEq: { path: number, value: '555-9999' }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where not exists (select 1 from jsonb_array_elements(jsonb_extract_path(t0.address, ?)) t1 where jsonb_extract_path_text(t1.value, ?) = ? and jsonb_extract_path_text(t1.value, ?) = ?)
        mariadb: select t0.id, t0.name from customer t0 where not coalesce(json_contains(t0.address, ?, ?), ?)
      binds:
        postgres: [phones, type, home, number, '555-9999']
        mariadb: ['{"type":"home", "number":"555-9999"}', '$.phones', 0]
  referenceSql:
    postgres: select id, name from customer where coalesce(address -> 'phones' @> '[{"type":"home", "number":"555-9999"}]', false) = false
    mariadb: select id, name from customer where not exists (select 1 from json_table(address, '$.phones[*]' columns (type varchar(64) path '$.type', number varchar(64) path '$.number')) jt where jt.type = 'home' and jt.number = '555-9999')
  rows:
    - { id: 1, name: Ada }
    - { id: 3, name: Grace }
    - { id: 4, name: Mary }
    - { id: 5, name: Kavi }
    - { id: 6, name: Rin }
    - { id: 7, name: Nils }
  roundTrips: 1
