# notExists across TWO hops (m-navigate negated semi-join, multi-hop).
#
# m-navigate-006 is a single-hop notExists; m-navigate-008 is a multi-hop EXISTS. This pins the
# negated multi-hop: orders that have NO item carrying any status. The inner
# `exists(OrderItem.statuses)` is nested under a `notExists(Order.items -> ...)`,
# so it keeps orders whose every item is status-less (or which have no items at
# all). Order 1 (items 11/12 have statuses) and order 42 (item 421 has a status)
# are dropped; order 2 (item 21 has none) and the item-less orders 3/4/5 survive.
model: models/orders.yaml
tags: [m-navigate, notExists, relationship, multi-hop, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    notExists:
      rel: Order.items
      op:
        exists:
          rel: OrderItem.statuses
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where not exists (select 1 from order_item t1 where t1.order_id = t0.id and exists (select 1 from order_status t2 where t2.order_item_id = t1.id))
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id not in (select order_id from order_item where id in (select order_item_id from order_status))
  rows:
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
  roundTrips: 1
