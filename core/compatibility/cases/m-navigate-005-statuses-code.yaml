# navigate(Order.statuses -> OrderStatus.code = 'SHIPPED'): filter orders by a
# related status event. `Order.statuses` joins on Order.id = OrderStatus.orderId,
# matching every status row for the order (order-level and item-level). Only
# order 2 has a SHIPPED status (row 102), so the result is {2}.
model: models/orders.yaml
tags: [m-navigate, navigate, relationship, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    navigate:
      rel: Order.statuses
      op:
        eq: { attr: OrderStatus.code, value: SHIPPED }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where exists (select 1 from order_status t1 where t1.order_id = t0.id and t1.code = ?)
      binds: [SHIPPED]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id in (select order_id from order_status where code = 'SHIPPED')
  rows:
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
  roundTrips: 1
