# valueObject materialization: the whole nested composite arrives WITH the owner
# in ONE round trip (m-value-object "Materialization and navigation contract"),
# on Postgres AND MariaDB.
#
# Reading the owning Customer projects the single structured-document `address`
# column; the to-one `geo` (and its to-one `point`, three levels deep) and the
# to-many `phones` array all decode from that ONE column — no deep-fetch statement,
# no per-value-object fetch, one golden statement, `then.graph` fully materialized:
# the positive proof of getter navigation to arbitrary depth with no child round
# trip. The graph is the DECLARED projection: only declared members appear (the
# undeclared `zip` inside `geo` is dropped), every declared member is present, and
# absence collapses exactly as the read predicates do (m-op-algebra Q5) — a null /
# missing / JSON-null / non-object `one` member materializes as null, a null /
# missing / non-array `many` member as []. Per id: 4 a SQL-NULL address column
# (whole object null); 5 missing city + geo inner keys (geo all-null, point null,
# phones missing); 6 a non-object geo scalar; 7 explicit JSON-null point leaves
# beside a real one-element phones array; 8 phones an explicit JSON null; 9/10
# phones a non-array scalar / an object colliding with a real element's content —
# still []. Golden SQL is dialect-identical (a bare column projection; MariaDB
# returns the `json` column as text, Postgres the `jsonb` parsed — the same
# composite). Element order in a to-many member is UNSPECIFIED (m-value-object):
# `then.graph` arrays compare as multisets (multiplicity enforced, order not), so
# a reordered `phones` array still passes.
model: models/customer.yaml
tags: [m-value-object, m-sql, nested, json, materialization, graph, to-one, to-many, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Customer
  operation:
    all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.address from customer t0
        mariadb: select t0.id, t0.name, t0.address from customer t0
  referenceSql: select id, name from customer
  graph:
    Customer:
      - id: 1
        name: Ada
        address:
          street: 1 Park Ave
          city: Oslo
          geo:
            country: NO
            elevation: 10.5
            point: { lat: 59.9, lon: 10.7 }
          phones:
            - { type: home, number: '555-1234' }
            - { type: work, number: '555-9999' }
