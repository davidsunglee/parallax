# orderBy with MULTIPLE keys + mixed directions (m-op-algebra orderBy, m-sql clause order).
#
# m-op-algebra-026/m-op-algebra-027 order by a single key; this pins the composite, comma-separated
# `order by t0.active desc, t0.qty asc` render and the tie-break it encodes:
# active rows first (desc on a boolean ⇒ true before false), then ascending qty
# within each group. Capping at 2 rows makes the multi-key ordering OBSERVABLE
# through membership — the first two rows are the active orders with the lowest
# qty (ids 1 and 2), not any active order.
model: models/orders.yaml
tags: [m-op-algebra, orderBy, limit, directive, multi-key, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    limit:
      count: 2
      operand:
        orderBy:
          keys:
            - { attr: Order.active, direction: desc }
            - { attr: Order.qty, direction: asc }
          operand:
            all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 order by t0.active desc, t0.qty asc limit ?
      binds: [2]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders order by active desc, qty asc limit 2
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
  roundTrips: 1
