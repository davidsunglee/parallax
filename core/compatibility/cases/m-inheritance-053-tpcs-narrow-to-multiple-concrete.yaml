# Table-per-concrete-subtype narrow to MULTIPLE concrete subtypes across branches
# (m-inheritance, m-op-algebra, m-sql).
#
# targetEntity is the abstract root Document; the `narrow` node constrains it to the
# explicit concrete list [Invoice, Memo] — two concretes from DIFFERENT branches of
# the tree (Invoice under FinancialDocument, Memo directly under Document), skipping
# Receipt. The read `union all`s over exactly the invoice + memo tables in descriptor
# order. Invoice and Memo share only the root chain (id, title), so the stable
# superset is id, title, currency, amount_due, body + `familyVariant`: this is the
# focused `NULL`-placeholder witness — Invoice NULLs `body`, and Memo NULLs both
# `currency` (FinancialDocument's, which Memo does not inherit) and `amount_due`, each
# with a dialect cast.
model: models/document.yaml
tags: [m-inheritance, m-op-algebra, m-sql, table-per-concrete-subtype, union-all, narrow, familyVariant, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Document
  operation:
    narrow:
      entity: Document
      to: [Invoice, Memo]
      operand:
        all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.title, t0.currency, t0.amount_due, cast(null as varchar(64)) body, 'Invoice' family_variant from invoice t0 union all select t0.id, t0.title, cast(null as varchar(3)) currency, cast(null as decimal(18, 2)) amount_due, t0.body, 'Memo' family_variant from memo t0
        mariadb: select t0.id, t0.title, t0.currency, t0.amount_due, cast(null as char(64)) body, 'Invoice' family_variant from invoice t0 union all select t0.id, t0.title, cast(null as char(3)) currency, cast(null as decimal(18, 2)) amount_due, t0.body, 'Memo' family_variant from memo t0
  rows:
    - { id: 1, title: Invoice-A, currency: USD, amount_due: 120.00, body: null, familyVariant: Invoice }
    - { id: 2, title: Invoice-B, currency: EUR, amount_due: 80.00, body: null, familyVariant: Invoice }
    - { id: 1, title: Memo-A, currency: null, amount_due: null, body: Reminder, familyVariant: Memo }
  roundTrips: 1
