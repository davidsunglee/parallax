# Table-per-hierarchy abstract-root read whose predicate matches NO row (m-inheritance, m-sql).
#
# Targeting the abstract root Animal spans the whole `animal` table with NO tag
# predicate; the user predicate `name = 'Ghost'` matches no fixture row, so the read
# returns the EMPTY set. The projection is still the full concrete superset — inherited
# (id, name, owner_id), Pet's license_id, then each concrete subtype's own columns in
# ALPHABETICAL subtype order (Cat's indoor, Dog's bark_volume, WildBoar's tusk_length)
# — PLUS the raw tag column `kind`, exactly as a non-empty abstract read. `name` is an INHERITED
# attribute (declared on the abstract root), so it is in
# scope at the root position with no narrowing. This zero-row case is the corpus witness
# that the abstract-read projection-shape oracle is row-count-INDEPENDENT: the harness
# asserts the golden projects the full superset + tag from the SQL text, not a sample row.
model: models/animal.yaml
tags: [m-inheritance, m-sql, table-per-hierarchy, root, familyVariant, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Animal
  operation:
    eq: { attr: Animal.name, value: Ghost }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.owner_id, t0.license_id, t0.indoor, t0.bark_volume, t0.tusk_length, t0.kind from animal t0 where t0.name = ?
      binds: [Ghost]
  referenceSql: select id, name, owner_id, license_id, indoor, bark_volume, tusk_length, kind from animal where name = 'Ghost'
  rows: []
  roundTrips: 1
