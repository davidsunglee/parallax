# Deep fetch, to-one: every OrderItem with its single owning Order eager-fetched
# via the many-to-one `OrderItem.order` relationship.
#
# Two statements, so roundTrips = 2 (NOT one query per item):
#   level 0 (root)  : all order items
#   level 1 (order) : the orders whose id is in the DISTINCT order_id values of
#                     those items — {1, 2, 42}.
# The harness gathers the distinct parent keys from level 0, asserts they equal
# the authored level-1 binds, executes once, and fans each order back onto its
# items as a single `order` object (to-one).
#
# Non-trivial (deep fetch) ⇒ referenceSql REQUIRED: it is the naive single-
# statement oracle for the ROOT row set (all order items).
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, to-one, relationship, slice-mvp-1, slice-managed-1]
shape: read
when:
  targetEntity: OrderItem
  operation:
    deepFetch:
      operand:
        all: {}
      paths:
        - [{ rel: OrderItem.order }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.id in (?, ?, ?)
      binds: [1, 2, 42]
  referenceSql: select id, order_id, sku, quantity, shipped_on from order_item
  graph:
    OrderItem:
      - id: 11
        order_id: 1
        sku: A-100
        quantity: 2
        shipped_on: null
        order: { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
      - id: 12
        order_id: 1
        sku: B-200
        quantity: 1
        shipped_on: 2024-02-15
        order: { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
      - id: 21
        order_id: 2
        sku: A-300
        quantity: 4
        shipped_on: 2024-02-20
        order: { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
      - id: 421
        order_id: 42
        sku: A-999
        quantity: 3
        shipped_on: 2024-03-10
        order: { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
      - id: 422
        order_id: 42
        sku: B-200
        quantity: 5
        shipped_on: 2024-02-05
        order: { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 2
