# orderBy + limit — directives composed over `all`.
#
# Ordering by qty descending and capping at 2 rows makes the ordering OBSERVABLE
# through row membership (the top two by qty are ids 42 and 5), so the
# order-insensitive result comparison still proves the directive. `order by ...
# limit ?` is identical SQL on Postgres and MariaDB, so both dialects share one
# `then.statements` entry — the pagination-parity witness and the row-limit decision
# point of the m-dialect seam.
model: models/orders.yaml
tags: [m-op-algebra, orderBy, limit, directive, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    limit:
      count: 2
      operand:
        orderBy:
          keys:
            - { attr: Order.qty, direction: desc }
          operand:
            all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 order by t0.qty desc limit ?
        mariadb: select t0.id, t0.name from orders t0 order by t0.qty desc limit ?
      binds: [2]
  referenceSql: select id, name from orders order by qty desc limit 2
  rows:
    - { id: 5, name: Alan }
    - { id: 42, name: Grace }
  roundTrips: 1
