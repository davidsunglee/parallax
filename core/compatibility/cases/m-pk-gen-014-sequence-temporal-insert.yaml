# PK generation `sequence` composed with a TEMPORAL (audit-only) insert (m-pk-gen +
# m-audit-write) — net-new: no existing case puts pk generation on a temporal entity.
#
# The insert reserves a block from the registry (entry_seq: next_val 1 -> 2, base 1)
# then opens an AuditEntry milestone carrying the reserved id 1 at the transaction
# instant ([in_z = txInstant, out_z = infinity)). The two disciplines compose: the
# reserved id is a plain domain value on the milestone (its allocation re-derived by
# the sequence oracle, case_runner._assert_pk_allocation), and the in_z/out_z
# bookkeeping is the ordinary audit-write milestone open. Postgres-only golden: the
# MariaDB infinity-sentinel round-trip is already witnessed by the bitemporal and
# audit-write cases, so this case (the pk-gen x temporal composition) proves the
# ordering on Postgres and leaves the sentinel witness to those.
model: models/pk-audit.yaml
tags: [m-pk-gen, m-audit-write, m-sql, sequence, write-sequence, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: writeSequence
given:
  fixtures: true
when:
  writeSequence:
    - mutation: update
      entity: AuditSeq
      statements: 1
      note: reserve a block of 1 (next_val += 1), base = 1
      rows:
        - { name: entry_seq, nextVal: { increment: 1 } }
    - mutation: insert
      entity: AuditEntry
      statements: 1
      note: open a milestone [txInstant, infinity) carrying the reserved id 1
      rows:
        - { id: 1, note: opened }
      at: "2024-05-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update audit_seq set next_val = next_val + ? where name = ?
      binds: [1, entry_seq]
    - sql:
        postgres: insert into audit_entry(id, note, in_z, out_z) values (?, ?, ?, ?)
      binds: [1, opened, "2024-05-01T00:00:00+00:00", infinity]
  tableState:
    audit_seq:
      - { name: entry_seq, next_val: 2 }
    audit_entry:
      - { id: 1, note: opened, in_z: "2024-05-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 2
