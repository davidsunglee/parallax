# valueObject structured-column read: project an inner field (m-value-object valueObject,
# m-sql), on Postgres AND MariaDB.
#
# Read a nested attribute of the `address` valueObject into the result set. The
# extraction is aliased `city` in the projection; the JSON key is the only bind
# (Postgres 'city', MariaDB '$.city'). Every customer is returned with its
# extracted city. This proves the structured-column READ form (projection), the
# complement of the structured-column FILTER cases.
#
# The absent-city rows read back as null: id 4 (null address column), id 5 (address
# present but the `city` key MISSING) and id 7 (city an explicit JSON `null`) all
# project null — three distinct not-present states, one extracted column. id 6
# (Berlin) projects its scalar. On MariaDB json_value maps the JSON-`null` leaf to
# SQL NULL, so id 7 projects null identically to Postgres. ids 8-10 (the non-array
# `phones` rows) carry no `city` key either, so they project null like id 5.
model: models/customer.yaml
tags: [m-value-object, m-sql, nested, json, projection, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  operation:
    all: {}
then:
  statements:
    - sql:
        postgres: select t0.id, jsonb_extract_path_text(t0.address, ?) city from customer t0
        mariadb: select t0.id, json_value(t0.address, ?) city from customer t0
      binds:
        postgres: [city]
        mariadb: ['$.city']
  referenceSql:
    postgres: select id, address ->> 'city' as city from customer
    mariadb: select id, nullif(json_unquote(json_extract(address, '$.city')), 'null') as city from customer
  rows:
    - { id: 1, city: Oslo }
    - { id: 2, city: Oslo }
    - { id: 3, city: Boston }
    - { id: 4, city: null }
    - { id: 5, city: null }
    - { id: 6, city: Berlin }
    - { id: 7, city: null }
    - { id: 8, city: null }
    - { id: 9, city: null }
    - { id: 10, city: null }
  roundTrips: 1
