# navigate(Order.items -> OrderItem.sku = 'A-100'): filter orders by traversing
# the to-many `items` relationship and constraining the related entity. A
# navigation filter lowers to a correlated EXISTS semi-join, so a to-many
# traversal never multiplies the order rows. Only order 1 has an item with sku
# A-100 (item 11), so the result is the single order {1}.
#
# Non-trivial (join) case ⇒ referenceSql is REQUIRED: the naive
# `id in (select order_id from order_item where sku = ...)` subquery is the
# independent oracle.
#
# Cross-dialect (Phase 10): the correlated EXISTS semi-join is identical SQL on
# Postgres and MariaDB, so this case proves the navigation/join contract across
# both dialects in the matrix.
model: models/orders.yaml
tags: [m-navigate, m-relationship, m-metamodel, m-model-formation, navigate, relationship, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    navigate:
      rel: Order.items
      op:
        eq: { attr: OrderItem.sku, value: A-100 }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where exists (select 1 from order_item t1 where t1.order_id = t0.id and t1.sku = ?)
        mariadb: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where exists (select 1 from order_item t1 where t1.order_id = t0.id and t1.sku = ?)
      binds: [A-100]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id in (select order_id from order_item where sku = 'A-100')
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
  roundTrips: 1
