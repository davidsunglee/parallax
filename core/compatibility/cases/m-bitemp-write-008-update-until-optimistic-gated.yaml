# Write sequence: updateUntil under an OPTIMISTIC gate, asserted END-TO-END — the
# full bitemporal RECTANGLE SPLIT (-001) whose inactivating close is GATED on the
# observed rectangle's Transaction-Time start (in_z) AND Valid-Time start (from_z), so the
# whole gated split (close + head/middle/tail) is witnessed, not just the single
# gated UPDATE that -004/-005 pin (m-bitemp-write + m-opt-lock).
#
# A bitemporal entity has no version column, so the observed Transaction-Time start (in_z)
# is the optimistic-lock version analogue; a bitemporal key adds the Valid-Time
# discriminator (from_z) so the close targets EXACTLY the observed rectangle. Here
# the sequence opens a single Latest rectangle at valid [2024-01-01, infinity),
# transaction [2024-01-01, infinity), then an `updateUntil` corrects the value to
# 200 for the bounded Valid-Time window [2024-03-01, 2024-09-01) at txInstant
# 2024-02-15. The close is gated on the observed rectangle's
# (from_z, in_z) = (2024-01-01, 2024-01-01) — NOTE the gate's from_z (2024-01-01,
# the observed row) is DISTINCT from the window boundary (2024-03-01). It then
# chains head / middle / tail as in -001.
#
# The optimistic gate rides the GOLDEN close directly (no `observedTxStart` token on the
# writeSequence step): the writeSequence steps are identical to -001's, self-
# describing the optimistic mode via `when.uow.concurrency` (descriptive only —
# the harness executes the authored golden SQL either way, `compatibility-case.
# schema.json`); only the close statement in `then.statements` carries the
# `and from_z = ? and in_z = ?` gate, whose two trailing binds are drawn from the
# currently-open row.
#
# The sequence (self-contained, from an empty table):
#   step 1 insert      : open the Latest rectangle, value 100,
#                        valid [2024-01-01, infinity), transaction [2024-01-01, infinity)  (1 statement)
#   step 2 updateUntil : set value 200 for Valid-Time window [2024-03-01, 2024-09-01)
#                        at txInstant 2024-02-15 — GATED-inactivate the observed
#                        rectangle (out_z = 2024-02-15 where from_z = 2024-01-01 and
#                        in_z = 2024-01-01) and chain head / middle / tail            (4 statements)
#
# Resulting state (4 rows): identical to m-bitemp-write-001 — the inactivated
# original (out_z finite) + head (100) + middle (200) + tail (100).
model: models/position.yaml
tags: [m-bitemp-write, m-opt-lock, m-sql, bitemporal, temporal, write-sequence, update-until, rectangle-split, slice-snapshot-1, slice-managed-1]
shape: writeSequence
when:
  uow:
    concurrency: optimistic
  writeSequence:
    - mutation: insert
      entity: Position
      statements: 1
      note: open the original Latest rectangle [valid inf, transaction inf)
      rows:
        - { id: 1, acctNum: A, value: 100.00 }
      validFrom: "2024-01-01T00:00:00+00:00"
      at: "2024-01-01T00:00:00+00:00"
    - mutation: updateUntil
      entity: Position
      statements: 4
      note: GATED-inactivate the observed rectangle on the Transaction-Time dimension, then chain head / middle / tail
      rows:
        - { id: 1, value: 200.00 }
      validFrom: "2024-03-01T00:00:00+00:00"
      at: "2024-02-15T00:00:00+00:00"
      until: "2024-09-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
        mariadb: insert into `position` (pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
      binds: [1, A, 100.00, "2024-01-01T00:00:00+00:00", infinity, "2024-01-01T00:00:00+00:00", infinity]
    - sql:
        postgres: update position set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
        mariadb: update `position` set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
      binds: ["2024-02-15T00:00:00+00:00", 1, infinity, "2024-01-01T00:00:00+00:00", "2024-01-01T00:00:00+00:00"]
    - sql:
        postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
        mariadb: insert into `position` (pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
      binds: [1, A, 100.00, "2024-01-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", "2024-02-15T00:00:00+00:00", infinity]
    - sql:
        postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
        mariadb: insert into `position` (pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
      binds: [1, A, 200.00, "2024-03-01T00:00:00+00:00", "2024-09-01T00:00:00+00:00", "2024-02-15T00:00:00+00:00", infinity]
    - sql:
        postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
        mariadb: insert into `position` (pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
      binds: [1, A, 100.00, "2024-09-01T00:00:00+00:00", infinity, "2024-02-15T00:00:00+00:00", infinity]
  tableState:
    position:
      - pos_id: 1
        acct_num: A
        val: 100.00
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: "2024-02-15T00:00:00+00:00"
      - pos_id: 1
        acct_num: A
        val: 100.00
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: "2024-03-01T00:00:00+00:00"
        in_z: "2024-02-15T00:00:00+00:00"
        out_z: infinity
      - pos_id: 1
        acct_num: A
        val: 200.00
        from_z: "2024-03-01T00:00:00+00:00"
        thru_z: "2024-09-01T00:00:00+00:00"
        in_z: "2024-02-15T00:00:00+00:00"
        out_z: infinity
      - pos_id: 1
        acct_num: A
        val: 100.00
        from_z: "2024-09-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-02-15T00:00:00+00:00"
        out_z: infinity
  roundTrips: 5
