# Read-lock matrix (m-read-lock / m-dialect): a projection/aggregation read inside a LOCKING unit
# of work proceeds UNLOCKED — the D2 reversal — `api-conformance` lane.
#
# The complement to `m-read-lock-002`: a `distinct`/projection read inside `px.transaction(
# body, { concurrency: "locking" })` takes NO lock and is NEVER rejected. Its
# result rows have no identifiable base row to lock (the database rejects a
# row-lock clause on a projection), and per ADR 0002 a projection returns plain
# unmanaged data that never enters the observed-version map or the write path — so
# there is nothing for a lock to protect. Omitting the lock is both necessary and
# safe (ADR 0012, delta 09 D2). The golden is the plain projection with NO
# `for share of t0` suffix.
#
# `lane: api-conformance`: the reversal (a projection proceeds unlocked instead of
# throwing) is a runtime property the language's API Conformance Suite proves; the
# m-case-format harness schema-validates the case.
model: models/account.yaml
tags: [m-read-lock, m-dialect, m-api-conformance, locking-mode, slice-snapshot-1, slice-managed-1]
lane: api-conformance
shape: read
when:
  targetEntity: Account
  uow:
    concurrency: locking
  operation:
    distinct:
      operand:
        all: {}
then:
  statements:
    - sql:
        postgres: select distinct t0.id, t0.owner, t0.balance, t0.version from account t0
  referenceSql: select distinct id, owner, balance, version from account
  rows:
    - { id: 1, owner: Ada, balance: 100.00, version: 1 }
    - { id: 2, owner: Linus, balance: 250.00, version: 1 }
    - { id: 3, owner: Grace, balance: 10.00, version: 1 }
  roundTrips: 1
