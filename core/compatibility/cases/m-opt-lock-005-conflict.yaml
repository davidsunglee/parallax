# Optimistic-lock conflict (m-opt-lock): a stale-version UPDATE affects ZERO rows.
#
# Account id 2 (Linus) is read at version 1. Before our UPDATE flushes, a
# CONCURRENT transaction commits a change to the same row, bumping its version to
# 2 — modeled here by the out-of-band `precondition` (a naive UPDATE the harness
# applies verbatim after loading the fixtures, simulating the other writer).
#
# Our golden UPDATE then gates on the version we read EARLIER (1):
#   update account set balance = ?, version = ? where id = ? and version = ?
# Because the row's version is now 2, the `... and version = ?` predicate (bind 1)
# matches NO row, so the UPDATE affects ZERO rows — the `updatedRows != 1`
# conflict signal (m-opt-lock). The harness asserts the affected-row count is 0; the
# conflict is detected against real data, not merely asserted.
#
# The resulting table state confirms our write did NOT apply: id 2 still carries
# the precondition's values (the concurrent writer's balance 999.00, version 2),
# never our stale-version balance.
model: models/account.yaml
tags: [m-opt-lock, m-sql, conflict, optimistic-lock-conflict, slice-mvp-1]
shape: conflict
given:
  apply:
    - sql: update account set balance = 999.00, version = 2 where id = 2
when:
  uow:
    concurrency: optimistic
  write: { id: 2, balance: 250.00, observedVersion: 1 }
then:
  statements:
    - sql:
        postgres: update account set balance = ?, version = ? where id = ? and version = ?
      binds: [250.00, 2, 2, 1]
  affectedRows: 0
  tableState:
    account:
      - { id: 1, owner: Ada, balance: 100.00, version: 1 }
      - { id: 2, owner: Linus, balance: 999.00, version: 2 }
      - { id: 3, owner: Grace, balance: 10.00, version: 1 }
