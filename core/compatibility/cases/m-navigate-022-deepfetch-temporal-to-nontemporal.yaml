# Mixed: deep fetch Lease.notes — a TEMPORAL parent (read as of processing
# LATEST) to a NON-temporal child. The root Lease carries its as-of, but the
# child LeaseNote is non-temporal, so it carries NO as-of term: a plain
# `lease_id in (?)` with binds = parent keys only. Lease 10 -> notes signed,
# renewed.
model: models/lease.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, propagation, mixed, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "deep-fetch child level - the Lease.notes IN-list binds are the distinct lease ids gathered from the root query result, so the child emissions depend on a query result"
when:
  targetEntity: Lease
  operation:
    deepFetch:
      operand:
        asOf:
          operand: { all: {} }
          dimension: transactionTime
          coordinate: latest
      paths:
        - [{ rel: Lease.notes }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.tenant_id, t0.term, t0.in_z, t0.out_z from lease t0 where t0.out_z = ?
      binds: [infinity]
    - sql:
        postgres: select t0.id, t0.lease_id, t0.note_text from lease_note t0 where t0.lease_id in (?)
      binds: [10]
  graph:
    Lease:
      - id: 10
        tenant_id: 1
        term: "24mo"
        in_z: "2024-04-01T00:00:00+00:00"
        out_z: infinity
        notes:
          - { id: 100, lease_id: 10, note_text: signed }
          - { id: 101, lease_id: 10, note_text: renewed }
  roundTrips: 2
