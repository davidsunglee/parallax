# Table-per-concrete-subtype INSERT: writing a concrete subtype targets its OWN table,
# with no tag, supplying the full ancestry chain (m-inheritance, m-sql).
#
# In a table-per-concrete-subtype family each concrete subtype maps to its own table,
# so inserting an Invoice is an ordinary single-table INSERT into `invoice` — no shared
# table and no tag column exist (contrast the table-per-hierarchy insert
# m-inheritance-007, which derives `kind`). The accepted payload fields are exactly the
# target's ancestry chain: the inherited root id + title (Document) and the inherited
# abstract-subtype `currency` (FinancialDocument), plus the subtype's own amount_due —
# all derived from the ancestry and written into the concrete `invoice` table. currency
# is REQUIRED on the FinancialDocument branch (see models/document.yaml), so the insert
# SUPPLIES it ('USD'). The inherited root FK folder_id is nullable and omitted here, so
# it reads back null. The abstract Document root owns no rows. Starts from an EMPTY
# schema and asserts the single inserted invoice row.
model: models/document.yaml
tags: [m-inheritance, m-sql, table-per-concrete-subtype, write-sequence, slice-snapshot-1, slice-managed-1]
shape: writeSequence
when:
  writeSequence:
    - mutation: insert
      entity: Invoice
      statements: 1
      note: insert an Invoice into its own concrete-subtype table; no tag column
      rows:
        - { id: 10, title: Invoice-C, currency: USD, amountDue: 300.00 }
then:
  statements:
    - sql:
        postgres: insert into invoice(id, title, currency, amount_due) values (?, ?, ?, ?)
      binds: [10, Invoice-C, USD, 300.00]
  tableState:
    invoice:
      - { id: 10, title: Invoice-C, folder_id: null, currency: USD, amount_due: 300.00 }
  roundTrips: 1
