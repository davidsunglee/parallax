# Versioned SET-BASED update materializes, locking mode (m-opt-lock materialize, ADR 0014).
#
# A set-based update targeting a VERSIONED entity has no set-based template — the
# gate binds a per-row observed version, so a single `where balance < ?` UPDATE
# cannot carry it. Instead the update MATERIALIZES: the runtime resolves the
# predicate to rows (a real read that records each row's observed version, and in
# locking mode takes the shared lock), then issues ONE keyed per-object UPDATE per
# resolved row. Round-trip accounting is 1 read + N updates.
#
# The scenario makes that cost observable, step by step:
#   step 0 find  : the materialize read — `balance < 200` matches accounts 1 (Ada,
#                  100.00) and 3 (Grace, 10.00), both at version 1 (account 2 at
#                  250.00 is excluded), 1 round trip, under the m-read-lock shared
#                  row lock (`for share of t0`).
#   step 1 write : set `balance = 0.00` on the matched rows — TWO per-object
#                  version-advancing UPDATEs (locking mode: NO `and version = ?`
#                  gate), one keyed on id 1, one on id 3, each advancing the
#                  version 1 -> 2, 2 round trips.
#   step 2 find  : the SAME `balance < 200` re-resolves (cache MISS after the write)
#                  and MUST observe both accounts at balance 0.00, version 2.
# Under the DEFAULT `locking` strategy EVERY in-transaction object find carries the
# shared-row-lock suffix (m-read-lock-002's rule) — the materialize read AND the
# step-2 verify read — so the per-object writes need no version check: the ungated
# version-advancing form (m-opt-lock-002 shape) per row. Optimistic mode
# (m-opt-lock-003) differs on BOTH sides: its reads take no lock and each per-object
# UPDATE adds the `and version = ?` gate.
# roundTrips = 4 (one materialize read + two per-object updates + one verify read).
model: models/account.yaml
tags: [m-opt-lock, m-sql, m-unit-work, locking-mode, materialize, set-based, scenario, slice-snapshot-1, slice-managed-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "predicate write materializes per-row from a resolving read - per-row binds (observed version / in_z / matched keys) depend on the query result"
when:
  uow:
    concurrency: locking
  scenario:
    - targetEntity: Account
      find:
        lessThan:
          attr: Account.balance
          value: 200.00
      roundTrips: 1
      note: the materialize read — resolve `balance < 200` to rows (ids 1 and 3, version 1)
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.balance < ? for share of t0
          binds: [200.00]
      referenceSql: select id, owner, balance, version from account where balance < 200.00 for share of account
      expectRows:
        - { id: 1, owner: Ada, balance: 100.00, version: 1 }
        - { id: 3, owner: Grace, balance: 10.00, version: 1 }
    - write:
        mutation: update
        target:
          entity: Account
          predicate:
            lessThan: { attr: Account.balance, value: 200.00 }
        assignments:
          - { attr: Account.balance, value: 0.00 }
      roundTrips: 2
      note: one per-object version-advancing UPDATE per materialized row (no gate, locking mode)
      statements:
        - sql:
            postgres: update account set balance = ?, version = ? where id = ?
          binds: [0.00, 2, 1]
        - sql:
            postgres: update account set balance = ?, version = ? where id = ?
          binds: [0.00, 2, 3]
    - targetEntity: Account
      find:
        lessThan:
          attr: Account.balance
          value: 200.00
      roundTrips: 1
      note: the SAME find re-resolves (cache MISS) and MUST observe both rows at balance 0.00, version 2
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.balance < ? for share of t0
          binds: [200.00]
      referenceSql: select id, owner, balance, version from account where balance < 200.00 for share of account
      expectRows:
        - { id: 1, owner: Ada, balance: 0.00, version: 2 }
        - { id: 3, owner: Grace, balance: 0.00, version: 2 }
then:
  roundTrips: 4
