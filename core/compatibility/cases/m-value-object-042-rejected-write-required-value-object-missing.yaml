# Negative (m-value-object write validation, resolved Q7): a write missing a required
# nested VALUE OBJECT is refused PRE-SQL.
#
# A required nested value object — not just a required attribute — must be present at
# write time. Contact's `address.geo` is a required (`nullable: false`) nested value
# object; this write supplies a valid `address` (street + city) but omits `geo`
# entirely (`phones` is a nullable to-many, legitimately absent), so model-aware write
# validation MUST reject it before any DML (m-value-object writes: "a required nested
# value object missing at any depth").
model: models/contact.yaml
tags: [m-value-object, rejected, negative, write, nested]
shape: rejected
when:
  write:
    id: 4
    name: Delta
    address:
      street: 3 Harbour Rd
      city: Oslo
then:
  rejectedRule: write-required-value-object-missing
