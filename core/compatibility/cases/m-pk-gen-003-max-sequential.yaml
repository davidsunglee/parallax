# PK generation `max` (m-pk-gen) — two consecutive allocations re-read the max.
#
# From empty: first allocation -> 1, second -> 2 (each insert re-reads max(id)).
model: models/pk-max.yaml
tags: [m-pk-gen, m-unit-work, max, write-sequence]
shape: writeSequence
when:
  writeSequence:
    - mutation: insert
      entity: Attendee
      statements: 1
      note: allocate id 1
      rows:
        - { id: { computed: maxPlusOne }, name: Ada }
    - mutation: insert
      entity: Attendee
      statements: 1
      note: allocate id 2 (re-reads the new max)
      rows:
        - { id: { computed: maxPlusOne }, name: Ben }
then:
  statements:
    - sql:
        postgres: insert into attendee(id, name) select coalesce(max(t0.id), ?) + ?, ? from attendee t0
        mariadb: insert into attendee(id, name) select coalesce(max(t0.id), ?) + ?, ? from attendee t0
      binds: [0, 1, Ada]
    - sql:
        postgres: insert into attendee(id, name) select coalesce(max(t0.id), ?) + ?, ? from attendee t0
        mariadb: insert into attendee(id, name) select coalesce(max(t0.id), ?) + ?, ? from attendee t0
      binds: [0, 1, Ben]
  tableState:
    attendee:
      - { id: 1, name: Ada }
      - { id: 2, name: Ben }
  roundTrips: 2
