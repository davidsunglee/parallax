# PK generation `max` (m-pk-gen) — allocate into an EMPTY table.
#
# The `max` strategy computes the next id as max(col)+1, expressed portably as an
# INSERT ... SELECT of coalesce(max(id), 0) + 1; from an empty table the first
# allocated id is 1. The strategy lives in the golden SQL, so the harness applies
# the DML and asserts the resulting row. There is no oracle — `max` is pinned by its
# self-describing statement plus `then.tableState` against the real database.
model: models/pk-max.yaml
tags: [m-pk-gen, m-unit-work, max, write-sequence, slice-snapshot-1, slice-managed-1]
shape: writeSequence
when:
  writeSequence:
    - mutation: insert
      entity: Attendee
      statements: 1
      note: allocate the first id via max(id)+1 over an empty table
      rows:
        - { id: { computed: maxPlusOne }, name: Ada }
then:
  statements:
    - sql:
        postgres: insert into attendee(id, name) select coalesce(max(t0.id), ?) + ?, ? from attendee t0
        mariadb: insert into attendee(id, name) select coalesce(max(t0.id), ?) + ?, ? from attendee t0
      binds: [0, 1, Ada]
  tableState:
    attendee:
      - { id: 1, name: Ada }
  roundTrips: 1
