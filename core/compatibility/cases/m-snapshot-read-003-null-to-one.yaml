# Snapshot graph, nullable to-one (m-snapshot-read): a materialized snapshot graph
# attaches an included nullable to-one as absent/null, in 1 + L statements.
#
# The snapshot twin of the m-deep-fetch nullable-to-one shape, now framed as a
# plain-value snapshot read rather than a managed deep fetch (so it carries no
# m-op-list tag). Every OrderStatus materializes with its optional OrderItem:
# order-level statuses (order_item_id NULL) attach `orderItem: null`; item-level
# statuses gather the distinct non-null item ids {11, 12, 421} and fetch those
# parents in ONE child statement. 1 (root) + 1 (orderItem) = 2 round trips.
model: models/orders.yaml
tags: [m-snapshot-read, m-deep-fetch, to-one, nullable, relationship, graph, materialization, slice-snapshot-1]
shape: read
when:
  targetEntity: OrderStatus
  operation:
    deepFetch:
      operand:
        all: {}
      paths:
        - [{ rel: OrderStatus.orderItem }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.order_id, t0.order_item_id, t0.code from order_status t0
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.id in (?, ?, ?)
      binds: [11, 12, 421]
  referenceSql: select id, order_id, order_item_id, code from order_status
  graph:
    OrderStatus:
      - { id: 101, order_id: 1, order_item_id: null, code: NEW, orderItem: null }
      - { id: 102, order_id: 2, order_item_id: null, code: SHIPPED, orderItem: null }
      - { id: 142, order_id: 42, order_item_id: null, code: NEW, orderItem: null }
      - id: 201
        order_id: 1
        order_item_id: 11
        code: PICKED
        orderItem: { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
      - id: 202
        order_id: 1
        order_item_id: 11
        code: PACKED
        orderItem: { id: 11, order_id: 1, sku: A-100, quantity: 2, shipped_on: null }
      - id: 203
        order_id: 1
        order_item_id: 12
        code: PICKED
        orderItem: { id: 12, order_id: 1, sku: B-200, quantity: 1, shipped_on: 2024-02-15 }
      - id: 204
        order_id: 42
        order_item_id: 421
        code: PICKED
        orderItem: { id: 421, order_id: 42, sku: A-999, quantity: 3, shipped_on: 2024-03-10 }
  roundTrips: 2
