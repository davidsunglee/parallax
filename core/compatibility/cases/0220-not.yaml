# not — logical negation wrapping a single inner operation.
model: models/orders.yaml
tags: [m2, not, boolean, first-implementation-mvp]
operation:
  not:
    operand:
      eq: { attr: Order.active, value: true }
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where not t0.active = ?
binds: [true]
referenceSql: select id, name from orders where not (active = true)
expectedRows:
  - { id: 3, name: ada }
  - { id: 5, name: Alan }
roundTrips: 1
