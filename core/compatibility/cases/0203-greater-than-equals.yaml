# greaterThanEquals — inclusive `>=` range predicate.
model: models/orders.yaml
tags: [m2, greaterThanEquals, slice-mvp-1]
operation:
  greaterThanEquals:
    attr: Order.qty
    value: 20
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where t0.qty >= ?
binds: [20]
referenceSql: select id, name from orders where qty >= 20
expectedRows:
  - { id: 4, name: Margaret }
  - { id: 5, name: Alan }
  - { id: 42, name: Grace }
roundTrips: 1
