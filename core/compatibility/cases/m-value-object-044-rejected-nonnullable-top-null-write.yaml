# Negative (m-value-object write validation, resolved Q7): a write omitting a
# required TOP-LEVEL value object is refused PRE-SQL.
#
# Every other value-object owner declares its top-level `address` as
# `nullable: true` (a null document is a legal write), so a write that omits a
# required top-level value object had no witness. Shipment's `destination`
# top-level value object is `nullable: false`; this write supplies `id` + `name`
# but omits `destination` entirely, so model-aware write validation MUST reject it
# before any DML with `write-required-value-object-missing` (the same rule
# m-value-object-042 pins for a required NESTED value object, here at the top level).
model: models/shipment.yaml
tags: [m-value-object, rejected, negative, write, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  write:
    id: 5
    name: Express
then:
  rejectedRule: write-required-value-object-missing
