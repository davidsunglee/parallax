# Merge-back RE-INSERTS a missing original (m-detach): merging back a detached copy
# whose original persisted row has since been DELETED looks the original up by
# primary key, does NOT find it, and inserts the copy as a new row —
# `copyDetachedValuesToOriginalOrInsertIfNew` => insert-if-new (m-detach.md
# merge-back table: `detached` + original NOT found => INSERT).
#
# This is the harness-lane, write-sequence sibling of m-detach-002 (detached-update:
# original found => UPDATE) and m-detach-001 (never-persisted => INSERT into an
# empty table). Here the original WAS persisted (account 1, Ada, 100.00): the
# model's fixtures load first (`given.fixtures`), then an out-of-band `given.apply`
# DELETEs account 1 — a concurrent transaction removed the original between
# detachment and merge-back — while the siblings (Linus, Grace) survive. The
# merge-back then finds no original for id 1 and INSERTs the detached copy's edited
# values (balance 175.00, version initialized to 1, the m-opt-lock insert baseline).
# The observable contract is `then.tableState`: account 1 is present again with the
# merged-back values, alongside the untouched siblings — verified against real data,
# not asserted in prose.
model: models/account.yaml
tags: [m-detach, m-sql, detached-insert, write-sequence, slice-managed-1]
shape: writeSequence
compileEligibility:
  mode: run-only
  reason: single-connection
  note: "single-connection concurrency/locking intent (given.apply)"
given:
  fixtures: true
  apply:
    - sql: delete from account where id = 1
when:
  writeSequence:
    - mutation: insert
      entity: Account
      statements: 1
      note: merge-back of a detached copy whose deleted original is NOT found re-inserts it
      rows:
        - { id: 1, owner: Ada, balance: 175.00 }
then:
  statements:
    - sql:
        postgres: insert into account(id, owner, balance, version) values (?, ?, ?, ?)
      binds: [1, Ada, 175.00, 1]
  tableState:
    account:
      - { id: 1, owner: Ada, balance: 175.00, version: 1 }
      - { id: 2, owner: Linus, balance: 250.00, version: 1 }
      - { id: 3, owner: Grace, balance: 10.00, version: 1 }
  roundTrips: 1
