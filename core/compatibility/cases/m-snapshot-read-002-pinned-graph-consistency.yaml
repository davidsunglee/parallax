# Pinned graph consistency (m-snapshot-read): a deep fetch pinned to a PAST instant
# materializes a point-consistent snapshot graph — every temporal node at the
# propagated pin, including now-superseded milestones.
#
# Invoice 100 is fetched as of processing 2024-02-01. The root pin lowers to the
# containment predicate and propagates per hop (m-navigate) into the child level, so
# InvoiceLine 1000 materializes as its SUPERSEDED 50.00 milestone (known
# [2024-01-01, 2024-04-01)) rather than the current 75.00 — the whole graph
# represents one instant, which is what makes its hard pointers safe. The graph is
# closed-world after this single 1 + L materialization: 1 (root) + 1 (lines) = 2
# round trips.
model: models/invoice.yaml
tags: [m-snapshot-read, m-deep-fetch, m-temporal-read, temporal, as-of, past, propagation, graph, audit-only, slice-snapshot-1]
shape: read
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "deep-fetch child level - the Invoice.lines IN-list binds are the distinct invoice ids gathered from the root query result, so the child emissions depend on a query result"
when:
  targetEntity: Invoice
  operation:
    deepFetch:
      operand:
        asOf:
          operand: { all: {} }
          dimension: transactionTime
          coordinate: "2024-02-01T00:00:00+00:00"
      paths:
        - [{ rel: Invoice.lines }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.in_z, t0.out_z from invoice t0 where t0.in_z <= ? and t0.out_z > ?
      binds: ["2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
    - sql:
        postgres: select t0.id, t0.invoice_id, t0.amount, t0.in_z, t0.out_z from invoice_line t0 where t0.invoice_id in (?) and t0.in_z <= ? and t0.out_z > ?
      binds: [100, "2024-02-01T00:00:00+00:00", "2024-02-01T00:00:00+00:00"]
  referenceSql: select id, name, in_z, out_z from invoice where in_z <= '2024-02-01T00:00:00+00:00'::timestamptz and out_z > '2024-02-01T00:00:00+00:00'::timestamptz
  graph:
    Invoice:
      - id: 100
        name: INV-100
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        lines:
          - { id: 1000, invoice_id: 100, amount: 50.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-04-01T00:00:00+00:00" }
          - { id: 1001, invoice_id: 100, amount: 25.00, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 2
