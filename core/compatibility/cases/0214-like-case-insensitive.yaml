# like (case-insensitive) — the `caseInsensitive` flag lowers both sides through
# `lower(...)`. The pattern `ada` matches both `Ada` (id 1) and `ada` (id 3);
# the case-sensitive form would match only id 3, so this fixture pins the
# case-folding contract.
model: models/orders.yaml
tags: [m2, like, string, caseInsensitive]
operation:
  like:
    attr: Order.name
    value: ada
    caseInsensitive: true
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where lower(t0.name) like lower(?)
binds: ["ada"]
referenceSql: select id, name from orders where lower(name) like lower('ada')
expectedRows:
  - { id: 1, name: Ada }
  - { id: 3, name: ada }
roundTrips: 1
