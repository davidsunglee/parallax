# Optimistic temporal close with a STALE observed in_z affects ZERO rows even though
# a CURRENT row exists — the lost update the in_z gate catches (m-temporal-read +
# m-opt-lock).
#
# This is why the current-row predicate (out_z = infinity) alone is not a gate.
# `given.apply` fully chains id 2: it closes the old current milestone at 2024-09-01
# and opens a new current row (value 999.00, in_z 2024-09-01), so a current row still
# exists but is a DIFFERENT milestone than the one we read. Our close bound to the
# stale observed in_z (2024-02-01) matches no current milestone and affects 0 rows;
# without the in_z gate it would silently re-close the concurrent writer's fresh row,
# an undetectable lost update (Reladomo's IN_Z rationale). `then.tableState` is the
# fixtures plus the two id-2 rows `given.apply` left behind.
model: models/balance.yaml
tags: [m-temporal-read, m-opt-lock, m-sql, temporal, conflict, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: conflict
given:
  apply:
    - sql: update balance set out_z = '2024-09-01T00:00:00+00:00' where bal_id = 2 and out_z = 'infinity'
    - sql: insert into balance(bal_id, acct_num, val, in_z, out_z) values (2, 'B', 999.00, '2024-09-01T00:00:00+00:00', 'infinity')
when:
  uow:
    concurrency: optimistic
  write: { id: 2 }
  at: "2024-10-01T00:00:00+00:00"
  observedInZ: "2024-02-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update balance set out_z = ? where bal_id = ? and out_z = ? and in_z = ?
      binds: ["2024-10-01T00:00:00+00:00", 2, infinity, "2024-02-01T00:00:00+00:00"]
  affectedRows: 0
  tableState:
    balance:
      - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-06-01T00:00:00+00:00" }
      - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
      - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: "2024-09-01T00:00:00+00:00" }
      - { bal_id: 2, acct_num: B, val: 999.00, in_z: "2024-09-01T00:00:00+00:00", out_z: infinity }
      - { bal_id: 3, acct_num: C, val: 50.00, in_z: "2024-03-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
