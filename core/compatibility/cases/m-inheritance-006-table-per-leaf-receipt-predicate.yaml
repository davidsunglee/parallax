# Table-per-leaf leaf query with a predicate (m-inheritance inheritance, m-sql).
#
# Query the Receipt leaf's own table for paidAmount >= 120. No discriminator is
# injected (the leaf is selected by its table); the user predicate is the only
# WHERE clause. The single authored receipt (paidAmount 120.00) qualifies.
model: models/document.yaml
tags: [m-inheritance, m-sql, table-per-leaf, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Receipt
  operation:
    greaterThanEquals: { attr: Receipt.paidAmount, value: 120.00 }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.title, t0.paid_amount from receipt t0 where t0.paid_amount >= ?
      binds: [120.00]
  referenceSql: select id, title, paid_amount from receipt where paid_amount >= 120.00
  rows:
    - { id: 1, title: Receipt-A, paid_amount: 120.00 }
  roundTrips: 1
