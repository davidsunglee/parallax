# Detached-update merge-back (m-detach): merging back a mutated detached copy
# UPDATES the original in place.
#
# A persisted Account (id 1, Ada, balance 100.00) is detached, its copy's balance
# edited to 175.00 with no transaction open and no SQL issued. At merge-back the
# original is looked up by primary key, found, and the changed attributes are copied
# onto the live object, driving the ordinary buffered-write machinery: a single
# UPDATE. `given.fixtures` loads the model's fixtures first so the original rows
# exist, then the merge-back UPDATE applies on top. The resulting `then.tableState`
# proves the contract — only Ada's row changed (balance 175.00, version advanced to
# 2) while Linus and Grace are untouched. The version advances in the same UPDATE
# (the m-opt-lock baseline: every successful write moves it forward), since the
# Account model carries the optimistic-locking version column.
model: models/account.yaml
tags: [m-detach, m-sql, detached-update, write-sequence, slice-managed-1]
shape: writeSequence
given:
  fixtures: true
when:
  writeSequence:
    - mutation: update
      entity: Account
      statements: 1
      note: merge-back of a mutated detached copy updates the original in place
      rows:
        - { id: 1, balance: 175.00, observedVersion: 1 }
then:
  statements:
    - sql:
        postgres: update account set balance = ?, version = ? where id = ?
      binds: [175.00, 2, 1]
  tableState:
    account:
      - { id: 1, owner: Ada, balance: 175.00, version: 2 }
      - { id: 2, owner: Linus, balance: 250.00, version: 1 }
      - { id: 3, owner: Grace, balance: 10.00, version: 1 }
  roundTrips: 1
