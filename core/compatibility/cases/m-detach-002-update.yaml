# Detached-update merge-back (m-detach): merging back a mutated detached copy UPDATES
# the original in place.
#
# A persisted Account (id 1, Ada, balance 100.00) is detached — a deep copy
# decoupled from the identity cache. The copy's balance is edited to 175.00 with
# NO transaction open and NO SQL issued (`isModifiedSinceDetachment` is now true).
# At merge-back the original is looked up by primary key, FOUND, and the changed
# attributes are copied onto the live object, driving the ordinary buffered-write
# machinery (m-unit-work): a single UPDATE of the original row.
#
# `loadFixtures: true` loads the model's fixtures FIRST (the original persisted
# rows exist), then the merge-back UPDATE is applied on top — the half of the
# write-sequence machinery the m-detach update case needs (the m-temporal-read / m-unit-work write-sequence
# cases instead build their own state from an empty schema). The resulting table
# state proves the contract: only Ada's row changed (balance 175.00, version
# advanced to 2); Linus and Grace are untouched.
#
# The version is advanced in the same UPDATE (the m-opt-lock baseline: every successful
# write moves the version forward) even though m-detach alone does not require it — the
# Account model carries the optimisticLocking version column from Phase 6.
model: models/account.yaml
tags: [m-detach, m-sql, detached-update, write-sequence]
loadFixtures: true
writeSequence:
  - mutation: update
    entity: Account
    statements: 1
    note: merge-back of a mutated detached copy updates the original in place
    rows:
      - { id: 1, balance: 175.00, observedVersion: 1 }
goldenSql:
  postgres:
    - update account set balance = ?, version = ? where id = ?
binds:
  - [175.00, 2, 1]
roundTrips: 1
expectedTableState:
  account:
    - id: 1
      owner: Ada
      balance: 175.00
      version: 2
    - id: 2
      owner: Linus
      balance: 250.00
      version: 1
    - id: 3
      owner: Grace
      balance: 10.00
      version: 1
