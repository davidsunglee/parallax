# Cascade delete leaves a NON-dependent relationship untouched (m-cascade-delete).
#
# m-cascade-delete-001 pins that a cascade deletes the dependent children before the
# root. This case pins the complementary boundary: a related entity reached over a
# NON-dependent relationship is NOT cascaded. Order.items and Order.statuses are
# `dependent: true`; Order.tags is NOT — so deleting Order 1 removes its statuses,
# then its items, then the order itself, but its order_tag rows survive (now orphaned,
# but provably untouched — the cascade walks only dependent edges).
#
# Fixtures are loaded first. Order 1 owns items 11/12, statuses 101/201/202/203, and
# tags 1/2/3. After the cascade, the tags for order 1 remain while its dependents are
# gone; other orders are untouched throughout.
model: models/orders.yaml
tags: [m-cascade-delete, m-unit-work, m-sql, write-sequence]
shape: writeSequence
given:
  fixtures: true
when:
  writeSequence:
    - mutation: cascadeDelete
      entity: Order
      statements: 3
      note: delete dependent statuses, dependent items, then the root order (tags are non-dependent)
      rows:
        - { id: 1 }
then:
  statements:
    - sql:
        postgres: delete from order_status where order_id = ?
      binds: [1]
    - sql:
        postgres: delete from order_item where order_id = ?
      binds: [1]
    - sql:
        postgres: delete from orders where id = ?
      binds: [1]
  tableState:
    orders:
      - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
      - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
      - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
      - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
      - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
    order_item:
      - { id: 21, order_id: 2, sku: A-300, quantity: 4, shipped_on: 2024-02-20 }
      - { id: 421, order_id: 42, sku: A-999, quantity: 3, shipped_on: 2024-03-10 }
      - { id: 422, order_id: 42, sku: B-200, quantity: 5, shipped_on: 2024-02-05 }
    order_status:
      - { id: 102, order_id: 2, order_item_id: null, code: SHIPPED }
      - { id: 142, order_id: 42, order_item_id: null, code: NEW }
      - { id: 204, order_id: 42, order_item_id: 421, code: PICKED }
    order_tag:
      - { id: 1, order_id: 1, label: urgent, priority: 2 }
      - { id: 2, order_id: 1, label: gift, priority: 2 }
      - { id: 3, order_id: 1, label: fragile, priority: 5 }
  roundTrips: 3
