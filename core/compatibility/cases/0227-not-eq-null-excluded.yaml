# notEq over a column containing NULLs — three-valued-logic exclusion (M2 §Null).
#
# `notEq` against a NULL column yields NULL (not true), so the NULL row is
# EXCLUDED, never returned. Order 4 has a NULL sku, so `sku <> 'B-200'` must drop
# both order 2 (the literal match) AND order 4 (the NULL). This is the negative
# 3VL companion to 0201 (notEq over non-null data) — the classic SQL footgun the
# spec mandates, proven against real data.
model: models/orders.yaml
tags: [m2, notEq, "null", three-valued-logic, first-implementation-mvp]
operation:
  notEq:
    attr: Order.sku
    value: B-200
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where t0.sku <> ?
binds: [B-200]
referenceSql: select id, name from orders where sku != 'B-200'
expectedRows:
  - { id: 1, name: Ada }
  - { id: 3, name: ada }
  - { id: 5, name: Alan }
  - { id: 42, name: Grace }
roundTrips: 1
