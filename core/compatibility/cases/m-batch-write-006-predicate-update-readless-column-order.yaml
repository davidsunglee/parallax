# Predicate-selected UPDATE over an UNVERSIONED, non-temporal entity is READLESS, and
# its SET clause follows DECLARED column order (m-batch-write, ADR 0014).
#
# As with the readless delete (m-batch-write-005), Wallet has no version to gate and no
# temporal chain, so the set update collapses to one predicate-shaped
# `update wallet set ... where balance < ?` with no materializing read. This case
# additionally pins SET-clause determinism: the assignments are authored balance-first
# then owner, but the golden SET emits `owner = ?, balance = ?` — the entity's DECLARED
# attribute order (id, owner, balance) — with binds [Updated, 150.00, 200.00] following
# that SET order, not the authored assignment order. Column order is a function of the
# model, so the emitted write is byte-identical across runs and implementations.
#
# The trailing find keys on the NEW owner value (owner = 'Updated') and expects the two
# rows the predicate touched (id 1 and 3, now Updated / 150.00), proving the update
# applied to exactly the matching set. Total roundTrips 2 = write (1) + verify read (1).
model: models/wallet.yaml
tags: [m-batch-write, m-sql, m-unit-work, predicate-write, readless, scenario, slice-snapshot-1]
shape: scenario
when:
  scenario:
    - write:
        mutation: update
        target:
          entity: Wallet
          predicate:
            lessThan: { attr: Wallet.balance, value: 200.00 }
        assignments:
          - { attr: Wallet.balance, value: 150.00 }
          - { attr: Wallet.owner, value: Updated }
      roundTrips: 1
      statements:
        - sql:
            postgres: update wallet set owner = ?, balance = ? where balance < ?
          binds: [Updated, 150.00, 200.00]
    - targetEntity: Wallet
      find:
        eq: { attr: Wallet.owner, value: Updated }
      roundTrips: 1
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance from wallet t0 where t0.owner = ?
          binds: [Updated]
      referenceSql: select id, owner, balance from wallet where owner = 'Updated'
      expectRows:
        - { id: 1, owner: Updated, balance: 150.00 }
        - { id: 3, owner: Updated, balance: 150.00 }
then:
  roundTrips: 2
