# Audit-only detached merge-back (m-detach + m-txtime-write): merging a mutated
# audit-only copy flushes the milestone close-and-chain, not an in-place UPDATE.
#
# When the detached entity is audit-only (Transaction-Time-Only), merge-back drives the
# same close-and-chain machinery as any audit-only update (m-txtime-write): it never
# mutates a value in place. A detached copy of the CURRENT Balance milestone for id 2
# (acct B, value 200.00) is edited to 250.00 with no transaction open. At merge-back
# the close UPDATE sets the current row's out_z to the transaction instant, then a new
# current milestone [2024-09-01, infinity) carrying 250.00 is chained — the prior value
# is preserved as the audit trail.
#
# Fixtures are loaded first (the persisted milestone history). Only id 2's current row
# is closed and a successor chained; ids 1 and 3 (including id 1's own superseded /
# current pair) are untouched, proving the close is keyed on (bal_id AND out_z =
# infinity), not a table-wide set.
model: models/balance.yaml
tags: [m-detach, m-txtime-write, m-sql, write-sequence, audit-only, slice-managed-1]
shape: writeSequence
given:
  fixtures: true
when:
  writeSequence:
    - mutation: update
      entity: Balance
      statements: 2
      note: merge-back of a mutated audit-only copy closes id 2's current row and chains the new value
      rows:
        - { id: 2, acctNum: B, value: 250.00 }
      at: "2024-09-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update balance set out_z = ? where bal_id = ? and out_z = ?
      binds: ["2024-09-01T00:00:00+00:00", 2, infinity]
    - sql:
        postgres: insert into balance(bal_id, acct_num, val, in_z, out_z) values (?, ?, ?, ?, ?)
      binds: [2, B, 250.00, "2024-09-01T00:00:00+00:00", infinity]
  tableState:
    balance:
      - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-06-01T00:00:00+00:00" }
      - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
      - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: "2024-09-01T00:00:00+00:00" }
      - { bal_id: 2, acct_num: B, val: 250.00, in_z: "2024-09-01T00:00:00+00:00", out_z: infinity }
      - { bal_id: 3, acct_num: C, val: 50.00, in_z: "2024-03-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
  roundTrips: 2
