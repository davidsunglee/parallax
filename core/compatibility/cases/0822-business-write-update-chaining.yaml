# Write sequence: business-temporal-only UPDATE via milestone chaining.
#
# A business-only update closes the open business row at the BUSINESS instant the
# change takes effect (thru_z = businessInstant) and chains a new row
# [businessInstant, infinity) with the new value. Unlike the bitemporal rectangle
# split, there is NO processing axis and so NO residual — it is the same
# close-and-chain shape as the audit-only profile (M7), driven by business date
# rather than transaction instant. The prior value survives as a superseded
# business milestone.
#
# The sequence (self-contained, from an empty table):
#   step 1 insert : open the original business milestone, guest Ada,
#                   business [2024-01-01, infinity)                      (1 statement)
#   step 2 update : the room is rebooked effective business 2024-03-01 —
#                   close Ada's row (thru_z = 2024-03-01) and chain a new
#                   current row [2024-03-01, infinity) for guest Bob      (2 statements)
#
# Resulting state (2 rows): the superseded Ada milestone (thru_z finite) and the
# current Bob milestone (thru_z = infinity). The close UPDATE is keyed by the
# current-business predicate (res_id AND thru_z = infinity).
model: models/reservation.yaml
tags: [m7, m3, business_temporal, temporal, write-sequence, update, business-only]
writeSequence:
  - mutation: insert
    entity: Reservation
    statements: 1
    note: open the original business milestone [2024-01-01, infinity)
  - mutation: update
    entity: Reservation
    statements: 2
    note: close the current business row, then chain a new milestone with the new guest
goldenSql:
  postgres:
    - insert into reservation(res_id, room, guest, from_z, thru_z) values (?, ?, ?, ?, ?)
    - update reservation set thru_z = ? where res_id = ? and thru_z = ?
    - insert into reservation(res_id, room, guest, from_z, thru_z) values (?, ?, ?, ?, ?)
binds:
  - [1, "101", Ada, "2024-01-01T00:00:00+00:00", infinity]
  - ["2024-03-01T00:00:00+00:00", 1, infinity]
  - [1, "101", Bob, "2024-03-01T00:00:00+00:00", infinity]
roundTrips: 3
expectedTableState:
  reservation:
    - res_id: 1
      room: "101"
      guest: Ada
      from_z: "2024-01-01T00:00:00+00:00"
      thru_z: "2024-03-01T00:00:00+00:00"
    - res_id: 1
      room: "101"
      guest: Bob
      from_z: "2024-03-01T00:00:00+00:00"
      thru_z: infinity
