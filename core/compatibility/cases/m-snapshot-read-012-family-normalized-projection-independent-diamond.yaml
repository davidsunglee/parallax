# Family-normalized, projection-independent diamond (m-snapshot-read): a root-typed
# and a leaf-typed include path reaching ONE inheritance row share a node; the
# differing fetched projections do not fork identity.
#
# Person 10 (Alice) owns Rex (Dog) and Whiskers (Cat) in the table-per-hierarchy
# `animal` family. The snapshot includes two paths that both reach Rex:
#   - `animals`      -> the abstract ROOT Animal (whole table, no tag): Rex + Whiskers,
#                       full concrete superset + tag column, familyVariant materialized.
#   - `pets[Dog]`    -> the concrete LEAF Dog (narrowed, `t0.kind = ?`): Rex only, the
#                       Dog superset, no familyVariant.
# Rex is reached by BOTH paths with DIFFERENT fetched projections (the root view
# carries indoor/tusk_length/familyVariant, the leaf view does not), yet it is ONE
# normalized node keyed by (family, primary key, coordinate) — projection-independent.
# The wire proves the shared row (same primary key in both views); reference identity
# is deferred to the API Conformance Suite, exactly like the plain diamond
# (m-snapshot-read-001). 1 (root) + 2 (one per view) = 3 round trips.
model: models/animal.yaml
tags: [m-snapshot-read, m-deep-fetch, m-inheritance, table-per-hierarchy, diamond, familyVariant, graph, slice-snapshot-1]
shape: read
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "deep-fetch child levels - the broad Person.animals and narrowed pets[Dog] IN-list binds are both the distinct owner ids gathered from the root query result, so the child emissions depend on a query result"
when:
  targetEntity: Person
  operation:
    deepFetch:
      operand:
        eq:
          attr: Person.id
          value: 10
      paths:
        - [{ rel: Person.animals }]
        - [{ rel: Person.pets, narrow: { to: [Dog] } }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from person t0 where t0.id = ?
      binds: [10]
    - sql:
        postgres: select t0.id, t0.name, t0.owner_id, t0.license_id, t0.indoor, t0.bark_volume, t0.tusk_length, t0.kind from animal t0 where t0.owner_id in (?)
      binds: [10]
    - sql:
        postgres: select t0.id, t0.name, t0.owner_id, t0.license_id, t0.bark_volume from animal t0 where t0.owner_id in (?) and t0.kind = ?
      binds: [10, dog]
  referenceSql: select id, name from person where id = 10
  graph:
    Person:
      - id: 10
        name: Alice
        animals:
          - { id: 1, name: Rex, owner_id: 10, license_id: L-100, bark_volume: 7, indoor: null, tusk_length: null, familyVariant: Dog }
          - { id: 3, name: Whiskers, owner_id: 10, license_id: L-200, bark_volume: null, indoor: true, tusk_length: null, familyVariant: Cat }
        "pets[Dog]":
          - { id: 1, name: Rex, owner_id: 10, license_id: L-100, bark_volume: 7 }
  roundTrips: 3
