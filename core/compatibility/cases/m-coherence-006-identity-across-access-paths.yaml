# Cross-process cache coherence — identity preserved across access paths (m-coherence).
# The cross-process lift of the m-process-cache identity scenario m-process-cache-002 (find-by-PK and
# find-by-owner denote the same logical object). Node B first surfaces the object
# via a NON-primary-key predicate (owner = 'Linus'), node A commits an update, and
# node B re-resolves via the primary key. `sameObjectAs: 0` asserts the two access
# paths denote the SAME object: identity is keyed by the primary key regardless of
# which predicate surfaced the row, AND it survives the cross-process write.
#
# `owner` resolves a single row in the fixture data (Ada/Linus/Grace are distinct),
# exactly as scenario m-process-cache-002 relies on, though the `account_owner` index is not
# declared unique.
#
# Steps:
#   0  read  on B : seed read by owner='Linus' — B observes/interns PK 2 at 250.00.
#   1  write on A : A commits balance = 888.00 for id 2 (a separate connection).
#   2  read  on B : B re-fetches by PK 2; observes 888.00 at the SAME identity the
#                   owner predicate surfaced (sameObjectAs 0).
model: models/account.yaml
tags: [m-coherence, identity, identity-preservation]
shape: coherence
when:
  coherence:
    - node: B
      kind: read
      find:
        eq:
          attr: Account.owner
          value: Linus
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.owner = ?
            mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.owner = ?
          binds: [Linus]
      note: seed read by owner — surfaces and interns PK 2 (Linus) at 250.00
      observeRows:
        - { id: 2, owner: Linus, balance: 250.00, version: 1 }
    - node: A
      kind: write
      statements:
        - sql:
            postgres: update account set balance = ?, version = ? where id = ?
            mariadb: update account set balance = ?, version = ? where id = ?
          binds: [888.00, 2, 2]
      note: node A commits an in-place update (version advances 1 -> 2) on a separate connection
    - node: B
      kind: read
      find:
        eq:
          attr: Account.id
          value: 2
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
            mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
          binds: [2]
      sameObjectAs: 0
      identityAttr: id
      note: re-fetch by PK 2 — SAME object the owner predicate surfaced, now 888.00 / version 2
      observeRows:
        - { id: 2, owner: Linus, balance: 888.00, version: 2 }
