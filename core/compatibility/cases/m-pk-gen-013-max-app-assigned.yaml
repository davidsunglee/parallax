# PK generation `max` (m-pk-gen) — max respects an application-assigned id.
#
# Seed an app-assigned high id (100), then allocate: max(id)+1 = 101. Proves `max`
# is computed from the actual maximum regardless of how prior ids were assigned.
model: models/pk-max.yaml
tags: [m-pk-gen, m-unit-work, max, write-sequence]
writeSequence:
  - mutation: insert
    entity: Attendee
    statements: 1
    note: application-assigned id 100
    rows:
      - { id: 100, name: Pat }
  - mutation: insert
    entity: Attendee
    statements: 1
    note: allocate max(id)+1 = 101
    rows:
      - { id: { computed: maxPlusOne }, name: Ada }
goldenSql:
  postgres:
    - insert into attendee(id, name) values (?, ?)
    - insert into attendee(id, name) select coalesce(max(t0.id), ?) + ?, ? from attendee t0
  mariadb:
    - insert into attendee(id, name) values (?, ?)
    - insert into attendee(id, name) select coalesce(max(t0.id), ?) + ?, ? from attendee t0
binds:
  - [100, Pat]
  - [0, 1, Ada]
roundTrips: 2
expectedTableState:
  attendee:
    - { id: 100, name: Pat }
    - { id: 101, name: Ada }
