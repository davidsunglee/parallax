# Deep fetch Policy.coverages, business LATEST / processing LATEST. The root pin
# propagates to the temporal child: both axes default to the equality form, so
# the child carries `thru_z = ? and out_z = ?` (binds infinity, infinity) after
# the IN list. Each coverage resolves to its fully-current milestone:
# coverage 10 -> 700 (C-R3), coverage 20 -> 300.
model: models/policy.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, propagation, bitemporal, slice-mvp-1]
operation:
  deepFetch:
    operand:
      asOf:
        operand:
          asOf:
            operand: { all: {} }
            asOfAttr: Policy.processingDate
            date: now
        asOfAttr: Policy.businessDate
        date: now
    paths:
      - [Policy.coverages]
goldenSql:
  postgres:
    - select t0.id, t0.name from policy t0 where t0.thru_z = ? and t0.out_z = ?
    - select t0.id, t0.policy_id, t0.amount from coverage t0 where t0.policy_id in (?, ?) and t0.thru_z = ? and t0.out_z = ?
binds:
  - [infinity, infinity]
  - [1, 2, infinity, infinity]
roundTrips: 2
expectedGraph:
  Policy:
    - id: 1
      name: Auto
      coverages:
        - { id: 10, policy_id: 1, amount: 700.00 }
    - id: 2
      name: Home
      coverages:
        - { id: 20, policy_id: 2, amount: 300.00 }
