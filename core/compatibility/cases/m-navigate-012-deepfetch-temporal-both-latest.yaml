# Deep fetch Policy.coverages, Valid Time LATEST / Transaction Time LATEST. The root pin
# propagates to the temporal child: both axes default to the equality form, so
# the child carries `thru_z = ? and out_z = ?` (binds infinity, infinity) after
# the IN list. Each coverage resolves to its fully-Latest milestone:
# coverage 10 -> 700 (C-R3), coverage 20 -> 300.
model: models/policy.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, propagation, bitemporal, slice-snapshot-1, slice-managed-1]
shape: read
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "deep-fetch child level - the Policy.coverages IN-list binds are the distinct policy ids gathered from the root query result, so the child emissions depend on a query result"
when:
  targetEntity: Policy
  operation:
    deepFetch:
      operand:
        asOf:
          operand:
            asOf:
              operand: { all: {} }
              dimension: transactionTime
              coordinate: latest
          dimension: validTime
          coordinate: latest
      paths:
        - [{ rel: Policy.coverages }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from policy t0 where t0.thru_z = ? and t0.out_z = ?
      binds: [infinity, infinity]
    - sql:
        postgres: select t0.id, t0.policy_id, t0.amount, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from coverage t0 where t0.policy_id in (?, ?) and t0.thru_z = ? and t0.out_z = ?
      binds: [1, 2, infinity, infinity]
  graph:
    Policy:
      - id: 1
        name: Auto
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        coverages:
          - { id: 10, policy_id: 1, amount: 700.00, from_z: "2024-06-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
      - id: 2
        name: Home
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        coverages:
          - { id: 20, policy_id: 2, amount: 300.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 2
