# notIn(values) — negated set membership. The m-sql canonical form renders the
# negation as `not t0.id in (...)` (the normalizer's fixed point); the naive
# referenceSql uses the familiar `not in` to cross-check.
model: models/orders.yaml
tags: [m-op-algebra, notIn, membership, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    notIn:
      attr: Order.id
      values: [1, 2, 42]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where not t0.id in (?, ?, ?)
      binds: [1, 2, 42]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where id not in (1, 2, 42)
  rows:
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
  roundTrips: 1
