# Explicit as-of a PAST instant: pin transactionTime to 2024-04-01. Because the
# pin is < infinity, the [from, to) containment predicate is injected
# (`in_z <= ? and out_z > ?`, because axes are half-open), NOT the current-row form.
# The pin instant appears as TWO binds (one per interval bound).
#
# As-of 2024-04-01 each account's then-known milestone is returned:
#   id 1: 100.00 ([2024-01-01, 2024-06-01) contains 2024-04-01)
#   id 2: 200.00 ([2024-02-01, infinity)   contains 2024-04-01)
#   id 3:  50.00 ([2024-03-01, 2024-08-01) contains 2024-04-01)
# The later id-1 (150.00) milestone is excluded — it was not yet known.
model: models/balance.yaml
tags: [m-temporal-read, m-sql, as-of, audit-only, past, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Balance
  operation:
    asOf:
      operand:
        all: {}
      dimension: transactionTime
      coordinate: "2024-04-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.in_z <= ? and t0.out_z > ?
      binds: ["2024-04-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
  referenceSql: select bal_id, acct_num, val, in_z, out_z from balance where in_z <= '2024-04-01T00:00:00+00:00'::timestamptz and out_z > '2024-04-01T00:00:00+00:00'::timestamptz
  rows:
    - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-06-01T00:00:00+00:00" }
    - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: infinity }
    - { bal_id: 3, acct_num: C, val: 50.00, in_z: "2024-03-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
  roundTrips: 1
