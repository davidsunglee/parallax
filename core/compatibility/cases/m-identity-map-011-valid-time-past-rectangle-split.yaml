# A finite Valid-Time-axis pinned view is WRITABLE (m-identity-map): mutating a view
# pinned at a finite Valid-Time-axis instant is the retroactive correction that lowers
# to the m-bitemp-write RECTANGLE SPLIT. (Contrast a finite Transaction-Time-axis pin,
# which is read-only — m-identity-map-010.)
#
# Step 0 establishes a fresh managed bitemporal object, Position id 2, as ONE clean
# Latest rectangle: value 100, valid [2024-01-01, infinity), transaction
# [2024-01-01, infinity). (The shared position fixture's id 1 already carries a
# multi-rectangle history, so this case constructs its own single-rectangle target
# on a distinct primary key rather than adding rows to the shared fixture.) Step 1
# pins id 2 at the finite Valid-Time instant 2024-03-01 (Transaction Time latest) — a
# WRITABLE Valid-Time-past view. Step 2 mutates its value to 200 in memory over the
# Valid-Time window [2024-03-01, 2024-09-01): roundTrips 0, no DML. Step 3 flushes,
# and the buffered correction lowers to the exact m-bitemp-write rectangle split —
# inactivate the original (close its Transaction-Time dimension at the transaction instant
# 2024-02-15, keyed by the Transaction-Time-current predicate) then chain HEAD
# [2024-01-01, 2024-03-01) value 100, MIDDLE [2024-03-01, 2024-09-01) value 200
# (new), and TAIL [2024-09-01, infinity) value 100. Step 4 re-reads inside the
# window and observes the corrected 200, so the value changed ONLY inside the
# window. The object-reference identity of the held, corrected view is asserted by
# the API Conformance Suite.
model: models/position.yaml
tags: [m-identity-map, m-bitemp-write, m-temporal-read, identity, bitemporal, temporal, rectangle-split, scenario, slice-managed-1]
shape: scenario
when:
  uow:
    concurrency: optimistic
  scenario:
    - write: insert
      roundTrips: 1
      note: establish a fresh managed Position id 2 as one clean Latest rectangle (value 100, both axes current)
      statements:
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [2, A, 100.00, "2024-01-01T00:00:00+00:00", infinity, "2024-01-01T00:00:00+00:00", infinity]
    - targetEntity: Position
      find:
        asOf:
          operand:
            asOf:
              operand:
                eq:
                  attr: Position.id
                  value: 2
              dimension: transactionTime
              coordinate: latest
          dimension: validTime
          coordinate: "2024-03-01T00:00:00+00:00"
      roundTrips: 1
      note: pin id 2 at the finite Valid-Time instant 2024-03-01 (Transaction Time latest) — a WRITABLE Valid-Time-past view (100)
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.pos_id = ? and t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
          binds: [2, "2024-03-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", infinity]
      expectRows:
        - { pos_id: 2, acct_num: A, val: 100.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
    - action: mutate
      "on": 1
      set:
        value: 200.00
      roundTrips: 0
      note: buffer the retroactive correction to 200 over the Valid-Time window [2024-03-01, 2024-09-01) — no DML yet
    - action: flush
      "on": 1
      roundTrips: 4
      note: the correction lowers to the m-bitemp-write rectangle split — inactivate the original, then chain head / middle / tail
      statements:
        - sql:
            postgres: update position set out_z = ? where pos_id = ? and out_z = ?
          binds: ["2024-02-15T00:00:00+00:00", 2, infinity]
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [2, A, 100.00, "2024-01-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", "2024-02-15T00:00:00+00:00", infinity]
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [2, A, 200.00, "2024-03-01T00:00:00+00:00", "2024-09-01T00:00:00+00:00", "2024-02-15T00:00:00+00:00", infinity]
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [2, A, 100.00, "2024-09-01T00:00:00+00:00", infinity, "2024-02-15T00:00:00+00:00", infinity]
    - targetEntity: Position
      find:
        asOf:
          operand:
            asOf:
              operand:
                eq:
                  attr: Position.id
                  value: 2
              dimension: transactionTime
              coordinate: latest
          dimension: validTime
          coordinate: "2024-04-01T00:00:00+00:00"
      roundTrips: 1
      note: re-read inside the corrected window (Valid Time 2024-04-01, Transaction Time latest) -> the MIDDLE's new value 200
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.pos_id = ? and t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
          binds: [2, "2024-04-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00", infinity]
      expectRows:
        - { pos_id: 2, acct_num: A, val: 200.00, from_z: "2024-03-01T00:00:00+00:00", thru_z: "2024-09-01T00:00:00+00:00", in_z: "2024-02-15T00:00:00+00:00", out_z: infinity }
then:
  roundTrips: 7
