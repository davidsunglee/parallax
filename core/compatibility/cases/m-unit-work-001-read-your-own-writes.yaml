# Read-your-own-writes scenario (m-unit-work): a dependent find observes a not-yet-read
# buffered write after the unit of work flushes.
#
# m-unit-work requires that a read which depends on a pending write observes that write —
# the unit of work flushes buffered writes before serving a dependent read. The
# scenario buffers an INSERT, then issues a find that depends on it:
#   step 0 write : COMMIT an INSERT of a brand-new account 7 (Newton, 5.00)
#   step 1 find  : query account 7 — it MUST observe the just-written row.
# The find is a cache MISS that costs one round trip (the forced flush precedes
# it). If the unit of work did not flush before the dependent read, the find would
# return nothing; asserting the written row proves read-your-own-writes against
# real committed data. The unit of work runs in the DEFAULT `locking` mode, so the
# in-transaction object find carries the m-read-lock shared-row-lock suffix
# (`for share of t0`). roundTrips = 2 (the committed insert + the dependent find).
model: models/account.yaml
tags: [m-unit-work, read-your-own-writes, flush, scenario, slice-snapshot-1, slice-managed-1]
shape: scenario
when:
  scenario:
    - write:
        - mutation: insert
          entity: Account
          rows:
            - { id: 7, owner: Newton, balance: 5.00, version: 1 }
      roundTrips: 1
      note: buffer + COMMIT an insert of a new account 7
      statements:
        - sql:
            postgres: insert into account(id, owner, balance, version) values (?, ?, ?, ?)
          binds: [7, Newton, 5.00, 1]
    - targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 7
      roundTrips: 1
      note: a dependent find MUST observe the flushed write (read-your-own-writes)
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
          binds: [7]
      expectRows:
        - { id: 7, owner: Newton, balance: 5.00, version: 1 }
then:
  roundTrips: 2
