# valueObject presence test: nestedIsNotNull over a shallow field (m-value-object,
# m-op-algebra absence collapse), on Postgres AND MariaDB.
#
# nestedIsNotNull(Customer.address.city) is the complement of nestedIsNull: it
# matches every row whose city extraction is present. Oslo (1, 2), Boston (3) and
# Berlin (6) qualify; the not-present cities — null column (4), missing key (5) and
# JSON `null` leaf (7) — are excluded. It normalizes to a leading `not` (mirroring
# the scalar `isNotNull`): Postgres `not jsonb_extract_path_text(t0.address, ?) is
# null`, MariaDB `not json_value(t0.address, ?) is null`.
model: models/customer.yaml
tags: [m-value-object, m-op-algebra, m-sql, nested, json, absence-collapse, slice-mvp-1]
shape: read
when:
  operation:
    nestedIsNotNull: { path: Customer.address.city }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where not jsonb_extract_path_text(t0.address, ?) is null
        mariadb: select t0.id, t0.name from customer t0 where not json_value(t0.address, ?) is null
      binds:
        postgres: [city]
        mariadb: ['$.city']
  referenceSql:
    postgres: select id, name from customer where address ->> 'city' is not null
    mariadb: select id, name from customer where nullif(json_unquote(json_extract(address, '$.city')), 'null') is not null
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
    - { id: 3, name: Grace }
    - { id: 6, name: Rin }
  roundTrips: 1
