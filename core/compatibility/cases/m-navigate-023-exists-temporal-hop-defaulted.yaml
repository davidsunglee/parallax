# Semi-join across a temporal hop with a DEFAULTED root as-of: Policies that HAVE
# a coverage with amount >= 600 — NEITHER the outer Policy NOR the read authors any
# `asOf` wrapper. This is the semi-join analog of the m-temporal-read-001-vs-m-temporal-read-002 defaulted/explicit
# equivalence: it MUST lower to the IDENTICAL golden SQL + rows as m-navigate-018 (which pins
# the explicit `asOf(..., now)` wrappers), because m-temporal-read's default-injection rule is
# per temporal entity read — an omitted axis is exactly `asOf(..., now)`. So the
# child Coverage semi-join carries the current-row predicate (`thru_z = ? and out_z
# = ?`) even though the root pinned nothing, and the outer Policy carries it too.
#
# m-navigate-018 could not catch a compiler that only injects the child as-of when the ROOT
# authored an explicit pin: dropping the child as-of here would admit policy 2's
# HISTORICAL coverage 21 (900) and wrongly return policy 2. As of latest only
# coverage 10 (700) clears 600, so only policy 1 qualifies. Proven by the independent
# referenceSql oracle (an `id in (select policy_id ...)` reformulation, as-of
# included) returning the same single row.
model: models/policy.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, exists, semi-join, propagation, bitemporal, default-injection, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Policy
  operation:
    exists:
      rel: Policy.coverages
      op:
        greaterThanEquals: { attr: Coverage.amount, value: 600.00 }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from policy t0 where exists (select 1 from coverage t1 where t1.policy_id = t0.id and t1.amount >= ? and t1.thru_z = ? and t1.out_z = ?) and t0.thru_z = ? and t0.out_z = ?
      binds: [600.00, infinity, infinity, infinity, infinity]
  referenceSql: select id, name, from_z, thru_z, in_z, out_z from policy where id in (select policy_id from coverage where amount >= 600.00 and thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz) and thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz
  rows:
    - { id: 1, name: Auto, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
