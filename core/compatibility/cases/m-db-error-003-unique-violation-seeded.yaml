# A single triggering INSERT that collides with an already-committed row. The
# first insert (id 7) commits in its own statement; a later, separate insert of
# id 7 in the SAME case collides -- the violation is against committed data, not
# an in-flight batch.
model: models/error-cases.yaml
tags: [m-db-error, uniqueViolation, slice-snapshot-1, slice-managed-1]
shape: error
then:
  statements:
    - sql:
        postgres: insert into widget(id, label) values (?, ?)
        mariadb: insert into widget(id, label) values (?, ?)
      binds: [7, "seed"]
    - sql:
        postgres: insert into widget(id, label) values (?, ?)
        mariadb: insert into widget(id, label) values (?, ?)
      binds: [7, "collide"]
  errorClass: uniqueViolation
  nativeCode:
    postgres: "23505"
    mariadb: 1062
