# Boundary case (M8): an injected TRANSIENT database failure is auto-retried
# IDENTICALLY when `retryOptimisticConflicts` is SET — the flag has no bearing on
# transients — `api-conformance` lane.
#
# The companion to `0712`: the same injected `serialization-failure`, now with
# `retryOptimisticConflicts: true`. The outcome is identical — the boundary
# auto-retries and the unit of work COMMITS — proving the flag governs OPTIMISTIC
# CONFLICTS only and never changes how transients are handled (they are always
# retriable). Together `0712`/`0713` pin "the flag has no bearing on transients"
# under both flag states.
#
# `lane: api-conformance`: injected transient; suite-driven via a fault-injecting
# decorator around the shipped adapter.
model: models/account.yaml
tags: [m-auto-retry, m-opt-lock, m-api-conformance, transient, slice-mvp-1]
lane: api-conformance
uow:
  concurrency: optimistic
  retryOptimisticConflicts: true
inject: serialization-failure
boundary:
  - action: read
    note: observe the versioned row
  - action: update
    note: the first write raises an injected serialization failure — auto-retried
expect: committed
