# Table-per-concrete-subtype TEMPORAL abstract-root read: `union all` with PER-BRANCH
# as-of binds (m-inheritance x m-temporal-read x m-sql — Phase 8 temporal composition).
#
# Targeting the abstract root Rate (bitemporal) resolves to every concrete descendant
# {DepositRate, LoanRate} (ALPHABETICAL branch order). With no shared table and no tag,
# the read lowers to `union all` over those concrete tables, and the injected as-of
# predicate is applied PER BRANCH: each branch carries its own `from_z <= ? and thru_z > ?
# and out_z = ?` fragment (validTime pinned past 2024-06-01, transactionTime defaulted
# NOW), in Valid-Time-first bind order. Because every concrete branch inherits the same
# axes from the root, each branch's as-of fragment is identical, so the union's binds are
# the per-branch suffix [2024-06-01, 2024-06-01, infinity] repeated in alphabetical branch
# order — the harness recomputes and asserts this per-branch propagation from the read's pin.
#
# Every branch projects the SAME stable superset — the inherited chain (id, amount + the
# four interval columns) then each subtype's own column (DepositRate's grade, LoanRate's
# spread, alphabetical) — then the per-branch familyVariant literal. A column not
# applicable to a branch is a NULL placeholder cast to its type; the bounded-string
# placeholder diverges per dialect (Postgres varchar / MariaDB char), the decimal is
# identical — hence the per-dialect goldens. The interval columns are inherited, so they
# are real references in EVERY branch (never NULL-cast).
#
# DepositRate now carries TWO Transaction-Time milestones sharing business key id=1 (the
# strengthened fixtures/rate.yaml, m-inheritance-100's own witness); this read's
# Transaction-Time Latest default (`out_z = ?` bind `infinity`) still resolves to exactly the
# CURRENT row (amount 2.50 / grade A) — the same current-result values this case always
# asserted — only its `in_z` moved to the milestone's own (later) from-instant.
model: models/rate.yaml
tags: [m-inheritance, m-temporal-read, m-sql, table-per-concrete-subtype, union-all, temporal, bitemporal, as-of, familyVariant, slice-snapshot-1, slice-managed-1]
shape: read
given:
  fixtures: true
when:
  targetEntity: Rate
  operation:
    asOf:
      operand:
        all: {}
      dimension: validTime
      coordinate: "2024-06-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: select t0.id, t0.amount, t0.from_z, t0.thru_z, t0.in_z, t0.out_z, t0.grade, cast(null as decimal(18, 2)) spread, 'DepositRate' family_variant from deposit_rate t0 where t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ? union all select t0.id, t0.amount, t0.from_z, t0.thru_z, t0.in_z, t0.out_z, cast(null as varchar(8)) grade, t0.spread, 'LoanRate' family_variant from loan_rate t0 where t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
        mariadb: select t0.id, t0.amount, t0.from_z, t0.thru_z, t0.in_z, t0.out_z, t0.grade, cast(null as decimal(18, 2)) spread, 'DepositRate' family_variant from deposit_rate t0 where t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ? union all select t0.id, t0.amount, t0.from_z, t0.thru_z, t0.in_z, t0.out_z, cast(null as char(8)) grade, t0.spread, 'LoanRate' family_variant from loan_rate t0 where t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
      binds: ["2024-06-01T00:00:00+00:00", "2024-06-01T00:00:00+00:00", infinity, "2024-06-01T00:00:00+00:00", "2024-06-01T00:00:00+00:00", infinity]
  rows:
    - { id: 1, amount: 2.50, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-02-01T00:00:00+00:00", out_z: infinity, grade: A, spread: null, familyVariant: DepositRate }
    - { id: 2, amount: 6.75, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity, grade: null, spread: 1.25, familyVariant: LoanRate }
  roundTrips: 1
