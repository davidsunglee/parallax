# Optimistic temporal close with a FRESH observed in_z gates on the processing-from
# the unit of work observed and closes EXACTLY one row (m-temporal-read + m-opt-lock).
#
# A processing-axis (audit-only) temporal entity has no version column, so the
# observed processing-from (in_z) is the optimistic-lock version analogue (Reladomo's
# IN_Z rule). In optimistic mode the milestone-closing UPDATE gains an `and in_z = ?`
# gate bound to the in_z the unit of work read; a fresh, still-current in_z matches
# the one current milestone, so the close affects 1 row. Balance id 2 (acct B) has a
# single clean current milestone (value 200.00, known [2024-02-01, infinity)) whose
# in_z (2024-02-01) the unit of work observed; the gated close closes it at the
# transaction instant 2024-10-01. A conflict case runs only that single close, not
# the chained replacement INSERT, so `then.tableState` is the fixtures with id 2's
# current row now closed at 2024-10-01.
model: models/balance.yaml
tags: [m-temporal-read, m-opt-lock, m-sql, temporal, conflict, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: conflict
when:
  uow:
    concurrency: optimistic
  write: { id: 2 }
  at: "2024-10-01T00:00:00+00:00"
  observedInZ: "2024-02-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update balance set out_z = ? where bal_id = ? and out_z = ? and in_z = ?
      binds: ["2024-10-01T00:00:00+00:00", 2, infinity, "2024-02-01T00:00:00+00:00"]
  affectedRows: 1
  tableState:
    balance:
      - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-06-01T00:00:00+00:00" }
      - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
      - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: "2024-10-01T00:00:00+00:00" }
      - { bal_id: 3, acct_num: C, val: 50.00, in_z: "2024-03-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
