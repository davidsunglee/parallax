# like (case-insensitive) — the `caseInsensitive` flag lowers both sides through
# `lower(...)`. The pattern `ada` matches both `Ada` (id 1) and `ada` (id 3);
# the case-sensitive form would match only id 3, so this fixture pins the
# case-folding contract.
#
# Cross-dialect (Phase 10): the `lower(...) like lower(?)` case-folding form is
# dialect-neutral and result-equal on both Postgres and MariaDB, so this case
# carries goldenSql for both — the collation/case-sensitivity witness in the
# matrix. (MariaDB's default collation is case-insensitive on its own, but the
# explicit `lower()` folding is the portable contract and matches the same rows.)
model: models/orders.yaml
tags: [m-op-algebra, like, string, caseInsensitive, slice-mvp-1]
operation:
  like:
    attr: Order.name
    value: ada
    caseInsensitive: true
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where lower(t0.name) like lower(?)
  mariadb: select t0.id, t0.name from orders t0 where lower(t0.name) like lower(?)
binds: ["ada"]
referenceSql: select id, name from orders where lower(name) like lower('ada')
expectedRows:
  - { id: 1, name: Ada }
  - { id: 3, name: ada }
roundTrips: 1
