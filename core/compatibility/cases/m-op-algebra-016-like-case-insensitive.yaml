# like with the `caseInsensitive` flag folds both sides through `lower(...)` — the
# case-folding contract.
#
# The pattern `ada` matches both `Ada` (id 1) and `ada` (id 3); the case-sensitive
# form would match only id 3, so this fixture pins case folding. The
# `lower(...) like lower(?)` form is dialect-neutral and result-equal on Postgres
# and MariaDB, so both dialects share one `then.statements` entry — the
# collation/case-sensitivity witness in the matrix. (MariaDB's default collation is
# case-insensitive on its own, but the explicit `lower()` folding is the portable
# contract and matches the same rows.)
model: models/orders.yaml
tags: [m-op-algebra, like, string, caseInsensitive, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    like:
      attr: Order.name
      value: ada
      caseInsensitive: true
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where lower(t0.name) like lower(?)
        mariadb: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where lower(t0.name) like lower(?)
      binds: ["ada"]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where lower(name) like lower('ada')
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
  roundTrips: 1
