# Deep fetch, SHARED-PREFIX paths — the shared hop is fetched once (m-deep-fetch dedup).
#
# m-deep-fetch-004 fetches two INDEPENDENT paths off the root; this is the spec's literal
# shared-prefix example: `[Order.items]` and `[Order.items, OrderItem.statuses]`.
# The two paths share the `Order.items` hop, which MUST be fetched ONCE (de-
# duplicated), so the level count is 3, not 4:
#   level 0 (root)     : all orders
#   level 1 (items)    : items keyed by the distinct order ids {1,2,3,4,5,42}
#   level 2 (statuses) : item-level statuses keyed by the distinct item ids
#                        {11,12,21,421,422}
# A naive reading would fetch `Order.items` twice (once per path); the harness
# asserts exactly 3 statements, proving the prefix is shared.
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, shared-prefix, relationship, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    deepFetch:
      operand:
        all: {}
      paths:
        - [{ rel: Order.items }]
        - [{ rel: Order.items }, { rel: OrderItem.statuses }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity, t0.shipped_on from order_item t0 where t0.order_id in (?, ?, ?, ?, ?, ?) order by t0.id desc
      binds: [1, 2, 3, 4, 5, 42]
    - sql:
        postgres: select t0.id, t0.order_id, t0.order_item_id, t0.code from order_status t0 where t0.order_item_id in (?, ?, ?, ?, ?) order by t0.code asc
      binds: [11, 12, 21, 421, 422]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders
  graph:
    Order:
      - id: 1
        name: Ada
        sku: A-100
        qty: 5
        price: 10.50
        active: true
        ordered_on: 2024-01-05
        items:
          - id: 12
            order_id: 1
            sku: B-200
            quantity: 1
            shipped_on: 2024-02-15
            statuses:
              - { id: 203, order_id: 1, order_item_id: 12, code: PICKED }
          - id: 11
            order_id: 1
            sku: A-100
            quantity: 2
            shipped_on: null
            statuses:
              - { id: 202, order_id: 1, order_item_id: 11, code: PACKED }
              - { id: 201, order_id: 1, order_item_id: 11, code: PICKED }
      - id: 2
        name: Linus
        sku: B-200
        qty: 10
        price: 20.00
        active: true
        ordered_on: 2024-02-10
        items:
          - id: 21
            order_id: 2
            sku: A-300
            quantity: 4
            shipped_on: 2024-02-20
            statuses: []
      - id: 3
        name: ada
        sku: A-300
        qty: 15
        price: 30.25
        active: false
        ordered_on: 2024-03-15
        items: []
      - id: 4
        name: Margaret
        sku: null
        qty: 20
        price: 40.00
        active: true
        ordered_on: 2024-04-20
        items: []
      - id: 5
        name: Alan
        sku: "C_50%"
        qty: 25
        price: 50.75
        active: false
        ordered_on: 2024-05-25
        items: []
      - id: 42
        name: Grace
        sku: A-999
        qty: 30
        price: 99.99
        active: true
        ordered_on: 2024-06-30
        items:
          - id: 422
            order_id: 42
            sku: B-200
            quantity: 5
