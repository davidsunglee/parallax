# endsWith + wildcard escape — affix escaping (M2 §Wildcard/escape rule).
#
# The endsWith affix prepends a leading `%` to the escaped literal. `endsWith
# '50%'` escapes the trailing literal `%` so it does NOT act as a wildcard:
# `like '%50\%' escape '\'`. Only `C_50%` ends with a literal `50%`. The
# independent `right(sku, 3)` oracle would catch an unescaped `%` (which would
# match any suffix). Companion to 0231 (startsWith) and 0213 (contains).
model: models/orders.yaml
tags: [m2, endsWith, string, escape, first-implementation-mvp]
operation:
  endsWith:
    attr: Order.sku
    value: 50%
goldenSql:
  postgres: select t0.id, t0.name from orders t0 where t0.sku like ? escape ?
binds: ["%50\\%", "\\"]
referenceSql: select id, name from orders where right(sku, 3) = '50%'
expectedRows:
  - { id: 5, name: Alan }
roundTrips: 1
