# valueObject structured-column filter: a DEEP nested field (m-value-object valueObject,
# m-sql), on Postgres AND MariaDB.
#
# The `address` valueObject nests a `geo` valueObject. nestedEq(
# Customer.address.geo.country, 'US') lowers per the m-dialect nested-extraction
# seam: Postgres `jsonb_extract_path_text(t0.address, ?, ?) = ?` carries one bind
# per path segment ('geo', 'country') then the value ('US') — three binds; MariaDB
# `json_value(t0.address, ?) = ?` carries a single '$.geo.country' path bind then
# the value — two binds. The hole COUNT diverges here, which is exactly why `binds`
# is a dialect-keyed map. Only Grace (Boston, US) qualifies; the two Oslo (NO)
# customers are excluded.
model: models/customer.yaml
tags: [m-value-object, m-sql, nested, json, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  operation:
    nestedEq: { path: Customer.address.geo.country, value: US }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where jsonb_extract_path_text(t0.address, ?, ?) = ?
        mariadb: select t0.id, t0.name from customer t0 where json_value(t0.address, ?) = ?
      binds:
        postgres: [geo, country, US]
        mariadb: ['$.geo.country', US]
  referenceSql:
    postgres: select id, name from customer where address -> 'geo' ->> 'country' = 'US'
    mariadb: select id, name from customer where nullif(json_unquote(json_extract(address, '$.geo.country')), 'null') = 'US'
  rows:
    - { id: 3, name: Grace }
  roundTrips: 1
