# valueObject structured-column filter: a DEEP nested field (m-value-object valueObject, m-sql).
#
# The `address` valueObject nests a `geo` object. In Postgres golden SQL,
# nestedEq(Customer.address.geo.country, 'US') lowers to a multi-segment
# extraction `jsonb_extract_path_text(t0.address, ?, ?)` — one bind per path
# segment ('geo', 'country') then the compared value ('US'). Only Grace
# (Boston, US) qualifies; the two Oslo (NO) customers are excluded.
#
# referenceSql spells the same path with native operators (`-> 'geo' ->> 'country'`).
model: models/customer.yaml
tags: [m-value-object, m-sql, nested, json]
shape: read
when:
  operation:
    nestedEq: { path: Customer.address.geo.country, value: US }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where jsonb_extract_path_text(t0.address, ?, ?) = ?
      binds: [geo, country, US]
  referenceSql: select id, name from customer where address -> 'geo' ->> 'country' = 'US'
  rows:
    - { id: 3, name: Grace }
  roundTrips: 1
