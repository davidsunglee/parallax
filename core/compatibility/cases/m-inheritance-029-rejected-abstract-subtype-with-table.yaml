# Negative (m-inheritance, resolved Q3/Q4): an abstract SUBTYPE declares a physical
# table.
#
# `Pet` is an interior `role: abstract-subtype` but also declares `table: animal`.
# Like the abstract root, an abstract subtype is tableless and rowless (its concrete
# descendants own the rows), so a model-aware validator MUST reject a table on it —
# the abstract-node-with-table rule applies to every abstract node, not only the root.
model: models/payment.yaml
tags: [m-inheritance, m-descriptor, rejected, negative, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  model:
    entities:
      - name: Animal
        inheritance:
          strategy: table-per-hierarchy
          role: root
          tag: { column: kind }
        attributes:
          - { name: id, type: int64, column: id, primaryKey: true }
      - name: Pet
        table: animal
        inheritance:
          role: abstract-subtype
          parent: Animal
        attributes:
          - { name: licenseId, type: string, column: license_id, nullable: true }
      - name: Dog
        table: animal
        inheritance:
          role: concrete-subtype
          parent: Pet
          tagValue: dog
        attributes:
          - { name: barkVolume, type: int32, column: bark_volume, nullable: true }
then:
  rejectedRule: inheritance-abstract-node-with-table
