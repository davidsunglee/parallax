# Negative (m-inheritance, resolved Q3/Q4): an abstract SUBTYPE declares a physical
# table.
#
# `Pet` is an interior `role: abstract-subtype` but also declares `table: animal`.
# The TPH root owns the shared table. Every descendant, abstract or concrete, must
# omit a table mapping and inherit the root-owned container.
model: models/payment.yaml
tags: [m-inheritance, m-descriptor, rejected, negative, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  model:
    entities:
      - name: Animal
        table: animal
        inheritance:
          strategy: table-per-hierarchy
          role: root
          tag: { column: kind }
        attributes:
          - { name: id, type: int64, column: id, primaryKey: true }
      - name: Pet
        table: animal
        inheritance:
          role: abstract-subtype
          parent: Animal
        attributes:
          - { name: licenseId, type: string, column: license_id, nullable: true }
      - name: Dog
        inheritance:
          role: concrete-subtype
          parent: Pet
          tagValue: dog
        attributes:
          - { name: barkVolume, type: int32, column: bark_volume, nullable: true }
then:
  rejectedRule: inheritance-tph-descendant-table-forbidden
