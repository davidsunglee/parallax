# valueObject numeric filter: nestedGte over a THREE-level path with a typed cast
# (m-value-object, m-sql, m-dialect), on Postgres AND MariaDB.
#
# `geo.point.lat` is a float64 attribute three levels deep. nestedGte(
# Customer.address.geo.point.lat, 59.9) casts and compares with `>=`: Postgres
# `cast(jsonb_extract_path_text(t0.address, ?, ?, ?) as double precision) >= ?`
# carries one bind per path segment ('geo','point','lat') then the value — four
# binds; MariaDB `cast(json_value(t0.address, ?) as double) >= ?` carries a single
# '$.geo.point.lat' path bind then the value — two binds. Ada and Linus (lat 59.9)
# qualify at the boundary; Grace (42.3) does not; the not-present rows (4/5/6/7)
# cast SQL NULL and are excluded.
model: models/customer.yaml
tags: [m-value-object, m-sql, m-dialect, nested, json, cast, numeric, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  operation:
    nestedGte: { path: Customer.address.geo.point.lat, value: 59.9 }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where cast(jsonb_extract_path_text(t0.address, ?, ?, ?) as double precision) >= ?
        mariadb: select t0.id, t0.name from customer t0 where cast(json_value(t0.address, ?) as double) >= ?
      binds:
        postgres: [geo, point, lat, 59.9]
        mariadb: ['$.geo.point.lat', 59.9]
  referenceSql:
    postgres: select id, name from customer where (address -> 'geo' -> 'point' ->> 'lat')::double precision >= 59.9
    mariadb: select id, name from customer where nullif(json_unquote(json_extract(address, '$.geo.point.lat')), 'null') + 0 >= 59.9
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
  roundTrips: 1
