# valueObject to-many: a NON-ARRAY `many` value collapses to not-present even when
# its scalar value COLLIDES with the query value (m-value-object to-many,
# m-op-algebra absence collapse, m-dialect array-traversal form), on Postgres AND
# MariaDB.
#
# nestedEq(Customer.address.phones.number, '555-0000') matches a row iff SOME
# element of its `phones` array has number = 555-0000. Only Nils (id 7,
# {work, 555-0000}) qualifies. The trap is Omar (id 9): his `phones` is the JSON
# scalar STRING "555-0000" — the exact query value — yet it must NOT match, because
# a non-array `phones` has no elements. This is the sharpest proof of the
# array-traversal guard: an implementation that extracts the scalar and compares it
# directly would wrongly match id 9; the guard collapses it (and the JSON-null 8
# and object 10) to not-present. This pairs with the type=home any-element case
# (m-value-object-017) on a different field and a value-colliding scalar.
#
# Postgres unnests behind the `case`/`jsonb_typeof` array guard; MariaDB guards
# `json_contains` with `json_type(json_extract(...)) = 'ARRAY'`. The oracle iterates
# elements differently per dialect (Postgres `@>`, MariaDB `json_table`).
model: models/customer.yaml
tags: [m-value-object, m-op-algebra, m-sql, m-dialect, nested, json, to-many, any-element, absence-collapse, array-traversal, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Customer
  operation:
    nestedEq: { path: Customer.address.phones.number, value: '555-0000' }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where exists (select 1 from jsonb_array_elements(case when jsonb_typeof(jsonb_extract_path(t0.address, ?)) = ? then jsonb_extract_path(t0.address, ?) else cast(? as jsonb) end) t1 where jsonb_extract_path_text(t1.value, ?) = ?)
        mariadb: select t0.id, t0.name from customer t0 where json_type(json_extract(t0.address, ?)) = ? and json_contains(t0.address, ?, ?)
      binds:
        postgres: [phones, 'array', phones, '[]', number, '555-0000']
        mariadb: ['$.phones', 'ARRAY', '{"number":"555-0000"}', '$.phones']
  referenceSql:
    postgres: select id, name from customer where address -> 'phones' @> '[{"number":"555-0000"}]'
    mariadb: select id, name from customer where json_type(json_extract(address, '$.phones')) = 'ARRAY' and exists (select 1 from json_table(address, '$.phones[*]' columns (type varchar(64) path '$.type', number varchar(64) path '$.number')) jt where jt.number = '555-0000')
  rows:
    - { id: 7, name: Nils }
  roundTrips: 1
