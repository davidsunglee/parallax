# valueObject on a FULL BITEMPORAL owner: the fully-Latest document (both dimensions Latest)
# (m-value-object "Inherited temporality", m-temporal-read), on Postgres AND MariaDB.
#
# `address` declares NO asOfAxes of its own — it inherits BOTH of the Branch's
# dimensions. Pinning validTime = Latest AND transactionTime = Latest injects each axis's
# current-row equality (thru_z = infinity AND out_z = infinity, two infinity binds), so
# the read returns the rectangle current on both axes. Over branch id 1's history that
# is R3 — the corrected address D3 (Tampere, two phones), true in the world now and
# known now. R1 is superseded on the Transaction-Time dimension; R2 (the head) is current on
# processing but its business thru_z is finite, so validTime=Latest excludes it. Only R3's
# document materializes, decoded from the one structured-document column with the owner.
#
# The golden SQL is IDENTICAL on both dialects (a bare column projection + the two
# injected current-row predicates); both infinity binds are owned by the m-dialect seam,
# so `binds` is one shared flat array. The dialect-neutral referenceSql ranges both
# `to` columns above the year-9000 floor (selecting the fully-Latest rectangle on both
# dialects) and pins the matched owner identity.
model: models/branch.yaml
tags: [m-value-object, m-temporal-read, m-sql, nested, json, temporal, bitemporal, as-of, both-axes, materialization, graph, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Branch
  operation:
    asOf:
      operand:
        asOf:
          operand:
            all: {}
          dimension: transactionTime
          coordinate: latest
      dimension: validTime
      coordinate: latest
then:
  statements:
    - sql:
        postgres: select t0.br_id, t0.name, t0.from_z, t0.thru_z, t0.in_z, t0.out_z, t0.address from branch t0 where t0.thru_z = ? and t0.out_z = ?
        mariadb: select t0.br_id, t0.name, t0.from_z, t0.thru_z, t0.in_z, t0.out_z, t0.address from branch t0 where t0.thru_z = ? and t0.out_z = ?
      binds: [infinity, infinity]
  referenceSql: select br_id, name, from_z, thru_z, in_z, out_z from branch where thru_z > '9000-01-01' and out_z > '9000-01-01'
  graph:
    Branch:
      - br_id: 1
        name: Central Branch
        from_z: "2024-06-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-04-01T00:00:00+00:00"
        out_z: infinity
        address:
          street: 30 New Road
          city: Tampere
          geo:
            country: FI
          phones:
            - { type: main, number: '555-3000' }
            - { type: fax, number: '555-3001' }
  roundTrips: 1
