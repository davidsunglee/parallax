# Snapshot mutation has no write-back (m-snapshot-read): mutating a snapshot node
# produces no DML and leaves the database unchanged.
#
# Step 0 materializes a snapshot of order 1 (name Ada). Step 1 mutates the node's
# `name` in memory: a snapshot is a plain value with no unit-of-work write-back, so
# the assignment emits NO DML (roundTrips 0). Step 2 re-reads order 1 from the
# database and observes the ORIGINAL Ada — the mutation never persisted. The wire
# proof is the two round trips (the mutate contributes none) plus the unchanged
# re-read rows; harness lane.
model: models/orders.yaml
tags: [m-snapshot-read, no-writeback, mutation, scenario, slice-snapshot-1]
shape: scenario
when:
  scenario:
    - targetEntity: Order
      find:
        eq:
          attr: Order.id
          value: 1
      roundTrips: 1
      note: materialize a snapshot of order 1
      statements:
        - sql:
            postgres: select t0.id, t0.name from orders t0 where t0.id = ?
          binds: [1]
      expectRows:
        - { id: 1, name: Ada }
    - action: mutate
      "on": 0
      set: { name: Mutant }
      roundTrips: 0
      note: mutate the snapshot node's name in memory -> NO DML (a snapshot has no write-back)
    - targetEntity: Order
      find:
        eq:
          attr: Order.id
          value: 1
      roundTrips: 1
      note: re-read order 1 from the database -> still Ada, proving the mutation did not write back
      statements:
        - sql:
            postgres: select t0.id, t0.name from orders t0 where t0.id = ?
          binds: [1]
      expectRows:
        - { id: 1, name: Ada }
then:
  roundTrips: 2
