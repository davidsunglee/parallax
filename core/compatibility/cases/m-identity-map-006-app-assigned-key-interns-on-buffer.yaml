# Application-assigned key interns on buffer (m-identity-map): a created object
# whose primary key is assigned by the application interns the moment its insert is
# BUFFERED — its identity key already exists — so no key generation is needed and
# its flush is a single plain insert.
#
# Step 0 constructs a new Account with an application-assigned primary key (id 4)
# and buffers its insert: roundTrips 0, NO DML. Because the key is known, the
# object interns in the identity map at buffer time (m-identity-map interning
# timing). Step 1 flushes the unit of work — the buffered create lands as ONE plain
# insert (the primary key is already assigned, so there is no sequence / key
# generation, unlike a generated-PK object; see m-identity-map-007). Step 2 finds id
# 4 and observes the persisted row. The object-reference identity of the buffered,
# flushed, and re-found instance is asserted per-language by the API Conformance
# Suite.
model: models/account.yaml
tags: [m-identity-map, m-unit-work, identity, interning, scenario, slice-managed-1]
shape: scenario
when:
  uow:
    concurrency: optimistic
  scenario:
    - write: insert
      roundTrips: 0
      note: buffer the create of Account id 4 with an APPLICATION-ASSIGNED primary key — interned in memory, no DML yet
    - action: flush
      "on": 0
      roundTrips: 1
      note: flush the buffered create -> ONE plain insert (the primary key is already assigned, no key generation)
      statements:
        - sql:
            postgres: insert into account(id, owner, balance, version) values (?, ?, ?, ?)
          binds: [4, Dijkstra, 75.00, 1]
    - targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 4
      roundTrips: 1
      identityAttr: id
      note: a subsequent find observes the interned, flushed row
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
          binds: [4]
      expectRows:
        - { id: 4, owner: Dijkstra, balance: 75.00, version: 1 }
then:
  roundTrips: 2
