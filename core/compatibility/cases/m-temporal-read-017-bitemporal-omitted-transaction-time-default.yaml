# Bitemporal read with only the Valid-Time dimension pinned. The omitted processing
# dimension defaults to Latest, so the golden SQL includes the current Transaction-Time
# predicate out_z = infinity.
model: models/position.yaml
tags: [m-temporal-read, m-sql, bitemporal, temporal, as-of, default-transaction-time, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Position
  operation:
    asOf:
      operand:
        all: {}
      dimension: validTime
      coordinate: "2024-03-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
      binds: ["2024-03-01T00:00:00+00:00", "2024-03-01T00:00:00+00:00", infinity]
  referenceSql: select pos_id, acct_num, val, from_z, thru_z, in_z, out_z from position where from_z <= '2024-03-01T00:00:00+00:00'::timestamptz and thru_z > '2024-03-01T00:00:00+00:00'::timestamptz and out_z = 'infinity'::timestamptz
  rows:
    - { pos_id: 1, acct_num: A, val: 100.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: "2024-06-01T00:00:00+00:00", in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 1
