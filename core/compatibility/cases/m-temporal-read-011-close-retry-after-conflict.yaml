# Optimistic temporal close RETRY after conflict — the `attempts` 0-then-1
# transition on the gated close (m-temporal-read + m-opt-lock retry contract, the
# m-opt-lock-007 analogue for a temporal entity).
#
# m-temporal-read-010 stops at the conflict signal (a stale-in_z close affects 0
# rows); this proves the retry closes the loop, and the `attempts` sequence makes the
# two-step observable in one case. `given.apply` fully chains id 2 (old current row
# closed at 2024-09-01, fresh current row value 999.00 opened at in_z 2024-09-01).
# Attempt 0 gates on the first-read in_z (2024-02-01) and affects 0 rows — the
# conflict; attempt 1 re-reads the fresh current in_z (2024-09-01), re-applies, and
# affects 1 row, closing the concurrent writer's milestone at 2024-10-01. The case
# asserts each attempt's affected count and runs no replacement INSERT, so
# `then.tableState` is the fixtures plus the re-chain plus that retry close.
model: models/balance.yaml
tags: [m-temporal-read, m-opt-lock, m-sql, temporal, conflict, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: conflict
compileEligibility:
  mode: run-only
  reason: single-connection
  note: "single-connection concurrency/locking intent (given.apply, shape:conflict)"
given:
  apply:
    - sql: update balance set out_z = '2024-09-01T00:00:00+00:00' where bal_id = 2 and out_z = 'infinity'
    - sql: insert into balance(bal_id, acct_num, val, in_z, out_z) values (2, 'B', 999.00, '2024-09-01T00:00:00+00:00', 'infinity')
when:
  uow:
    concurrency: optimistic
  attempts:
    - note: stale close — gates on the observed in_z 2024-02-01, which no longer matches ⇒ 0 rows
      write: { id: 2 }
      at: "2024-10-01T00:00:00+00:00"
      observedTxStart: "2024-02-01T00:00:00+00:00"
      statements:
        - sql:
            postgres: update balance set out_z = ? where bal_id = ? and out_z = ? and in_z = ?
          binds: ["2024-10-01T00:00:00+00:00", 2, infinity, "2024-02-01T00:00:00+00:00"]
      affectedRows: 0
    - note: retry — re-read the fresh current in_z (2024-09-01) and re-apply ⇒ 1 row closed
      write: { id: 2 }
      at: "2024-10-01T00:00:00+00:00"
      observedTxStart: "2024-09-01T00:00:00+00:00"
      statements:
        - sql:
            postgres: update balance set out_z = ? where bal_id = ? and out_z = ? and in_z = ?
          binds: ["2024-10-01T00:00:00+00:00", 2, infinity, "2024-09-01T00:00:00+00:00"]
      affectedRows: 1
then:
  tableState:
    balance:
      - { bal_id: 1, acct_num: A, val: 100.00, in_z: "2024-01-01T00:00:00+00:00", out_z: "2024-06-01T00:00:00+00:00" }
      - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
      - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: "2024-09-01T00:00:00+00:00" }
      - { bal_id: 2, acct_num: B, val: 999.00, in_z: "2024-09-01T00:00:00+00:00", out_z: "2024-10-01T00:00:00+00:00" }
      - { bal_id: 3, acct_num: C, val: 50.00, in_z: "2024-03-01T00:00:00+00:00", out_z: "2024-08-01T00:00:00+00:00" }
