# Predicate-selected TERMINATE over an audit-only (processing-temporal) entity
# materializes per resolved row (m-txtime-write + m-opt-lock, ADR 0014).
#
# Balance carries a SINGLE Transaction-Time dimension [in_z, out_z); a terminate merely CLOSES the
# current row's processing interval — there is no business-date split and no re-inserted
# successor (contrast the bitemporal terminates, m-bitemp-write-011/013). Because the
# write gates each row on its own open interval, the set predicate cannot collapse to
# one statement: it MATERIALIZES to one `set out_z = <at>` per resolved row, gated on the
# key and the open bound (out_z = infinity).
#
# The unit of work runs in LOCKING mode, so the materializing read takes `for share` row
# locks (`for share of t0`) over the two matches (bal_id 1 and 2, both value < 250, both
# currently open). The terminate then closes both at the processing instant
# at = 2024-10-01: two keyed UPDATEs, each binding [at, bal_id, infinity]. A
# processing-only close needs no old payload, so the materialization observes only the
# id and interval columns (m-txtime-write).
#
# The trailing find re-reads the still-open set (out_z = infinity) and expects NO rows:
# both intervals are now closed as of 2024-10-01, proving the terminate landed. Total
# roundTrips 4 = materialize read (1) + two closes (2) + verify read (1).
model: models/balance.yaml
tags: [m-txtime-write, m-opt-lock, m-sql, m-unit-work, temporal, materialize, predicate-write, scenario, slice-snapshot-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "predicate write materializes per-row from a resolving read - per-row binds (observed version / in_z / matched keys) depend on the query result"
when:
  uow:
    concurrency: locking
  scenario:
    - targetEntity: Balance
      find:
        lessThan: { attr: Balance.value, value: 250.00 }
      roundTrips: 1
      statements:
        - sql:
            postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.val < ? and t0.out_z = ? for share of t0
          binds: [250.00, infinity]
      referenceSql: select bal_id, acct_num, val, in_z, out_z from balance where val < 250.00 and out_z = 'infinity'::timestamptz for share of balance
      expectRows:
        - { bal_id: 1, acct_num: A, val: 150.00, in_z: "2024-06-01T00:00:00+00:00", out_z: infinity }
        - { bal_id: 2, acct_num: B, val: 200.00, in_z: "2024-02-01T00:00:00+00:00", out_z: infinity }
    - write:
        mutation: terminate
        target:
          entity: Balance
          predicate:
            lessThan: { attr: Balance.value, value: 250.00 }
        at: "2024-10-01T00:00:00+00:00"
      roundTrips: 2
      statements:
        - sql:
            postgres: update balance set out_z = ? where bal_id = ? and out_z = ?
          binds: ["2024-10-01T00:00:00+00:00", 1, infinity]
        - sql:
            postgres: update balance set out_z = ? where bal_id = ? and out_z = ?
          binds: ["2024-10-01T00:00:00+00:00", 2, infinity]
    - targetEntity: Balance
      find:
        lessThan: { attr: Balance.value, value: 250.00 }
      roundTrips: 1
      statements:
        - sql:
            postgres: select t0.bal_id, t0.acct_num, t0.val, t0.in_z, t0.out_z from balance t0 where t0.val < ? and t0.out_z = ? for share of t0
          binds: [250.00, infinity]
      referenceSql: select bal_id, acct_num, val, in_z, out_z from balance where val < 250.00 and out_z = 'infinity'::timestamptz for share of balance
      expectRows: []
then:
  roundTrips: 4
