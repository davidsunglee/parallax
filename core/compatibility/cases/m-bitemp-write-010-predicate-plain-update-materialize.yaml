# Predicate-selected PLAIN bitemporal UPDATE materializes per resolved row to a
# Transaction-Time close + a Valid-Time timeline split (m-bitemp-write + m-opt-lock, ADR 0014).
#
# Position is bitemporal: a Valid-Time interval [from_z, thru_z) nested under a Transaction-Time
# interval [in_z, out_z). A predicate write cannot collapse — each row's rectangle split
# depends on its own observed coordinates — so it materializes. For the one resolved row
# (pos 1, value 200, currently open on both axes) a PLAIN update (no `until`) sets
# value = 300 from validFrom = 2024-07-01 to valid infinity, processed at
# at = 2024-10-01, in three statements:
#   1. close the current Transaction-Time row (set out_z = at), gated on key + open out_z +
#      the observed from_z/in_z — the optimistic coordinate gate (concurrency: optimistic);
#   2. re-insert the OLD payload (value 200) for the pre-split slice [2024-06-01,
#      2024-07-01) with in_z = at — history preserved before the change;
#   3. insert the NEW payload (value 300) for [2024-07-01, infinity) with in_z = at.
#
# The trailing find reads the open current value = 300 and sees the new [2024-07-01, inf)
# Valid-Time segment (in_z = 2024-10-01), proving the split landed. Total roundTrips 5 =
# materialize read (1) + three write statements (3) + verify read (1).
model: models/position.yaml
tags: [m-bitemp-write, m-opt-lock, m-sql, m-unit-work, bitemporal, temporal, materialize, predicate-write, scenario, slice-snapshot-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "predicate write materializes per-row from a resolving read - per-row binds (observed version / in_z / matched keys) depend on the query result"
when:
  uow:
    concurrency: optimistic
  scenario:
    - targetEntity: Position
      find:
        and:
          operands:
            - { eq: { attr: Position.id, value: 1 } }
            - { eq: { attr: Position.value, value: 200.00 } }
      roundTrips: 1
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.pos_id = ? and t0.val = ? and t0.thru_z = ? and t0.out_z = ?
          binds: [1, 200.00, infinity, infinity]
      referenceSql: select pos_id, acct_num, val, from_z, thru_z, in_z, out_z from position where pos_id = 1 and val = 200.00 and thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz
      expectRows:
        - { pos_id: 1, acct_num: A, val: 200.00, from_z: "2024-06-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
    - write:
        mutation: update
        target:
          entity: Position
          predicate:
            and:
              operands:
                - { eq: { attr: Position.id, value: 1 } }
                - { eq: { attr: Position.value, value: 200.00 } }
        assignments:
          - { attr: Position.value, value: 300.00 }
        at: "2024-10-01T00:00:00+00:00"
        validFrom: "2024-07-01T00:00:00+00:00"
      roundTrips: 3
      statements:
        - sql:
            postgres: update position set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
          binds: ["2024-10-01T00:00:00+00:00", 1, infinity, "2024-06-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [1, A, 200.00, "2024-06-01T00:00:00+00:00", "2024-07-01T00:00:00+00:00", "2024-10-01T00:00:00+00:00", infinity]
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [1, A, 300.00, "2024-07-01T00:00:00+00:00", infinity, "2024-10-01T00:00:00+00:00", infinity]
    - targetEntity: Position
      find:
        eq: { attr: Position.value, value: 300.00 }
      roundTrips: 1
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.val = ? and t0.thru_z = ? and t0.out_z = ?
          binds: [300.00, infinity, infinity]
      referenceSql: select pos_id, acct_num, val, from_z, thru_z, in_z, out_z from position where val = 300.00 and thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz
      expectRows:
        - { pos_id: 1, acct_num: A, val: 300.00, from_z: "2024-07-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-10-01T00:00:00+00:00", out_z: infinity }
then:
  roundTrips: 5
