# PK generation `sequence` (m-pk-gen) — three inserts, batch=1 (one allocation per id).
#
# batch=1 -> each row reserves its own block; badge_seq 1->2->3->4; ids 1,2,3.
model: models/pk-sequence.yaml
loadFixtures: true
tags: [m-pk-gen, m-unit-work, sequence, write-sequence]
writeSequence:
  - mutation: update
    entity: PkSequence
    statements: 1
    note: "reserve block, base 1"
    rows:
      - { name: badge_seq, nextVal: { increment: 1 } }
  - mutation: insert
    entity: Badge
    statements: 1
    note: id 1
    rows:
      - { id: 1, holder: Bo }
  - mutation: update
    entity: PkSequence
    statements: 1
    note: "reserve block, base 2"
    rows:
      - { name: badge_seq, nextVal: { increment: 1 } }
  - mutation: insert
    entity: Badge
    statements: 1
    note: id 2
    rows:
      - { id: 2, holder: Cy }
  - mutation: update
    entity: PkSequence
    statements: 1
    note: "reserve block, base 3"
    rows:
      - { name: badge_seq, nextVal: { increment: 1 } }
  - mutation: insert
    entity: Badge
    statements: 1
    note: id 3
    rows:
      - { id: 3, holder: Di }
goldenSql:
  postgres:
    - update pk_sequence set next_val = next_val + ? where name = ?
    - insert into badge(id, holder) values (?, ?)
    - update pk_sequence set next_val = next_val + ? where name = ?
    - insert into badge(id, holder) values (?, ?)
    - update pk_sequence set next_val = next_val + ? where name = ?
    - insert into badge(id, holder) values (?, ?)
  mariadb:
    - update pk_sequence set next_val = next_val + ? where name = ?
    - insert into badge(id, holder) values (?, ?)
    - update pk_sequence set next_val = next_val + ? where name = ?
    - insert into badge(id, holder) values (?, ?)
    - update pk_sequence set next_val = next_val + ? where name = ?
    - insert into badge(id, holder) values (?, ?)
binds:
  - [1, badge_seq]
  - [1, Bo]
  - [1, badge_seq]
  - [2, Cy]
  - [1, badge_seq]
  - [3, Di]
roundTrips: 6
expectedTableState:
  badge:
    - { id: 1, holder: Bo }
    - { id: 2, holder: Cy }
    - { id: 3, holder: Di }
