# Optimistic-lock conflict ABORTS the unit of work (m-opt-lock + m-unit-work): a
# `updatedRows != 1` conflict mid-flush discards EVERY buffered write in the UoW,
# not just the conflicting one — no partial flush survives.
#
# m-opt-lock-005 proves the conflict SIGNAL (a stale-version UPDATE affects 0 rows);
# this composes it with the m-unit-work abort contract: when a versioned write in a
# unit of work conflicts, the WHOLE unit of work rolls back, so an unrelated insert
# buffered in the same UoW is discarded too. The scenario:
#   step 0 write : a CONCURRENT transaction commits first, bumping account 2 to
#                  balance 999.00 / version 2 (the classic optimistic race).
#   step 1 write : OUR optimistic unit of work buffers TWO writes and flushes them,
#                  then ABORTS (rollback: true — the observable form of the conflict
#                  abort):
#                    (a) insert a brand-new account 9 (would succeed on its own), then
#                    (b) a version-GATED update of account 2 on the version we OBSERVED
#                        (1) — but the row is now version 2, so the gate matches ZERO
#                        rows (updatedRows != 1). That conflict aborts the UoW, so (a)
#                        is rolled back with it.
#   step 2 find  : query account 9 — it MUST observe NO rows. The would-be-successful
#                  insert never became durable: the conflict discarded the entire UoW
#                  (no partial flush). This is the teeth.
# The conflict is ASSERTED against real data, not merely simulated: then.affectedRows
# (0) pins the gated update of account 2 to the 0-row conflict count, and the harness
# makes the abort a CONSEQUENCE of detecting it — a gated write that affected 1 row
# (no conflict) would fail this case rather than pass on the rollback alone.
# roundTrips = 4 (the concurrent commit + the two aborted writes + the dependent find).
model: models/account.yaml
tags: [m-opt-lock, m-unit-work, optimistic-lock-conflict, abort, scenario, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: scenario
given:
  fixtures: true
when:
  uow:
    concurrency: optimistic
  scenario:
    - write:
        - mutation: update
          entity: Account
          rows:
            - { id: 2, balance: 999.00, version: 2 }
      roundTrips: 1
      note: a CONCURRENT transaction commits first — account 2 -> balance 999.00, version 2
      statements:
        - sql:
            postgres: update account set balance = ?, version = ? where id = ?
          binds: [999.00, 2, 2]
    - write:
        - mutation: insert
          entity: Account
          rows:
            - { id: 9, owner: Noether, balance: 5.00, version: 1 }
        - mutation: update
          entity: Account
          rows:
            - { id: 2, balance: 300.00, version: 2 }
      rollback: true
      roundTrips: 2
      note: our UoW inserts account 9 then hits a stale-version conflict on account 2 (0 rows) -> the whole UoW aborts
      statements:
        - sql:
            postgres: insert into account(id, owner, balance, version) values (?, ?, ?, ?)
          binds: [9, Noether, 5.00, 1]
        - sql:
            postgres: update account set balance = ?, version = ? where id = ? and version = ?
          binds: [300.00, 2, 2, 1]
    - targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 9
      roundTrips: 1
      note: account 9 MUST be absent — the aborted UoW's insert never flushed (no partial flush)
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
          binds: [9]
      expectRows: []
then:
  # The conflict is ASSERTED, not merely simulated: the version-gated update of
  # account 2 (step 1's second statement) MUST affect 0 rows — the stale-version gate
  # matched no row (`updatedRows != 1`, m-opt-lock). The harness detects that 0-row
  # conflict and makes the abort its CONSEQUENCE; a gated write that instead affected
  # 1 row (no real conflict) fails this case. This composes with the table-unchanged
  # read-back (step 2: account 9 absent — the buffered insert never flushed).
  affectedRows: 0
  roundTrips: 4
