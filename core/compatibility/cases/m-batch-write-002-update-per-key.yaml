# Batched UPDATE, per-distinct-key form (m-batch-write): non-uniform new values.
#
# m-batch-write says batched updates collapse "executed once per distinct key, OR as a single
# statement with an IN predicate when the new values are uniform." m-batch-write-001 proves the
# uniform `id in (?, ?)` form (one statement, one shared value). This pins the
# complementary per-key form: when each key gets a DIFFERENT new value, the batch
# flushes one keyed UPDATE per distinct key. Fixtures are loaded first; wallets 1
# and 2 receive different balances, wallet 3 is untouched.
#
# The subject is the NON-VERSIONED Wallet (models/wallet.yaml): a readless batched
# UPDATE per key is honest only for a non-versioned entity — a versioned entity's
# set-based update MUST materialize into per-object version-advancing updates
# (m-opt-lock / ADR 0014).
model: models/wallet.yaml
tags: [m-batch-write, m-sql, write-sequence, per-key, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: writeSequence
given:
  fixtures: true
when:
  writeSequence:
    - mutation: update
      entity: Wallet
      statements: 2
      note: two distinct keys take DIFFERENT new balances ⇒ one keyed UPDATE each
      rows:
        - { id: 1, balance: 111.00 }
        - { id: 2, balance: 222.00 }
then:
  statements:
    - sql:
        postgres: update wallet set balance = ? where id = ?
      binds: [111.00, 1]
    - sql:
        postgres: update wallet set balance = ? where id = ?
      binds: [222.00, 2]
  tableState:
    wallet:
      - { id: 1, owner: Ada, balance: 111.00 }
      - { id: 2, owner: Linus, balance: 222.00 }
      - { id: 3, owner: Grace, balance: 10.00 }
  roundTrips: 2
