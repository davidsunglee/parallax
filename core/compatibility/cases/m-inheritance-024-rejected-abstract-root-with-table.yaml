# Negative (m-inheritance): a table-per-concrete-subtype root declares a table.
#
# A TPCS root is an abstract model position and owns no storage container; each
# concrete subtype owns its own table. The root-owned table is valid only for TPH.
model: models/payment.yaml
tags: [m-inheritance, m-descriptor, rejected, negative, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  model:
    entities:
      - name: Animal
        table: animal
        inheritance:
          strategy: table-per-concrete-subtype
          role: root
        attributes:
          - { name: id, type: int64, column: id, primaryKey: true }
      - name: Dog
        table: dog
        inheritance:
          role: concrete-subtype
          parent: Animal
        attributes:
          - { name: barkVolume, type: int32, column: bark_volume, nullable: true }
then:
  rejectedRule: inheritance-tpcs-abstract-table-forbidden
