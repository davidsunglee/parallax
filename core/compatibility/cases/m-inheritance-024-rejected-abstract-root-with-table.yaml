# Negative (m-inheritance, resolved Q3/Q4): an abstract root declares a physical table.
#
# `Animal` is an abstract `role: root` but also declares `table: animal`. Abstract
# roots (and abstract subtypes) are tableless and rowless — their rows live in a
# concrete descendant's table — so a model-aware validator MUST reject a table on an
# abstract node. (The metamodel schema's entity `table` conditional also rejects this;
# the semantic validator enforces the same rule portably.)
model: models/payment.yaml
tags: [m-inheritance, m-descriptor, rejected, negative, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  model:
    entities:
      - name: Animal
        table: animal
        inheritance:
          strategy: table-per-hierarchy
          role: root
          tag: { column: kind }
        attributes:
          - { name: id, type: int64, column: id, primaryKey: true }
      - name: Dog
        table: animal
        inheritance:
          role: concrete-subtype
          parent: Animal
          tagValue: dog
        attributes:
          - { name: barkVolume, type: int32, column: bark_volume, nullable: true }
then:
  rejectedRule: inheritance-abstract-node-with-table
