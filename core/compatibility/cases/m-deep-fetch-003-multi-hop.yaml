# Deep fetch, MULTI-HOP 1 -> N -> N: the headline N+1-elimination proof.
#
# Root orders {1, 42} along the path Order.items -> OrderItem.statuses resolve in
# EXACTLY THREE statements: the two orders (level 0), their line items keyed by
# order id (level 1), and the item-level statuses keyed by the DISTINCT item ids
# {11, 12, 421, 422} (level 2). Naively this is 1 + N + N = 1 + 2 + 4 = 7 (one items
# query per order, one statuses query per item); deep fetch collapses each level
# into a single IN-keyed query, so `then.roundTrips` is 3. The harness asserts the
# statement count is 3 and that the assembled graph matches `then.graph`, proving
# N+1 elimination automatically rather than by reading the SQL. The order-level
# status rows (order_item_id NULL) are correctly absent — the hop keys on
# order_item_id — and item 422, which has no statuses, yields an empty list.
model: models/orders.yaml
tags: [m-deep-fetch, m-op-list, multi-hop, relationship, slice-mvp-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    deepFetch:
      operand:
        in:
          attr: Order.id
          values: [1, 42]
      paths:
        - [{ rel: Order.items }, { rel: OrderItem.statuses }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where t0.id in (?, ?)
      binds: [1, 42]
    - sql:
        postgres: select t0.id, t0.order_id, t0.sku, t0.quantity from order_item t0 where t0.order_id in (?, ?) order by t0.id desc
      binds: [1, 42]
    - sql:
        postgres: select t0.id, t0.order_item_id, t0.code from order_status t0 where t0.order_item_id in (?, ?, ?, ?) order by t0.code asc
      binds: [11, 12, 421, 422]
  referenceSql: select id, name from orders where id in (1, 42)
  graph:
    Order:
      - id: 1
        name: Ada
        items:
          - id: 12
            order_id: 1
            sku: B-200
            quantity: 1
            statuses:
              - { id: 203, order_item_id: 12, code: PICKED }
          - id: 11
            order_id: 1
            sku: A-100
            quantity: 2
            statuses:
              - { id: 202, order_item_id: 11, code: PACKED }
              - { id: 201, order_item_id: 11, code: PICKED }
      - id: 42
        name: Grace
        items:
          - id: 422
            order_id: 42
            sku: B-200
            quantity: 5
            statuses: []
          - id: 421
            order_id: 42
            sku: A-999
            quantity: 3
            statuses:
              - { id: 204, order_item_id: 421, code: PICKED }
  roundTrips: 3
