# PK generation `sequence` (m-pk-gen) — init 1000, inc 5, three inserts.
#
# ticket_seq 1000->1005->1010->1015; ids 1000,1005,1010 (stride-5 gaps between ids).
model: models/pk-sequence.yaml
tags: [m-pk-gen, m-unit-work, sequence, write-sequence, slice-snapshot-1, slice-managed-1]
shape: writeSequence
given:
  fixtures: true
when:
  writeSequence:
    - mutation: update
      entity: PkSequence
      statements: 1
      note: base 1000
      rows:
        - { name: ticket_seq, nextVal: { increment: 5 } }
    - mutation: insert
      entity: Ticket
      statements: 1
      note: id 1000
      rows:
        - { id: 1000, tier: gold }
    - mutation: update
      entity: PkSequence
      statements: 1
      note: base 1005
      rows:
        - { name: ticket_seq, nextVal: { increment: 5 } }
    - mutation: insert
      entity: Ticket
      statements: 1
      note: id 1005
      rows:
        - { id: 1005, tier: silver }
    - mutation: update
      entity: PkSequence
      statements: 1
      note: base 1010
      rows:
        - { name: ticket_seq, nextVal: { increment: 5 } }
    - mutation: insert
      entity: Ticket
      statements: 1
      note: id 1010
      rows:
        - { id: 1010, tier: bronze }
then:
  statements:
    - sql:
        postgres: update pk_sequence set next_val = next_val + ? where name = ?
        mariadb: update pk_sequence set next_val = next_val + ? where name = ?
      binds: [5, ticket_seq]
    - sql:
        postgres: insert into ticket(id, tier) values (?, ?)
        mariadb: insert into ticket(id, tier) values (?, ?)
      binds: [1000, gold]
    - sql:
        postgres: update pk_sequence set next_val = next_val + ? where name = ?
        mariadb: update pk_sequence set next_val = next_val + ? where name = ?
      binds: [5, ticket_seq]
    - sql:
        postgres: insert into ticket(id, tier) values (?, ?)
        mariadb: insert into ticket(id, tier) values (?, ?)
      binds: [1005, silver]
    - sql:
        postgres: update pk_sequence set next_val = next_val + ? where name = ?
        mariadb: update pk_sequence set next_val = next_val + ? where name = ?
      binds: [5, ticket_seq]
    - sql:
        postgres: insert into ticket(id, tier) values (?, ?)
        mariadb: insert into ticket(id, tier) values (?, ?)
      binds: [1010, bronze]
  tableState:
    ticket:
      - { id: 1000, tier: gold }
      - { id: 1005, tier: silver }
      - { id: 1010, tier: bronze }
  roundTrips: 6
