# Read-lock matrix (m-read-lock / m-dialect): a runtime object find inside a LOCKING unit of work
# emits the shared row lock — `api-conformance` lane.
#
# `m-read-lock-001` proves the locking read is well-formed SQL a single-connection harness can
# execute. This case is the portable *runtime* observable that complements it: the
# developer-surface object find issued inside `px.transaction(body, { concurrency:
# "locking" })` carries the dialect's shared-row-lock suffix (`for share of t0`) —
# the m-read-lock automatic read-lock correctness the runtime applies with no caller SQL,
# owned by the m-dialect dialect (`applyReadLock`, ADR 0012 / delta 09).
#
# The lock is a concurrency property no single-connection harness can distinguish
# (exactly like `m-read-lock-001`), so this case is `lane: api-conformance`: the m-case-format harness
# schema-validates it while the language's API Conformance Suite proves the runtime
# read path emits the lock. The golden documents the expected emitted SQL.
model: models/account.yaml
tags: [m-read-lock, m-dialect, m-api-conformance, locking-mode, slice-mvp-1, slice-snapshot-1, slice-managed-1]
lane: api-conformance
shape: read
when:
  targetEntity: Account
  uow:
    concurrency: locking
  operation:
    eq:
      attr: Account.id
      value: 2
then:
  statements:
    - sql:
        postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ? for share of t0
      binds: [2]
  referenceSql: select id, owner, balance, version from account where id = 2
  rows:
    - { id: 2, owner: Linus, balance: 250.00, version: 1 }
  roundTrips: 1
