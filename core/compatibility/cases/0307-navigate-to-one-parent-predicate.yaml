# navigate(OrderItem.order -> Order.name = 'Ada'): filter child rows by a
# predicate on their to-one parent. This pins reverse/to-one navigation in
# addition to the existing to-many parent-to-child navigation cases.
model: models/orders.yaml
tags: [m4, navigate, relationship, to-one]
operation:
  navigate:
    rel: OrderItem.order
    op:
      eq: { attr: Order.name, value: Ada }
goldenSql:
  postgres: select t0.id, t0.order_id, t0.sku, t0.quantity from order_item t0 where exists (select 1 from orders t1 where t1.id = t0.order_id and t1.name = ?)
binds: [Ada]
referenceSql: select id, order_id, sku, quantity from order_item where order_id in (select id from orders where name = 'Ada')
expectedRows:
  - { id: 11, order_id: 1, sku: A-100, quantity: 2 }
  - { id: 12, order_id: 1, sku: B-200, quantity: 1 }
roundTrips: 1
