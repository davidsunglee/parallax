# between — inclusive bounded range over a decimal(18,2) column. Two ordered
# binds (lower, upper). `between` is a convenience over `>= lower and <= upper`,
# which is exactly what the naive referenceSql spells out.
model: models/orders.yaml
tags: [m-op-algebra, between, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  operation:
    between:
      attr: Order.price
      lower: 20.00
      upper: 50.75
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where t0.price between ? and ?
      binds: [20.00, 50.75]
  referenceSql: select id, name from orders where price >= 20.00 and price <= 50.75
  rows:
    - { id: 2, name: Linus }
    - { id: 3, name: ada }
    - { id: 4, name: Margaret }
    - { id: 5, name: Alan }
  roundTrips: 1
