# between — inclusive bounded range over a decimal(18,2) column. Two ordered
# binds (lower, upper). `between` is a convenience over `>= lower and <= upper`,
# which is exactly what the naive referenceSql spells out.
model: models/orders.yaml
tags: [m-op-algebra, between, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    between:
      attr: Order.price
      lower: 20.00
      upper: 50.75
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.price between ? and ?
      binds: [20.00, 50.75]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where price >= 20.00 and price <= 50.75
  rows:
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
  roundTrips: 1
