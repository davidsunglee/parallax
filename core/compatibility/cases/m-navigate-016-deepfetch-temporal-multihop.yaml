# Multi-hop deep fetch [Policy.coverages, Coverage.claims], Valid Time LATEST /
# Transaction Time LATEST — the temporal analog of the 1 -> N -> N N+1-elimination
# proof. THREE statements (root + coverages + claims), and the root pin
# propagates to BOTH temporal child levels (each carries `thru_z = ? and
# out_z = ?`). coverage 10 -> 700 owns claim 1000 (9000); coverage 20 -> 300 owns
# claim 2000 (4000).
model: models/policy.yaml
tags: [m-navigate, m-temporal-read, temporal, relationship, propagation, bitemporal, multi-hop, slice-snapshot-1, slice-managed-1]
shape: read
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "deep-fetch child levels - the Policy.coverages IN-list binds are the distinct policy ids the root query returned, and the Coverage.claims IN-list binds are the distinct coverage ids the coverages level returned, so both child emissions depend on a query result"
when:
  targetEntity: Policy
  operation:
    deepFetch:
      operand:
        asOf:
          operand:
            asOf:
              operand: { all: {} }
              dimension: transactionTime
              coordinate: latest
          dimension: validTime
          coordinate: latest
      paths:
        - [{ rel: Policy.coverages }, { rel: Coverage.claims }]
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from policy t0 where t0.thru_z = ? and t0.out_z = ?
      binds: [infinity, infinity]
    - sql:
        postgres: select t0.id, t0.policy_id, t0.amount, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from coverage t0 where t0.policy_id in (?, ?) and t0.thru_z = ? and t0.out_z = ?
      binds: [1, 2, infinity, infinity]
    - sql:
        postgres: select t0.id, t0.coverage_id, t0.reserve, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from claim t0 where t0.coverage_id in (?, ?) and t0.thru_z = ? and t0.out_z = ?
      binds: [10, 20, infinity, infinity]
  graph:
    Policy:
      - id: 1
        name: Auto
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        coverages:
          - id: 10
            policy_id: 1
            amount: 700.00
            from_z: "2024-06-01T00:00:00+00:00"
            thru_z: infinity
            in_z: "2024-04-01T00:00:00+00:00"
            out_z: infinity
            claims:
              - { id: 1000, coverage_id: 10, reserve: 9000.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
      - id: 2
        name: Home
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: infinity
        coverages:
          - id: 20
            policy_id: 2
            amount: 300.00
            from_z: "2024-01-01T00:00:00+00:00"
            thru_z: infinity
            in_z: "2024-01-01T00:00:00+00:00"
            out_z: infinity
            claims:
              - { id: 2000, coverage_id: 20, reserve: 4000.00, from_z: "2024-01-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-01-01T00:00:00+00:00", out_z: infinity }
  roundTrips: 3
