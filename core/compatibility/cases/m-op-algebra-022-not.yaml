# not — logical negation wrapping a single inner operation.
model: models/orders.yaml
tags: [m-op-algebra, not, boolean, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    not:
      operand:
        eq: { attr: Order.active, value: true }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where not t0.active = ?
      binds: [true]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where not (active = true)
  rows:
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
  roundTrips: 1
