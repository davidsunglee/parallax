# sum + groupBy + having — the canonical aggregate case (m-agg sub-area).
#
# Group OrderItem rows by their owning order and sum the quantities, keeping only
# groups whose summed quantity exceeds the having threshold of 3. The group totals
# are order 1 -> 3 (dropped, not > 3), order 2 -> 4 (kept), and order 42 -> 8
# (kept), so `then.rows` holds exactly the two surviving groups. Each result row is
# the group key (order_id) and the sum aliased `total_quantity`.
model: models/orders.yaml
tags: [m-agg, m-sql-agg, sum, groupBy, having]
shape: read
when:
  operation:
    groupBy:
      operand:
        all: {}
      keys: [OrderItem.orderId]
      aggregates:
        - sum: { attr: OrderItem.quantity, as: total_quantity }
      having:
        gt:
          agg:
            sum: { attr: OrderItem.quantity, as: total_quantity }
          value: 3
then:
  statements:
    - sql:
        postgres: select t0.order_id, sum(t0.quantity) total_quantity from order_item t0 group by t0.order_id having sum(t0.quantity) > ?
      binds: [3]
  referenceSql: select order_id, sum(quantity) as total_quantity from order_item group by order_id having sum(quantity) > 3
  rows:
    - { order_id: 2, total_quantity: 4 }
    - { order_id: 42, total_quantity: 8 }
  roundTrips: 1
