# Lock-wait timeout (m-db-error). Round 1: A locks gauge row 1 and holds (no commit).
# Round 2: B tries to update row 1, blocks on A's lock, and -- with the session's
# lowered lock-wait budget (lock_timeout / innodb_lock_wait_timeout) -- raises a
# timeout. Neutral category lockWaitTimeout; native PG 55P03 / MariaDB 1205.
model: models/error-cases.yaml
tags: [m-db-error, lockWaitTimeout, slice-snapshot-1, slice-managed-1]
shape: error
given:
  fixtures: true
when:
  concurrency:
    rounds:
      - A:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [10, 1]
      - B:
          statements:
            - sql:
                postgres: "update gauge set v = ? where id = ?"
                mariadb: "update gauge set v = ? where id = ?"
              binds: [20, 1]
then:
  errorClass: lockWaitTimeout
  nativeCode:
    postgres: "55P03"
    mariadb: 1205
