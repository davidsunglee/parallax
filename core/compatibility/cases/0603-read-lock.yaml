# Read-lock case (M8): an in-transaction read acquires a shared row lock.
#
# A read performed inside a unit of work that intends to write is made correct
# automatically — the caller writes no locking SQL. The default in-transaction
# read appends the dialect's shared-row-lock suffix (M8 / M11). For Postgres that
# is `for share of t0`, qualified by the root alias and appended AFTER every other
# clause.
#
# The lock itself is a concurrency property; a single-connection harness proves the
# observable half — the locking read is WELL-FORMED and RESULT-CORRECT. The golden
# SQL is a normal `eq` read with the lock suffix; it executes against real Postgres
# and returns the expected row, cross-checked by an independent naive oracle (the
# same select WITHOUT the lock, which must return the same rows because the lock
# does not change the result).
#
# `for share of t0` is fully lowercase — the canonical fixed point of the M3
# normalizer, which lowercases the lock-clause keywords like any other keyword
# even though sqlglot tokenizes them as values, so the golden SQL passes the
# layer-3 canonical-form check.
model: models/account.yaml
tags: [m8, m3, read-lock, transactions cache]
operation:
  eq:
    attr: Account.id
    value: 2
goldenSql:
  postgres: select t0.id, t0.owner, t0.balance from account t0 where t0.id = ? for share of t0
binds: [2]
referenceSql: select id, owner, balance from account where id = 2
expectedRows:
  - { id: 2, owner: Linus, balance: 250.00 }
roundTrips: 1
