# having with the `<>` comparator (M2 having comparators).
#
# Keep groups whose summed quantity is not 4:
#   order 1 -> 3 (kept), order 2 -> 4 (dropped), order 42 -> 8 (kept).
model: models/orders.yaml
tags: [m2, m3, aggregate, sum, groupBy, having, notEq]
operation:
  groupBy:
    operand:
      all: {}
    keys: [OrderItem.orderId]
    aggregates:
      - sum: { attr: OrderItem.quantity, as: total_quantity }
    having:
      notEq:
        agg:
          sum: { attr: OrderItem.quantity, as: total_quantity }
        value: 4
goldenSql:
  postgres: select t0.order_id, sum(t0.quantity) total_quantity from order_item t0 group by t0.order_id having sum(t0.quantity) <> ?
binds: [4]
referenceSql: select order_id, sum(quantity) as total_quantity from order_item group by order_id having sum(quantity) <> 4
expectedRows:
  - { order_id: 1, total_quantity: 3 }
  - { order_id: 42, total_quantity: 8 }
roundTrips: 1
