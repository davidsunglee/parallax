# Versioned update, locking mode (m-unit-work strategy selection + m-opt-lock): a keyed update on
# a versioned entity ADVANCES the version but emits NO gate.
#
# The version advances on every UPDATE against a versioned entity in BOTH modes;
# what differs is the gate. Under the DEFAULT `locking` strategy the in-
# transaction read already took a shared row lock (m-read-lock), so the write needs no
# version check — it is the ungated version-advancing form (the m-detach-002 / detached-
# merge-back shape). Only OPTIMISTIC mode (m-opt-lock-005 / m-opt-lock-006) adds `and version = ?`.
#
# Account 2 (Linus) is read at version 1 under the lock; the update sets balance
# to 500.00 and advances the version to 2 with NO `and version = ?` gate:
#   update account set balance = ?, version = ? where id = ?
# Fixtures are loaded first; the resulting state proves the write landed and the
# version advanced (id 2 → balance 500.00, version 2; ids 1 and 3 untouched).
model: models/account.yaml
tags: [m-opt-lock, m-unit-work, m-sql, locking-mode, write-sequence, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: writeSequence
given:
  fixtures: true
when:
  uow:
    concurrency: locking
  writeSequence:
    - mutation: update
      entity: Account
      statements: 1
      note: locking-mode keyed update advances the version with no gate
      rows:
        - { id: 2, balance: 500.00, observedVersion: 1 }
then:
  statements:
    - sql:
        postgres: update account set balance = ?, version = ? where id = ?
      binds: [500.00, 2, 2]
  tableState:
    account:
      - { id: 1, owner: Ada, balance: 100.00, version: 1 }
      - { id: 2, owner: Linus, balance: 500.00, version: 2 }
      - { id: 3, owner: Grace, balance: 10.00, version: 1 }
  roundTrips: 1
