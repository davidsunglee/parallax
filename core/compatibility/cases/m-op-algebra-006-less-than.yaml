# lessThan — strict `<` range predicate.
model: models/orders.yaml
tags: [m-op-algebra, lessThan, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  operation:
    lessThan:
      attr: Order.qty
      value: 15
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from orders t0 where t0.qty < ?
      binds: [15]
  referenceSql: select id, name from orders where qty < 15
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
  roundTrips: 1
