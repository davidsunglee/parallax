# lessThan — strict `<` range predicate.
model: models/orders.yaml
tags: [m-op-algebra, lessThan, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    lessThan:
      attr: Order.qty
      value: 15
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.qty < ?
      binds: [15]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where qty < 15
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 2, name: Linus, sku: B-200, qty: 10, price: 20.00, active: true, ordered_on: 2024-02-10 }
  roundTrips: 1
