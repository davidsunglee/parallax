# Cross-process cache coherence — identity preserved across an in-place update
# (m-coherence). The value-convergence cases (m-coherence-001) prove node B observes node A's new
# *value*; this proves node B observes it *at the same logical identity* — the
# interned object is refreshed in place, not forked into a second object for the
# same primary key. It is the cross-process lift of the m-process-cache identity scenario
# (m-process-cache-002): the same-PK-=>-same-object rule, holding across a peer write.
#
# `sameObjectAs: 0` on the final re-fetch ties it to the seed read: both observe
# primary key 2, so node B's cache converged on A's committed write WITHOUT
# breaking one-object-per-PK. (The harness has no cache; it witnesses the
# observable half — the primary-key identity is stable across the refresh — which
# any conforming full-cache re-fetch / partial-cache mark-dirty must satisfy.)
#
# Steps:
#   0  read  on B : seed read of PK 2 — B observes Linus at balance 250.00.
#   1  write on A : A commits balance = 777.00 for id 2 (a separate connection).
#   2  read  on B : B re-fetches PK 2; observes the new 777.00 AND the SAME object
#                   identity as step 0 (sameObjectAs 0).
model: models/account.yaml
tags: [m-coherence, identity, identity-preservation]
shape: coherence
when:
  coherence:
    - node: B
      kind: read
      targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 2
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
            mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
          binds: [2]
      note: seed read on node B — interns Linus (PK 2) at balance 250.00
      observeRows:
        - { id: 2, owner: Linus, balance: 250.00, version: 1 }
    - node: A
      kind: write
      statements:
        - sql:
            postgres: update account set balance = ?, version = ? where id = ?
            mariadb: update account set balance = ?, version = ? where id = ?
          binds: [777.00, 2, 2]
      note: node A commits an in-place update (version advances 1 -> 2) on a separate connection
    - node: B
      kind: read
      targetEntity: Account
      find:
        eq:
          attr: Account.id
          value: 2
      statements:
        - sql:
            postgres: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
            mariadb: select t0.id, t0.owner, t0.balance, t0.version from account t0 where t0.id = ?
          binds: [2]
      sameObjectAs: 0
      identityAttr: id
      note: node B re-fetches PK 2 — observes 777.00 / version 2 at the SAME identity (in place)
      observeRows:
        - { id: 2, owner: Linus, balance: 777.00, version: 2 }
