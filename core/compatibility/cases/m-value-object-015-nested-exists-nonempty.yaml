# valueObject to-many existence: nestedExists over a `many` member is a NON-EMPTY
# test (m-value-object to-many, m-op-algebra, m-dialect array-traversal form), on
# Postgres AND MariaDB.
#
# nestedExists(Customer.address.phones) is true for a row whose `phones` array (a
# `many` nested value object in the address column) has at least one element. Ada
# (2 phones), Linus (1) and Nils (1) qualify; Grace's EMPTY array (3), Mary's NULL
# column (4) and the missing-`phones` rows (5, 6) are all excluded — the four
# not-present states collapse identically. The array-traversal spelling diverges:
# Postgres unnests with the strict `jsonb_array_elements` inside a correlated
# `exists`; MariaDB counts with `json_length(...) > 0` (a NULL/missing path yields
# NULL, excluded). The independent oracle is a different formulation per dialect.
model: models/customer.yaml
tags: [m-value-object, m-op-algebra, m-sql, m-dialect, nested, json, to-many, exists, array-traversal]
shape: read
when:
  operation:
    nestedExists: { path: Customer.address.phones }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where exists (select 1 from jsonb_array_elements(jsonb_extract_path(t0.address, ?)) t1)
        mariadb: select t0.id, t0.name from customer t0 where json_length(t0.address, ?) > ?
      binds:
        postgres: [phones]
        mariadb: ['$.phones', 0]
  referenceSql:
    postgres: select id, name from customer where jsonb_array_length(address -> 'phones') > 0
    mariadb: select id, name from customer where json_contains_path(address, 'one', '$.phones[0]') = 1
  rows:
    - { id: 1, name: Ada }
    - { id: 2, name: Linus }
    - { id: 7, name: Nils }
  roundTrips: 1
