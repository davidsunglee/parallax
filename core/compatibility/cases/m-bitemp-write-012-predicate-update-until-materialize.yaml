# Predicate-selected UPDATE-UNTIL applies the new value only within a BOUNDED Valid-Time
# window, materializing to a Transaction-Time close + three re-inserts (m-bitemp-write +
# m-opt-lock, ADR 0014).
#
# Unlike the plain update (m-bitemp-write-010), which runs the new value to Valid-Time
# infinity, `updateUntil` bounds it to [validFrom, until) = [2024-07-01, 2024-09-01)
# and RESTORES the old value on either side. The resolved row (pos 1, value 200)
# materializes to four statements:
#   1. close the current Transaction-Time row (set out_z = at, gated on the observed
#      coordinates — optimistic);
#   2. head: re-insert old value 200 for [2024-06-01, 2024-07-01);
#   3. middle: insert NEW value 300 for [2024-07-01, 2024-09-01) — the bounded window;
#   4. tail: re-insert old value 200 for [2024-09-01, infinity) — the restored future.
# All three inserts carry in_z = at (2024-10-01).
#
# The trailing find reads as-of validTime 2024-08-01 (INSIDE the window) and expects
# value = 300 on the [2024-07-01, 2024-09-01) segment, proving the new value is visible
# only within the window. Total roundTrips 6 = read (1) + four writes (4) +
# verify read (1).
model: models/position.yaml
tags: [m-bitemp-write, m-opt-lock, m-sql, m-unit-work, bitemporal, temporal, materialize, predicate-write, scenario, slice-snapshot-1]
shape: scenario
compileEligibility:
  mode: run-only
  reason: query-result-dependent
  note: "predicate write materializes per-row from a resolving read - per-row binds (observed version / in_z / matched keys) depend on the query result"
when:
  uow:
    concurrency: optimistic
  scenario:
    - targetEntity: Position
      find:
        and:
          operands:
            - { eq: { attr: Position.id, value: 1 } }
            - { eq: { attr: Position.value, value: 200.00 } }
      roundTrips: 1
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.pos_id = ? and t0.val = ? and t0.thru_z = ? and t0.out_z = ?
          binds: [1, 200.00, infinity, infinity]
      referenceSql: select pos_id, acct_num, val, from_z, thru_z, in_z, out_z from position where pos_id = 1 and val = 200.00 and thru_z = 'infinity'::timestamptz and out_z = 'infinity'::timestamptz
      expectRows:
        - { pos_id: 1, acct_num: A, val: 200.00, from_z: "2024-06-01T00:00:00+00:00", thru_z: infinity, in_z: "2024-04-01T00:00:00+00:00", out_z: infinity }
    - write:
        mutation: updateUntil
        target:
          entity: Position
          predicate:
            and:
              operands:
                - { eq: { attr: Position.id, value: 1 } }
                - { eq: { attr: Position.value, value: 200.00 } }
        assignments:
          - { attr: Position.value, value: 300.00 }
        at: "2024-10-01T00:00:00+00:00"
        validFrom: "2024-07-01T00:00:00+00:00"
        until: "2024-09-01T00:00:00+00:00"
      roundTrips: 4
      statements:
        - sql:
            postgres: update position set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
          binds: ["2024-10-01T00:00:00+00:00", 1, infinity, "2024-06-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [1, A, 200.00, "2024-06-01T00:00:00+00:00", "2024-07-01T00:00:00+00:00", "2024-10-01T00:00:00+00:00", infinity]
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [1, A, 300.00, "2024-07-01T00:00:00+00:00", "2024-09-01T00:00:00+00:00", "2024-10-01T00:00:00+00:00", infinity]
        - sql:
            postgres: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (?, ?, ?, ?, ?, ?, ?)
          binds: [1, A, 200.00, "2024-09-01T00:00:00+00:00", infinity, "2024-10-01T00:00:00+00:00", infinity]
    - targetEntity: Position
      find:
        asOf:
          operand:
            eq: { attr: Position.value, value: 300.00 }
          dimension: validTime
          coordinate: "2024-08-01T00:00:00+00:00"
      roundTrips: 1
      statements:
        - sql:
            postgres: select t0.pos_id, t0.acct_num, t0.val, t0.from_z, t0.thru_z, t0.in_z, t0.out_z from position t0 where t0.val = ? and t0.from_z <= ? and t0.thru_z > ? and t0.out_z = ?
          binds: [300.00, "2024-08-01T00:00:00+00:00", "2024-08-01T00:00:00+00:00", infinity]
      referenceSql: select pos_id, acct_num, val, from_z, thru_z, in_z, out_z from position where val = 300.00 and from_z <= '2024-08-01T00:00:00+00:00'::timestamptz and thru_z > '2024-08-01T00:00:00+00:00'::timestamptz and out_z = 'infinity'::timestamptz
      expectRows:
        - { pos_id: 1, acct_num: A, val: 300.00, from_z: "2024-07-01T00:00:00+00:00", thru_z: "2024-09-01T00:00:00+00:00", in_z: "2024-10-01T00:00:00+00:00", out_z: infinity }
then:
  roundTrips: 6
