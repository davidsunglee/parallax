# valueObject to-many: a scoped `where` requires ONE element to satisfy the whole
# compound — SAME-element (m-value-object to-many, m-op-algebra same-element,
# m-dialect array-traversal form), on Postgres AND MariaDB.
#
# nestedExists(Customer.address.phones, where: type = 'home' AND number =
# '555-9999') is true only when a SINGLE element carries both fields. Linus's one
# phone {home, 555-9999} matches; Ada — whose `home` and `555-9999` live in
# DIFFERENT elements — does NOT, which is exactly what tells this scoped form apart
# from the unscoped AND of m-value-object-018 (that matches Ada too). Postgres puts
# both element predicates on the SAME unnested alias t1; MariaDB uses one
# `json_contains` whose candidate object '{"type":"home", "number":"555-9999"}'
# forces one element to contain all of it. The oracle is a JSON_TABLE unnest on
# MariaDB (parse-only) and a same-element `@>` on Postgres.
model: models/customer.yaml
tags: [m-value-object, m-op-algebra, m-sql, m-dialect, nested, json, to-many, exists, scoped, same-element, array-traversal]
shape: read
when:
  operation:
    nestedExists:
      path: Customer.address.phones
      where:
        and:
          operands:
            - nestedEq: { path: type, value: home }
            - nestedEq: { path: number, value: '555-9999' }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name from customer t0 where exists (select 1 from jsonb_array_elements(jsonb_extract_path(t0.address, ?)) t1 where jsonb_extract_path_text(t1.value, ?) = ? and jsonb_extract_path_text(t1.value, ?) = ?)
        mariadb: select t0.id, t0.name from customer t0 where json_contains(t0.address, ?, ?)
      binds:
        postgres: [phones, type, home, number, '555-9999']
        mariadb: ['{"type":"home", "number":"555-9999"}', '$.phones']
  referenceSql:
    postgres: select id, name from customer where address -> 'phones' @> '[{"type":"home", "number":"555-9999"}]'
    mariadb: select id, name from customer where exists (select 1 from json_table(address, '$.phones[*]' columns (type varchar(64) path '$.type', number varchar(64) path '$.number')) jt where jt.type = 'home' and jt.number = '555-9999')
  rows:
    - { id: 2, name: Linus }
  roundTrips: 1
