# and — conjunction of two atomic predicates. Operands serialize in order; binds
# follow left-to-right appearance.
model: models/orders.yaml
tags: [m-op-algebra, and, boolean, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    and:
      operands:
        - eq: { attr: Order.active, value: true }
        - greaterThan: { attr: Order.qty, value: 10 }
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.active = ? and t0.qty > ?
      binds: [true, 10]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where active = true and qty > 10
  rows:
    - { id: 4, name: Margaret, sku: null, qty: 20, price: 40.00, active: true, ordered_on: 2024-04-20 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
