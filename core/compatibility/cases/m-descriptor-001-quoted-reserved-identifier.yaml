# Reserved-word identifier quoting — a reserved column name is quoted everywhere it
# appears, with the quote CHARACTER as the sole cross-dialect divergence
# (m-descriptor, m-sql, m-dialect seam).
#
# The `ordinal` attribute maps to a column named `order`, a reserved word, so it
# must be quoted in both the projection and the predicate; Postgres double-quotes
# (`"order"`) while MariaDB backticks (`` `order` ``), the one genuine divergence in
# quote character. The same rows return on both dialects (ordinal > 1 ⇒ grades 2 and
# 3). Simple columns (id, label) are not reserved and stay unquoted, proving quoting
# is applied per identifier rather than blanket. The trivial single-table predicate
# needs no `then.referenceSql` — the two `then.rows` are eyeball-verifiable.
model: models/grade.yaml
tags: [m-descriptor, m-sql, m-dialect, identifier, quoting, reserved-word, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  operation:
    greaterThan:
      attr: Grade.ordinal
      value: 1
then:
  statements:
    - sql:
        postgres: select t0.id, t0."order", t0.label from grade t0 where t0."order" > ?
        mariadb: select t0.id, t0.`order`, t0.label from grade t0 where t0.`order` > ?
      binds: [1]
  rows:
    - { id: 2, order: 2, label: mid }
    - { id: 3, order: 3, label: high }
  roundTrips: 1
