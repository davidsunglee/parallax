# Optimistic bitemporal inactivation with a FRESH observed in_z inactivates EXACTLY
# the one observed current row (m-bitemp-write + m-opt-lock).
#
# A bitemporal entity has no version column, so the observed processing-from (in_z)
# is the optimistic-lock version analogue — but a bitemporal key spans both axes.
# Fixture rows R2 and R3 share in_z = 2024-04-01 and are both current on the
# Transaction-Time dimension, differing only by Valid-Time window, so the close adds the business
# discriminator `from_z = ?` alongside the in_z gate to target exactly R3 (value
# 200, business [2024-06-01, infinity)); it inactivates 1 row. A conflict case runs
# only that single close, not the replacement INSERTs a full rectangle split would
# chain, so `then.tableState` shows R3 closed at 2024-10-01 with R1/R2 untouched —
# conflict granularity is the rectangle, not the primary key.
model: models/position.yaml
tags: [m-bitemp-write, m-opt-lock, m-sql, bitemporal, temporal, conflict, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: conflict
compileEligibility:
  mode: run-only
  reason: single-connection
  note: "single-connection concurrency/locking intent (shape:conflict)"
when:
  uow:
    concurrency: optimistic
  write: { id: 1, valid_start: "2024-06-01T00:00:00+00:00" }
  at: "2024-10-01T00:00:00+00:00"
  observedTxStart: "2024-04-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update position set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
        mariadb: update `position` set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
      binds: ["2024-10-01T00:00:00+00:00", 1, infinity, "2024-06-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
  affectedRows: 1
  tableState:
    position:
      - pos_id: 1
        acct_num: A
        val: 90.00
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: "2024-04-01T00:00:00+00:00"
      - pos_id: 1
        acct_num: A
        val: 100.00
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: "2024-06-01T00:00:00+00:00"
        in_z: "2024-04-01T00:00:00+00:00"
        out_z: infinity
      - pos_id: 1
        acct_num: A
        val: 200.00
        from_z: "2024-06-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-04-01T00:00:00+00:00"
        out_z: "2024-10-01T00:00:00+00:00"
