# Negative (m-inheritance, resolved Q3/Q4): table-per-hierarchy concrete subtypes map
# to different physical tables.
#
# `Dog` maps to `animal` and `Cat` to `feline`. Under table-per-hierarchy all concrete
# subtypes in the family share ONE physical table (the shared table the tag
# discriminates); mapping siblings to different tables contradicts the strategy, so a
# model-aware validator MUST reject it.
model: models/payment.yaml
tags: [m-inheritance, m-descriptor, rejected, negative, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  model:
    entities:
      - name: Animal
        inheritance:
          strategy: table-per-hierarchy
          role: root
          tag: { column: kind }
        attributes:
          - { name: id, type: int64, column: id, primaryKey: true }
      - name: Dog
        table: animal
        inheritance:
          role: concrete-subtype
          parent: Animal
          tagValue: dog
        attributes:
          - { name: barkVolume, type: int32, column: bark_volume, nullable: true }
      - name: Cat
        table: feline
        inheritance:
          role: concrete-subtype
          parent: Animal
          tagValue: cat
        attributes:
          - { name: indoor, type: boolean, column: indoor, nullable: true }
then:
  rejectedRule: inheritance-inconsistent-hierarchy-table
