# Negative (m-inheritance): a TPH descendant repeats a physical table.
#
# The root alone owns `animal`. `Cat` incorrectly declares `feline`; a descendant
# may neither repeat the root table nor declare a different one.
model: models/payment.yaml
tags: [m-inheritance, m-descriptor, rejected, negative, slice-snapshot-1, slice-managed-1]
shape: rejected
when:
  model:
    entities:
      - name: Animal
        table: animal
        inheritance:
          strategy: table-per-hierarchy
          role: root
          tag: { column: kind }
        attributes:
          - { name: id, type: int64, column: id, primaryKey: true }
      - name: Dog
        inheritance:
          role: concrete-subtype
          parent: Animal
          tagValue: dog
        attributes:
          - { name: barkVolume, type: int32, column: bark_volume, nullable: true }
      - name: Cat
        table: feline
        inheritance:
          role: concrete-subtype
          parent: Animal
          tagValue: cat
        attributes:
          - { name: indoor, type: boolean, column: indoor, nullable: true }
then:
  rejectedRule: inheritance-tph-descendant-table-forbidden
