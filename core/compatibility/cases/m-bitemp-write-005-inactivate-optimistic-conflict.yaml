# Optimistic bitemporal inactivation with a STALE observed in_z affects ZERO rows
# even though a current row for the same business window exists — the bitemporal
# lost update the in_z gate catches (m-bitemp-write + m-opt-lock).
#
# As in m-bitemp-write-004 the close gates on both the business discriminator
# `from_z = ?` and the processing `in_z = ?`. Here `given.apply` re-chains R3: a
# concurrent writer inactivated it (processing axis closed at 2024-05-01) and opened
# a fresh current milestone for the SAME business window at in_z 2024-05-01. A
# current row for that window still exists, but it is a different processing
# milestone than the one we observed, so our close bound to the stale in_z
# (2024-04-01) matches nothing and affects 0 rows — without the in_z gate it would
# silently re-inactivate the concurrent writer's fresh milestone. `then.tableState`
# is the fixtures plus that re-chain. Harness-only (bitemporal writes are outside
# slice-mvp-1).
model: models/position.yaml
tags: [m-bitemp-write, m-opt-lock, m-sql, bitemporal, temporal, conflict]
shape: conflict
given:
  apply:
    - sql: update position set out_z = '2024-05-01T00:00:00+00:00' where pos_id = 1 and out_z = 'infinity' and from_z = '2024-06-01T00:00:00+00:00' and in_z = '2024-04-01T00:00:00+00:00'
    - sql: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (1, 'A', 250.00, '2024-06-01T00:00:00+00:00', 'infinity', '2024-05-01T00:00:00+00:00', 'infinity')
when:
  uow:
    concurrency: optimistic
  write: { id: 1, businessFrom: "2024-06-01T00:00:00+00:00" }
  at: "2024-10-01T00:00:00+00:00"
  observedInZ: "2024-04-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update position set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
      binds: ["2024-10-01T00:00:00+00:00", 1, infinity, "2024-06-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
  affectedRows: 0
  tableState:
    position:
      - pos_id: 1
        acct_num: A
        val: 90.00
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: "2024-04-01T00:00:00+00:00"
      - pos_id: 1
        acct_num: A
        val: 100.00
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: "2024-06-01T00:00:00+00:00"
        in_z: "2024-04-01T00:00:00+00:00"
        out_z: infinity
      - pos_id: 1
        acct_num: A
        val: 200.00
        from_z: "2024-06-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-04-01T00:00:00+00:00"
        out_z: "2024-05-01T00:00:00+00:00"
      - pos_id: 1
        acct_num: A
        val: 250.00
        from_z: "2024-06-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-05-01T00:00:00+00:00"
        out_z: infinity
