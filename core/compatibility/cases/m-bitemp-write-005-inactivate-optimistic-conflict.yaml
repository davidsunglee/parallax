# Optimistic BITEMPORAL inactivation, STALE observed in_z (m-bitemp-write + m-opt-lock): the inactivating
# close affects ZERO rows even though a current row for the same business window exists.
#
# As in m-bitemp-write-004 the gate carries both the business discriminator `from_z = ?` and the
# processing gate `in_z = ?`. Here a concurrent writer re-chained R3: it inactivated R3
# (closed its processing axis at 2024-05-01) and opened a fresh current milestone for the
# SAME business window [2024-06-01, infinity) at in_z 2024-05-01. So a current row for
# that business window still exists — but it is a DIFFERENT processing milestone than the
# one we observed. Our gated close binds the STALE observed in_z (2024-04-01):
#   update position set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
#   binds [2024-10-01, 1, infinity, 2024-06-01, 2024-04-01]  ->  0 rows.
# Without the in_z gate this close would have silently re-inactivated the concurrent
# writer's fresh current milestone — the bitemporal lost update the gate exists to catch.
#
# The case runs the precondition (the concurrent re-chain) + the SINGLE gated close and
# asserts affectedRows 0; it runs no replacement INSERT of our own. expectedTableState is
# the fixtures + the precondition (R3 inactivated at 2024-05-01, the fresh milestone).
#
# Harness-only (bitemporal writes are outside slice-mvp-1).
# A concurrent writer re-chained R3: inactivate it on the processing axis at 2024-05-01,
# then open a fresh current milestone for the same business window at in_z 2024-05-01.
# R1 — superseded on the processing axis, untouched.
# R2 — the head, still current, untouched.
# R3 — INACTIVATED by the concurrent writer at 2024-05-01 (out_z now finite).
# the concurrent writer's fresh current milestone for the same business window —
# our stale close did NOT touch it (its in_z is 2024-05-01, not the observed 2024-04-01).
model: models/position.yaml
tags: [m-bitemp-write, m-opt-lock, m-sql, bitemporal, temporal, conflict]
shape: conflict
given:
  apply:
    - sql: update position set out_z = '2024-05-01T00:00:00+00:00' where pos_id = 1 and out_z = 'infinity' and from_z = '2024-06-01T00:00:00+00:00' and in_z = '2024-04-01T00:00:00+00:00'
    - sql: insert into position(pos_id, acct_num, val, from_z, thru_z, in_z, out_z) values (1, 'A', 250.00, '2024-06-01T00:00:00+00:00', 'infinity', '2024-05-01T00:00:00+00:00', 'infinity')
when:
  uow:
    concurrency: optimistic
  write: { id: 1, businessFrom: "2024-06-01T00:00:00+00:00" }
  at: "2024-10-01T00:00:00+00:00"
  observedInZ: "2024-04-01T00:00:00+00:00"
then:
  statements:
    - sql:
        postgres: update position set out_z = ? where pos_id = ? and out_z = ? and from_z = ? and in_z = ?
      binds: ["2024-10-01T00:00:00+00:00", 1, infinity, "2024-06-01T00:00:00+00:00", "2024-04-01T00:00:00+00:00"]
  affectedRows: 0
  tableState:
    position:
      - pos_id: 1
        acct_num: A
        val: 90.00
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-01-01T00:00:00+00:00"
        out_z: "2024-04-01T00:00:00+00:00"
      - pos_id: 1
        acct_num: A
        val: 100.00
        from_z: "2024-01-01T00:00:00+00:00"
        thru_z: "2024-06-01T00:00:00+00:00"
        in_z: "2024-04-01T00:00:00+00:00"
        out_z: infinity
      - pos_id: 1
        acct_num: A
        val: 200.00
        from_z: "2024-06-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-04-01T00:00:00+00:00"
        out_z: "2024-05-01T00:00:00+00:00"
      - pos_id: 1
        acct_num: A
        val: 250.00
        from_z: "2024-06-01T00:00:00+00:00"
        thru_z: infinity
        in_z: "2024-05-01T00:00:00+00:00"
        out_z: infinity
