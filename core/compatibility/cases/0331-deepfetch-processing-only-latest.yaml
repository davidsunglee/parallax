# The CLEAN audit-only example: deep fetch Invoice.lines as of processing LATEST.
# Single-axis propagation: the child carries `out_z = ?` (bind infinity). Line
# 1000 -> 75 (current), line 1001 -> 25.
model: models/invoice.yaml
tags: [m4, m7, temporal, relationship, deepFetch, propagation, audit-only, slice-mvp-1]
operation:
  deepFetch:
    operand:
      asOf:
        operand: { all: {} }
        asOfAttr: Invoice.processingDate
        date: now
    paths:
      - [Invoice.lines]
goldenSql:
  postgres:
    - select t0.id, t0.name from invoice t0 where t0.out_z = ?
    - select t0.id, t0.invoice_id, t0.amount from invoice_line t0 where t0.invoice_id in (?) and t0.out_z = ?
binds:
  - [infinity]
  - [100, infinity]
roundTrips: 2
expectedGraph:
  Invoice:
    - id: 100
      name: INV-100
      lines:
        - { id: 1000, invoice_id: 100, amount: 75.00 }
        - { id: 1001, invoice_id: 100, amount: 25.00 }
