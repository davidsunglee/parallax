# Boundary case (m-opt-lock): with the opt-in SET, an optimistic-lock conflict is
# AUTO-retried — the closure re-executes, re-reads, and succeeds — `api-conformance`
# lane.
#
# The loop-mechanics complement to the harness-lane `m-opt-lock-009`: `retryOptimisticConflicts:
# true` joins conflicts to the retriable set, so an injected conflict on the first
# attempt makes the boundary re-execute the WHOLE closure — the re-read observes the
# now-current version and the re-applied gated UPDATE succeeds — and the unit of work
# COMMITS, with NO caller retry code. This is the observable that a single-connection
# harness cannot provoke (it needs an injected conflict and a re-executed closure),
# so it is authored here beside `m-opt-lock-009`'s golden-SQL proof.
#
# `lane: api-conformance`: injected conflict, re-executed closure; suite-driven via a
# fault-injecting decorator around the shipped adapter.
model: models/account.yaml
tags: [m-opt-lock, m-auto-retry, m-api-conformance, conflict, success, slice-mvp-1, slice-snapshot-1, slice-managed-1]
lane: api-conformance
shape: boundary
given:
  fault: optimistic-lock-conflict
when:
  uow:
    concurrency: optimistic
    retryOptimisticConflicts: true
  boundary:
    - action: read
      note: observe the versioned row (records the observed version)
    - action: update
      note: the gated UPDATE conflicts once, then the auto-retry re-reads and succeeds
then:
  outcome: committed
