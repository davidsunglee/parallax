# notEq over a column containing NULLs — three-valued-logic exclusion (m-op-algebra §Null).
#
# `notEq` against a NULL column yields NULL (not true), so the NULL row is
# EXCLUDED, never returned. Order 4 has a NULL sku, so `sku <> 'B-200'` must drop
# both order 2 (the literal match) AND order 4 (the NULL). This is the negative
# 3VL companion to m-op-algebra-003 (notEq over non-null data) — the classic SQL footgun the
# spec mandates, proven against real data.
model: models/orders.yaml
tags: [m-op-algebra, notEq, "null", three-valued-logic, slice-mvp-1, slice-snapshot-1, slice-managed-1]
shape: read
when:
  targetEntity: Order
  operation:
    notEq:
      attr: Order.sku
      value: B-200
then:
  statements:
    - sql:
        postgres: select t0.id, t0.name, t0.sku, t0.qty, t0.price, t0.active, t0.ordered_on from orders t0 where t0.sku <> ?
      binds: [B-200]
  referenceSql: select id, name, sku, qty, price, active, ordered_on from orders where sku != 'B-200'
  rows:
    - { id: 1, name: Ada, sku: A-100, qty: 5, price: 10.50, active: true, ordered_on: 2024-01-05 }
    - { id: 3, name: ada, sku: A-300, qty: 15, price: 30.25, active: false, ordered_on: 2024-03-15 }
    - { id: 5, name: Alan, sku: "C_50%", qty: 25, price: 50.75, active: false, ordered_on: 2024-05-25 }
    - { id: 42, name: Grace, sku: A-999, qty: 30, price: 99.99, active: true, ordered_on: 2024-06-30 }
  roundTrips: 1
