# Fixture rows for the Orders model (models/orders.yaml).
#
# Keyed by class name. Each row is a map of attribute-name -> value. The harness
# data loader resolves attribute names to columns via the descriptor, so fixture
# rows speak the metamodel's vocabulary (attribute names), not raw column names.
#
# The Order dataset is deliberately small but varied — distinct qty/price bands, a
# NULL sku, mixed case names, and `%`/`_` literals in a sku — so each Phase 2
# operator (range, null, string incl. wildcard-escape and case-insensitive,
# membership, boolean/group, directives) has unambiguous expected rows. These
# Order rows are UNCHANGED from Phase 2 so every Phase 1/2 case keeps passing.
#
# Phase 3 adds OrderItem and OrderStatus rows so relationship navigation and deep
# fetch have a graph to traverse. The shape is chosen so the relationships fan
# out unevenly (some orders have items, some don't; some items have statuses,
# some don't), which makes navigate / exists / deep-fetch results discriminating.
Order:
  - id: 1
    name: Ada
    sku: A-100
    qty: 5
    price: 10.50
    active: true
    orderedOn: 2024-01-05
  - id: 2
    name: Linus
    sku: B-200
    qty: 10
    price: 20.00
    active: true
    orderedOn: 2024-02-10
  - id: 3
    name: ada
    sku: A-300
    qty: 15
    price: 30.25
    active: false
    orderedOn: 2024-03-15
  - id: 4
    name: Margaret
    sku: null
    qty: 20
    price: 40.00
    active: true
    orderedOn: 2024-04-20
  - id: 5
    name: Alan
    sku: "C_50%"
    qty: 25
    price: 50.75
    active: false
    orderedOn: 2024-05-25
  - id: 42
    name: Grace
    sku: A-999
    qty: 30
    price: 99.99
    active: true
    orderedOn: 2024-06-30

# Line items. Orders 1, 2, and 42 have items; orders 3, 4, 5 have none.
OrderItem:
  - id: 11
    orderId: 1
    sku: A-100
    quantity: 2
  - id: 12
    orderId: 1
    sku: B-200
    quantity: 1
  - id: 21
    orderId: 2
    sku: A-300
    quantity: 4
  - id: 421
    orderId: 42
    sku: A-999
    quantity: 3
  - id: 422
    orderId: 42
    sku: B-200
    quantity: 5

# Status events. Rows with a NULL orderItemId are ORDER-level statuses (reached
# via Order.statuses); rows with an orderItemId set are ITEM-level statuses
# (reached via the multi-hop Order.items -> OrderItem.statuses). This dual role
# lets one entity exercise both a to-many off the root and the second hop of the
# 1 -> N -> N deep fetch.
OrderStatus:
  # order-level
  - id: 101
    orderId: 1
    orderItemId: null
    code: NEW
  - id: 102
    orderId: 2
    orderItemId: null
    code: SHIPPED
  - id: 142
    orderId: 42
    orderItemId: null
    code: NEW
  # item-level (multi-hop grandchildren)
  - id: 201
    orderId: 1
    orderItemId: 11
    code: PICKED
  - id: 202
    orderId: 1
    orderItemId: 11
    code: PACKED
  - id: 203
    orderId: 1
    orderItemId: 12
    code: PICKED
  - id: 204
    orderId: 42
    orderItemId: 421
    code: PICKED

# Tags on order 1, inserted OUT OF declared order so the multi-key orderBy is
# load-bearing. Declared order is `priority desc, label asc`, so the expected
# list is fragile(5), then the priority=2 tie broken by `label asc` -> gift,
# urgent. Only the multi-key ordering case (0322) navigates Order.tags; every
# other case ignores this table.
OrderTag:
  - id: 1
    orderId: 1
    label: urgent
    priority: 2
  - id: 2
    orderId: 1
    label: gift
    priority: 2
  - id: 3
    orderId: 1
    label: fragile
    priority: 5
