# Fixture rows for the Document table-per-concrete-subtype model
# (models/document.yaml).
#
# Each concrete subtype has its OWN table, so rows are keyed per concrete subtype.
# Each row carries the inherited attributes (id, title) plus the subtype's own
# column; the abstract `Document` root owns no rows. A concrete read reads only its
# own table.
Invoice:
