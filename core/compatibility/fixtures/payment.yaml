# Fixture rows for the Payment table-per-hierarchy model (models/payment.yaml).
#
# The whole family lives in one `payment` table, but rows are keyed by CONCRETE
# subtype — the abstract root `Payment` is rowless. Each concrete subtype's `kind`
# tag column is DERIVED from its `tagValue` (m-inheritance), never authored here.
#
# Two card rows (Visa / Amex) and one cash row, so a concrete-subtype tag filter
# discriminates cleanly:
#   id 1 CardPayment  amount 100.00  network Visa   (kind=card, derived)
#   id 2 CardPayment  amount  50.00  network Amex   (kind=card, derived)
#   id 3 CashPayment  amount  20.00  tendered 25.00 (kind=cash, derived)
CardPayment:
  - id: 1
    amount: 100.00
    cardNetwork: Visa
  - id: 2
    amount: 50.00
    cardNetwork: Amex
CashPayment:
  - id: 3
    amount: 20.00
    tendered: 25.00
