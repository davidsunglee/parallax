# Fixture rows for the Customer valueObject model (models/customer.yaml).
#
# Each `address` value is a nested mapping loaded into the single m-core `json`
# column. The nested-field cases extract declared attributes at shallow
# (`address.city`), two-level (`address.geo.country`, `address.geo.elevation`) and
# three-level (`address.geo.point.lat`) depth. Postgres golden SQL uses
# jsonb_extract_path_text (text, cast per m-dialect for the numeric attributes);
# MariaDB uses json_value (which maps a JSON `null` leaf and a missing path alike
# to SQL NULL, so the absence collapse holds on both dialects â€” m-dialect).
#
# The rows instantiate the distinguishable presence / absence states the
# absence-collapse rule (m-op-algebra) folds to "not present":
#
#   id 1 Ada    city Oslo   geo NO  elevation 10.5  point (59.9, 10.7)  present object + scalars
#   id 2 Linus  city Oslo   geo NO  elevation 20.0  point (59.9, 10.8)  present object + scalars
#   id 3 Grace  city Boston geo US  elevation  5.0  point (42.3,-71.0)  present object + scalars
#   id 4 Mary   address null                                            SQL-NULL column
#   id 5 Kavi   (no city)   geo has only zip                            MISSING key (city, geo.country, geo.elevation, geo.point)
#   id 6 Rin    city Berlin geo "unknown" (a scalar)                    NON-OBJECT intermediate (geo.country / geo.elevation / geo.point block descent)
#   id 7 Nils   city null   geo.country/elevation/point.* all null      explicit JSON `null` LEAF at every extracted leaf
#
# All four not-present states â€” SQL-NULL column (4), missing key (5), non-object
# intermediate (6), and explicit JSON `null` leaf (7) â€” collapse to a SQL-NULL
# extraction and are excluded by every nested predicate; isNull matches exactly
# them. Because the MariaDB golden extraction is json_value (JSON `null` -> SQL
# NULL) all four collapse IDENTICALLY on Postgres AND MariaDB, and are what the
# cases pin on both dialects.
#
# To-many (`address.phones`, a `many` nested value object â€” a JSON array of
# {type, number} documents in the SAME address column) drives the exists /
# any-element / same-element cases (m-op-algebra to-many, m-dialect array-traversal
# form). The phones arrays are the discriminating dataset:
#
#   id 1 Ada    phones [{home,555-1234},{work,555-9999}]  two elements â€” the DISCRIMINATOR
#   id 2 Linus  phones [{home,555-9999}]                  one element with BOTH home & 555-9999
#   id 3 Grace  phones []                                 EMPTY array
#   id 7 Nils   phones [{work,555-0000}]                  present, matches neither predicate
#   id 4 Mary   (address null)                            NULL column â€” no phones
#   id 5 Kavi / id 6 Rin  (address present, no `phones`)  MISSING phones key
#
# Absence collapse for a `many` member (m-op-algebra to-many / m-dialect
# array-traversal): a `phones` value that is NOT a JSON array collapses to "not
# present" â€” zero elements â€” exactly like a missing key or a NULL column. Three
# distinguishable NON-ARRAY storage states instantiate that, and they are the
# rows the guarded golden SQL exists to handle (an UNguarded traversal would ERROR
# on Postgres and MIS-COUNT on MariaDB â€” see cases 015-022):
#
#   id 8  Iris   phones null                              explicit JSON `null`
#   id 9  Omar   phones "555-0000" (a JSON string)        NON-ARRAY scalar
#   id 10 Priya  phones {type:home, number:'555-9999'}    NON-ARRAY object
#
# Each of these three is EXCLUDED by nestedExists / any-element / same-element and
# INCLUDED by nestedNotExists, indistinguishable from the empty array (3) and the
# NULL column (4). id 9's scalar VALUE ("555-0000") equals a real element's number
# (id 7), and id 10's OBJECT content matches the same-element candidate; both still
# collapse to not-present because they are not arrays (cases 021, 019/020). Rows
# 8-10 also carry no `city`/`geo`, so â€” like Kavi (5) â€” they read as not-present
# for the scalar nested predicates (projected null in 003, matched by isNull in
# 007 / 013).
#
# The discriminating pair: ANDing two flat any-element predicates
# (nestedEq(phones.type, home) AND nestedEq(phones.number, '555-9999')) matches
# BOTH id 1 (home in element 0, 555-9999 in element 1 â€” DIFFERENT elements) and id
# 2; the scoped form nestedExists(phones, where: type=home AND number=555-9999)
# requires ONE element to satisfy both, so it matches ONLY id 2. id 1 is the row
# that tells the two apart. exists = non-empty {1,2,7}; notExists (empty-or-absent)
# folds the empty array (3), the NULL column (4), the missing key (5,6) and every
# non-array state (8,9,10) together.
Customer:
  - id: 1
    name: Ada
    address:
      street: 1 Park Ave
      city: Oslo
      geo:
        country: NO
        zip: "0150"
        elevation: 10.5
        point:
          lat: 59.9
          lon: 10.7
      phones:
        - { type: home, number: '555-1234' }
        - { type: work, number: '555-9999' }
  - id: 2
    name: Linus
    address:
      street: 2 Main St
      city: Oslo
      geo:
        country: NO
        zip: "0151"
        elevation: 20.0
        point:
          lat: 59.9
          lon: 10.8
      phones:
        - { type: home, number: '555-9999' }
  - id: 3
    name: Grace
    address:
      street: 9 Beacon St
      city: Boston
      geo:
        country: US
        zip: "02108"
        elevation: 5.0
        point:
          lat: 42.3
          lon: -71.0
      phones: []
  # id 4 (Mary) has NO address: the nullable valueObject column is SQL NULL. A
  # nested extraction over it yields null, so it reads back as a null projected
  # field and is EXCLUDED by every nested predicate via the absence collapse.
  - id: 4
    name: Mary
    address: null
  # id 5 (Kavi): `address` is present but the `city` key and every `geo` inner
  # attribute (country / elevation / point) are MISSING keys â€” the missing-key
  # not-present state. Extraction yields SQL NULL on both dialects.
  - id: 5
    name: Kavi
    address:
      street: 5 Harbour Rd
      geo:
        zip: "3000"
  # id 6 (Rin): `city` is present (Berlin) but `geo` is a SCALAR string, not an
  # object â€” a non-object intermediate that blocks descent, so geo.country /
  # geo.elevation / geo.point.lat all extract SQL NULL on both dialects.
  - id: 6
    name: Rin
    address:
      street: 6 Kastanien Allee
      city: Berlin
      geo: unknown
  # id 7 (Nils): `address` and `geo` are present objects, but the extracted leaves
  # are explicit JSON `null` â€” `city` is null, and `geo.country`, `geo.elevation`,
  # `geo.point.lat` are null. This is the JSON-`null`-LEAF not-present state,
  # distinct from the missing key (5) and the non-object intermediate (6): the keys
  # are present with a null value. The MariaDB golden json_value maps JSON `null` to
  # SQL NULL (as Postgres jsonb_extract_path_text does), so this row collapses to
  # "not present" identically on both dialects â€” matched by isNull, excluded by
  # every comparison.
  - id: 7
    name: Nils
    address:
      street: 7 Fjord Vei
      city: null
      geo:
        country: null
        zip: "0152"
        elevation: null
        point:
          lat: null
          lon: null
      phones:
        - { type: work, number: '555-0000' }
  # id 8 (Iris): `address` is present but `phones` is an explicit JSON `null` â€” a
  # non-array `many` value. The array traversal must read it as ZERO elements (not
  # present), never as a scalar to unnest. Excluded by exists / any-element,
  # included by notExists.
  - id: 8
    name: Iris
    address:
      street: 8 Null Way
      phones: null
  # id 9 (Omar): `phones` is a NON-ARRAY JSON scalar (a string). Its value
  # "555-0000" deliberately equals a real element's `number` (Nils, id 7), yet it
  # still collapses to not-present because it is not an array â€” an unguarded
  # any-element read must NOT match it (case 021).
  - id: 9
    name: Omar
    address:
      street: 9 Scalar Rd
      phones: "555-0000"
  # id 10 (Priya): `phones` is a NON-ARRAY JSON object. Its content matches the
  # same-element candidate {type:home, number:'555-9999'}, so an UNguarded MariaDB
  # `json_contains` would wrongly match it and Postgres `jsonb_array_elements`
  # would ERROR; the array-type guard collapses it to not-present on both dialects
  # (cases 017-020).
  - id: 10
    name: Priya
    address:
      street: 10 Object Ct
      phones:
        type: home
        number: '555-9999'

# Location rows (models/customer.yaml `Location`, the many side of the to-many
# `Customer.locations`). Each `address` is the SAME recursive composite as a
# Customer address, loaded into Location's own single structured-document column,
# so the deep-fetch child level materializes a document AT DEPTH exactly as the
# owner read does (m-value-object). The rows are tied to specific Customer parents
# to exercise the fan-out shapes the witness pins:
#
#   id 100  customer 1 (Ada)   label HQ     address present (an undeclared `zip`
#                                            inside geo is DROPPED by the declared
#                                            projection, like the Customer rows)
#   id 101  customer 1 (Ada)   label Depot  address NULL â€” the null-DOCUMENT child:
#                                            the whole value object materializes
#                                            null, the absence collapse pinned at
#                                            DEPTH (the analogue of Customer id 4)
#   id 102  customer 2 (Linus) label Home   address present, empty phones array
#
# Customer 1 owns TWO locations (100, 101 â€” ordered by id asc per the relationship
# orderBy), one of them the null-document child; Customer 2 owns one; Customers
# 3-10 own none, so they appear in the graph with an empty `locations` list
# (the fan-out attaches by key, never dropping childless parents).
Location:
  - id: 100
    customerId: 1
    label: HQ
    address:
      street: 1 Harbour Way
      city: Oslo
      geo:
        country: NO
        zip: "0150"
        elevation: 12.0
        point:
          lat: 59.91
          lon: 10.75
      phones:
        - { type: work, number: '555-0100' }
  # id 101: the null-DOCUMENT child â€” Location.address is SQL NULL, so the whole
  # value object materializes null in the child graph node (the depth analogue of
  # Customer id 4 / Mary). This is the row the witness exists to pin: an
  # implementation that materializes documents at the root but forgets them at
  # child levels, or that mis-handles a null child document, fails here.
  - id: 101
    customerId: 1
    label: Depot
    address: null
  - id: 102
    customerId: 2
    label: Home
    address:
      street: 5 Karl Johans Gate
      city: Oslo
      geo:
        country: NO
        elevation: 8.0
        point:
          lat: 59.92
          lon: 10.74
      phones: []
