# Fixture rows for the Instrument table-per-hierarchy BITEMPORAL model
# (models/instrument.yaml) — the milestone history the temporal abstract-target read
# (m-inheritance-092) queries.
#
# The whole family lives in one `instrument` table, keyed by CONCRETE subtype (the
# abstract root Instrument is rowless). Each row's `kind` tag is DERIVED from the
# subtype's tagValue (m-inheritance), never authored here. Interval columns are
# authored as ISO-8601 UTC strings; the open upper bound is the literal `infinity`.
# The loader resolves attribute names to columns (businessFrom/businessTo ->
# from_z/thru_z, processingFrom/processingTo -> in_z/out_z).
#
# Each instrument is a single fully-current rectangle (business [2024-01-01, infinity),
# processing [2024-01-01, infinity)), so a read pinned business-past 2024-06-01 /
# processing-now returns both, each carrying its familyVariant (bond -> Bond,
# stock -> Stock). Inner subtype columns not applicable to a row load as null.
Bond:
  - id: 1
    price: 100.00
    coupon: 5.00
    businessFrom: "2024-01-01T00:00:00+00:00"
    businessTo: infinity
    processingFrom: "2024-01-01T00:00:00+00:00"
    processingTo: infinity
Stock:
  - id: 2
    price: 200.00
    ticker: ACME
    businessFrom: "2024-01-01T00:00:00+00:00"
    businessTo: infinity
    processingFrom: "2024-01-01T00:00:00+00:00"
    processingTo: infinity
