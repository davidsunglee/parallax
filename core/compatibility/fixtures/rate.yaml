# Fixture rows for the Rate table-per-concrete-subtype BITEMPORAL model
# (models/rate.yaml) — the milestone history the temporal abstract-target `union all`
# read (m-inheritance-093) and the concrete-target reads (m-inheritance-100) query.
#
# Each concrete subtype owns its OWN table (deposit_rate / loan_rate), keyed by CONCRETE
# subtype (the abstract root Rate is rowless). There is no shared table and no tag.
# Interval columns are authored as ISO-8601 UTC strings; the open upper bound is the
# literal `infinity`. The loader resolves attribute names to columns (businessFrom/
# businessTo -> from_z/thru_z, processingFrom/processingTo -> in_z/out_z).
#
# DepositRate carries TWO processing milestones sharing the SAME business key (id: 1)
# and the SAME business interval ([2024-01-01, infinity) — no business-effective change)
# but DIFFERENT `in_z` values: a CLOSED historical correction (processing [2024-01-01,
# 2024-02-01), amount 2.25 / grade B) and the CURRENT one (processing [2024-02-01,
# infinity), amount 2.50 / grade A). This is the fixture the TPCS provisioning DDL must
# key on `(id, from_z, in_z)` — not `(id)` — to admit at all (a single-column physical PK
# would reject the second row outright, m-descriptor). A read pinned business-past
# 2024-06-01 / processing-now (m-inheritance-093, m-inheritance-100's default read) still
# resolves to exactly the CURRENT row (amount 2.50 / grade A), preserving m-inheritance-093's
# original current-result semantics; a read pinned processing-past into the closed window
# (m-inheritance-100's historical read) resolves to the OTHER, superseded row instead.
#
# LoanRate stays a single fully-current rectangle (business [2024-01-01, infinity),
# processing [2024-01-01, infinity)) — an abstract read pinned business-past 2024-06-01 /
# processing-now returns both branches' current rows, each carrying its per-branch
# familyVariant literal (DepositRate / LoanRate).
DepositRate:
  - id: 1
    amount: 2.25
    grade: B
    businessFrom: "2024-01-01T00:00:00+00:00"
    businessTo: infinity
    processingFrom: "2024-01-01T00:00:00+00:00"
    processingTo: "2024-02-01T00:00:00+00:00"
  - id: 1
    amount: 2.50
    grade: A
    businessFrom: "2024-01-01T00:00:00+00:00"
    businessTo: infinity
    processingFrom: "2024-02-01T00:00:00+00:00"
    processingTo: infinity
LoanRate:
  - id: 2
    amount: 6.75
    spread: 1.25
    businessFrom: "2024-01-01T00:00:00+00:00"
    businessTo: infinity
    processingFrom: "2024-01-01T00:00:00+00:00"
    processingTo: infinity
