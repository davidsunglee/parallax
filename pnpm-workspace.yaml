packages:
  - "languages/typescript/packages/*"
  - "languages/typescript/examples/*"
allowBuilds:
  # esbuild needs its postinstall to fetch the platform binary (vitest/tsx).
  esbuild: true
  # Testcontainers' Docker transport (dockerode → ssh2) pulls these optional
  # native build helpers. They are not required for the Docker-socket path the
  # Postgres provider uses, so their build scripts stay off (keeps the supply
  # chain minimal); ssh2 falls back to its pure-JS implementation.
  cpu-features: false
  protobufjs: false
  ssh2: false
