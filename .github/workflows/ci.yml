name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Secret scanning: fail fast on live credentials or credentials whose verifier
  # could not conclusively determine status. GitHub secret scanning should still
  # be enabled for continuous repository monitoring where available.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@v3.95.7
        with:
          extra_args: --results=verified,unknown

  # Static checks: lint + schema/meta-schema validation + sqlglot-parse +
  # dependency-graph DAG check + the coverage gate (every in-scope module has a
  # fixture) + the first-implementation-mvp profile gate (the tagged slice is
  # consistent with its canonical describe claim). No Docker required.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: astral-sh/setup-uv@v5
      - name: Sync harness deps
        working-directory: reference-harness
        run: uv sync --frozen
      - name: just lint
        run: just lint
      - name: just dep-graph
        run: just dep-graph

  # The Docker-free TypeScript lane: typecheck (tsc -b), Biome, the
  # dependency-cruiser DAG gate, the full-slice compile sweep + honesty gate +
  # case-matrix report, and the package-export health checks (publint / attw /
  # knip). This is the fast inner-loop lane; no Docker required.
  ts-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (tsc -b)
        run: pnpm run ts:typecheck
      - name: Lint (biome + dependency-cruiser)
        run: pnpm run ts:lint
      - name: Package-export health (publint + attw + knip)
        run: pnpm run ts:package-check
      - name: Conformance compile sweep (Docker-free)
        run: pnpm exec vitest run --root languages/typescript packages/conformance
      - name: DSL fidelity + codegen (Docker-free)
        run: >-
          pnpm exec vitest run --root languages/typescript
          packages/typescript/test/dsl.test.ts
          packages/typescript/test/generate.test.ts
      - name: Conformance slice coverage report
        run: pnpm run ts:conformance-coverage
      - name: Add conformance slice coverage summary
        run: cat coverage/conformance-slice.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload conformance slice coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-slice-coverage
          path: |
            coverage/conformance-slice.json
            coverage/conformance-slice.md
          if-no-files-found: warn

  # The Docker-backed TypeScript run lane: provision postgres:17 via
  # Testcontainers and run the full first-implementation-mvp slice end-to-end
  # (rows / graph / tableState / affectedRows + roundTrips), asserting the
  # case-matrix report is green. Docker is available on GitHub-hosted ubuntu
  # runners, so Testcontainers works out of the box.
  ts-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dialect: [postgres]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build the composition-root dist (tsc -b)
        run: pnpm run ts:typecheck
      - name: Conformance run lane (${{ matrix.dialect }}, Testcontainers)
        run: pnpm exec vitest run --root languages/typescript packages/typescript

  # TypeScript V8 line coverage. This produces a GitHub job-summary table and
  # uploads the full report, including lcov.info for later Codecov/Coveralls use.
  ts-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build TypeScript workspace (tsc -b)
        run: pnpm run ts:typecheck
      - name: TypeScript line coverage
        run: pnpm run ts:coverage
      - name: Add TypeScript coverage summary
        if: always()
        run: node languages/typescript/scripts/coverage-summary.mjs coverage/typescript/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"
      - name: Upload TypeScript coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-coverage
          path: coverage/typescript
          if-no-files-found: warn

  # Conventional-commit validation across the PR commit range.
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate PR commits
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  # The compatibility suite across the database matrix. Docker is available on
  # GitHub-hosted ubuntu runners, so Testcontainers works out of the box.
  suite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [postgres, mariadb]
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync harness deps
        working-directory: reference-harness
        run: uv sync --frozen
      - name: Run suite (${{ matrix.database }})
        env:
          PARALLAX_DATABASES: ${{ matrix.database }}
        run: just test
