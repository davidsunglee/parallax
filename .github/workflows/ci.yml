name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Secret scanning: fail fast on live credentials or credentials whose verifier
  # could not conclusively determine status. GitHub secret scanning should still
  # be enabled for continuous repository monitoring where available.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          extra_args: --results=verified,unknown

  # Static checks: lint + schema/meta-schema validation + sqlglot-parse +
  # dependency-graph DAG check + the coverage gate (every in-scope module has a
  # fixture) + the profile gate (each tagged slice is consistent with its
  # canonical describe claim). No Docker required.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: astral-sh/setup-uv@v7
      - name: Sync harness deps
        working-directory: reference-harness
        run: uv sync --frozen
      - name: just lint
        run: just lint
      - name: just core-dep-graph
        run: just core-dep-graph

  # Conventional-commit validation across the PR commit range.
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate PR commits
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  # The compatibility suite across the database matrix. Docker is available on
  # GitHub-hosted ubuntu runners, so Testcontainers works out of the box.
  suite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [postgres, mariadb]
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - uses: astral-sh/setup-uv@v7
      - name: Sync harness deps
        working-directory: reference-harness
        run: uv sync --frozen
      - name: Run suite (${{ matrix.database }})
        env:
          PARALLAX_DATABASES: ${{ matrix.database }}
        run: just oracle-test

  # The Docker-free Python static lane across the supported CPython matrix: ruff
  # (lint + format check), Pyright strict, the generated import-linter
  # forbidden-edge complement (DAG-sync check) + lint-imports, unit tests +
  # branch coverage + diff-cover, the built-artifact / clean-install /
  # api-surface proofs, dead-code scan, and the supply-chain audit. No Docker.
  python-static:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    env:
      UV_FROZEN: "1"
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v7
        with:
          # diff-cover compares changed lines against origin/main.
          fetch-depth: 0
      - uses: extractions/setup-just@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync Python workspace (frozen)
        working-directory: languages/python
        run: uv sync --frozen
      - name: just python-static
        run: just python-static

  # The Docker-backed Python run lane: provisions Testcontainers Postgres and
  # runs the pg-full run sweep, provider contract, adapter smoke, and API
  # conformance. Those lanes come online in COR-3 Phase 5+, together with the
  # session summary that fails on any silently skipped database-backed check;
  # until then the markers collect nothing (pytest's no-tests exit code 5 is
  # tolerated). Docker is available on GitHub-hosted ubuntu runners.
  python-database:
    runs-on: ubuntu-latest
    env:
      UV_FROZEN: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Sync Python workspace (frozen)
        working-directory: languages/python
        run: uv sync --frozen
      - name: Python database lanes (Testcontainers Postgres)
        working-directory: languages/python
        run: uv run pytest -m "conformance or provider_contract or adapter_smoke or api_conformance" || [ "$?" -eq 5 ]
